<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:0.5s;
}

body.kids{background:linear-gradient(135deg,#ff9a9e,#fad0c4);}
body.dark{background:linear-gradient(135deg,#0f0c29,#302b63);}
body.neon{background:linear-gradient(135deg,#00f5ff,#7cffcb,#ff61d2);}

.card{
width:92%;
max-width:500px;
background:white;
padding:18px;
border-radius:18px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.btn{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffd32a;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
border-radius:50%;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body class="kids">

<div class="card">

<div>⭐ <span id="stars">0</span> | 🪙 <span id="coins">0</span></div>

<h2>🎮 Kids Quiz PRO</h2>

<button class="btn p3" onclick="theme()">🎨 Theme</button>

<!-- START -->
<div id="startScreen">
<button class="btn p1" onclick="start()">Start Game</button>
</div>

<!-- CATEGORY -->
<div id="catScreen" class="hidden">
<button class="btn p2" onclick="catSelect('math')">Math</button>
<button class="btn p3" onclick="catSelect('english')">English</button>
<button class="btn p4" onclick="catSelect('gk')">GK</button>
</div>

<!-- LEVEL -->
<div id="levelScreen" class="hidden">
<button id="easyBtn" class="btn p1" onclick="levelSelect(0)">Easy 🔓</button>
<button id="medBtn" class="btn p2" onclick="levelSelect(1)">Medium 🔒</button>
<button id="hardBtn" class="btn p3" onclick="levelSelect(2)">Hard 🔒</button>
<button class="btn p4" onclick="back()">⬅ Back</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="options"></div>

<button class="btn p2" onclick="prev()">⬅ Prev</button>
<button class="btn p3" onclick="next()">Next ➡</button>
<button class="btn p4" onclick="home()">🏠 Home</button>
</div>

</div>

<script>

/* SOUND */
function sound(t){
let a=new Audio();
if(t==="correct") a.src="https://actions.google.com/sounds/v1/cartoon/pop.ogg";
if(t==="wrong") a.src="https://actions.google.com/sounds/v1/cartoon/boing.ogg";
if(t==="welcome") a.src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg";
a.play();
}

/* VOICE */
function speak(t){
let msg=new SpeechSynthesisUtterance(t);
msg.rate=0.85;
msg.pitch=1.6;
speechSynthesis.speak(msg);
}

/* CONFETTI */
function confetti(){
for(let i=0;i<50;i++){
let d=document.createElement("div");
d.className="confetti";
d.style.left=Math.random()*window.innerWidth+"px";
d.style.background=`hsl(${Math.random()*360},100%,50%)`;
d.style.animationDuration=(2+Math.random()*2)+"s";
document.body.appendChild(d);
setTimeout(()=>d.remove(),4000);
}
}

/* QUESTIONS */
const data={
math:[
[
{q:"2+3=?",o:["4","5","6","7"],a:1},
{q:"5+5=?",o:["10","11","12","13"],a:0}
],
[
{q:"10+5=?",o:["13","14","15","16"],a:2}
],
[
{q:"20+10=?",o:["25","30","35","40"],a:1}
]
],
english:[
[
{q:"Apple is a?",o:["Fruit","Animal","Car","City"],a:0}
],
[
{q:"Opposite of Hot?",o:["Cold","Warm","Fire","Ice"],a:0}
],
[
{q:"Past tense of Go?",o:["Went","Gone","Going","Go"],a:0}
]
],
gk:[
[
{q:"Capital of India?",o:["Delhi","Mumbai","Goa","Chennai"],a:0}
],
[
{q:"Planet we live on?",o:["Earth","Mars","Moon","Sun"],a:0}
],
[
{q:"CPU is brain of?",o:["Computer","Human","Robot","Phone"],a:0}
]
]
};

/* STATE */
let cat="",level=0,i=0;

let unlock=JSON.parse(localStorage.getItem("unlock"));
if(!unlock || unlock.length!==3){
unlock=[true,false,false];
localStorage.setItem("unlock",JSON.stringify(unlock));
}

/* START */
function start(){
sound("welcome");
show("catScreen");
}

/* CATEGORY */
function catSelect(c){
cat=c;
i=0;
level=0;
show("levelScreen");
setTimeout(updateLevelUI,50);
}

/* LEVEL UI */
function updateLevelUI(){
unlock=JSON.parse(localStorage.getItem("unlock"));

document.getElementById("easyBtn").innerHTML="Easy "+(unlock[0]?"🔓":"🔒");
document.getElementById("medBtn").innerHTML="Medium "+(unlock[1]?"🔓":"🔒");
document.getElementById("hardBtn").innerHTML="Hard "+(unlock[2]?"🔓":"🔒");
}

/* LEVEL SELECT */
function levelSelect(l){
if(!unlock[l]){
alert("Locked!");
return;
}
level=l;
i=0;
show("gameScreen");
load();
}

/* LOAD QUESTION */
function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

let h="";
q.o.forEach((o,idx)=>{
h+=`<button class='btn p1' onclick='check(${idx})'>${o}</button>`;
});

document.getElementById("options").innerHTML=h;

speechSynthesis.cancel();
speak(q.q);
}

/* CHECK */
function check(a){
let q=data[cat][level][i];

if(a===q.a){
sound("correct");
confetti();
}else{
sound("wrong");
}

setTimeout(next,600);
}

/* NEXT */
function next(){
if(i<data[cat][level].length-1){
i++;
load();
}else{

if(level<2){
unlock[level+1]=true;
localStorage.setItem("unlock",JSON.stringify(unlock));
updateLevelUI();
}

show("catScreen");
}
}

/* PREV */
function prev(){
if(i>0){
i--;
load();
}
}

/* HOME */
function home(){
show("catScreen");
}

/* BACK */
function back(){
show("catScreen");
}

/* SCREEN */
function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

/* THEME */
function theme(){
let b=document.body;
if(b.classList.contains("kids")) b.className="dark";
else if(b.classList.contains("dark")) b.className="neon";
else b.className="kids";
}

</script>

</body>
</html>
