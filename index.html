<!DOCTYPE html>
<html>
<head>
<title>Kids Quiz Pro</title>
<style>
body { font-family: Arial; text-align:center; background:#f2f2f2; }
.screen { display:none; padding:20px; }
button { padding:10px; margin:5px; font-size:16px; }
</style>
</head>

<body>

<!-- NAME -->
<div id="nameScreen" class="screen" style="display:block;">
<h2>Enter Your Name</h2>
<input id="playerName" placeholder="Your Name">
<br>
<button onclick="saveName()">Start</button>
</div>

<!-- HOME -->
<div id="homeScreen" class="screen">
<h2>Welcome <span id="nameDisplay"></span></h2>
<h3>Select Category</h3>
<button onclick="startGame('gk')">GK</button>
<button onclick="startGame('english')">English</button>
<button onclick="startGame('math')">Math</button>
</div>

<!-- LEVEL -->
<div id="levelScreen" class="screen">
<h2 id="levelText"></h2>
<button onclick="startLevel()">Start Level</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
<h3 id="question"></h3>
<div id="options"></div>
<br>
<button onclick="goBack()">Back</button>
<button onclick="goHome()">Home</button>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="screen">
<h2>Game Completed 🎉</h2>
<button onclick="goHome()">Play Again</button>
</div>

// ---------------- UI ----------------

function show(id){
document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}

// ---------------- NAME ----------------

function saveName(){
playerName=document.getElementById("playerName").value;
if(!playerName) return;
document.getElementById("nameDisplay").innerText=playerName;
show("homeScreen");
}

// ---------------- GAME START ----------------

function startGame(cat){
category=cat;
levelIndex=0;
qIndex=0;
used.clear();
showLevel();
}

// ---------------- LEVEL ----------------

function showLevel(){
document.getElementById("levelText").innerText=levels[levelIndex];
show("levelScreen");
}

function startLevel(){
qIndex=0;
show("gameScreen");
loadQuestion();
}

// ---------------- QUESTION SYSTEM (NO REPEAT) ----------------

function getQuestion(){
let list=questions[category];
let available=list.filter((q,i)=>!used.has(i));

if(available.length===0){
used.clear();
available=list;
}

let q=available[Math.floor(Math.random()*available.length)];
used.add(list.indexOf(q));
return q;
}

function loadQuestion(){
let q=getQuestion();

document.getElementById("question").innerText=q.q;

let html="";
q.options.forEach((op,i)=>{
html+=`<button onclick="checkAnswer(${i},${q.answer})">${op}</button>`;
});

document.getElementById("options").innerHTML=html;
}

// ---------------- ANSWER ----------------

function checkAnswer(sel,correct){
if(sel===correct){
alert("Correct 🎉");
}else{
alert("Wrong ❌");
}

qIndex++;

if(qIndex>=5){
levelIndex++;

if(levelIndex>=levels.length){
show("gameOverScreen");
return;
}

showLevel();
}else{
loadQuestion();
}
}

// ---------------- NAV ----------------

function goHome(){
show("homeScreen");
}

function goBack(){
show("homeScreen");
}

</script>

</html>
