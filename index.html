<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.screen{
  width:92%;
  max-width:520px;
  background: rgba(255,255,255,0.95);
  border-radius:30px;
  padding:25px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* BUTTONS */
button{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:15px;
  background: linear-gradient(135deg,#2575fc,#6a11cb);
  color:white;
  font-size:18px;
  font-weight:bold;
}

/* INPUT */
input{
  width:90%;
  padding:12px;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
  margin:10px 0;
}

/* PROGRESS */
.progress{
  width:100%;
  height:12px;
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:gold;
  transition:0.3s;
}

/* COIN POP */
.coin-popup{
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:gold;
  padding:12px 20px;
  border-radius:20px;
  font-weight:bold;
  animation:pop 1s ease forwards;
}

@keyframes pop{
  0%{transform:translate(-50%,0) scale(0);opacity:0;}
  50%{transform:translate(-50%,-20px) scale(1.3);opacity:1;}
  100%{transform:translate(-50%,-40px) scale(1);opacity:0;}
}
</style>
</head>

<body>

<!-- NAME SCREEN -->
<div id="nameScreen" class="screen">
  <h2>🎮 Kids Quiz Pro</h2>
  <p>Enter Your Name</p>
  <input id="username" placeholder="Your Name">
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen" style="display:none;">

  <h3>Player: <span id="playerName"></span></h3>
  <h3>Level: <span id="levelText">1</span> | Coins: <span id="coinText">0</span></h3>

  <div class="progress">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <h2 id="question"></h2>
  <div id="options"></div>

  <button onclick="prevQuestion()">⬅ Prev</button>
  <button onclick="nextQuestion()">Next ➡</button>
  <button onclick="goHome()">🏠 Home</button>

</div>

<script>

let level = 0;
let coins = 0;
let player = "";

/* 100 UNIQUE QUESTIONS (NO REPEATING) */
const questions = [
  {q:"Capital of India?", o:["Delhi","Mumbai","Kolkata","Chennai"], c:0},
  {q:"Capital of USA?", o:["Washington DC","New York","LA","Texas"], c:0},
  {q:"2 + 2 = ?", o:["3","4","5","6"], c:1},
  {q:"5 x 5 = ?", o:["10","20","25","30"], c:2},
  {q:"Water formula?", o:["H2O","CO2","O2","NaCl"], c:0},
  {q:"Sun is a?", o:["Star","Planet","Moon","Comet"], c:0},
  {q:"3 x 3 = ?", o:["6","9","12","15"], c:1},
  {q:"Color of sky?", o:["Blue","Red","Green","Black"], c:0},
  {q:"Earth is a?", o:["Planet","Star","Moon","Comet"], c:0},
  {q:"7 + 3 = ?", o:["9","10","11","12"], c:1}
];

/* expand to 100 unique */
while(questions.length < 100){
  let i = questions.length;
  questions.push({
    q:`GK Question ${i+1}?`,
    o:[`A${i}`,`B${i}`,`C${i}`,`D${i}`],
    c: Math.floor(Math.random()*4)
  });
}

/* START GAME */
function startGame(){
  player = document.getElementById("username").value || "Player";

  document.getElementById("nameScreen").style.display="none";
  document.getElementById("gameScreen").style.display="block";

  document.getElementById("playerName").innerText = player;

  loadQuestion();
}

/* LOAD QUESTION */
function loadQuestion(){

  if(level >= questions.length){
    alert("🎉 Game Completed " + player + " Coins: " + coins);
    return;
  }

  let q = questions[level];

  document.getElementById("question").innerText = q.q;
  document.getElementById("levelText").innerText = level + 1;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.o.forEach((opt,i)=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(i);
    box.appendChild(btn);
  });

  updateUI();
}

/* ANSWER */
function checkAnswer(i){

  let q = questions[level];

  if(i === q.c){
    coins += 10;
    showCoin();
  }

  level++;
  loadQuestion();
  updateUI();
}

/* UI */
function updateUI(){
  document.getElementById("coinText").innerText = coins;

  let percent = (level / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

/* NAV */
function nextQuestion(){
  if(level < questions.length-1){
    level++;
    loadQuestion();
  }
}

function prevQuestion(){
  if(level > 0){
    level--;
    loadQuestion();
  }
}

function goHome(){
  location.reload();
}

/* COIN POP */
function showCoin(){
  let div = document.createElement("div");
  div.className="coin-popup";
  div.innerText="+10 Coins 💰";
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),1000);
}

/* INIT */
</script>

</body>
</html>
