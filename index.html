<!DOCTYPE html>
<html>
<head>
<title>Kids Quiz Game</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f0f4ff;
text-align:center;
}

.screen{display:none;padding:20px;}
.active{display:block;}

h1{color:#4f46e5}

input{
padding:10px;
width:80%;
margin:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
margin:8px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-weight:bold;
}

.level-btn{background:#10b981}
.option{display:block;width:80%;margin:10px auto;background:#6366f1}

.topbar{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
<h1>🎮 Kids Quiz Game</h1>
<input id="name" placeholder="Enter your name">
<br>
<button onclick="goCategories()">Start Game</button>
</div>

<!-- CATEGORIES -->
<div id="categories" class="screen">
<h2>Choose Category</h2>
<button onclick="openLevels('kids')">Kids</button>
<button onclick="openLevels('math')">Math</button>
<button onclick="openLevels('english')">English</button>
<button onclick="openLevels('gk')">GK</button>
<br><br>
<button onclick="goHome()">Back</button>
</div>

<!-- LEVELS -->
<div id="levels" class="screen">
<h2>Choose Level</h2>
<div id="levelBox"></div>
<br>
<button onclick="goHome()">Home</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div class="topbar">
👤 <span id="player"></span><br>
Score: <span id="score">0</span> |
Coins: <span id="coins">0</span> |
Stars: <span id="stars">0</span>
</div>

<h2 id="q"></h2>
<div id="options"></div>

<button onclick="goHome()">Exit</button>
</div>

<script>

/* PLAYER DATA */
let player="";
let category="";
let level=1;

let score=0,coins=0,stars=0;

let questionPool=[];
let currentIndex=0;

/* NO REPEAT TRACKER */
let usedQuestions={
kids:new Set(),
math:new Set(),
english:new Set(),
gk:new Set()
};

/* QUESTION BANK (EXTENDED) */
const DB={
kids:[
{q:"Dog says?",a:"Bark",o:["Bark","Meow","Roar","Buzz"]},
{q:"Cat says?",a:"Meow",o:["Meow","Bark","Roar","Buzz"]},
{q:"Cow gives?",a:"Milk",o:["Milk","Egg","Water","Honey"]},
{q:"Bird can?",a:"Fly",o:["Fly","Swim","Run","Sleep"]},
{q:"Fish lives in?",a:"Water",o:["Water","Sky","Land","Tree"]},
{q:"Lion is?",a:"King",o:["King","Doctor","Teacher","Farmer"]},
{q:"Hen gives?",a:"Egg",o:["Egg","Milk","Water","Oil"]},
{q:"Duck says?",a:"Quack",o:["Quack","Bark","Meow","Roar"]},
{q:"Frog jumps?",a:"Yes",o:["Yes","No","Maybe","Never"]},
{q:"Horse runs?",a:"Fast",o:["Fast","Slow","Fly","Crawl"]}
],

math:[
{q:"2+2=?",a:"4",o:["4","3","5","6"]},
{q:"5+3=?",a:"8",o:["8","7","9","10"]},
{q:"10-5=?",a:"5",o:["5","4","6","7"]},
{q:"6+2=?",a:"8",o:["8","7","9","10"]},
{q:"9-3=?",a:"6",o:["6","5","7","8"]},
{q:"4+4=?",a:"8",o:["8","7","9","6"]}
],

english:[
{q:"A for?",a:"Apple",o:["Apple","Ball","Cat","Dog"]},
{q:"B for?",a:"Ball",o:["Ball","Cat","Dog","Ant"]},
{q:"C for?",a:"Cat",o:["Cat","Dog","Bat","Rat"]},
{q:"D for?",a:"Dog",o:["Dog","Cat","Cow","Hen"]},
{q:"E for?",a:"Elephant",o:["Elephant","Fish","Goat","Hen"]}
],

gk:[
{q:"Sun is?",a:"Hot",o:["Hot","Cold","Wet","Dry"]},
{q:"Sky color?",a:"Blue",o:["Blue","Red","Green","Black"]},
{q:"We drink?",a:"Water",o:["Water","Milk","Oil","Juice"]},
{q:"Earth is?",a:"Round",o:["Round","Flat","Square","Triangle"]},
{q:"We breathe?",a:"Air",o:["Air","Water","Fire","Stone"]}
]
};

/* START */
function goCategories(){
player=document.getElementById("name").value;
if(player===""){alert("Enter name");return;}
show("categories");
}

/* LEVELS */
function openLevels(cat){
category=cat;
show("levels");

let box=document.getElementById("levelBox");
box.innerHTML="";

for(let i=1;i<=5;i++){
let b=document.createElement("button");
b.innerText="Level "+i;
b.className="level-btn";
b.onclick=()=>startGame(i);
box.appendChild(b);
}
}

/* START GAME */
function startGame(lv){

level=lv;
score=0;coins=0;stars=0;

questionPool=[];

/* REMOVE USED QUESTIONS */
let available = DB[category].filter(q => !usedQuestions[category].has(q.q));

if(available.length===0){
usedQuestions[category].clear();
available = DB[category].slice();
}

/* SHUFFLE */
available.sort(()=>Math.random()-0.5);

/* TAKE 3 QUESTIONS */
questionPool = available.slice(0,3);

/* MARK USED */
questionPool.forEach(q=>{
usedQuestions[category].add(q.q);
});

currentIndex=0;

show("game");
load();
updateUI();
}

/* LOAD QUESTION */
function load(){

if(currentIndex>=questionPool.length){
alert("Level Completed 🎉");
show("levels");
return;
}

let q=questionPool[currentIndex];
currentIndex++;

document.getElementById("player").innerText=player;
document.getElementById("q").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.sort(()=>Math.random()-0.5);

q.o.forEach(opt=>{
let btn=document.createElement("button");
btn.className="option";
btn.innerText=opt;

btn.onclick=()=>{

if(opt===q.a){
score+=10;
coins+=5;
stars+=1;
btn.style.background="green";
}else{
btn.style.background="red";
}

updateUI();
setTimeout(load,500);
};

box.appendChild(btn);
});
}

/* UPDATE */
function updateUI(){
document.getElementById("score").innerText=score;
document.getElementById("coins").innerText=coins;
document.getElementById("stars").innerText=stars;
}

/* NAV */
function goHome(){
show("home");
}

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
