<!DOCTYPE html>

<meta charset="UTF-8">

<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}
@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.neon{
background:#000;
color:#0ff;
box-shadow:0 0 20px #0ff;
}

.dark{
background:#222;
color:#fff;
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{font-size:22px;font-weight:bold;margin:10px 0;}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.bounce{animation:bounce 0.5s;}
@keyframes bounce{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}
</style>
</head>

<canvas id="confetti"></canvas>

<div class="card" id="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<button class="btn p3" onclick="changeTheme()">🎨 Theme</button>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">🔊 Tap to Start</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p1" onclick="goHome()">🏠 Restart</button>
</div>

<div id="levelScreen" class="hidden">
<button id="easyBtn" class="btn p1" onclick="selectLevel(0)">Easy</button>
<button id="medBtn" class="btn p2" onclick="selectLevel(1)">Medium 🔒</button>
<button id="hardBtn" class="btn p3" onclick="selectLevel(2)">Hard 🔒</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

/* ===== REST SAME ===== */

let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;

/* CONFETTI COLOR FIX */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let confetti=[];
function blastConfetti(){
for(let i=0;i<80;i++){
confetti.push({
x:Math.random()*canvas.width,
y:0,
r:Math.random()*6+2,
d:Math.random()*50,
color:`hsl(${Math.random()*360},100%,50%)`
});
}}
function drawConfetti(){
ctx.clearRect(0,0,canvas.width,canvas.height);
confetti.forEach(p=>{
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=2+p.d/30;
});
confetti=confetti.filter(p=>p.y<canvas.height);
requestAnimationFrame(drawConfetti);
}
drawConfetti();

/* THEME FIX */
let theme=0;
function changeTheme(){
const card=document.getElementById("card");
theme=(theme+1)%3;
card.className="card";
if(theme===1) card.classList.add("dark");
if(theme===2) card.classList.add("neon");
}

/* ===== GAME FUNCTIONS (UNCHANGED) ===== */
function playSound(src){ new Audio(src).play(); }
function speak(t){ speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);

let options=q.o.map((t,idx)=>({t,ok:idx===q.a})).sort(()=>Math.random()-0.5);

let html="";
options.forEach(op=>{
html+=`<button class="btn p1" onclick="check(this,${op.ok})">${op.t}</button>`;
});
document.getElementById("opts").innerHTML=html;
startTimer();
}

function check(btn,ok){
clearInterval(timer);
if(ok){
btn.classList.add("correct","bounce");
stars++; coins+=10;
playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
blastConfetti();
}else{
btn.classList.add("wrong");
playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
}
document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;
setTimeout(nextQ,700);
}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;
timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

function nextQ(){
if(i < data[cat][level].length-1){i++;load();}
else{goHome();}
}

function prevQ(){if(i>0){i--;load();}}

function goHome(){i=0;clearInterval(timer);show("catScreen");}

function startApp(){
playSound("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
show("catScreen");
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){cat=c;show("levelScreen");}

function selectLevel(l){
level=l;i=0;show("gameScreen");load();
}
