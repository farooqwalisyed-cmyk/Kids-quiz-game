<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}
@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}
.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}
.title{
font-size:24px;
font-weight:bold;
margin:10px 0;
color:#6a11cb;
text-shadow:1px 1px 2px #ccc;
}
.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}
.btn:hover{transform:scale(1.03);}
.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}
.hidden{display:none;}
.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}
.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}
.bounce{animation:bounce 0.5s;}
@keyframes bounce{
0%{transform:scale(1)}
30%{transform:scale(1.15)}
60%{transform:scale(0.95)}
100%{transform:scale(1)}
}
#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">🔊 Tap to Start</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p1" onclick="goHome()">🏠 Restart</button>
</div>

<div id="levelScreen" class="hidden">
<button id="easyBtn" class="btn p1" onclick="selectLevel(0)">Easy</button>
<button id="medBtn" class="btn p2" onclick="selectLevel(1)">Medium 🔒</button>
<button id="hardBtn" class="btn p3" onclick="selectLevel(2)">Hard 🔒</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* ===== LEVEL UNLOCK SYSTEM ===== */
let unlock = {math:0, english:0, gk:0};

/* ===== CONFETTI ===== */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
let confetti=[];
function blastConfetti(){
for(let i=0;i<80;i++){
confetti.push({
x:Math.random()*canvas.width,
y:0,
r:Math.random()*6+2,
d:Math.random()*50,
color:`hsl(${Math.random()*360},100%,50%)`
});
}}
function drawConfetti(){
ctx.clearRect(0,0,canvas.width,canvas.height);
confetti.forEach(p=>{
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=2+p.d/30;
});
confetti=confetti.filter(p=>p.y<canvas.height);
requestAnimationFrame(drawConfetti);
}
drawConfetti();

/* ===== VOICE ===== */
function speak(text){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

/* ===== SOUND ===== */
function playSound(src){ new Audio(src).play(); }

/* ===== QUESTIONS (FULL ADDED) ===== */
const data = {
math:[ Array(3).fill(0).map((_,lvl)=>[
{q:"2+2=?",o:["3","4","5","6"],a:1},
{q:"5+3=?",o:["6","7","8","9"],a:2},
{q:"10-4=?",o:["5","6","7","8"],a:1},
{q:"3+6=?",o:["7","8","9","10"],a:2},
{q:"7-2=?",o:["4","5","6","3"],a:1},
{q:"4+4=?",o:["6","7","8","9"],a:2},
{q:"9-3=?",o:["5","6","7","8"],a:1},
{q:"6+2=?",o:["7","8","9","10"],a:1},
{q:"8-4=?",o:["2","3","4","5"],a:2},
{q:"1+1=?",o:["1","2","3","4"],a:1}
])],
english:[ Array(3).fill(0).map(()=>[
{q:"Dog has ___ legs?",o:["2","3","4","5"],a:2},
{q:"Bird can?",o:["Fly","Swim","Run","Walk"],a:0},
{q:"Apple is a ___",o:["Fruit","Animal","Color","Place"],a:0},
{q:"Sky is ___",o:["Blue","Green","Red","Black"],a:0},
{q:"Cat says ___",o:["Meow","Bark","Moo","Quack"],a:0},
{q:"Sun gives ___",o:["Light","Rain","Snow","Wind"],a:0},
{q:"He ___ a boy",o:["is","are","am","be"],a:0},
{q:"She ___ teacher",o:["is","are","am","be"],a:0},
{q:"I ___ happy",o:["am","is","are","be"],a:0},
{q:"We ___ friends",o:["is","are","am","be"],a:1}
])],
gk:[ Array(3).fill(0).map(()=>[
{q:"Capital of India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0},
{q:"How many days in a year?",o:["365","360","300","400"],a:0},
{q:"Sun is a?",o:["Star","Planet","Moon","Asteroid"],a:0},
{q:"Water formula?",o:["H2O","CO2","O2","NaCl"],a:0},
{q:"Earth is?",o:["Planet","Star","Moon","Cloud"],a:0},
{q:"Largest ocean?",o:["Pacific","Atlantic","Indian","Arctic"],a:0},
{q:"India currency?",o:["Rupee","Dollar","Yen","Euro"],a:0},
{q:"1 year has?",o:["12 months","10","11","13"],a:0},
{q:"Rainbow colors?",o:["7","5","6","8"],a:0},
{q:"Moon is?",o:["Satellite","Star","Planet","Cloud"],a:0}
])]
};

let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);
let opts=q.o.map((t,i)=>({t,ok:i===q.a})).sort(()=>Math.random()-0.5);
document.getElementById("opts").innerHTML=
opts.map(o=>`<button class="btn p1" onclick="check(this,${o.ok})">${o.t}</button>`).join("");
startTimer();
}

function check(btn,ok){
clearInterval(timer);
if(ok){
btn.classList.add("correct","bounce");
stars++;coins+=10;
playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
blastConfetti();
}else{
btn.classList.add("wrong","shake");
playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
}
stars.innerText=stars;
coins.innerText=coins;
setTimeout(nextQ,700);
}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;
timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

function nextQ(){
if(i<data[cat][level].length-1){i++;load();}
else{
if(level===0) unlock[cat]=1;
if(level===1) unlock[cat]=2;
goHome();
}
}

function prevQ(){ if(i>0){i--;load();} }

function goHome(){ i=0;clearInterval(timer);show("catScreen"); }

function startApp(){
playSound("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
show("catScreen");
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){
cat=c;
medBtn.innerText=unlock[cat]>=1?"Medium":"Medium 🔒";
hardBtn.innerText=unlock[cat]>=2?"Hard":"Hard 🔒";
show("levelScreen");
}

function selectLevel(l){
if(l===1 && unlock[cat]<1){alert("Complete Easy first");return;}
if(l===2 && unlock[cat]<2){alert("Complete Medium first");return;}
level=l;i=0;show("gameScreen");load();
}

</script>

</body>
</html>
