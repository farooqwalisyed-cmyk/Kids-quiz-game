<script>

let player="",category="",level=1;
let score=0,coins=0,stars=0;

let currentQuestions=[];
let qIndex=0;

/* ✅ GLOBAL USED TRACKER (KEY FIX) */
let usedQuestions = new Set();

/* DATABASE (EXPANDED + UNIQUE SAFE) */
const DB = {
kids: [
"Dog says?|Bark|Bark,Meow,Roar,Buzz",
"Cat says?|Meow|Meow,Bark,Roar,Buzz",
"Cow gives?|Milk|Milk,Egg,Water,Honey",
"Hen gives?|Egg|Egg,Milk,Water,Oil",
"Fish lives in?|Water|Water,Sky,Land,Tree",
"Bird can?|Fly|Fly,Swim,Run,Sleep",
"Lion is?|King|King,Doctor,Teacher,Farmer",
"Duck says?|Quack|Quack,Bark,Meow,Roar",
"Horse runs?|Fast|Fast,Slow,Fly,Crawl",
"Elephant is?|Big|Big,Small,Tiny,Light"
],

math: [
"2+2=?|4|4,3,5,6",
"5+3=?|8|8,7,9,10",
"10-5=?|5|5,4,6,7",
"6+2=?|8|8,7,9,10",
"9-3=?|6|6,5,7,8",
"4+4=?|8|8,7,9,6",
"7+2=?|9|9,8,10,11",
"3+5=?|8|8,7,9,6",
"8-2=?|6|6,5,7,8",
"1+1=?|2|2,3,4,5"
],

english: [
"A for?|Apple|Apple,Ball,Cat,Dog",
"B for?|Ball|Ball,Cat,Dog,Ant",
"C for?|Cat|Cat,Dog,Bat,Rat",
"D for?|Dog|Dog,Cat,Cow,Hen",
"E for?|Elephant|Elephant,Fish,Goat,Hen",
"F for?|Fish|Fish,Apple,Ball,Dog",
"G for?|Goat|Goat,Cat,Dog,Ant",
"H for?|Hen|Hen,Fish,Ball,Dog"
],

gk: [
"Sun is?|Hot|Hot,Cold,Wet,Dry",
"Sky color?|Blue|Blue,Red,Green,Black",
"We drink?|Water|Water,Milk,Oil,Juice",
"Earth is?|Round|Round,Flat,Square,Triangle",
"We breathe?|Air|Air,Water,Fire,Stone",
"Moon gives?|Light|Light,Heat,Smoke,Sound",
"Sun rises in?|East|East,West,North,South",
"Grass color?|Green|Green,Red,Blue,Black"
]
};

/* NAV */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function goHome(){show("home");}

function goCategories(){
player=document.getElementById("name").value;
if(!player){alert("Enter Name");return;}
show("categories");
}

/* LEVELS */
function openLevels(cat){
category=cat;
show("levels");

let box=document.getElementById("levelBox");
box.innerHTML="";

for(let i=1;i<=5;i++){
let b=document.createElement("button");
b.innerText="Level "+i;
b.onclick=()=>startGame(i);
box.appendChild(b);
}
}

/* 🔥 CORE ENGINE (NO REPEAT EVER FIXED) */
function startGame(lv){

level=lv;
score=0;coins=0;stars=0;

/* build clean pool */
let pool = DB[category].map(x=>{
let parts=x.split("|");
return {
q:parts[0],
a:parts[1],
o:parts[2].split(",")
};
});

/* remove used questions */
pool = pool.filter(q => !usedQuestions.has(q.q));

/* if empty → reset ALL */
if(pool.length===0){
usedQuestions.clear();
pool = DB[category].map(x=>{
let parts=x.split("|");
return {
q:parts[0],
a:parts[1],
o:parts[2].split(",")
};
});
}

/* shuffle */
pool.sort(()=>Math.random()-0.5);

/* take 3 questions */
currentQuestions = pool.slice(0,3);

/* mark used */
currentQuestions.forEach(q=>usedQuestions.add(q.q));

qIndex=0;

show("game");
load();
updateUI();
}

/* LOAD */
function load(){

if(qIndex>=currentQuestions.length){
alert("Level Completed 🎉");
show("levels");
return;
}

let q=currentQuestions[qIndex];
qIndex++;

document.getElementById("player").innerText=player;
document.getElementById("q").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.sort(()=>Math.random()-0.5);

q.o.forEach(opt=>{
let btn=document.createElement("button");
btn.className="option";
btn.innerText=opt;

btn.onclick=()=>{

if(opt===q.a){
score+=10;
coins+=5;
stars+=1;
btn.style.background="green";
}else{
btn.style.background="red";
}

updateUI();
setTimeout(load,500);
};

box.appendChild(btn);
});
}

/* UI */
function updateUI(){
document.getElementById("score").innerText=score;
document.getElementById("coins").innerText=coins;
document.getElementById("stars").innerText=stars;
}

</script>
