<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{font-size:22px;font-weight:bold;margin:10px 0;}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.hidden{display:none;}

.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.bounce{
animation:bounce 0.5s;
}

@keyframes bounce{
0%{transform:scale(1)}
30%{transform:scale(1.15)}
60%{transform:scale(0.95)}
100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">Tap to Play</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p1" onclick="goHome()">Restart</button>
</div>

<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium</button>
<button class="btn p3" onclick="selectLevel(2)">Hard</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* ===== DATA (UNCHANGED) ===== */
const data=/* same as your previous script */ data;

/* ===== GAME STATE ===== */
let cat="",level=0,i=0;
let stars=0,coins=0;
let timer,time=10;

/* ===== FIX 1: PROPER SHUFFLE ===== */
function shuffle(arr){
return arr
.map(v=>({v,sort:Math.random()}))
.sort((a,b)=>a.sort-b.sort)
.map(({v})=>v);
}

/* ===== LOAD QUESTION ===== */
function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

/* FIXED JUMBLE LOGIC */
let options=q.o.map((text,idx)=>({
text,
isCorrect: idx === q.a
}));

options = shuffle(options);

let html="";
options.forEach(op=>{
html+=`
<button class="btn p1" onclick="check(this,${op.isCorrect})">
${op.text}
</button>`;
});

document.getElementById("opts").innerHTML=html;
startTimer();
}

/* ===== CHECK ANSWER ===== */
function check(btn,isCorrect){
clearInterval(timer);

if(isCorrect){
btn.classList.add("correct","bounce");
stars++; coins+=10;
}else{
btn.classList.add("wrong","shake");
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

setTimeout(nextQ,700);
}

/* ===== TIMER ===== */
function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

/* ===== NAV ===== */
function nextQ(){
if(i < data[cat][level].length-1){
i++;
load();
}else{
goHome();
}
}

function prevQ(){
if(i>0){
i--;
load();
}
}

function goHome(){
i=0;
clearInterval(timer);
show("catScreen");
}

function show(s){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(id=>document.getElementById(id).classList.add("hidden"));
document.getElementById(s).classList.remove("hidden");
}

function startApp(){
show("catScreen");
}

function selectCat(c){
cat=c;
show("levelScreen");
}

function selectLevel(l){
level=l;
i=0;
show("gameScreen");
load();
}

</script>

</body>
</html>
