<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: radial-gradient(circle at top,#6a11cb,#2575fc);
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.screen{
 width:90%;
 max-width:420px;
 text-align:center;
}

button{
 padding:12px;
 margin:6px;
 border:none;
 border-radius:12px;
 font-size:16px;
 cursor:pointer;
}

.btn{
 background:white;
 color:black;
 width:80%;
}

.hidden{display:none;}

.top{
 margin:10px 0;
}
</style>
</head>

<body>

<div class="screen">

<h2>🎮 Kids Quiz PRO</h2>

<!-- HOME -->
<div id="home">
 <button class="btn" onclick="openSetup()">Start Game</button>
</div>

<!-- SETUP -->
<div id="setup" class="hidden">

 <div class="top">Select Category</div>
 <button class="btn" onclick="setCat('math')">Math</button>
 <button class="btn" onclick="setCat('english')">English</button>
 <button class="btn" onclick="setCat('gk')">GK</button>

 <div class="top">Select Difficulty</div>
 <button class="btn" onclick="setDiff('easy')">Easy</button>
 <button class="btn" onclick="setDiff('medium')">Medium</button>
 <button class="btn" onclick="setDiff('hard')">Hard</button>

 <button class="btn" onclick="startGame()">Play Quiz</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">

 <h3 id="q"></h3>
 <div id="opts"></div>

</div>

</div>

<script>

let cat = "";
let diff = "";
let i = 0;

const data = {
 math:{
  easy:[{q:"2+2?",a:1,o:["3","4","5"]}],
  medium:[{q:"5+5?",a:2,o:["8","9","10"]}],
  hard:[{q:"10×2?",a:1,o:["10","20","30"]}]
 },
 english:{
  easy:[{q:"A for?",a:0,o:["Apple","Ball","Cat"]}],
  medium:[{q:"Plural Book?",a:0,o:["Books","Book","Boks"]}],
  hard:[{q:"Opposite Happy?",a:1,o:["Sad","Joyful","Angry"]}]
 },
 gk:{
  easy:[{q:"Days week?",a:2,o:["5","6","7"]}],
  medium:[{q:"Capital India?",a:0,o:["Delhi","Mumbai","Chennai"]}],
  hard:[{q:"Ocean?",a:1,o:["Atlantic","Pacific","Arctic"]}]
 }
};

function openSetup(){
 document.getElementById("home").style.display="none";
 document.getElementById("setup").style.display="block";
}

function setCat(c){
 cat = c;
}

function setDiff(d){
 diff = d;
}

function startGame(){

 // ✅ HARD SAFETY FIX
 if(!cat){
  alert("Please select CATEGORY");
  return;
 }

 if(!diff){
  alert("Please select DIFFICULTY");
  return;
 }

 if(!data[cat] || !data[cat][diff]){
  alert("Level data missing");
  return;
 }

 document.getElementById("setup").style.display="none";
 document.getElementById("game").style.display="block";

 i = 0;
 load();
}

function load(){

 let q = data[cat][diff][i];

 if(!q){
  alert("Level Completed!");
  location.reload();
  return;
 }

 document.getElementById("q").innerText = q.q;

 let html = "";
 q.o.forEach((opt,idx)=>{
  html += `<button class="btn" onclick="check(${idx})">${opt}</button>`;
 });

 document.getElementById("opts").innerHTML = html;
}

function check(ans){

 let q = data[cat][diff][i];

 if(ans === q.a){
  alert("Correct ✔");
 } else {
  alert("Wrong ❌");
 }

 i++;
 load();
}

</script>

</body>
</html>
