<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcB77,#4d96ff);
 height:100vh;
}

/* FULL SCREEN */
.card{
 width:100%;
 height:100vh;
 background: rgba(0,0,0,0.3);
 color:white;
 padding:20px;
 box-sizing:border-box;
}

/* HEADER */
.topbar{
 display:flex;
 justify-content:space-between;
 font-size:22px;
 margin-bottom:10px;
}

/* TEXT */
h2{
 text-align:center;
 font-size:36px;
 color:#fff700;
}
h3{
 text-align:center;
 font-size:30px;
}

/* BUTTONS */
button{
 padding:18px;
 margin:10px 0;
 border:none;
 border-radius:16px;
 font-size:22px;
 width:100%;
 font-weight:bold;
}

/* COLORS */
.c1{background:#ff6b6b;}
.c2{background:#4dabf7;}
.c3{background:#51cf66;}
.opt1{background:#ff6b6b;}
.opt2{background:#4dabf7;}
.opt3{background:#51cf66;}
.opt4{background:#ffd43b;color:black;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.screen{display:none;}
.active{display:block;}

#q{
 font-size:32px;
 margin:25px 0;
 text-align:center;
}

/* NAV */
.nav{display:flex;gap:10px;}
.nav button{flex:1;}

</style>
</head>

<body>

<div class="card">

<div class="topbar">
 <div>⭐ <span id="stars">0</span></div>
 <div>🪙 <span id="coins">0</span></div>
</div>

<h2>🎮 Kids Quiz PRO</h2>

<!-- HOME -->
<div id="home" class="screen active">
 <button onclick="startGame()">Start Game</button>
</div>

<!-- CATEGORY -->
<div id="category" class="screen">
<h3>Select Category</h3>
<button class="c1" onclick="selectCat('math')">Math</button>
<button class="c2" onclick="selectCat('english')">English</button>
<button class="c3" onclick="selectCat('gk')">GK</button>
</div>

<!-- LEVEL -->
<div id="level" class="screen">
<h3>Select Level</h3>
<button class="c1" onclick="begin('easy')">Easy</button>
<button class="c2" onclick="begin('medium')">Medium</button>
<button class="c3" onclick="begin('hard')">Hard</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button onclick="prev()">⬅ Prev</button>
 <button onclick="next()">Next ➡</button>
</div>

<button onclick="restart()">🔄 Restart</button>
<button onclick="home()">🏠 Home</button>

</div>

</div>

<script>

/* STATE */
let cat, diff, i=0;
let stars=0;
let coins=0;

/* AUDIO */
let audioCtx;

function unlockAudio(){
 if(!audioCtx){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
 }
 audioCtx.resume();
}

function sound(freq){
 let o=audioCtx.createOscillator();
 let g=audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);
 o.frequency.value=freq;
 g.gain.value=0.2;
 o.start();
 setTimeout(()=>o.stop(),200);
}

/* DATA */
const data={
 math:{easy:[{q:"2+2=?",o:["3","4","5","6"],a:1}]},
 english:{easy:[{q:"A for?",o:["Apple","Ball","Cat","Dog"],a:0}]},
 gk:{easy:[{q:"Days?",o:["5","6","7","8"],a:2}]}
};

/* SCREEN */
function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* FLOW */
function startGame(){
 unlockAudio();
 sound(600);
 show("category");
}

function selectCat(c){
 cat=c;
 show("level");
}

function begin(d){
 diff=d;
 i=0;
 show("game");
 load();
}

/* LOAD */
function load(){
 let q=data[cat][diff][i];
 document.getElementById("q").innerText=q.q;

 let colors=["opt1","opt2","opt3","opt4"];
 let html="";
 q.o.forEach((op,idx)=>{
  html+=`<button class="${colors[idx]}" onclick="check(${idx},this)">${op}</button>`;
 });
 document.getElementById("opts").innerHTML=html;
}

/* ANSWER */
function check(ans,btn){
 let q=data[cat][diff][i];

 if(ans===q.a){
  btn.classList.add("correct");
  stars++;
  coins+=10;
  sound(900);
 }else{
  btn.classList.add("wrong");
  sound(200);
 }

 document.getElementById("stars").innerText=stars;
 document.getElementById("coins").innerText=coins;

 setTimeout(()=>next(),800);
}

/* NAV */
function next(){
 if(i < data[cat][diff].length-1){
  i++; load();
 }else{
  alert("🎉 Finished!");
  home();
 }
}
function prev(){ if(i>0){i--;load();}}

/* RESET */
function restart(){i=0;stars=0;coins=0;load();}
function home(){show("home");}

</script>

</body>
</html>
