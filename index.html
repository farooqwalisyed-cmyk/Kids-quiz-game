<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

#quizScreen{
  width:90%;
  max-width:420px;
  margin:20px auto;
  text-align:center;
  background:white;
  color:black;
  padding:20px;
  border-radius:20px;
}

button{
  width:90%;
  padding:10px;
  margin:6px;
  border:none;
  border-radius:10px;
  background:#2575fc;
  color:white;
  font-weight:bold;
}

.progress{
  width:90%;
  height:10px;
  background:#ddd;
  border-radius:20px;
  margin:10px auto;
}

.progress-bar{
  height:100%;
  width:0%;
  background:gold;
}

</style>
</head>

<body>

<div id="quizScreen">

  <div>
    <h3>Level: <span id="levelText">1</span></h3>
    <h3>Coins: <span id="coinText">0</span></h3>
  </div>

  <div class="progress">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <h2 id="question"></h2>

  <div id="options"></div>

  <button onclick="prevQuestion()">⬅ Prev</button>
  <button onclick="nextQuestion()">Next ➡</button>
  <button onclick="goHome()">🏠 Home</button>

</div>

<script>

let level = 0;
let coins = 0;

/* REAL QUESTIONS */
const sampleQuestions = [
  {q:"Capital of India?", o:["Delhi","Mumbai","Kolkata"], c:0},
  {q:"2 + 2 = ?", o:["3","4","5"], c:1},
  {q:"Water formula?", o:["H2O","CO2","O2"], c:0},
  {q:"Sun is a?", o:["Star","Planet","Moon"], c:0},
  {q:"5 x 5 = ?", o:["10","20","25"], c:2}
];

/* 100 LEVELS */
const questions = Array.from({length:100},(_,i)=>{
  return sampleQuestions[i % sampleQuestions.length];
});

/* LOAD QUESTION */
function loadQuestion(){

  if(level >= questions.length){
    alert("Game Completed 🎉");
    return;
  }

  let q = questions[level];

  document.getElementById("question").innerText = q.q;
  document.getElementById("levelText").innerText = level + 1;

  /* FIXED OPTIONS */
  let box = document.getElementById("options");
  box.innerHTML = "";

  q.o.forEach((opt,i)=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(i);
    box.appendChild(btn);
  });

  updateUI();
}

/* CHECK ANSWER */
function checkAnswer(i){

  let q = questions[level];

  if(i === q.c){
    coins += 10;
  }

  level++;

  if(level < questions.length){
    loadQuestion();
  } else {
    alert("Game Completed 🎉 Coins: " + coins);
  }

  updateUI();
}

/* UI UPDATE */
function updateUI(){
  document.getElementById("coinText").innerText = coins;

  let percent = (level / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

/* NEXT */
function nextQuestion(){
  if(level < questions.length - 1){
    level++;
    loadQuestion();
  }
}

/* PREVIOUS */
function prevQuestion(){
  if(level > 0){
    level--;
    loadQuestion();
  }
}

/* HOME */
function goHome(){
  location.reload();
}

/* START */
loadQuestion();

</script>

</body>
</html>
