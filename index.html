<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.shake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.pop{
animation:pop 0.3s;
}

@keyframes pop{
0%{transform:scale(0.6)}
100%{transform:scale(1)}
}

.confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}
</style>
</head>

<body>

<audio id="welcomeSound" src="welcome.mp3"></audio>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<!-- START -->
<div id="start">
<button class="btn p1" onclick="startGame()">👉 Tap to Play</button>
</div>

<!-- CATEGORY -->
<div id="cat" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>
</div>

</div>

<script>

let cat="math";
let i=0;
let stars=0;
let coins=0;
let timer;
let time=10;

/* SOUND */
function beep(type){
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.connect(ctx.destination);

if(type=="correct") o.frequency.value=800;
else if(type=="wrong") o.frequency.value=200;
else o.frequency.value=500;

o.start();
setTimeout(()=>o.stop(),120);
}

/* TIMER */
function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;

if(time<=0){
clearInterval(timer);
next();
}
},1000);
}

/* START */
function startGame(){
document.getElementById("start").classList.add("hidden");
document.getElementById("cat").classList.remove("hidden");

document.getElementById("welcomeSound").play().catch(()=>{});
}

/* SELECT CATEGORY */
function selectCat(c){
cat=c;
i=0;

document.getElementById("cat").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

load();
}

/* FULL QUESTIONS (RESTORED) */
const data={

math:[
  [
    {q:"2+2=?",o:["3","4","5","6"],a:1},
    {q:"5+3=?",o:["6","7","8","9"],a:2},
    {q:"10-2=?",o:["6","7","8","9"],a:2},
    {q:"3×3=?",o:["6","7","9","12"],a:2},
    {q:"12÷4=?",o:["2","3","4","6"],a:1},
    {q:"7+2=?",o:["8","9","10","11"],a:1},
    {q:"9-3=?",o:["5","6","7","8"],a:1},
    {q:"6×1=?",o:["1","6","7","8"],a:1},
    {q:"15÷3=?",o:["3","4","5","6"],a:2},
    {q:"4+4=?",o:["6","7","8","9"],a:2},
    {q:"8-2=?",o:["5","6","7","8"],a:1},
    {q:"11+1=?",o:["10","11","12","13"],a:2},
    {q:"14-4=?",o:["8","9","10","11"],a:2},
    {q:"2×5=?",o:["10","11","12","9"],a:0},
    {q:"18÷2=?",o:["8","9","10","11"],a:1},
    {q:"20-10=?",o:["5","10","15","20"],a:1},
    {q:"3+6=?",o:["8","9","10","11"],a:1},
    {q:"7×1=?",o:["6","7","8","9"],a:1},
    {q:"16÷4=?",o:["2","3","4","5"],a:2},
    {q:"9+1=?",o:["9","10","11","12"],a:1}
  ],
  [
    {q:"25×2=?",o:["40","50","60","70"],a:1},
    {q:"100÷4=?",o:["20","25","30","35"],a:1},
    {q:"15×3=?",o:["30","45","60","75"],a:1}
  ],
  [
    {q:"144÷12=?",o:["10","11","12","13"],a:2},
    {q:"25×4=?",o:["90","100","110","120"],a:1},
    {q:"18×6=?",o:["96","108","118","128"],a:1}
  ]
],

english:[
  [
    {q:"A is for?",o:["Apple","Ball","Cat","Dog"],a:0},
    {q:"Opposite Big?",o:["Small","Tall","Huge","Large"],a:0}
  ],
  [
    {q:"He ___ playing",o:["is","are","am","be"],a:0},
    {q:"Plural of Cat?",o:["Cats","Cat's","Cates","Caty"],a:0},
    {q:"Correct spelling?",o:["Beautiful","Beautifull","Bautiful","Beutiful"],a:0}
  ],
  [
    {q:"Past of Go?",o:["Went","Goes","Going","Gone"],a:0},
    {q:"He ___ a boy",o:["is","are","am","be"],a:0},
    {q:"Opposite Hot?",o:["Cold","Warm","Heat","Boil"],a:0}
  ]
],

gk:[
  [
    {q:"How many days in a year?",o:["365","360","400","300"],a:0},
    {q:"Bird can?",o:["Fly","Swim","Run","Walk"],a:0}
  ],
  [
    {q:"Capital of India?",o:["Delhi","Mumbai","Kolkata","Chennai"],a:0},
    {q:"Largest planet?",o:["Earth","Mars","Jupiter","Venus"],a:2},
    {q:"Sun is a?",o:["Star","Planet","Moon","Comet"],a:0}
  ],
  [
    {q:"We breathe?",o:["Oxygen","Carbon","Nitrogen","Helium"],a:0},
    {q:"Earth shape?",o:["Round","Flat","Cube","Triangle"],a:0},
    {q:"Ocean is?",o:["Water","Fire","Land","Sand"],a:0}
  ]
]

};

/* LOAD */
function load(){
let q=data[cat][i];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach((op,idx)=>{
html+=`<button class="btn p1" onclick="check(${idx},this)">${op}</button>`;
});

document.getElementById("opts").innerHTML=html;
startTimer();
}

/* CHECK */
function check(ans,btn){
clearInterval(timer);
let q=data[cat][i];

if(ans===q.a){
btn.classList.add("correct","pop");
stars++;
coins+=10;
beep("correct");
}else{
btn.classList.add("wrong","shake");
beep("wrong");
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

setTimeout(next,700);
}

/* NEXT */
function next(){
if(i<data[cat].length-1){
i++;
load();
}else{
alert("Completed 🎉");
document.getElementById("game").classList.add("hidden");
document.getElementById("cat").classList.remove("hidden");
}
}

</script>

</body>
</html>
