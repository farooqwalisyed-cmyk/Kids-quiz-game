<script>

let player="";
let category="";
let level=1;

let score=0,coins=0,stars=0;

let questionPool=[];
let currentIndex=0;

/* CLEAN QUESTION BANK (EXPANDED PER LEVEL STYLE) */
const DB={
kids:[
{q:"Dog says?",a:"Bark",o:["Bark","Meow","Roar","Buzz"]},
{q:"Cat says?",a:"Meow",o:["Meow","Bark","Roar","Buzz"]},
{q:"Cow gives?",a:"Milk",o:["Milk","Egg","Water","Honey"]},
{q:"Bird can?",a:"Fly",o:["Fly","Swim","Run","Sleep"]},
{q:"Fish lives in?",a:"Water",o:["Water","Sky","Land","Tree"]},
{q:"Lion is?",a:"King",o:["King","Doctor","Teacher","Farmer"]},
{q:"Elephant is?",a:"Big",o:["Big","Small","Fast","Tiny"]},
{q:"Duck says?",a:"Quack",o:["Quack","Meow","Bark","Roar"]}
],

math:[
{q:"2+2=?",a:"4",o:["4","3","5","6"]},
{q:"5-2=?",a:"3",o:["3","2","4","5"]},
{q:"3+3=?",a:"6",o:["6","5","7","8"]},
{q:"10-5=?",a:"5",o:["5","4","6","7"]},
{q:"4+4=?",a:"8",o:["8","9","7","6"]},
{q:"6+2=?",a:"8",o:["8","7","9","10"]},
{q:"9-3=?",a:"6",o:["6","5","7","8"]},
{q:"7+1=?",a:"8",o:["8","9","7","6"]}
],

english:[
{q:"A for?",a:"Apple",o:["Apple","Ball","Cat","Dog"]},
{q:"B for?",a:"Ball",o:["Ball","Cat","Dog","Ant"]},
{q:"C for?",a:"Cat",o:["Cat","Dog","Bat","Rat"]},
{q:"D for?",a:"Dog",o:["Dog","Cat","Cow","Hen"]},
{q:"E for?",a:"Elephant",o:["Elephant","Fish","Goat","Hen"]},
{q:"F for?",a:"Fish",o:["Fish","Apple","Ball","Dog"]},
{q:"G for?",a:"Goat",o:["Goat","Cat","Dog","Ant"]},
{q:"H for?",a:"Hen",o:["Hen","Fish","Ball","Dog"]}
],

gk:[
{q:"Sun is?",a:"Hot",o:["Hot","Cold","Wet","Dry"]},
{q:"Sky color?",a:"Blue",o:["Blue","Red","Green","Black"]},
{q:"We drink?",a:"Water",o:["Water","Milk","Oil","Juice"]},
{q:"Earth is?",a:"Round",o:["Round","Flat","Square","Triangle"]},
{q:"We breathe?",a:"Air",o:["Air","Water","Fire","Stone"]},
{q:"Moon gives?",a:"Light",o:["Light","Heat","Smoke","Sound"]},
{q:"Sun rises in?",a:"East",o:["East","West","North","South"]},
{q:"Rain comes from?",a:"Clouds",o:["Clouds","Sun","Fire","Stone"]}
]
};

/* HOME */
function goCategories(){
player=document.getElementById("name").value;
if(player===""){alert("Enter name");return;}
show("categories");
}

/* CATEGORY */
function openLevels(cat){
category=cat;
show("levels");

let box=document.getElementById("levelBox");
box.innerHTML="";

for(let i=1;i<=5;i++){
let b=document.createElement("button");
b.className="level-btn";
b.innerText="Level "+i;
b.onclick=()=>startGame(i);
box.appendChild(b);
}
}

/* START LEVEL */
function startGame(lv){

level=lv;
score=0;
coins=0;
stars=0;

/* 🔥 IMPORTANT FIX: fresh copy per level */
questionPool = DB[category].slice();

/* shuffle strongly */
for(let i=questionPool.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[questionPool[i],questionPool[j]]=[questionPool[j],questionPool[i]];
}

currentIndex=0;

show("game");
load();
updateUI();
}

/* LOAD QUESTION (NO REPEAT ENGINE) */
function load(){

if(currentIndex >= questionPool.length){
alert("🎉 Level Completed - No Repeat Guaranteed!");
show("levels");
return;
}

let q = questionPool[currentIndex];
currentIndex++;

document.getElementById("player").innerText="👤 "+player;
document.getElementById("q").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.sort(()=>Math.random()-0.5);

q.o.forEach(opt=>{
let btn=document.createElement("button");
btn.className="option";
btn.innerText=opt;

btn.onclick=()=>{

if(opt===q.a){
score+=10;
coins+=5;
stars+=1;
btn.style.background="#22c55e";
}else{
btn.style.background="#ef4444";
}

updateUI();

setTimeout(()=>load(),600);
};

box.appendChild(btn);
});
}

/* UI */
function updateUI(){
document.getElementById("score").innerText=score;
document.getElementById("coins").innerText=coins;
document.getElementById("stars").innerText=stars;
}

/* NAV */
function goHome(){
show("home");
}

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>
