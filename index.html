<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game{
  width:95%;
  max-width:520px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
}

.btn{
  padding:12px;
  margin:6px;
  width:90%;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.9);
}

.category-btn{background:#2575fc;color:white;}
.level-btn{background:#6a11cb;color:white;}
.answer-btn{background:#eee;}

.hidden{display:none;}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.nav button{
  width:32%;
  background:#333;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
}

.correct{background:#4CAF50 !important;color:white;}
.wrong{background:#f44336 !important;color:white;}

#emoji{
  font-size:40px;
  margin:10px 0;
}

/* 🎉 Confetti */
.confetti{
position:fixed;
top:0;
width:10px;
height:10px;
animation:fall 1s linear forwards;
}

@keyframes fall{
to{
transform:translateY(500px) rotate(360deg);
opacity:0;
}
}
</style>
</head>

<body>

<div class="game">

<div class="top">
<div>⭐ <span id="stars">0</span></div>
<div>💰 <span id="coins">0</span></div>
</div>

<h2>Kids Quiz PRO MAX 🎮</h2>

<button onclick="toggleSound()">🔊 Sound</button>

<div id="emoji">🙂</div>

<!-- CATEGORY -->
<div id="screen1">
<h3>Select Category</h3>
<button class="btn category-btn" onclick="selectCategory('gk')">GK</button>
<button class="btn category-btn" onclick="selectCategory('english')">English</button>
<button class="btn category-btn" onclick="selectCategory('math')">Math</button>
</div>

<!-- LEVEL -->
<div id="screen2" class="hidden">
<h3>Select Level</h3>

<button id="easyBtn" class="btn level-btn" onclick="startGame('easy')">Easy</button>
<button id="mediumBtn" class="btn level-btn" onclick="startGame('medium')" disabled>🔒 Medium</button>
<button id="hardBtn" class="btn level-btn" onclick="startGame('hard')" disabled>🔒 Hard</button>

<button class="btn" onclick="backToCategory()">⬅ Back</button>
</div>

<!-- QUIZ -->
<div id="screen3" class="hidden">
<h3 id="question"></h3>
<div id="answers"></div>

<div class="nav">
<button onclick="prevQ()">⬅</button>
<button onclick="backToLevels()">🔙</button>
<button onclick="home()">🏠</button>
</div>

<div id="timer">⏱ 10</div>
</div>

<!-- RESULT -->
<div id="screen4" class="hidden">
<h2>🎉 Completed!</h2>
<h3 id="finalScore"></h3>
<h3 id="badge"></h3>

<button class="btn level-btn" onclick="playAgain()">🔁 Play Again</button>
<button class="btn category-btn" onclick="home()">🏠 Home</button>
</div>

</div>

<script>

let category="", level="", index=0;
let stars=0, coins=0;
let shuffledList=[];
let locked=false;

let timer;
let timeLeft=10;

let soundOn=true;

// QUESTIONS
const questions={
gk:{
easy:[
{q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:0},
{q:"Sun rises in?",a:["West","East","North","South"],c:1}
],
medium:[
{q:"Largest ocean?",a:["Atlantic","Indian","Pacific","Arctic"],c:2}
],
hard:[
{q:"Smallest country?",a:["Vatican","India","USA","UK"],c:0}
]
},
english:{
easy:[
{q:"A for?",a:["Apple","Ball","Cat","Dog"],c:0}
],
medium:[
{q:"Plural of Child?",a:["Childs","Children","Childes","Childer"],c:1}
],
hard:[
{q:"Synonym of Happy?",a:["Sad","Joyful","Angry","Tired"],c:1}
]
},
math:{
easy:[
{q:"2 + 2 = ?",a:["3","4","5","6"],c:1}
],
medium:[
{q:"10 × 2 = ?",a:["20","15","25","30"],c:0}
],
hard:[
{q:"100 ÷ 4 = ?",a:["20","25","30","40"],c:1}
]
}
};

// SOUND
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq,time=0.15){
if(!soundOn) return;
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.frequency.value=freq;
o.connect(g);
g.connect(audioCtx.destination);
o.start();
o.stop(audioCtx.currentTime+time);
}

function toggleSound(){
soundOn=!soundOn;
event.target.innerText = soundOn ? "🔊 Sound" : "🔇 Mute";
}

// SHUFFLE
function shuffle(arr){
let a=[...arr];
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

// UI
function setEmoji(t){
document.getElementById("emoji").innerText=
t==="good"?"🎉":"😢";
}

// NAV
function selectCategory(c){
category=c;
stars=0; coins=0;
document.getElementById("stars").innerText=0;
document.getElementById("coins").innerText=0;

document.getElementById("screen1").classList.add("hidden");
document.getElementById("screen2").classList.remove("hidden");
}

function startGame(l){
level=l;
index=0;
shuffledList=shuffle(questions[category][level]);

document.getElementById("screen2").classList.add("hidden");
document.getElementById("screen3").classList.remove("hidden");

loadQ();
}

// TIMER
function startTimer(){
clearInterval(timer);
timeLeft=10;

timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText="⏱ "+timeLeft;

if(timeLeft<=0){
clearInterval(timer);
autoWrong();
}
},1000);
}

function autoWrong(){
if(locked) return;
locked=true;
setEmoji("bad");
beep(200);
setTimeout(()=>nextQ(),800);
}

// LOAD
function loadQ(){
if(!shuffledList[index]){
showResult();
return;
}

locked=false;

let q=shuffledList[index];
document.getElementById("question").innerText=q.q;

let ansDiv=document.getElementById("answers");
ansDiv.innerHTML="";

q.a.forEach((a,i)=>{
let btn=document.createElement("button");
btn.className="btn answer-btn";
btn.innerText=a;
btn.onclick=()=>checkAnswer(i,q.c,btn);
ansDiv.appendChild(btn);
});

startTimer();
}

// ANSWER
function checkAnswer(sel,correct,btn){
if(locked) return;
locked=true;

clearInterval(timer);

if(sel===correct){
btn.classList.add("correct");
stars++; coins+=5;
setEmoji("good");
beep(800);
showConfetti();
}else{
btn.classList.add("wrong");
setEmoji("bad");
beep(200);
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

setTimeout(()=>nextQ(),800);
}

// CONFETTI
function showConfetti(){
for(let i=0;i<20;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),1000);
}
}

// NEXT
function nextQ(){
index++;
loadQ();
}

function prevQ(){
if(index>0){
index--;
loadQ();
}
}

// RESULT
function showResult(){
document.getElementById("screen3").classList.add("hidden");
document.getElementById("screen4").classList.remove("hidden");

document.getElementById("finalScore").innerText=
"⭐ "+stars+" 💰 "+coins;

let badge="🌟 GENIUS";
if(stars>=3) document.getElementById("mediumBtn").disabled=false;
if(stars>=6) document.getElementById("hardBtn").disabled=false;

if(stars>=6) badge="⭐ MASTER";
else if(stars>=3) badge="🏆 PRO";

document.getElementById("badge").innerText=badge;
}

function playAgain(){
document.getElementById("screen4").classList.add("hidden");
document.getElementById("screen1").classList.remove("hidden");
}

function backToCategory(){
document.getElementById("screen2").classList.add("hidden");
document.getElementById("screen1").classList.remove("hidden");
}

function backToLevels(){
document.getElementById("screen3").classList.add("hidden");
document.getElementById("screen2").classList.remove("hidden");
}

function home(){
document.getElementById("screen3").classList.add("hidden");
document.getElementById("screen1").classList.remove("hidden");
}

</script>

</body>
</html>
