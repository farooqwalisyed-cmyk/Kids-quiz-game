<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 color:white;
}

.card{
 width:92%;
 max-width:420px;
 background: rgba(0,0,0,0.3);
 padding:20px;
 border-radius:20px;
 text-align:center;
 backdrop-filter: blur(10px);
}

button{
 padding:12px;
 margin:6px;
 border:none;
 border-radius:12px;
 font-size:16px;
 cursor:pointer;
}

.btn{
 width:100%;
 background:white;
 color:black;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<button class="btn" onclick="toggleSound()">🔊 Sound: <span id="soundTxt">ON</span></button>

<div id="home">
  <button class="btn" onclick="startSetup()">Start Game</button>
</div>

<div id="setup" class="hidden">

  <h3>Select Category</h3>
  <button class="btn" onclick="setCat('math')">Math</button>
  <button class="btn" onclick="setCat('english')">English</button>
  <button class="btn" onclick="setCat('gk')">GK</button>

  <h3>Select Difficulty</h3>
  <button class="btn" onclick="setDiff('easy')">Easy</button>
  <button class="btn" onclick="setDiff('medium')">Medium</button>
  <button class="btn" onclick="setDiff('hard')">Hard</button>

</div>

<div id="game" class="hidden">

  <h3 id="q">Loading...</h3>
  <div id="opts"></div>

</div>

</div>

<script>

let cat=null;
let diff=null;
let i=0;
let sound=true;

/* ---------------- SOUND ENGINE ---------------- */

function beep(type){
 if(!sound) return;

 let ctx = new (window.AudioContext || window.webkitAudioContext)();
 let o = ctx.createOscillator();
 let g = ctx.createGain();

 o.connect(g);
 g.connect(ctx.destination);

 if(type==="correct") o.frequency.value = 700;
 if(type==="wrong") o.frequency.value = 200;
 if(type==="welcome") o.frequency.value = 500;

 o.start();
 g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.5);
 o.stop(ctx.currentTime + 0.5);
}

/* ---------------- DATA ---------------- */

const data={
 math:{
  easy:[
   {q:"2 + 2 = ?", o:["3","4","5"], a:1},
   {q:"5 + 3 = ?", o:["6","7","8"], a:2}
  ],
  medium:[
   {q:"12 + 8 = ?", o:["18","20","22"], a:1}
  ],
  hard:[
   {q:"12 x 12 = ?", o:["124","144","154"], a:1}
  ]
 },

 english:{
  easy:[
   {q:"A for ?", o:["Apple","Ball","Cat"], a:0}
  ],
  medium:[
   {q:"Plural of Book?", o:["Books","Bookies","Booked"], a:0}
  ],
  hard:[
   {q:"Opposite Happy?", o:["Joy","Sad","Glad"], a:1}
  ]
 },

 gk:{
  easy:[
   {q:"Days in week?", o:["5","6","7"], a:2}
  ],
  medium:[
   {q:"Capital India?", o:["Delhi","Mumbai","Chennai"], a:0}
  ],
  hard:[
   {q:"Largest ocean?", o:["Atlantic","Pacific","Arctic"], a:1}
  ]
 }
};

/* ---------------- FLOW FIX ---------------- */

function startSetup(){
 document.getElementById("home").style.display="none";
 document.getElementById("setup").style.display="block";
 beep("welcome");
}

function setCat(c){
 cat=c;
 tryStart();
}

function setDiff(d){
 diff=d;
 tryStart();
}

function tryStart(){
 if(cat && diff){
  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="block";
  i=0;
  load();
 }
}

/* ---------------- GAME ---------------- */

function load(){

 let q=data?.[cat]?.[diff]?.[i];

 if(!q){
  alert("🎉 Level Completed!");
  location.reload();
  return;
 }

 document.getElementById("q").innerText=q.q;

 let html="";

 q.o.forEach((op,idx)=>{
  html+=`<button class="btn" onclick="check(${idx})">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

function check(ans){

 let q=data[cat][diff][i];

 if(ans===q.a){
  beep("correct");
 }else{
  beep("wrong");
 }

 i++;
 load();
}

/* ---------------- SOUND TOGGLE ---------------- */

function toggleSound(){
 sound=!sound;
 document.getElementById("soundTxt").innerText=sound?"ON":"OFF";
}

</script>

</body>
</html>
