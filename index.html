<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f172a;
 color:white;
}

/* APP SCREENS */
.screen{
 display:none;
 height:100vh;
 width:100%;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 text-align:center;
}

.active{
 display:flex;
}

/* CARD */
.card{
 width:90%;
 max-width:420px;
 background:#1e293b;
 padding:20px;
 border-radius:16px;
}

/* BUTTONS */
button{
 padding:12px;
 margin:6px;
 border:none;
 border-radius:10px;
 font-size:16px;
 cursor:pointer;
}

.btn{
 background:white;
 color:black;
 width:100%;
}

/* TOP BAR */
.top{
 display:flex;
 justify-content:space-between;
 margin-bottom:10px;
}

/* ANIMATION */
.correct{
 background:lime !important;
 transform:scale(1.1);
 transition:0.2s;
}

.wrong{
 background:red !important;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="card">
    <h2>🎮 Kids Quiz PRO</h2>
    <button class="btn" onclick="goSetup()">Start Game</button>
  </div>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
  <div class="card">

    <h3>Select Category</h3>
    <button class="btn" onclick="setCat('math')">Math</button>
    <button class="btn" onclick="setCat('english')">English</button>
    <button class="btn" onclick="setCat('gk')">GK</button>

    <h3>Select Difficulty</h3>
    <button class="btn" onclick="setDiff('easy')">Easy</button>
    <button class="btn" onclick="setDiff('medium')">Medium</button>
    <button class="btn" onclick="setDiff('hard')">Hard</button>

    <button class="btn" onclick="startGame()">Play Quiz</button>

  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="card">

    <div class="top">
      <div>🔊 <span id="sound">ON</span></div>
    </div>

    <h3 id="q"></h3>
    <div id="opts"></div>

  </div>
</div>

<script>

let cat="";
let diff="";
let i=0;
let sound=true;

const data={
 math:{
  easy:[
   {q:"2+2?",a:1,o:["3","4","5"]},
   {q:"3+3?",a:0,o:["6","7","8"]}
  ],
  medium:[
   {q:"10+5?",a:2,o:["12","13","15"]}
  ],
  hard:[
   {q:"10×2?",a:1,o:["10","20","30"]}
  ]
 },
 english:{
  easy:[
   {q:"A for?",a:0,o:["Apple","Ball","Cat"]}
  ],
  medium:[
   {q:"Plural Book?",a:0,o:["Books","Book","Boks"]}
  ],
  hard:[
   {q:"Opposite Happy?",a:1,o:["Sad","Joyful","Angry"]}
  ]
 },
 gk:{
  easy:[
   {q:"Days in week?",a:2,o:["5","6","7"]}
  ],
  medium:[
   {q:"Capital India?",a:0,o:["Delhi","Mumbai","Chennai"]}
  ],
  hard:[
   {q:"Ocean?",a:1,o:["Atlantic","Pacific","Arctic"]}
  ]
 }
};

function showScreen(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function goSetup(){
 showScreen("setup");
}

function setCat(c){ cat=c; }
function setDiff(d){ diff=d; }

function startGame(){

 if(!cat || !diff){
  alert("Select category & difficulty");
  return;
 }

 i=0;
 showScreen("game");
 load();
}

function load(){

 let q = data[cat][diff][i];

 if(!q){
  alert("Level Completed!");
  location.reload();
  return;
 }

 document.getElementById("q").innerText=q.q;

 let html="";
 q.o.forEach((op,idx)=>{
  html+=`<button class="btn" onclick="check(this,${idx})">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

function check(btn,ans){

 let q=data[cat][diff][i];

 if(ans===q.a){
  btn.classList.add("correct");
 }else{
  btn.classList.add("wrong");
 }

 setTimeout(()=>{
  i++;
  load();
 },500);
}

</script>

</body>
</html>
