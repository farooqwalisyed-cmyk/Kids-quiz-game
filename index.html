<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game{
  width:95%;
  max-width:520px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
}

.btn{
  padding:12px;
  margin:6px;
  width:90%;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

.btn:active{transform:scale(0.9);}

.category-btn{background:#2575fc;color:white;}
.level-btn{background:#6a11cb;color:white;}
.answer-btn{background:#eee;}

.hidden{display:none;}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.nav button{
  width:32%;
  background:#333;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
}

.correct{background:#4CAF50 !important;color:white;}
.wrong{background:#f44336 !important;color:white;}

#emoji{font-size:40px;margin:10px 0;}

.confetti{
position:fixed;
top:0;
width:10px;
height:10px;
animation:fall 1s linear forwards;
}
@keyframes fall{
to{transform:translateY(500px) rotate(360deg);opacity:0;}
}
</style>
</head>

<body>

<div class="game">

<div class="top">
<div>⭐ <span id="stars">0</span></div>
<div>💰 <span id="coins">0</span></div>
</div>

<h2>Kids Quiz PRO MAX 🎮</h2>

<button onclick="toggleSound()">🔊 Sound</button>

<div id="emoji">🙂</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=kids-happy-112194.mp3" type="audio/mpeg">
</audio>

<!-- CATEGORY -->
<div id="screen1">
<h3>Select Category</h3>
<button class="btn category-btn" onclick="selectCategory('gk')">GK</button>
<button class="btn category-btn" onclick="selectCategory('english')">English</button>
<button class="btn category-btn" onclick="selectCategory('math')">Math</button>
</div>

<!-- LEVEL -->
<div id="screen2" class="hidden">
<h3>Select Level</h3>
<button id="easyBtn" class="btn level-btn" onclick="startGame('easy')">Easy</button>
<button id="mediumBtn" class="btn level-btn" onclick="startGame('medium')">🔒 Medium</button>
<button id="hardBtn" class="btn level-btn" onclick="startGame('hard')">🔒 Hard</button>
<button class="btn" onclick="backToCategory()">⬅ Back</button>
</div>

<!-- QUIZ -->
<div id="screen3" class="hidden">
<h3 id="question"></h3>
<div id="answers"></div>

<div class="nav">
<button onclick="prevQ()">⬅</button>
<button onclick="backToLevels()">🔙</button>
<button onclick="home()">🏠</button>
</div>

<div id="timer">⏱ 10</div>
</div>

<!-- RESULT -->
<div id="screen4" class="hidden">
<h2>🎉 Completed!</h2>
<h3 id="finalScore"></h3>
<h3 id="badge"></h3>

<button class="btn level-btn" onclick="playAgain()">🔁 Play Again</button>
<button class="btn category-btn" onclick="home()">🏠 Home</button>
</div>

</div>

<script>

// GAME STATE
let category="", level="", index=0;
let stars=0, coins=0;
let shuffledList=[];
let locked=false;
let timer, timeLeft=10;

let soundOn=true;
let musicStarted=false;

// UNLOCK SYSTEM
let unlockedLevels={
gk:{easy:true,medium:false,hard:false},
english:{easy:true,medium:false,hard:false},
math:{easy:true,medium:false,hard:false}
};

// QUESTIONS

const questions={
gk:{
easy:[
{q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:0},
{q:"Sun rises in?",a:["West","East","North","South"],c:1}
],
medium:[
{q:"Largest ocean?",a:["Atlantic","Indian","Pacific","Arctic"],c:2}
],
hard:[
{q:"Smallest country?",a:["Vatican","India","USA","UK"],c:0}
]
},

english:{
easy:[
{q:"A for?",a:["Apple","Ball","Cat","Dog"],c:0}
],
medium:[
{q:"Plural of child?",a:["Childs","Children","Childes","Childer"],c:1}
],
hard:[
{q:"Synonym of happy?",a:["Sad","Joyful","Angry","Tired"],c:1}
]
},

math:{
easy:[
{q:"2 + 2?",a:["3","4","5","6"],c:1}
],
medium:[
{q:"10 × 2?",a:["20","15","25","30"],c:0}
],
hard:[
{q:"100 ÷ 4?",a:["20","25","30","40"],c:1}
]
}
};

// 🎤 VOICE
function speak(text){
if(!soundOn) return;
let msg=new SpeechSynthesisUtterance(text);
msg.rate=1;
msg.pitch=1.3;
speechSynthesis.speak(msg);
}

// 🔊 SOUND
let audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function beep(freq,time=0.15){
if(!soundOn) return;
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.frequency.value=freq;
o.connect(g);
g.connect(audioCtx.destination);
o.start();
o.stop(audioCtx.currentTime+time);
}

// 🎵 MUSIC FIX
function startMusicOnce(){
if(musicStarted) return;

if(audioCtx.state==="suspended") audioCtx.resume();

let music=document.getElementById("bgMusic");
music.volume=0.5;

music.play().then(()=>{
musicStarted=true;
}).catch(()=>{});
}

document.body.addEventListener("touchstart", startMusicOnce);
document.body.addEventListener("click", startMusicOnce);

function toggleSound(){
soundOn=!soundOn;
let music=document.getElementById("bgMusic");

if(soundOn){
event.target.innerText="🔊 Sound";
if(musicStarted) music.play();
}else{
event.target.innerText="🔇 Mute";
music.pause();
}
}

// 🎉 FUN SOUNDS
function popSound(){beep(600,0.1);}
function funnyWrong(){beep(200,0.2);setTimeout(()=>beep(150,0.2),150);}
function winSound(){beep(800,0.2);setTimeout(()=>beep(1000,0.2),150);}

// SHUFFLE
function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

// UI
function setEmoji(t){
emoji.innerText=t==="good"?"🎉":"😢";
}

// LEVEL BUTTONS
function updateLevelButtons(){
let c=unlockedLevels[category];
mediumBtn.disabled=!c.medium;
hardBtn.disabled=!c.hard;
mediumBtn.innerText=c.medium?"Medium":"🔒 Medium";
hardBtn.innerText=c.hard?"Hard":"🔒 Hard";
}

// NAV
function selectCategory(c){
popSound();
speak("Welcome to Kids Quiz");

category=c;
stars=0; coins=0;
starsEl.innerText=0;
coinsEl.innerText=0;

screen1.classList.add("hidden");
screen2.classList.remove("hidden");

updateLevelButtons();
}

function startGame(l){
popSound();
if(!unlockedLevels[category][l]) return;

level=l;
index=0;
shuffledList=shuffle(questions[category][level]);

screen2.classList.add("hidden");
screen3.classList.remove("hidden");

loadQ();
}

// TIMER
function startTimer(){
clearInterval(timer);
timeLeft=10;

timer=setInterval(()=>{
timeLeft--;
timerEl.innerText="⏱ "+timeLeft;

if(timeLeft<=0){
clearInterval(timer);
autoWrong();
}
},1000);
}

function autoWrong(){
if(locked) return;
locked=true;
setEmoji("bad");
funnyWrong();
speak("Time is up");
setTimeout(nextQ,800);
}

// LOAD
function loadQ(){
if(!shuffledList[index]){showResult();return;}
locked=false;

let q=shuffledList[index];
question.innerText=q.q;

answers.innerHTML="";
q.a.forEach((a,i)=>{
let btn=document.createElement("button");
btn.className="btn answer-btn";
btn.innerText=a;
btn.onclick=()=>checkAnswer(i,q.c,btn);
answers.appendChild(btn);
});

startTimer();
}

// ANSWER
function checkAnswer(sel,correct,btn){
if(locked) return;
locked=true;
clearInterval(timer);

if(sel===correct){
btn.classList.add("correct");
stars++; coins+=5;
setEmoji("good");
winSound();
speak("Correct Answer");
showConfetti();
}else{
btn.classList.add("wrong");
setEmoji("bad");
funnyWrong();
speak("Try Again");
}

starsEl.innerText=stars;
coinsEl.innerText=coins;

setTimeout(nextQ,800);
}

// CONFETTI
function showConfetti(){
for(let i=0;i<20;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),1000);
}
}

// FLOW
function nextQ(){index++;loadQ();}
function prevQ(){if(index>0){index--;loadQ();}}

// RESULT
function showResult(){
screen3.classList.add("hidden");
screen4.classList.remove("hidden");

finalScore.innerText="⭐ "+stars+" 💰 "+coins;

if(level==="easy") unlockedLevels[category].medium=true;
if(level==="medium") unlockedLevels[category].hard=true;

updateLevelButtons();

let badge="🌟 GENIUS";
if(stars>=2) badge="⭐ MASTER";
else if(stars>=1) badge="🏆 PRO";

badgeEl.innerText=badge;

speak("Great job! Level completed");
winSound();
}

// NAV BACK
function playAgain(){screen4.classList.add("hidden");screen1.classList.remove("hidden");}
function backToCategory(){screen2.classList.add("hidden");screen1.classList.remove("hidden");}
function backToLevels(){screen3.classList.add("hidden");screen2.classList.remove("hidden");}
function home(){screen3.classList.add("hidden");screen1.classList.remove("hidden");}

// ELEMENTS
let starsEl=document.getElementById("stars");
let coinsEl=document.getElementById("coins");
let timerEl=document.getElementById("timer");
let question=document.getElementById("question");
let answers=document.getElementById("answers");
let screen1=document.getElementById("screen1");
let screen2=document.getElementById("screen2");
let screen3=document.getElementById("screen3");
let screen4=document.getElementById("screen4");
let finalScore=document.getElementById("finalScore");
let badgeEl=document.getElementById("badge");
let emoji=document.getElementById("emoji");

</script>

</body>
</html>
