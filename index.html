<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

.screen{display:none;}
.active{display:block;}

.card{
  background:white;
  color:black;
  width:90%;
  max-width:420px;
  margin:40px auto;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#2575fc;
  color:white;
  font-weight:bold;
}

/* PRO UI */
.progress{
  width:90%;
  height:10px;
  background:#ddd;
  border-radius:20px;
  margin:10px auto;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:gold;
  transition:0.3s;
}

.correct{background:#4caf50 !important;}
.wrong{background:#f44336 !important;}

/* COIN POP */
.coin-pop{
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:gold;
  color:black;
  padding:10px 20px;
  border-radius:20px;
  font-weight:bold;
  animation:pop 1s ease forwards;
  z-index:9999;
}

@keyframes pop{
  0%{transform:translate(-50%,0) scale(0);opacity:0;}
  50%{transform:translate(-50%,-20px) scale(1.2);opacity:1;}
  100%{transform:translate(-50%,-40px) scale(1);opacity:0;}
}

/* RESULT SCREEN */
#result{
  display:none;
}

.star{
  font-size:25px;
  color:gold;
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active card">
  <h1>🎮 Kids Quiz Pro</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="quizScreen" class="screen card">

  <div class="topbar">
    <div>Level: <span id="levelText">1</span></div>
    <div>Coins: <span id="coinText">0</span></div>
  </div>

  <!-- PROGRESS -->
  <div class="progress">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <h2 id="question">Question</h2>

  <div id="options"></div>

</div>

<!-- RESULT -->
<div id="result" class="card">
  <h1>🎉 Game Completed</h1>
  <h2 id="finalScore"></h2>
  <div id="stars"></div>
  <button onclick="restart()">Play Again</button>
</div>

<script>

let level = 0;
let coins = 0;

const sampleQuestions = [
  {q:"Capital of India?", o:["Delhi","Mumbai","Kolkata"], c:0},
  {q:"2 + 2 = ?", o:["3","4","5"], c:1},
  {q:"Color of sky?", o:["Blue","Red","Green"], c:0},
  {q:"5 x 5 = ?", o:["10","20","25"], c:2},
  {q:"Sun is a?", o:["Star","Planet","Moon"], c:0},
  {q:"Water formula?", o:["H2O","CO2","O2"], c:0},
  {q:"Capital of USA?", o:["Washington DC","New York","LA"], c:0},
  {q:"10 - 7 = ?", o:["2","3","4"], c:1},
  {q:"Bird flies with?", o:["Wings","Hands","Legs"], c:0},
  {q:"Apple is a?", o:["Fruit","Animal","Veg"], c:0}
];

// expand to 100 levels properly
const questions = Array.from({length:100}, (_,i)=>{
  return sampleQuestions[i % sampleQuestions.length];
});

/* START */
function startGame(){
  document.getElementById("home").classList.remove("active");
  document.getElementById("quizScreen").classList.add("active");

  level = 0;
  coins = 0;

  updateUI();
  loadQuestion();
}

/* LOAD */
function loadQuestion(){

  if(level >= questions.length){
    showResult();
    return;
  }

  let q = questions[level];

  document.getElementById("levelText").innerText = level + 1;
  document.getElementById("question").innerText = q.q;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.o.forEach((opt,i)=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(i);
    box.appendChild(btn);
  });

  updateUI();
}

/* ANSWER CHECK */
function checkAnswer(i){

  let q = questions[level];
  let screen = document.getElementById("quizScreen");

  if(i === q.c){
    coins += 10;
    showCoin("+10 Coins 🎉");
    screen.classList.add("correct");

    // vibration (mobile)
    if(navigator.vibrate) navigator.vibrate(100);

  } else {
    screen.classList.add("wrong");
    if(navigator.vibrate) navigator.vibrate(200);
  }

  setTimeout(()=>{
    screen.classList.remove("correct");
    screen.classList.remove("wrong");
  },300);

  level++;
  loadQuestion();
}

/* PROGRESS + UI */
function updateUI(){
  document.getElementById("coinText").innerText = coins;
  document.getElementById("levelText").innerText = level + 1;

  let percent = (level / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

/* COIN POP */
function showCoin(text){
  let div = document.createElement("div");
  div.className = "coin-pop";
  div.innerText = text;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),1000);
}

/* RESULT SCREEN */
function showResult(){

  document.getElementById("quizScreen").style.display = "none";
  document.getElementById("result").style.display = "block";

  document.getElementById("finalScore").innerText =
    "Coins: " + coins;

  let starBox = document.getElementById("stars");
  starBox.innerHTML = "";

  let stars = coins >= 800 ? 3 : coins >= 500 ? 2 : 1;

  for(let i=0;i<stars;i++){
    starBox.innerHTML += "⭐";
  }

  // confetti simple
  for(let i=0;i<30;i++){
    let c = document.createElement("div");
    c.innerText = "🎉";
    c.style.position="fixed";
    c.style.left=Math.random()*100+"%";
    c.style.top=Math.random()*100+"%";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1000);
  }
}

/* RESTART */
function restart(){
  location.reload();
}

</script>

</body>
</html>
