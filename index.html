<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO MAX</title>

<style>
body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background: linear-gradient(135deg,#9b8cff,#ffb3b3);
}

.card{
 width:95%;
 max-width:420px;
 background:white;
 border-radius:30px;
 padding:20px;
 box-shadow:0 10px 30px rgba(0,0,0,0.2);
 text-align:center;
 position:relative;
 overflow:hidden;
}

.top{
 display:flex;
 justify-content:space-between;
 font-size:16px;
}

h1{font-size:24px;}

button{
 width:100%;
 padding:14px;
 margin:8px 0;
 border:none;
 border-radius:20px;
 font-size:16px;
 color:white;
}

.btn-blue{background:linear-gradient(90deg,#43cea2,#185a9d);}
.btn-pink{background:linear-gradient(90deg,#ff758c,#ff7eb3);}
.btn-gray{background:#ddd;color:black;}

.opt{border-radius:15px;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.screen{display:none;}
.active{display:block;}

#q{font-size:20px;margin:10px 0;}

.nav{display:flex;gap:10px;}
.nav button{flex:1;}

.tap{
 font-size:20px;
 animation: blink 1s infinite;
}
@keyframes blink{50%{opacity:0.3;}}

/* PROGRESS BAR */
.progress{
 height:8px;
 background:#eee;
 border-radius:10px;
 margin:10px 0;
 overflow:hidden;
}
.bar{
 height:100%;
 width:0%;
 background:#4dabf7;
}

/* TIMER */
.timer{
 font-weight:bold;
 color:#ff4d4d;
}

/* CONFETTI */
.confetti{
 position:absolute;
 width:6px;
 height:6px;
 background:red;
 top:-10px;
 animation:fall 2s linear forwards;
}
@keyframes fall{
 to{
  transform:translateY(400px) rotate(360deg);
  opacity:0;
 }
}

</style>
</head>

<body>

<div class="card">

<div class="top">
 ⭐ <span id="stars">0</span>
 🪙 <span id="coins">0</span>
 ⏱️ <span class="timer" id="time">10</span>
</div>

<h1>Kids Quiz PRO MAX 🎮</h1>

<!-- TAP -->
<div id="start" class="screen active" onclick="startApp()">
 <div class="tap">👉 Tap to Start</div>
</div>

<!-- CATEGORY -->
<div id="category" class="screen">
<button class="btn-blue" onclick="selectCat('math')">Math</button>
<button class="btn-blue" onclick="selectCat('english')">English</button>
<button class="btn-blue" onclick="selectCat('gk')">GK</button>
</div>

<!-- LEVEL -->
<div id="level" class="screen">
<button class="btn-pink" onclick="startGame('easy')">Easy</button>
<button class="btn-pink" onclick="startGame('medium')">Medium</button>
<button class="btn-pink" onclick="startGame('hard')">Hard</button>
<button class="btn-gray" onclick="back()">Back</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div class="progress"><div class="bar" id="bar"></div></div>

<div id="q"></div>
<div id="opts"></div>

<div class="nav">
 <button class="btn-gray" onclick="prev()">⬅</button>
 <button class="btn-gray" onclick="next()">➡</button>
</div>

<button class="btn-gray" onclick="home()">🏠</button>

</div>

</div>

<script>

let cat,diff,i=0;
let stars=0,coins=0;
let timer=10,interval;
let soundOn=true;
let audioCtx;

/* 🎤 VOICE */
function speak(t){
 if(!soundOn) return;
 let msg=new SpeechSynthesisUtterance(t);
 speechSynthesis.speak(msg);
}

/* 🎵 BG MUSIC */
function bgMusic(){
 if(!audioCtx){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
 }
 let o=audioCtx.createOscillator();
 let g=audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);
 o.frequency.value=200;
 g.gain.value=0.05;
 o.start();
}

/* 🎉 CONFETTI */
function confetti(){
 for(let j=0;j<20;j++){
  let c=document.createElement("div");
  c.className="confetti";
  c.style.left=Math.random()*100+"%";
  c.style.background=`hsl(${Math.random()*360},100%,50%)`;
  document.querySelector(".card").appendChild(c);
  setTimeout(()=>c.remove(),2000);
 }
}

/* DATA (expanded sample) */
const data={
 math:{
  easy:[
   {q:"2+2=?",o:["3","4","5","6"],a:1},
   {q:"5+5=?",o:["10","11","9","8"],a:0},
   {q:"3+7=?",o:["10","9","8","11"],a:0}
  ],
  medium:[
   {q:"12+8=?",o:["20","18","22","16"],a:0},
   {q:"15-5=?",o:["10","5","8","12"],a:0}
  ],
  hard:[
   {q:"12x12=?",o:["144","124","154","134"],a:0}
  ]
 },
 english:{
  easy:[
   {q:"A for?",o:["Apple","Ball","Cat","Dog"],a:0},
   {q:"B for?",o:["Ball","Apple","Cat","Dog"],a:0}
  ],
  medium:[
   {q:"Plural of book?",o:["Books","Book","Booked","Bookies"],a:0}
  ],
  hard:[
   {q:"Opposite happy?",o:["Sad","Joy","Fun","Glad"],a:0}
  ]
 },
 gk:{
  easy:[
   {q:"Days in week?",o:["5","6","7","8"],a:2},
   {q:"Sun rises in?",o:["East","West","North","South"],a:0}
  ],
  medium:[
   {q:"Capital India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0}
  ],
  hard:[
   {q:"Largest ocean?",o:["Pacific","Atlantic","Arctic","Indian"],a:0}
  ]
 }
};

/* SCREEN */
function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* START */
function startApp(){
 speak("Welcome to Kids Quiz Pro");
 bgMusic();
 show("category");
}

function selectCat(c){cat=c;show("level");}

function startGame(d){
 diff=d;i=0;
 stars=0;coins=0;
 load();
 show("game");
}

/* LOAD */
function load(){
 let q=data[cat][diff][i];
 document.getElementById("q").innerText=q.q;

 let html="";
 q.o.forEach((op,idx)=>{
  html+=`<button class="btn-blue" onclick="check(${idx},this)">${op}</button>`;
 });
 document.getElementById("opts").innerHTML=html;

 updateProgress();
 startTimer();
}

/* TIMER */
function startTimer(){
 clearInterval(interval);
 timer=10;
 document.getElementById("time").innerText=timer;

 interval=setInterval(()=>{
  timer--;
  document.getElementById("time").innerText=timer;

  if(timer===0){
   clearInterval(interval);
   next();
  }
 },1000);
}

/* PROGRESS */
function updateProgress(){
 let total=data[cat][diff].length;
 let percent=((i+1)/total)*100;
 document.getElementById("bar").style.width=percent+"%";
}

/* ANSWER */
function check(ans,btn){
 clearInterval(interval);

 let q=data[cat][diff][i];

 if(ans===q.a){
  btn.classList.add("correct");
  stars++; coins+=10;
  speak("Correct Answer");
  confetti();
 }else{
  btn.classList.add("wrong");
  speak("Wrong Answer");
 }

 document.getElementById("stars").innerText=stars;
 document.getElementById("coins").innerText=coins;

 setTimeout(()=>next(),800);
}

/* NAV */
function next(){
 if(i < data[cat][diff].length-1){
  i++; load();
 }else{
  alert("Game Finished!");
  home();
 }
}

function prev(){
 if(i>0){i--;load();}
}

function home(){
 show("category");
}

function back(){
 show("category");
}

</script>

</body>
</html>
