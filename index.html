<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz Game</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
margin:0;
padding:0;
}

.screen{display:none;padding:20px;}
.active{display:block;}

button{
padding:10px 15px;
margin:8px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

#question{
font-size:22px;
margin:20px;
font-weight:bold;
}
</style>
</head>

<body>

<!-- MENU SCREEN -->
<div id="menu" class="screen active">

<h1>🎮 Kids Quiz Game</h1>

<button onclick="startGame()">Start Game</button>

<br><br>

Score: <span id="score">0</span><br>
Coins: <span id="coins">0</span><br>
Stars: <span id="stars">0</span>

</div>

<!-- GAME SCREEN -->
<div id="game" class="screen">

<h2 id="question"></h2>

<div id="options"></div>

<br>
<button onclick="showMenu()">Exit</button>

</div>

<script>

let questions = [
{q:"Dog says?", a:"Bark", o:["Bark","Meow","Roar","Buzz"]},
{q:"Cat says?", a:"Meow", o:["Meow","Bark","Roar","Buzz"]},
{q:"Cow gives?", a:"Milk", o:["Milk","Egg","Water","Honey"]},
{q:"Lion sound?", a:"Roar", o:["Roar","Buzz","Meow","Bark"]},
{q:"Fish lives in?", a:"Water", o:["Water","Sky","Land","Tree"]},
{q:"Bird can?", a:"Fly", o:["Fly","Swim","Run","Sleep"]},
{q:"Sun is?", a:"Hot", o:["Hot","Cold","Wet","Dry"]},
{q:"Moon appears at?", a:"Night", o:["Night","Morning","Noon","Evening"]},
{q:"Baby dog?", a:"Puppy", o:["Puppy","Kitten","Cub","Calf"]},
{q:"2 + 2 = ?", a:"4", o:["4","3","5","6"]}
];

let index = 0;
let score = 0;
let coins = 0;
let stars = 0;

let shuffled = [];

function startGame(){
index = 0;
score = 0;
coins = 0;
stars = 0;

shuffled = shuffle([...questions]);

updateUI();
show("game");
loadQuestion();
}

function loadQuestion(){

if(index >= shuffled.length){
alert("🎉 Game Finished!");
show("menu");
return;
}

let q = shuffled[index];

document.getElementById("question").innerText = q.q;

let box = document.getElementById("options");
box.innerHTML = "";

// shuffle options
let opts = shuffle([...q.o]);

opts.forEach(opt=>{
let btn = document.createElement("button");
btn.innerText = opt;

btn.onclick = function(){
if(opt === q.a){
score += 10;
coins += 5;
stars += 1;
btn.style.background="green";
}else{
btn.style.background="red";
}

setTimeout(()=>{
index++;
updateUI();
loadQuestion();
},400);
};

box.appendChild(btn);
});
}

function updateUI(){
document.getElementById("score").innerText = score;
document.getElementById("coins").innerText = coins;
document.getElementById("stars").innerText = stars;
}

function showMenu(){
show("menu");
}

function show(id){
document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active");
});
document.getElementById(id).classList.add("active");
}

/* shuffle function */
function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

</script>

</body>
</html>
