<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}
@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{
font-size:24px;
font-weight:bold;
margin:10px 0;
color:#6a11cb;
}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}
.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.bounce{animation:bounce 0.4s;}
@keyframes bounce{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.dark{background:#111 !important;color:white;}
.neon{background:black !important;color:#0ff;}
.kids{background:#fffbe6 !important;}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="card" id="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">🔊 Tap to Start</button>

<button class="btn p2" onclick="setTheme('kids')">Kids Theme</button>
<button class="btn p3" onclick="setTheme('dark')">Dark Theme</button>
<button class="btn p4" onclick="setTheme('neon')">Neon Theme</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>

<button class="btn p1" onclick="showLeaderboard()">🏆 Leaderboard</button>
<button class="btn p1" onclick="goHome()">🏠 Restart</button>
</div>

<div id="levelScreen" class="hidden">
<button id="easyBtn" class="btn p1" onclick="selectLevel(0)">Easy</button>
<button id="medBtn" class="btn p2" onclick="selectLevel(1)">Medium 🔒</button>
<button id="hardBtn" class="btn p3" onclick="selectLevel(2)">Hard 🔒</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

<div id="leaderScreen" class="hidden">
<h3>🏆 Leaderboard</h3>
<div id="leaderData"></div>
<button class="btn p1" onclick="goHome()">⬅ Back</button>
</div>

</div>

<script>

/* ===== FULL QUESTIONS ===== */
const data={
math:[
Array.from({length:10},(_,i)=>({
q:`${i+2}+${i+3}=?`,
o:[`${i+3}`,`${i+5}`,`${i+6}`,`${i+7}`],
a:1
})),
Array.from({length:10},(_,i)=>({
q:`${i+5}×2=?`,
o:[`${(i+5)*2-2}`,`${(i+5)*2}`,`${(i+5)*2+2}`,`${(i+5)*2+4}`],
a:1
})),
Array.from({length:10},(_,i)=>({
q:`${(i+10)}+${(i+15)}=?`,
o:[`${(i+10)+(i+15)-2}`,`${(i+10)+(i+15)}`,`${(i+10)+(i+15)+2}`,`${(i+10)+(i+15)+4}`],
a:1
}))
],

english:[
Array.from({length:10},()=>({q:"Apple is a ?",o:["Fruit","Animal","Car","City"],a:0})),
Array.from({length:10},()=>({q:"He __ going",o:["is","are","am","be"],a:0})),
Array.from({length:10},()=>({q:"Go past tense?",o:["Went","Goed","Going","Go"],a:0}))
],

gk:[
Array.from({length:10},()=>({q:"Capital of India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0})),
Array.from({length:10},()=>({q:"Sun is a?",o:["Star","Planet","Moon","Rock"],a:0})),
Array.from({length:10},()=>({q:"Water formula?",o:["H2O","CO2","O2","NaCl"],a:0}))
]
};

/* ===== REST SAME ===== */
let unlock={math:0,english:0,gk:0};
let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;
let aiBoost=0;

/* SOUND */
function playSound(src){
let a=new Audio(src);
a.play().catch(()=>{});
}

/* VOICE */
function speak(text){
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.rate=0.9;
speechSynthesis.speak(msg);
}

/* THEME */
function setTheme(t){
localStorage.setItem("theme",t);
applyTheme();
}
function applyTheme(){
let t=localStorage.getItem("theme");
document.getElementById("card").className="card "+(t||"");
}
applyTheme();

/* CONFETTI */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
let pieces=[];
function blastConfetti(){
for(let i=0;i<80;i++){
pieces.push({x:Math.random()*canvas.width,y:0,r:Math.random()*5+2,d:Math.random()*40});
}}
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
pieces.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=2+p.d/30;
});
pieces=pieces.filter(p=>p.y<canvas.height);
requestAnimationFrame(draw);
}
draw();

/* GAME */
function startApp(){
playSound("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
show("catScreen");
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen","leaderScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){
cat=c;
document.getElementById("medBtn").innerText = unlock[cat]>=1?"Medium":"Medium 🔒";
document.getElementById("hardBtn").innerText = unlock[cat]>=2?"Hard":"Hard 🔒";
show("levelScreen");
}

function selectLevel(l){
if(l===1 && unlock[cat]<1){alert("Complete Easy");return;}
if(l===2 && unlock[cat]<2){alert("Complete Medium");return;}
level=l;i=0;show("gameScreen");load();
}

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);

time=Math.max(5,10-aiBoost);

let opts=q.o.map((t,idx)=>({t,ok:idx===q.a})).sort(()=>Math.random()-0.5);
document.getElementById("opts").innerHTML=opts.map(o=>`<button class="btn p1" onclick="check(this,${o.ok})">${o.t}</button>`).join("");
startTimer();
}

function check(btn,ok){
clearInterval(timer);
if(ok){
btn.classList.add("correct","bounce");
stars++; coins+=10;
aiBoost++;
playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
blastConfetti();
}else{
btn.classList.add("wrong");
playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
}
document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;
setTimeout(nextQ,700);
}

function startTimer(){
clearInterval(timer);
document.getElementById("time").innerText=time;
timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

function nextQ(){
if(i<data[cat][level].length-1){i++;load();}
else{
if(level===0) unlock[cat]=1;
if(level===1) unlock[cat]=2;
saveScore();
goHome();
}
}

function prevQ(){if(i>0){i--;load();}}

function goHome(){
i=0;
clearInterval(timer);
show("catScreen");
}

/* LEADERBOARD */
function saveScore(){
let scores=JSON.parse(localStorage.getItem("quizScores")||"[]");
scores.push({score:stars,date:new Date().toLocaleDateString()});
scores.sort((a,b)=>b.score-a.score);
scores=scores.slice(0,5);
localStorage.setItem("quizScores",JSON.stringify(scores));
}

function showLeaderboard(){
let scores=JSON.parse(localStorage.getItem("quizScores")||"[]");
let html=scores.map(s=>`⭐ ${s.score} - ${s.date}`).join("<br>");
document.getElementById("leaderData").innerHTML=html || "No scores yet";
show("leaderScreen");
}

</script>

</body>
</html>
