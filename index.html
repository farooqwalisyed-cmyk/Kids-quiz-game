<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:0.5s;
}

/* 🌈 FULL THEMES */
body.dark{background:#0f172a;}
body.neon{background:#000;}
body.kids{background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card.dark{background:#1e1e1e;color:white;}
.card.neon{background:#000;color:#0ff;box-shadow:0 0 20px #0ff;}
.card.kids{background:#fff;}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}
</style>
</head>

<body class="kids">

<canvas id="confetti"></canvas>

<div class="card kids" id="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<button class="btn p3" onclick="changeTheme()">🎨 Theme</button>

<div id="startScreen">
<button class="btn p1" onclick="startGame()">Start</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
</div>

<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium</button>
<button class="btn p3" onclick="selectLevel(2)">Hard</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>
<button class="btn p4" onclick="goHome()">Home</button>
</div>

</div>

<script>

/* 🎵 SOUND SYSTEM */
function sound(type){
if(type==="welcome"){
new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}
if(type==="correct"){
new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg").play();
}
if(type==="wrong"){
new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg").play();
}
}

/* 🎉 CONFETTI */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let parts=[];
function blast(){
for(let i=0;i<80;i++){
parts.push({
x:Math.random()*canvas.width,
y:0,
r:Math.random()*6+2,
c:`hsl(${Math.random()*360},100%,50%)`
});
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
parts.forEach(p=>{
ctx.fillStyle=p.c;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=3;
});
parts=parts.filter(p=>p.y<canvas.height);
requestAnimationFrame(draw);
}
draw();

/* 📚 FULL ORIGINAL QUESTION BANK RESTORED */
const data={
math:[
[
{q:"2+3=?",o:["4","5","6","7"],a:1},
{q:"4+5=?",o:["7","8","9","10"],a:2},
{q:"6+2=?",o:["6","7","8","9"],a:2},
{q:"3+7=?",o:["9","10","11","8"],a:1},
{q:"5+5=?",o:["9","10","11","12"],a:1}
],
[
{q:"10+5=?",o:["14","15","16","17"],a:1},
{q:"12+6=?",o:["17","18","19","20"],a:1},
{q:"9+9=?",o:["16","17","18","19"],a:2},
{q:"14+3=?",o:["16","17","18","19"],a:1},
{q:"11+7=?",o:["17","18","19","20"],a:1}
],
[
{q:"20+15=?",o:["30","35","40","45"],a:1},
{q:"25+10=?",o:["30","35","40","45"],a:1},
{q:"30+12=?",o:["40","42","44","46"],a:1},
{q:"18+17=?",o:["34","35","36","37"],a:1},
{q:"22+13=?",o:["33","35","36","37"],a:1}
]
],

english:[
[
{q:"Apple is?",o:["Fruit","Car","Animal","City"],a:0},
{q:"Dog says?",o:["Bark","Meow","Moo","Roar"],a:0},
{q:"Sky color?",o:["Blue","Red","Green","Black"],a:0},
{q:"Bird can?",o:["Fly","Swim","Run","Drive"],a:0},
{q:"Milk is?",o:["Drink","Stone","Car","Wood"],a:0}
],
[
{q:"Opposite Big?",o:["Small","Tall","Huge","Long"],a:0},
{q:"Opposite Hot?",o:["Cold","Warm","Fire","Heat"],a:0},
{q:"Opposite Up?",o:["Down","Left","Right","Front"],a:0},
{q:"Opposite Fast?",o:["Slow","Quick","Rush","Speed"],a:0},
{q:"Opposite Happy?",o:["Sad","Joy","Fun","Smile"],a:0}
],
[
{q:"Past go?",o:["Went","Goed","Gone","Going"],a:0},
{q:"Past eat?",o:["Ate","Eated","Eat","Eating"],a:0},
{q:"Past run?",o:["Ran","Runed","Running","Runs"],a:0},
{q:"Past come?",o:["Came","Comed","Coming","Comes"],a:0},
{q:"Past see?",o:["Saw","Seed","Seeing","Sees"],a:0}
]
],

gk:[
[
{q:"Capital India?",o:["Delhi","Mumbai","Goa","Chennai"],a:0},
{q:"Sun is?",o:["Star","Planet","Moon","Rock"],a:0},
{q:"Water formula?",o:["H2O","CO2","O2","NaCl"],a:0},
{q:"Earth is?",o:["Planet","Star","Moon","Cloud"],a:0},
{q:"Rainbow colors?",o:["7","5","6","8"],a:0}
],
[
{q:"Fastest animal?",o:["Cheetah","Lion","Tiger","Horse"],a:0},
{q:"CPU is?",o:["Brain","Heart","Eye","Hand"],a:0},
{q:"Sun rises?",o:["East","West","North","South"],a:0},
{q:"Water boils?",o:["100°C","50°C","0°C","200°C"],a:0},
{q:"Plants make food?",o:["Photosynthesis","Jump","Run","Sleep"],a:0}
],
[
{q:"1 KB=?",o:["1024 bytes","100","10","1"],a:0},
{q:"Gravity?",o:["Newton","Tesla","Einstein","Darwin"],a:0},
{q:"DNA is?",o:["Genetic","Metal","Gas","Stone"],a:0},
{q:"Light speed?",o:["Fastest","Slow","Medium","Zero"],a:0},
{q:"Atom is?",o:["Smallest","Big","Huge","Large"],a:0}
]
];

/* 🎮 GAME ENGINE */
let cat="",level=0,i=0,stars=0,coins=0,time=10,timer;

/* 🔊 FIXED WELCOME SOUND */
function startGame(){
sound("welcome");
show("catScreen");
}

/* 🎨 THEMES */
function changeTheme(){
let body=document.body;
let card=document.getElementById("card");

if(body.classList.contains("dark")){
body.className="neon";
card.className="card neon";
}
else if(body.classList.contains("neon")){
body.className="kids";
card.className="card kids";
}
else{
body.className="dark";
card.className="card dark";
}
}

function selectCat(c){cat=c;show("levelScreen");}

function selectLevel(l){level=l;i=0;show("gameScreen");load();}

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach((o,idx)=>{
html+=`<button class="btn p1" onclick="check(${idx})">${o}</button>`;
});
document.getElementById("opts").innerHTML=html;
startTimer();
}

/* 🔊 FIXED SOUND LOGIC */
function check(ans){
clearInterval(timer);
let q=data[cat][level][i];

if(ans==q.a){
stars++;coins+=10;
blast();
sound("correct");
}else{
sound("wrong");
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

setTimeout(nextQ,500);
}

/* 🤖 AI DIFFICULTY */
function startTimer(){
time=10-(level*2);
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

function nextQ(){
if(i<data[cat][level].length-1){
i++;
load();
}else{
i=0;
show("catScreen");
}
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function goHome(){
show("catScreen");
}

</script>
</body>
</html>
