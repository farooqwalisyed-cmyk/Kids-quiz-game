<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#a18cd1,#84fab0);
 background-size:400% 400%;
 animation: bg 8s infinite;
}
@keyframes bg{
 0%{background-position:0%}
 50%{background-position:100%}
 100%{background-position:0%}
}

.card{
 width:95%;
 max-width:500px;
 background:#fff;
 border-radius:25px;
 padding:20px;
 text-align:center;
}

.top{
 display:flex;
 justify-content:space-between;
 font-size:18px;
}

.timer{color:red;font-weight:bold;}

button{
 width:100%;
 padding:14px;
 margin:6px 0;
 border:none;
 border-radius:15px;
 font-size:18px;
 color:white;
}

.btn1{background:#ff6b6b;}
.btn2{background:#4dabf7;}
.btn3{background:#51cf66;}
.btn4{background:#ffd43b;color:black;}

.navBtn1{background:#845ef7;}
.navBtn2{background:#20c997;}
.navBtn3{background:#ff922b;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.screen{display:none;}
.active{display:block;}

.nav{display:flex;gap:8px;}
.nav button{flex:1;}

.lock{opacity:0.5;}
</style>
</head>

<body>

<div class="card">

<div class="top">
 ⭐ <span id="stars">0</span>
 🪙 <span id="coins">0</span>
 ⏱️ <span id="time" class="timer">10</span>
</div>

<h2>🎮 Kids Quiz PRO</h2>

<div id="start" class="screen active" onclick="startApp()">
 <h3>👉 Tap to Start</h3>
</div>

<div id="category" class="screen">
<button class="btn2" onclick="selectCat('math')">Math</button>
<button class="btn2" onclick="selectCat('english')">English</button>
<button class="btn2" onclick="selectCat('gk')">GK</button>
</div>

<div id="level" class="screen">
<button class="btn1" onclick="startGame('easy')">Easy</button>
<button id="medBtn" class="btn1 lock" onclick="startGame('medium')">🔒 Medium</button>
<button id="hardBtn" class="btn1 lock" onclick="startGame('hard')">🔒 Hard</button>
<button class="navBtn1" onclick="show('category')">⬅ Back</button>
</div>

<div id="game" class="screen">

<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button class="navBtn1" onclick="prev()">⬅ Prev</button>
 <button class="navBtn2" onclick="next()">Next ➡</button>
</div>

<button class="navBtn3" onclick="home()">🏠 Home</button>

</div>

</div>

<script>

let cat,diff="easy",i=0;
let stars=0,coins=0;
let timer,interval;

/* SOUND */
function playSound(freq){
 let ctx=new (window.AudioContext||window.webkitAudioContext)();
 let o=ctx.createOscillator();
 let g=ctx.createGain();
 o.connect(g); g.connect(ctx.destination);
 o.frequency.value=freq;
 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
 o.stop(ctx.currentTime+0.5);
}

/* START */
function startApp(){
 speechSynthesis.speak(new SpeechSynthesisUtterance("Welcome to Kids Quiz Pro"));
 show("category");
}

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function selectCat(c){
 cat=c;
 show("level");
}

function startGame(){
 i=0;
 show("game");
 load();
}

/* SHUFFLE */
function shuffle(q){
 let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
 arr.sort(()=>Math.random()-0.5);
 return {
  q:q.q,
  o:arr.map(x=>x.t),
  a:arr.findIndex(x=>x.correct)
 };
}

/* ✅ 20 QUESTIONS EACH */
const data={

math:{easy:[
{q:"2+2=?",o:["3","4","5","6"],a:1},
{q:"5+3=?",o:["7","8","9","6"],a:1},
{q:"10-5=?",o:["5","6","4","3"],a:0},
{q:"6+2=?",o:["7","8","9","10"],a:1},
{q:"9-3=?",o:["6","5","4","7"],a:0},

{q:"3+6=?",o:["8","9","10","7"],a:1},
{q:"8-2=?",o:["6","5","7","8"],a:0},
{q:"1+7=?",o:["7","8","9","6"],a:1},
{q:"2+6=?",o:["7","8","9","10"],a:1},
{q:"7-1=?",o:["5","6","7","8"],a:1},
{q:"3+3=?",o:["5","6","7","8"],a:1},
{q:"5+2=?",o:["6","7","8","9"],a:1},
{q:"9-2=?",o:["6","7","8","5"],a:1},
{q:"6+1=?",o:["6","7","8","9"],a:1},
{q:"4+3=?",o:["6","7","8","5"],a:1},
{q:"8-4=?",o:["4","5","6","7"],a:0},
{q:"7+2=?",o:["8","9","10","7"],a:1},
{q:"5+5=?",o:["9","10","11","8"],a:1},
{q:"10-3=?",o:["6","7","8","9"],a:1}
]},

english:{easy:[
{q:"A is for?",o:["Apple","Ball","Cat","Dog"],a:0},
{q:"B is for?",o:["Ball","Dog","Egg","Fish"],a:0},
{q:"C is for?",o:["Cat","Dog","Elephant","Fan"],a:0},
{q:"D is for?",o:["Dog","Apple","Ink","Hat"],a:0},
{q:"E is for?",o:["Egg","Ball","Car","Dog"],a:0},
{q:"F is for?",o:["Fan","Gun","Hat","Ink"],a:0},
{q:"G is for?",o:["Goat","Hat","Ink","Jug"],a:0},
{q:"H is for?",o:["Hat","Ink","Jug","Kite"],a:0},

gk:{easy:[
{q:"How many days are there in a week?",o:["5","6","7","8"],a:2},
{q:"Which animal says meow?",o:["Dog","Cat","Cow","Lion"],a:1},

{q:"What do bees make?",o:["Milk","Honey","Juice","Water"],a:1},

{q:"Which animal barks?",o:["Cat","Dog","Cow","Lion"],a:1}
]}

};

let current;

function load(){
 let q=data[cat].easy[i];
 current=shuffle(q);

 document.getElementById("q").innerText=current.q;

 let colors=["btn1","btn2","btn3","btn4"];
 let html="";
 current.o.forEach((op,idx)=>{
  html+=`<button class="${colors[idx]}" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;

 startTimer();
}

function startTimer(){
 clearInterval(interval);
 timer=10;
 document.getElementById("time").innerText=timer;

 interval=setInterval(()=>{
  timer--;
  document.getElementById("time").innerText=timer;
  if(timer===0){clearInterval(interval);next();}
 },1000);
}

function check(ans,btn){
 clearInterval(interval);

 if(ans===current.a){
  btn.classList.add("correct");
  stars++; coins+=10;
  playSound(900);
 }else{
  btn.classList.add("wrong");
  playSound(200);
 }

 document.getElementById("stars").innerText=stars;
 document.getElementById("coins").innerText=coins;

 setTimeout(()=>next(),700);
}

function next(){
 if(i < data[cat].easy.length-1){
  i++; load();
 }else{
  alert("Easy Level Completed!");
  show("category");
 }
}

function prev(){ if(i>0){i--;load();} }
function home(){ show("category"); }

</script>

</body>
</html>
