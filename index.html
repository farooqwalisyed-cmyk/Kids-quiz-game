<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
overflow:hidden;
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
position:relative;
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}

.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.pop{animation:pop 0.3s;}
@keyframes pop{
0%{transform:scale(0.6)}
100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<!-- SCREENS -->
<div id="startScreen">
<button class="btn p1" onclick="startApp()">Tap to Play</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p1" onclick="goHome()">⬅ Back</button>
</div>

<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium</button>
<button class="btn p3" onclick="selectLevel(2)">Hard</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

let cat="",level=0,i=0;
let stars=0,coins=0;
let timer,time=10;

/* ===== SOUND FIX (IMPORTANT) ===== */
let audioUnlocked=false;

function unlockAudio(){
if(audioUnlocked) return;
audioUnlocked=true;
let ctx = new (window.AudioContext || window.webkitAudioContext)();
ctx.resume();
}

function sound(type){
try{
unlockAudio();

let audio = new Audio();

audio.src = type==="correct"
? "https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
: "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg";

audio.volume=1;
audio.play().catch(()=>{});
}catch(e){}
}

/* ===== SCREEN FIX ===== */
function show(id){
document.getElementById("startScreen").classList.add("hidden");
document.getElementById("catScreen").classList.add("hidden");
document.getElementById("levelScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.add("hidden");

document.getElementById(id).classList.remove("hidden");
}

/* ===== FLOW ===== */
function startApp(){
unlockAudio();
show("catScreen");
}

function selectCat(c){
cat=c;
show("levelScreen");
}

function selectLevel(l){
level=l;
i=0;
show("gameScreen");
load();
}

/* ===== QUESTIONS ===== */
const data={
math:[
[
{q:"2+2=?",o:["3","4","5","6"],a:1},
{q:"5×2=?",o:["10","12","8","6"],a:0}
],
[
{q:"20+15=?",o:["35","30","25","40"],a:0}
],
[
{q:"144÷12=?",o:["10","11","12","13"],a:2}
]
]
};

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach((op,idx)=>{
html+=`<button class="btn p1" onclick="check(${idx},this)">${op}</button>`;
});

document.getElementById("opts").innerHTML=html;
startTimer();
}

/* ===== TIMER ===== */
function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

/* ===== ANSWER ===== */
function check(ans,btn){
clearInterval(timer);

let q=data[cat][level][i];

if(ans===q.a){
btn.classList.add("correct","pop");
stars++; coins+=10;
sound("correct");
}else{
btn.classList.add("wrong","shake");
sound("wrong");
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

setTimeout(nextQ,600);
}

/* ===== NAV ===== */
function nextQ(){
if(i < data[cat][level].length-1){
i++;
load();
}else{
show("catScreen");
}
}

function prevQ(){
if(i>0){
i--;
load();
}
}

function goHome(){
show("catScreen");
}

</script>

</body>
</html>
