<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}

@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{
font-size:24px;
font-weight:bold;
margin:10px 0;
color:#6a11cb;
text-shadow:1px 1px 2px #ccc;
}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
transform:scale(1.03);
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.bounce{animation:bounce 0.5s;}
@keyframes bounce{
0%{transform:scale(1)}
30%{transform:scale(1.15)}
60%{transform:scale(0.95)}
100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">🔊 Tap to Start</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p1" onclick="goHome()">🏠 Restart</button>
</div>

<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium</button>
<button class="btn p3" onclick="selectLevel(2)">Hard</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* ===== SOUND ===== */
function playSound(src){
new Audio(src).play();
}

/* ===== DATA (ONLY MEDIUM LEVEL UPDATED TO 10 QUESTIONS EACH) ===== */
const data = {
math:[
[
{q:"2+2=?",o:["3","4","5","6"],a:1},
{q:"5+3=?",o:["6","7","8","9"],a:2},
{q:"10-4=?",o:["5","6","7","8"],a:1},
{q:"3+6=?",o:["7","8","9","10"],a:2},
{q:"7-2=?",o:["4","5","6","3"],a:1},
{q:"4+4=?",o:["6","7","8","9"],a:2},
{q:"9-3=?",o:["5","6","7","8"],a:1},
{q:"6+2=?",o:["7","8","9","10"],a:1},
{q:"8-4=?",o:["2","3","4","5"],a:2},
{q:"1+1=?",o:["1","2","3","4"],a:1}
],
[
{q:"10×2=?",o:["10","20","30","40"],a:1},
{q:"15+5=?",o:["18","19","20","21"],a:2},
{q:"25-10=?",o:["10","15","20","25"],a:1},
{q:"6×3=?",o:["12","15","18","20"],a:2},
{q:"9+9=?",o:["16","17","18","19"],a:2},
{q:"8×2=?",o:["14","15","16","18"],a:2},
{q:"30-10=?",o:["10","15","20","25"],a:2},
{q:"12÷2=?",o:["4","5","6","7"],a:2},
{q:"14+6=?",o:["18","19","20","21"],a:2},
{q:"20-5=?",o:["10","15","20","25"],a:1}
],
[
{q:"50÷5=?",o:["5","10","15","20"],a:1}
]
],

english:[
[
{q:"Dog has ___ legs?",o:["2","3","4","5"],a:2},
{q:"Bird can?",o:["Fly","Swim","Run","Walk"],a:0},
{q:"Apple is a ___",o:["Fruit","Animal","Color","Place"],a:0},
{q:"Sky is ___",o:["Blue","Green","Red","Black"],a:0},
{q:"Cat says ___",o:["Meow","Bark","Moo","Quack"],a:0},
{q:"Sun gives ___",o:["Light","Rain","Snow","Wind"],a:0},
{q:"He ___ a boy",o:["is","are","am","be"],a:0},
{q:"She ___ teacher",o:["is","are","am","be"],a:0},
{q:"I ___ happy",o:["am","is","are","be"],a:0},
{q:"We ___ friends",o:["is","are","am","be"],a:1}
],
[
{q:"He ___ going",o:["is","are","am","be"],a:0},
{q:"They ___ playing",o:["is","are","am","be"],a:1},
{q:"She ___ eating",o:["is","are","am","be"],a:0},
{q:"We ___ happy",o:["is","are","am","be"],a:1},
{q:"Dog ___ barking",o:["is","are","am","be"],a:0},
{q:"Birds ___ flying",o:["is","are","am","be"],a:1},
{q:"I ___ student",o:["is","are","am","be"],a:2},
{q:"You ___ smart",o:["is","are","am","be"],a:1},
{q:"He ___ sad",o:["is","are","am","be"],a:0},
{q:"We ___ ready",o:["is","are","am","be"],a:1}
],
[
{q:"Go past tense?",o:["Went","Goed","Goes","Going"],a:0}
]
],

gk:[
[
{q:"Capital of India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0},
{q:"How many days?",o:["365","360","300","400"],a:0},
{q:"Sun is a?",o:["Star","Planet","Moon","Asteroid"],a:0},
{q:"Water formula?",o:["H2O","CO2","O2","NaCl"],a:0},
{q:"Earth is?",o:["Planet","Star","Moon","Cloud"],a:0},
{q:"Largest ocean?",o:["Pacific","Atlantic","Indian","Arctic"],a:0},
{q:"India currency?",o:["Rupee","Dollar","Yen","Euro"],a:0},
{q:"1 year has?",o:["12 months","10","11","13"],a:0},
{q:"Rainbow colors?",o:["7","5","6","8"],a:0},
{q:"Moon is?",o:["Satellite","Star","Planet","Cloud"],a:0}
],
[
{q:"CPU is?",o:["Brain","Heart","Eye","Hand"],a:0},
{q:"HTML used for?",o:["Web","Game","Music","Video"],a:0},
{q:"Water boils at?",o:["100°C","50°C","0°C","200°C"],a:0},
{q:"Human body has?",o:["Heart","Wings","Fins","Leaves"],a:0},
{q:"India PM residence?",o:["Delhi","Mumbai","Goa","Kolkata"],a:0},
{q:"Fastest land animal?",o:["Cheetah","Lion","Tiger","Horse"],a:0},
{q:"Plant makes food by?",o:["Photosynthesis","Breathing","Jump","Running"],a:0},
{q:"Which is gas?",o:["Oxygen","Stone","Water","Iron"],a:0},
{q:"Sun rises in?",o:["East","West","North","South"],a:0},
{q:"Largest planet?",o:["Jupiter","Earth","Mars","Venus"],a:0}
],
[
{q:"1 KB = ?",o:["1024 bytes","100 bytes","10 bytes","1 byte"],a:0}
]
]
};

let cat="",level=0,i=0;
let stars=0,coins=0;
let timer,time=10;

/* ===== LOAD ===== */
function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

let options=q.o.map((t,idx)=>({t,ok:idx===q.a}));
options = options.sort(()=>Math.random()-0.5);

let html="";
options.forEach(op=>{
html+=`<button class="btn p1" onclick="check(this,${op.ok})">${op.t}</button>`;
});

document.getElementById("opts").innerHTML=html;
startTimer();
}

/* ===== CHECK ===== */
function check(btn,ok){
clearInterval(timer);

if(ok){
btn.classList.add("correct","bounce");
stars++; coins+=10;
playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
}else{
btn.classList.add("wrong","shake");
playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

setTimeout(nextQ,700);
}

/* ===== TIMER ===== */
function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

/* ===== NAV ===== */
function nextQ(){
if(i < data[cat][level].length-1){
i++;
load();
}else{
goHome();
}
}

function prevQ(){
if(i>0){ i--; load(); }
}

function goHome(){
i=0;
clearInterval(timer);
show("catScreen");
}

/* ===== WELCOME SOUND FIX ===== */
function startApp(){
playSound("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
show("catScreen");
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){
cat=c;
show("levelScreen");
}

function selectLevel(l){
level=l;
i=0;
show("gameScreen");
load();
}

</script>

</body>
</html>
