<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO v6</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to bottom,#6a11cb,#2575fc);
  color:white;
  text-align:center;
}

.screen{display:none;padding:20px;}
.active{display:block;}

button{
  padding:12px 18px;
  margin:8px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.card{
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  margin-top:10px;
}

.option{
  display:block;
  width:80%;
  margin:10px auto;
}

.bar{
  width:80%;
  background:#ddd;
  margin:10px auto;
  border-radius:20px;
  overflow:hidden;
}

.fill{
  height:12px;
  width:0%;
  background:#00c853;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <h1>🎮 Kids Quiz PRO</h1>
  <button onclick="show('level')">Start Game</button>
</div>

<!-- LEVEL -->
<div id="level" class="screen">
  <h2>Select Level</h2>
  <button onclick="selectLevel('easy')">Easy</button>
  <button onclick="selectLevel('medium')">Medium</button>
  <button onclick="selectLevel('hard')">Hard</button>
</div>

<!-- CATEGORY -->
<div id="category" class="screen">
  <h2>Select Category</h2>
  <button onclick="selectCategory('math')">Math</button>
  <button onclick="selectCategory('english')">English</button>
  <button onclick="selectCategory('gk')">GK</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

  <div>❤️ Lives: <span id="lives">3</span></div>
  <div>⏱️ Time: <span id="time">15</span>s</div>

  <div class="bar"><div id="progress" class="fill"></div></div>

  <div class="card">
    <h3 id="question"></h3>
    <div id="options"></div>
  </div>
</div>

<script>

// ---------------- SOUND ----------------
function beep(type){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  let g = ctx.createGain();

  o.connect(g);
  g.connect(ctx.destination);

  if(type==="correct") o.frequency.value=700;
  if(type==="wrong") o.frequency.value=200;
  if(type==="tick") o.frequency.value=400;

  o.start();
  g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.2);
}

// ---------------- DATA ----------------

const questions = {
math:{
easy:[
{q:"2 + 2 = ?", a:"4"},
{q:"5 - 2 = ?", a:"3"},
{q:"10 + 5 = ?", a:"15"},
{q:"3 + 6 = ?", a:"9"},
{q:"8 - 3 = ?", a:"5"},
{q:"4 + 4 = ?", a:"8"},
{q:"6 - 1 = ?", a:"5"},
{q:"7 + 2 = ?", a:"9"},
{q:"9 - 4 = ?", a:"5"},
{q:"1 + 1 = ?", a:"2"}
],
medium:[
{q:"6 x 2 = ?", a:"12"},
{q:"15 - 7 = ?", a:"8"},
{q:"9 x 3 = ?", a:"27"},
{q:"18 ÷ 2 = ?", a:"9"},
{q:"7 x 4 = ?", a:"28"},
{q:"20 - 9 = ?", a:"11"},
{q:"8 x 5 = ?", a:"40"},
{q:"30 ÷ 5 = ?", a:"6"},
{q:"12 + 13 = ?", a:"25"},
{q:"14 - 6 = ?", a:"8"}
],
hard:[
{q:"12 x 12 = ?", a:"144"},
{q:"100 ÷ 4 = ?", a:"25"},
{q:"25 x 4 = ?", a:"100"},
{q:"144 ÷ 12 = ?", a:"12"},
{q:"18 x 6 = ?", a:"108"},
{q:"81 ÷ 9 = ?", a:"9"},
{q:"15 x 7 = ?", a:"105"},
{q:"200 ÷ 10 = ?", a:"20"},
{q:"11 x 11 = ?", a:"121"},
{q:"50 + 25 = ?", a:"75"}
]
},
gk:{
easy:[
{q:"Days in a week?", a:"7"},
{q:"Months in year?", a:"12"},
{q:"Capital of India?", a:"Delhi"},
{q:"Sun rises in?", a:"East"},
{q:"Cat legs?", a:"4"},
{q:"Sky color?", a:"Blue"},
{q:"Fingers on hand?", a:"5"},
{q:"Eyes?", a:"2"},
{q:"Water is?", a:"Liquid"},
{q:"Apple is?", a:"Fruit"}
]
},
english:{
easy:[
{q:"A for ?", a:"Apple"},
{q:"B for ?", a:"Bat"},
{q:"C for ?", a:"Cat"},
{q:"D for ?", a:"Dog"},
{q:"E for ?", a:"Egg"},
{q:"F for ?", a:"Fish"},
{q:"G for ?", a:"Goat"},
{q:"H for ?", a:"Hen"},
{q:"I for ?", a:"Ice"},
{q:"J for ?", a:"Jug"}
]
}
};

// ---------------- STATE ----------------

let level="", category="", index=0;
let score=0, lives=3, timer=15;
let current=[], interval;

// ---------------- UTIL ----------------

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

// ---------------- SELECT ----------------

function selectLevel(l){
  level=l;
  show("category");
}

function selectCategory(c){
  category=c;
  startGame();
}

// ---------------- START ----------------

function startGame(){
  current = shuffle([...questions[category][level]]);
  index=0;
  score=0;
  lives=3;
  show("game");
  next();
}

// ---------------- TIMER ----------------

function startTimer(){
  clearInterval(interval);
  timer=15;
  document.getElementById("time").innerText=timer;

  interval=setInterval(()=>{
    timer--;
    document.getElementById("time").innerText=timer;
    beep("tick");

    if(timer<=0){
      clearInterval(interval);
      loseLife();
    }
  },1000);
}

// ---------------- LIFE ----------------

function loseLife(){
  lives--;
  document.getElementById("lives").innerText=lives;
  beep("wrong");

  if(lives<=0){
    alert("Game Over 💔");
    show("home");
    return;
  }
  next();
}

// ---------------- PROGRESS ----------------

function updateBar(){
  let p = (index/current.length)*100;
  document.getElementById("progress").style.width = p+"%";
}

// ---------------- QUESTION ----------------

function next(){
  if(index>=current.length){
    alert("🎉 Level Complete!");
    show("home");
    return;
  }

  let q=current[index];
  document.getElementById("question").innerText=q.q;

  let options = getOptions(q.a);
  let box=document.getElementById("options");
  box.innerHTML="";

  options.forEach(o=>{
    let b=document.createElement("button");
    b.className="option";
    b.innerText=o;
    b.onclick=()=>check(o);
    box.appendChild(b);
  });

  updateBar();
  startTimer();
}

// ---------------- OPTIONS (1 correct + 3 wrong) ----------------

function getOptions(correct){
  let pool=current.map(q=>q.a).filter(a=>a!==correct);
  let wrong=shuffle(pool).slice(0,3);
  return shuffle([correct,...wrong]);
}

// ---------------- CHECK ----------------

function check(ans){
  clearInterval(interval);

  let q=current[index];

  if(ans===q.a){
    score+=10;
    beep("correct");
  }else{
    lives--;
    document.getElementById("lives").innerText=lives;
    beep("wrong");
  }

  if(lives<=0){
    alert("Game Over 💔");
    show("home");
    return;
  }

  index++;
  next();
}

</script>

</body>
</html>
