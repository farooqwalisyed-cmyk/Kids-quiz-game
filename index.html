<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* BIGGER SCREEN */
.screen{
  width:95%;
  max-width:600px;
  background: rgba(255,255,255,0.96);
  border-radius:30px;
  padding:30px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

h2{
  font-size:30px;
}

h3{
  font-size:20px;
}

button{
  width:100%;
  padding:16px;
  margin:10px 0;
  border:none;
  border-radius:15px;
  background: linear-gradient(135deg,#2575fc,#6a11cb);
  color:white;
  font-size:20px;
  font-weight:bold;
}

input{
  width:92%;
  padding:14px;
  font-size:18px;
  border-radius:10px;
  margin-bottom:15px;
}

#options button{
  background:#2575fc;
  font-size:18px;
}

.progress{
  width:100%;
  height:14px;
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:gold;
  transition:0.3s;
}

/* COIN POP FIXED */
.coin-popup{
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:gold;
  padding:14px 25px;
  border-radius:25px;
  font-weight:bold;
  font-size:18px;
  animation:pop 1s ease forwards;
}

@keyframes pop{
  0%{transform:translate(-50%,0) scale(0);opacity:0;}
  40%{transform:translate(-50%,-30px) scale(1.3);opacity:1;}
  100%{transform:translate(-50%,-60px) scale(1);opacity:0;}
}
</style>
</head>

<body>

<div id="nameScreen" class="screen">
  <h2>🎮 Kids Quiz Pro</h2>
  <input id="username" placeholder="Enter Name">
  <button onclick="startGame()">Start Game</button>
</div>

<div id="gameScreen" class="screen" style="display:none;">

  <h3>Player: <span id="playerName"></span></h3>
  <h3>Level: <span id="levelText">1</span> | Coins: <span id="coinText">0</span></h3>

  <div class="progress">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <h2 id="question"></h2>
  <div id="options"></div>

  <button onclick="prevQuestion()">⬅ Prev</button>
  <button onclick="nextQuestion()">Next ➡</button>
  <button onclick="goHome()">🏠 Home</button>

</div>

<script>

let level = 0;
let coins = 0;
let player = "";

/* QUESTIONS */
const topics = [
  {q:"Capital of India?", o:["Delhi","Mumbai","Kolkata","Chennai"], c:0},
  {q:"Capital of USA?", o:["Washington DC","New York","LA","Texas"], c:0},
  {q:"2 + 2 = ?", o:["3","4","5","6"], c:1},
  {q:"Water formula?", o:["H2O","CO2","O2","NaCl"], c:0},
  {q:"Sun is a?", o:["Star","Planet","Moon","Comet"], c:0},
  {q:"5 x 5 = ?", o:["10","20","25","30"], c:2},
  {q:"India currency?", o:["Rupee","Dollar","Yen","Euro"], c:0},
  {q:"Largest planet?", o:["Jupiter","Mars","Earth","Venus"], c:0},
  {q:"Human heart chambers?", o:["4","2","3","5"], c:0},
  {q:"Speed of light?", o:["3 lakh km/s","10 km/s","100 km/s","1 km/s"], c:0}
];

/* SHUFFLE */
function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    let j = Math.floor(Math.random() * (i+1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

/* BUILD 100 QUESTIONS */
function generate100Questions(){

  let pool = topics.map(q => ({
    q: q.q,
    o: [...q.o],
    c: q.c
  }));

  shuffle(pool);

  let list = [];

  for(let i=0;i<100;i++){
    let base = pool[i % pool.length];

    list.push({
      q: base.q,
      o: [...base.o],
      c: base.c
    });
  }

  return list;
}

let questions = generate100Questions();

/* START */
function startGame(){
  player = document.getElementById("username").value || "Player";
  document.getElementById("nameScreen").style.display="none";
  document.getElementById("gameScreen").style.display="block";
  document.getElementById("playerName").innerText = player;
  loadQuestion();
}

/* LOAD */
function loadQuestion(){

  let q = questions[level];

  document.getElementById("question").innerText = q.q;
  document.getElementById("levelText").innerText = level + 1;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.o.forEach((opt,i)=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(i);
    box.appendChild(btn);
  });

  updateUI();
}

/* ANSWER */
function checkAnswer(i){
  let q = questions[level];

  if(i === q.c){
    coins += 10;
    showCoin();
  }

  nextQuestion();
}

/* NEXT */
function nextQuestion(){
  if(level < questions.length - 1){
    level++;
    loadQuestion();
  } else {
    alert("🎉 Game Completed " + player + " Coins: " + coins);
  }
}

/* PREV */
function prevQuestion(){
  if(level > 0){
    level--;
    loadQuestion();
  }
}

/* HOME */
function goHome(){
  location.reload();
}

/* UI */
function updateUI(){
  document.getElementById("coinText").innerText = coins;
  let percent = (level / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

/* COIN POP */
function showCoin(){
  let div = document.createElement("div");
  div.className="coin-popup";
  div.innerText="+10 Coins 💰";
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),1000);
}

</script>

</body>
</html>
