<!DOCTYPE html>
<html>
<head>
<title>Kids Quiz Game</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
margin:0;
}

.screen{display:none;padding:20px;}
.active{display:block;}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="menu" class="screen active">

<h1>🎮 Kids Quiz Game</h1>

<button onclick="startGame()">Start Game</button>

<br><br>

Score: <span id="score">0</span><br>
Coins: <span id="coins">0</span><br>
Stars: <span id="stars">0</span>

</div>

<div id="game" class="screen">

<h2 id="q"></h2>
<div id="options"></div>

<br>
<button onclick="show('menu')">Exit</button>

</div>

<script>

let questions=[
{q:"Dog says?",a:"Bark",o:["Bark","Meow","Roar","Buzz"]},
{q:"Cat says?",a:"Meow",o:["Meow","Bark","Roar","Buzz"]},
{q:"Cow gives?",a:"Milk",o:["Milk","Egg","Water","Honey"]},
{q:"Lion sound?",a:"Roar",o:["Roar","Buzz","Meow","Bark"]},
{q:"Fish lives in?",a:"Water",o:["Water","Sky","Land","Tree"]}
];

let index=0;
let score=0;
let coins=0;
let stars=0;

function startGame(){
index=0;
score=0;
coins=0;
stars=0;
show("game");
load();
}

function load(){

if(index>=questions.length){
alert("Game Finished!");
show("menu");
return;
}

let q=questions[index];
document.getElementById("q").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.forEach(opt=>{
let btn=document.createElement("button");
btn.innerText=opt;

btn.onclick=()=>{
if(opt===q.a){
score+=10;
coins+=5;
stars+=1;
}

index++;
updateUI();
load();
};

box.appendChild(btn);
});
}

function updateUI(){
document.getElementById("score").innerText=score;
document.getElementById("coins").innerText=coins;
document.getElementById("stars").innerText=stars;
}

function show(id){
document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active");
});
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
