function speak(text){
speechSynthesis.cancel();
text=text.replace(/__+/g," dash ");
let msg=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(msg);

/* GAME LOGIC */
let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);

let options=q.o.map((t,idx)=>({t,ok:idx===q.a})).sort(()=>Math.random()-0.5);

document.getElementById("opts").innerHTML=
options.map(op=>`<button class="btn p1" onclick="check(this,${op.ok})">${op.t}</button>`).join("");

startTimer();
}

function check(btn,ok){
clearInterval(timer);
if(ok){
stars++;coins+=10;
playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
blastConfetti();
}else{
playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
}
update();
setTimeout(nextQ,700);
}

function prevQ(){
if(i>0){
i--;
stars=Math.max(0,stars-1);
update();
load();
}
}

function nextQ(){
if(i<data[cat][level].length-1){i++;load();}
else{goHome();}
}

function update(){
document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;
}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;
timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

function goHome(){i=0;clearInterval(timer);show("catScreen");}
function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){cat=c;show("levelScreen");}
function selectLevel(l){level=l;i=0;show("gameScreen");load();}

/* CONFETTI (MEDIUM SPEED + ANIMATION) */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let confetti=[];

function blastConfetti(){
for(let i=0;i<60;i++){
confetti.push({
x:Math.random()*canvas.width,
y:-10,
r:Math.random()*6+2,
vx:(Math.random()-0.5)*2,
vy:Math.random()*3+3, // medium speed
color:`hsl(${Math.random()*360},100%,50%)`
});
}}

function drawConfetti(){
ctx.clearRect(0,0,canvas.width,canvas.height);
confetti.forEach(p=>{
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.x+=p.vx;
p.y+=p.vy;
});
confetti=confetti.filter(p=>p.y<canvas.height);
requestAnimationFrame(drawConfetti);
}
drawConfetti();
