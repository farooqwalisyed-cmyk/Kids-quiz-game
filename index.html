<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidz Quiz</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#fbc2eb);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.game{
width:95%;
max-width:500px;
background:white;
padding:20px;
border-radius:20px;
text-align:center;
}

button{
width:90%;
padding:12px;
margin:8px;
border:none;
border-radius:10px;
font-size:16px;
}

.category{background:#36d1dc;color:white;}
.level{background:#ff758c;color:white;}
.answer{background:#eee;}

.correct{background:green;color:white;}
.wrong{background:red;color:white;}

.hidden{display:none;}
</style>
</head>

<body>

<div class="game">

<h2>Kidz Quiz 🎮</h2>

<div id="screen1">
<h3>Select Category</h3>
<button class="category" onclick="selectCategory('gk')">GK</button>
<button class="category" onclick="selectCategory('english')">English</button>
<button class="category" onclick="selectCategory('math')">Math</button>
</div>

<div id="screen2" class="hidden">
<h3>Select Level</h3>
<button class="level" onclick="startGame('easy')">Easy</button>
<button class="level" onclick="startGame('medium')">Medium</button>
<button class="level" onclick="startGame('hard')">Hard</button>
<button onclick="back()">⬅ Back</button>
</div>

<div id="screen3" class="hidden">
<h3 id="q"></h3>
<div id="answers"></div>
<button onclick="next()">Next</button>
</div>

</div>

<script>

let category="", level="", index=0;

const questions={
gk:{
easy:[
{q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:0},
{q:"Sun rises in?",a:["West","East","North","South"],c:1}
],
medium:[
{q:"Largest ocean?",a:["Atlantic","Indian","Pacific","Arctic"],c:2}
],
hard:[
{q:"Smallest country?",a:["Vatican","India","USA","UK"],c:0}
]
},

english:{
easy:[
{q:"A for?",a:["Apple","Ball","Cat","Dog"],c:0}
],
medium:[
{q:"Plural of child?",a:["Children","Childs","Childes","Childer"],c:0}
],
hard:[
{q:"Synonym happy?",a:["Joyful","Sad","Angry","Cry"],c:0}
]
},

math:{
easy:[
{q:"2+2?",a:["3","4","5","6"],c:1}
],
medium:[
{q:"10×2?",a:["20","15","25","30"],c:0}
],
hard:[
{q:"100÷4?",a:["25","20","30","40"],c:0}
]
}
};

function selectCategory(c){
category=c;
screen1.classList.add("hidden");
screen2.classList.remove("hidden");
}

function startGame(l){
level=l;
index=0;
screen2.classList.add("hidden");
screen3.classList.remove("hidden");
loadQ();
}

function loadQ(){
let qObj=questions[category][level][index];
q.innerText=qObj.q;

answers.innerHTML="";
qObj.a.forEach((a,i)=>{
let b=document.createElement("button");
b.className="answer";
b.innerText=a;
b.onclick=()=>check(i,qObj.c,b);
answers.appendChild(b);
});
}

function check(i,c,b){
if(i===c){
b.classList.add("correct");
}else{
b.classList.add("wrong");
}
}

function next(){
index++;
if(index<questions[category][level].length){
loadQ();
}else{
alert("Finished!");
location.reload();
}
}

function back(){
screen2.classList.add("hidden");
screen1.classList.remove("hidden");
}

</script>

</body>
</html>
