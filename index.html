<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}
@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{
font-size:24px;
font-weight:bold;
margin:10px 0;
color:#6a11cb;
}

.progress{
height:8px;
background:#ddd;
border-radius:10px;
margin:10px 0;
overflow:hidden;
}
.progressFill{
height:100%;
width:0%;
background:#1dd1a1;
}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.bounce{animation:bounce 0.5s;}
@keyframes bounce{
0%{transform:scale(1)}
30%{transform:scale(1.15)}
60%{transform:scale(0.95)}
100%{transform:scale(1)}
}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div class="progress"><div class="progressFill" id="progressFill"></div></div>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">🔊 Tap to Start</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p1" onclick="goHome()">🏠 Restart</button>
</div>

<div id="levelScreen" class="hidden">
<button id="easyBtn" class="btn p1" onclick="selectLevel(0)">Easy</button>
<button id="medBtn" class="btn p2" onclick="selectLevel(1)">Medium 🔒</button>
<button id="hardBtn" class="btn p3" onclick="selectLevel(2)">Hard 🔒</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* ===== SAVE SYSTEM ===== */
let saved = JSON.parse(localStorage.getItem("quizSave")) || {
stars:0, coins:0, unlock:{math:0,english:0,gk:0}
};

let unlock = saved.unlock;
let stars = saved.stars;
let coins = saved.coins;

function saveGame(){
localStorage.setItem("quizSave", JSON.stringify({stars,coins,unlock}));
}

/* ===== VOICE ===== */
function speak(text){
try{
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(msg);
}catch(e){}
}

function voiceMsg(t){
speak(t);
}

/* ===== SOUND ===== */
function playSound(src){
new Audio(src).play();
}

/* ===== CONFETTI ===== */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let confetti=[];
function blastConfetti(){
for(let i=0;i<80;i++){
confetti.push({x:Math.random()*canvas.width,y:0,r:Math.random()*6+2,d:Math.random()*50,color:`hsl(${Math.random()*360},100%,50%)`});
}}
function drawConfetti(){
ctx.clearRect(0,0,canvas.width,canvas.height);
confetti.forEach(p=>{
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=2+p.d/30;
});
confetti=confetti.filter(p=>p.y<canvas.height);
requestAnimationFrame(drawConfetti);
}
drawConfetti();

/* ===== QUESTIONS ===== */
const data = {
math:[
Array.from({length:10},(_,i)=>({q:`${i+5}+${i+7}=?`,o:[`${i+10}`,`${i+12}`,`${i+14}`,`${i+16}`],a:1})),
Array.from({length:10},(_,i)=>({q:`${i+10}×3=?`,o:[`${i+20}`,`${(i+10)*3}`,`${i+30}`,`${i+40}`],a:1})),
Array.from({length:10},(_,i)=>({q:`${(i+5)*12}÷3=?`,o:[`${i+10}`,`${(i+5)*4}`,`${i+20}`,`${i+30}`],a:1}))
],
english:[
[
{q:"Apple is a ?",o:["Fruit","Animal","Car","City"],a:0},
{q:"Dog says ?",o:["Meow","Bark","Moo","Roar"],a:1},
{q:"Sky color?",o:["Blue","Green","Red","Yellow"],a:0},
{q:"Cat has ___ legs",o:["2","3","4","5"],a:2},
{q:"Bird can ?",o:["Swim","Fly","Run","Jump"],a:1},
{q:"Sun gives ?",o:["Rain","Light","Snow","Wind"],a:1},
{q:"Fish lives in ?",o:["Air","Water","Land","Tree"],a:1},
{q:"Ball is a ?",o:["Toy","Food","Animal","Plant"],a:0},
{q:"Cow gives ?",o:["Milk","Water","Juice","Tea"],a:0},
{q:"Fire is ?",o:["Cold","Hot","Wet","Dry"],a:1}
],
Array.from({length:10},()=>({q:"Opposite of big?",o:["Small","Tall","Long","Wide"],a:0})),
Array.from({length:10},()=>({q:"Go past tense?",o:["Went","Goed","Going","Gone"],a:0}))
],
gk:[
Array.from({length:10},()=>({q:"Capital of India?",o:["Delhi","Mumbai","Goa","Chennai"],a:0})),
Array.from({length:10},()=>({q:"Sun is a ?",o:["Star","Planet","Moon","Rock"],a:0})),
Array.from({length:10},()=>({q:"Water formula?",o:["H2O","CO2","O2","NaCl"],a:0}))
]
};

/* ===== GAME ===== */
let cat="",level=0,i=0,timer,time=10;

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);

let total=data[cat][level].length;
document.getElementById("progressFill").style.width=((i+1)/total)*100+"%";

let options=q.o.map((t,idx)=>({t,ok:idx===q.a})).sort(()=>Math.random()-0.5);

let html="";
options.forEach(op=>{
html+=`<button class="btn p1" onclick="check(this,${op.ok})">${op.t}</button>`;
});
document.getElementById("opts").innerHTML=html;

startTimer();
}

function check(btn,ok){
clearInterval(timer);

if(ok){
btn.classList.add("correct","bounce");
stars++; coins+=10;
playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
voiceMsg("Great job");
blastConfetti();
}else{
btn.classList.add("wrong","shake");
playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
voiceMsg("Try again");
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

saveGame();

setTimeout(nextQ,700);
}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

function nextQ(){
if(i<data[cat][level].length-1){
i++;load();
}else{
if(level===0) unlock[cat]=1;
if(level===1) unlock[cat]=2;
saveGame();
goHome();
}
}

function prevQ(){if(i>0){i--;load();}}

function goHome(){
i=0;
clearInterval(timer);
show("catScreen");
}

function startApp(){
playSound("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
voiceMsg("Welcome to Kids Quiz Pro");
show("catScreen");
document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){
cat=c;

document.getElementById("medBtn").innerText = unlock[cat]>=1?"Medium":"Medium 🔒";
document.getElementById("hardBtn").innerText = unlock[cat]>=2?"Hard":"Hard 🔒";

show("levelScreen");
}

function selectLevel(l){
if(l===1 && unlock[cat]<1){alert("Complete Easy first");return;}
if(l===2 && unlock[cat]<2){alert("Complete Medium first");return;}
level=l;i=0;show("gameScreen");load();
}

</script>
</body>
</html>
