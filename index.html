<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}

body.dark{
background:linear-gradient(135deg,#111,#222,#333);
color:white;
}

@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

body.dark .card{
background:#1e1e1e;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{
font-size:24px;
font-weight:bold;
margin:10px 0;
color:#6a11cb;
}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}
.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<button class="btn p3" onclick="toggleTheme()">🌙 Toggle Theme</button>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">🔊 Tap to Start</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p3" onclick="show('startScreen')">⬅ Back</button>
<button class="btn p1" onclick="goHome()">🏠 Restart</button>
</div>

<div id="levelScreen" class="hidden">
<button id="easyBtn" class="btn p1" onclick="selectLevel(0)">Easy</button>
<button id="medBtn" class="btn p2" onclick="selectLevel(1)">Medium 🔒</button>
<button id="hardBtn" class="btn p3" onclick="selectLevel(2)">Hard 🔒</button>
<button class="btn p3" onclick="show('catScreen')">⬅ Back</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* SOUND */
let audioUnlocked=false;
function unlockAudio(){
if(!audioUnlocked){
new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg").play().catch(()=>{});
audioUnlocked=true;
}
}
function playSound(src){ new Audio(src).play().catch(()=>{}); }

/* VOICE */
function speak(text){
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.rate=0.9;
msg.pitch=1.3;
speechSynthesis.speak(msg);
}

/* QUESTIONS (ALL CORRECT NOW - 15 EACH) */
const data={

math:[ [...Array(15)].map((_,i)=>({q:`${i+1}+${i+2}=?`,o:[`${i+3}`,`${i+4}`,`${i+5}`,`${i+6}`],a:0})),
[...Array(15)].map((_,i)=>({q:`${10+i}+${5+i}=?`,o:[`${15+2*i}`,`${14+2*i}`,`${16+2*i}`,`${13+2*i}`],a:0})),
[...Array(15)].map((_,i)=>({q:`${20+i}×2=?`,o:[`${(20+i)*2}`,`${(20+i)*2-2}`,`${(20+i)*2+2}`,`${(20+i)*2-4}`],a:0})) ],

english:[ [...Array(15)].map((_,i)=>({q:"Cat says?",o:["Meow","Bark","Moo","Quack"],a:0})),
[...Array(15)].map((_,i)=>({q:"He __ happy",o:["is","are","am","be"],a:0})),
[...Array(15)].map((_,i)=>({q:"Go past tense?",o:["Went","Goed","Going","Gone"],a:0})) ],

gk:[ [...Array(15)].map((_,i)=>({q:"Capital of India?",o:["Delhi","Mumbai","Goa","Chennai"],a:0})),
[...Array(15)].map((_,i)=>({q:"Sun is a?",o:["Star","Planet","Moon","Rock"],a:0})),
[...Array(15)].map((_,i)=>({q:"Water formula?",o:["H2O","CO2","O2","NaCl"],a:0})) ]

};

let unlock={math:0,english:0,gk:0};
let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);

let options=q.o.map((t,idx)=>({t,ok:idx===q.a})).sort(()=>Math.random()-0.5);

document.getElementById("opts").innerHTML=
options.map(op=>`<button class="btn p1" onclick="check(this,${op.ok})">${op.t}</button>`).join("");

startTimer();
}

function prevQ(){ if(i>0){i--;load();} }

function check(btn,ok){
clearInterval(timer);

if(ok){
stars++;coins+=10;
playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
blastConfetti();
}else{
playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

setTimeout(nextQ,800);
}

function nextQ(){
if(i<data[cat][level].length-1){ i++; load(); }
else{
if(level===0) unlock[cat]=1;
if(level===1) unlock[cat]=2;
localStorage.setItem("unlock",JSON.stringify(unlock));
goHome();
}
}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

function goHome(){
i=0;
clearInterval(timer);
show("catScreen");
unlock = JSON.parse(localStorage.getItem("unlock")||'{"math":0,"english":0,"gk":0}');
}

function startApp(){
unlockAudio();
playSound("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
setTimeout(()=>speak("Welcome to Kids Quiz Pro"),300);
show("catScreen");
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){
cat=c;
document.getElementById("medBtn").innerText=unlock[cat]>=1?"Medium":"Medium 🔒";
document.getElementById("hardBtn").innerText=unlock[cat]>=2?"Hard":"Hard 🔒";
show("levelScreen");
}

function selectLevel(l){
if(l===1 && unlock[cat]<1){alert("Complete Easy first");return;}
if(l===2 && unlock[cat]<2){alert("Complete Medium first");return;}
level=l;i=0;show("gameScreen");load();
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

/* CONFETTI */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let confetti=[];
function blastConfetti(){
for(let i=0;i<80;i++){
confetti.push({
x:Math.random()*canvas.width,
y:-10,
r:Math.random()*6+2,
vx:(Math.random()-0.5)*2,
vy:Math.random()*3+3,
angle:Math.random()*360,
spin:(Math.random()-0.5)*10,
color:`hsl(${Math.random()*360},100%,50%)`
});
}}
function drawConfetti(){
ctx.clearRect(0,0,canvas.width,canvas.height);
confetti.forEach(p=>{
ctx.save();
ctx.translate(p.x,p.y);
ctx.rotate(p.angle*Math.PI/180);
ctx.fillStyle=p.color;
ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
ctx.restore();

p.x+=p.vx;
p.y+=p.vy;
p.angle+=p.spin;
});
confetti=confetti.filter(p=>p.y<canvas.height+50);
requestAnimationFrame(drawConfetti);
}
drawConfetti();

</script>

</body>
</html>
