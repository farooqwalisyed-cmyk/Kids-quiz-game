<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game{
  width:95%;
  max-width:520px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
}

h1{margin:10px 0;}

.btn{
  padding:12px;
  margin:6px;
  width:90%;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

.category-btn{background:#2575fc;color:white;}
.level-btn{background:#6a11cb;color:white;}
.answer-btn{background:#eee;}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.nav button{
  width:32%;
  background:#333;
  color:white;
}

.hidden{display:none;}

.correct{background:#4CAF50 !important;color:white;}
.wrong{background:#f44336 !important;color:white;}

.pop{animation:pop 0.3s ease;}

@keyframes pop{
  0%{transform:scale(1);}
  50%{transform:scale(1.3);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="game">

<div class="top">
<div>⭐ Stars: <span id="stars">0</span></div>
<div>💰 Coins: <span id="coins">0</span></div>
</div>

<h1>Kids Quiz PRO</h1>

<!-- CATEGORY -->
<div id="screen1">
  <h3>Select Category</h3>
  <button class="btn category-btn" onclick="selectCategory('gk')">General Knowledge</button>
  <button class="btn category-btn" onclick="selectCategory('english')">English</button>
  <button class="btn category-btn" onclick="selectCategory('math')">Math</button>
</div>

<!-- LEVEL -->
<div id="screen2" class="hidden">
  <h3>Select Level</h3>
  <button class="btn level-btn" onclick="startGame('easy')">Easy</button>
  <button class="btn level-btn" onclick="startGame('medium')">Medium</button>
  <button class="btn level-btn" onclick="startGame('hard')">Hard</button>
</div>

<!-- QUIZ -->
<div id="screen3" class="hidden">
  <h3 id="question"></h3>
  <div id="answers"></div>

  <div class="nav">
    <button onclick="prevQ()">⬅ Prev</button>
    <button onclick="home()">🏠 Home</button>
    <button onclick="nextQ()">Next ➡</button>
  </div>
</div>

</div>

<script>

let category="", level="", index=0;
let stars=0, coins=0;
let autoMove=true;

// ================= BIG QUESTION BANK =================
const questions={

gk:{
easy:[
{q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:0},
{q:"Sun rises in?",a:["West","East","North","South"],c:1},
{q:"How many days in a week?",a:["5","6","7","8"],c:2},
{q:"Largest planet?",a:["Earth","Mars","Jupiter","Venus"],c:2},
{q:"National animal of India?",a:["Lion","Tiger","Elephant","Leopard"],c:1}
],
medium:[
{q:"Largest ocean?",a:["Atlantic","Indian","Pacific","Arctic"],c:2},
{q:"Capital of USA?",a:["New York","Washington DC","LA","Chicago"],c:1},
{q:"H2O is?",a:["Oxygen","Hydrogen","Water","Salt"],c:2},
{q:"Fastest land animal?",a:["Tiger","Cheetah","Lion","Horse"],c:1}
],
hard:[
{q:"World smallest country?",a:["Vatican","India","USA","UK"],c:0},
{q:"Speed of light?",a:["300,000 km/s","150,000 km/s","100,000 km/s","50,000 km/s"],c:0},
{q:"Earth revolves around?",a:["Moon","Sun","Mars","Venus"],c:1}
]
},

english:{
easy:[
{q:"A for?",a:["Apple","Ball","Cat","Dog"],c:0},
{q:"B for?",a:["Ball","Apple","Cat","Dog"],c:0},
{q:"C for?",a:["Cat","Dog","Elephant","Fish"],c:0}
],
medium:[
{q:"Plural of child?",a:["Childs","Children","Childes","Childer"],c:1},
{q:"Opposite of big?",a:["Large","Huge","Small","Tall"],c:2},
{q:"Synonym of fast?",a:["Quick","Slow","Late","Weak"],c:0}
],
hard:[
{q:"Synonym of happy?",a:["Sad","Angry","Joyful","Tired"],c:2},
{q:"Opposite of victory?",a:["Win","Lose","Gain","Try"],c:1}
]
},

math:{
easy:[
{q:"2 + 2 = ?",a:["3","4","5","6"],c:1},
{q:"5 - 2 = ?",a:["2","3","4","5"],c:1},
{q:"1 + 1 = ?",a:["1","2","3","4"],c:1}
],
medium:[
{q:"10 × 2 = ?",a:["20","15","25","30"],c:0},
{q:"12 ÷ 2 = ?",a:["4","5","6","7"],c:2}
],
hard:[
{q:"50 ÷ 5 = ?",a:["5","10","15","20"],c:1},
{q:"25 × 2 = ?",a:["40","45","50","60"],c:2}
]
}
};

// ================= GAME LOGIC =================

function selectCategory(c){
category=c;
document.getElementById("screen1").classList.add("hidden");
document.getElementById("screen2").classList.remove("hidden");
clickSound();
}

function startGame(l){
level=l;
index=0;
document.getElementById("screen2").classList.add("hidden");
document.getElementById("screen3").classList.remove("hidden");
loadQ();
clickSound();
}

function loadQ(){
let q=questions[category][level][index];
document.getElementById("question").innerText=q.q;

let ansDiv=document.getElementById("answers");
ansDiv.innerHTML="";

q.a.forEach((a,i)=>{
let btn=document.createElement("button");
btn.className="btn answer-btn";
btn.innerText=a;
btn.onclick=()=>checkAnswer(i,q.c,btn);
ansDiv.appendChild(btn);
});
}

// ================= AUTO NEXT FIX =================

function checkAnswer(sel,correct,btn){
let buttons=document.querySelectorAll(".answer-btn");

if(sel===correct){
btn.classList.add("correct");
stars++;
coins+=5;
coinPop();
correctSound();
}else{
btn.classList.add("wrong");
wrongSound();
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

buttons.forEach(b=>b.disabled=true);

// 🚀 AUTO NEXT AFTER 1 SECOND
setTimeout(()=>{
if(autoMove){
nextQ();
}
},1000);
}

// ================= NAV =================

function nextQ(){
if(index < questions[category][level].length-1){
index++;
loadQ();
clickSound();
}else{
home();
}
}

function prevQ(){
if(index>0){
index--;
loadQ();
clickSound();
}
}

function home(){
document.getElementById("screen3").classList.add("hidden");
document.getElementById("screen1").classList.remove("hidden");
clickSound();
}

// ================= COIN POP =================

function coinPop(){
let c=document.getElementById("coins");
c.classList.add("pop");
setTimeout(()=>c.classList.remove("pop"),300);
}

// ================= SOUND =================

function clickSound(){beep(300);}
function correctSound(){beep(800);}
function wrongSound(){beep(150);}

function beep(freq){
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let o=ctx.createOscillator();
o.frequency.value=freq;
o.connect(ctx.destination);
o.start();
o.stop(ctx.currentTime+0.15);
}

</script>

</body>
</html>
