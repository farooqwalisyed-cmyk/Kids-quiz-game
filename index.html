<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz Pro</title>

<style>

/* BACKGROUND */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

/* CARD */
.card{
  background:white;
  color:black;
  width:90%;
  max-width:420px;
  margin:60px auto;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

/* BUTTON */
button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#2575fc;
  color:white;
  font-weight:bold;
  transition:0.2s;
}

button:active{
  transform:scale(0.95);
}

/* SCREEN */
.screen{display:none;}
.active{display:block;}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin-bottom:10px;
}

/* ANIMATION */
.correct{background:#4caf50 !important;}
.wrong{background:#f44336 !important;}

/* COIN POP */
.coin-pop{
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:gold;
  color:black;
  padding:10px 20px;
  border-radius:20px;
  font-weight:bold;
  animation:pop 1s ease forwards;
  z-index:9999;
}

@keyframes pop{
  0%{transform:translate(-50%,0) scale(0);opacity:0;}
  50%{transform:translate(-50%,-20px) scale(1.2);opacity:1;}
  100%{transform:translate(-50%,-40px) scale(1);opacity:0;}
}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active card">
  <h1>🎮 Kids Quiz Pro</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="quizScreen" class="screen card">

  <div class="topbar">
    <div>Level: <span id="levelText">1</span></div>
    <div>Coins: <span id="coinText">0</span></div>
  </div>

  <h2 id="question">Question</h2>

  <div id="options"></div>

  <button onclick="prevQuestion()">⬅ Prev</button>
  <button onclick="nextQuestion()">Next ➡</button>

</div>

<script>

let level = 0;
let coins = 0;

/* QUESTIONS */
const questions = [
const questions = [
  {q:"Capital of India?", o:["Delhi","Mumbai","Kolkata"], c:0},
  {q:"2 + 2 = ?", o:["3","4","5"], c:1},
  {q:"Apple is a?", o:["Fruit","Animal","Car"], c:0},
  {q:"Color of sky?", o:["Blue","Red","Green"], c:0},
  {q:"5 + 3 = ?", o:["6","7","8"], c:2},

  {q:"Capital of USA?", o:["New York","Washington DC","LA"], c:1},
  {q:"5 x 5 = ?", o:["10","20","25"], c:2},
  {q:"Sun is a?", o:["Planet","Star","Moon"], c:1},
  {q:"H2O is?", o:["Water","Fire","Air"], c:0},
  {q:"10 - 7 = ?", o:["2","3","4"], c:1},

  {q:"Largest animal?", o:["Elephant","Whale","Lion"], c:1},
  {q:"Smallest planet?", o:["Mercury","Earth","Mars"], c:0},
  {q:"Bird flies with?", o:["Wings","Hands","Legs"], c:0},
  {q:"Color of banana?", o:["Yellow","Blue","Red"], c:0},
  {q:"3 + 6 = ?", o:["9","8","7"], c:0},

  {q:"Which is a fruit?", o:["Potato","Apple","Carrot"], c:1},
  {q:"India is in?", o:["Europe","Asia","Africa"], c:1},
  {q:"7 x 2 = ?", o:["14","12","16"], c:0},
  {q:"Rain comes from?", o:["Clouds","Sun","Moon"], c:0},
  {q:"Opposite of hot?", o:["Cold","Warm","Boiling"], c:0},

  {q:"Red planet?", o:["Mars","Earth","Venus"], c:0},
  {q:"How many days in week?", o:["5","7","10"], c:1},
  {q:"Ocean is?", o:["Salt water","Milk","Juice"], c:0},
  {q:"Bird example?", o:["Dog","Eagle","Cat"], c:1},
  {q:"5 + 5 = ?", o:["10","11","9"], c:0},

  {q:"Capital of France?", o:["Paris","Rome","Berlin"], c:0},
  {q:"7 + 3 = ?", o:["10","11","12"], c:0},
  {q:"Which is animal?", o:["Chair","Tiger","Table"], c:1},
  {q:"Sky color at night?", o:["Black","Green","Red"], c:0},
  {q:"6 x 2 = ?", o:["12","10","14"], c:0},

  {q:"Which is liquid?", o:["Stone","Water","Wood"], c:1},
  {q:"Earth has?", o:["1 moon","2 moons","3 moons"], c:0},
  {q:"Cow gives?", o:["Milk","Egg","Honey"], c:0},
  {q:"8 + 1 = ?", o:["9","8","7"], c:0},
  {q:"Fish lives in?", o:["Water","Land","Sky"], c:0},

  {q:"Sun rises in?", o:["East","West","North"], c:0},
  {q:"Alphabet first letter?", o:["A","B","C"], c:0},
  {q:"10 / 2 = ?", o:["5","6","4"], c:0},
  {q:"Which is veg?", o:["Chicken","Carrot","Fish"], c:1},
  {q:"1 + 9 = ?", o:["10","11","12"], c:0},

  {q:"Largest continent?", o:["Asia","Europe","Africa"], c:0},
  {q:"Spider has how many legs?", o:["6","8","10"], c:1},
  {q:"3 x 3 = ?", o:["6","9","12"], c:1},
  {q:"Water freezes into?", o:["Ice","Gas","Steam"], c:0},
  {q:"Dog says?", o:["Meow","Bark","Moo"], c:1},

  {q:"Opposite of day?", o:["Night","Evening","Morning"], c:0},
  {q:"Color of grass?", o:["Green","Blue","Red"], c:0},
  {q:"2 x 10 = ?", o:["20","10","15"], c:0},
  {q:"Human has?", o:["2 legs","4 legs","6 legs"], c:0},
  {q:"Sky object?", o:["Moon","Rock","Tree"], c:0},

  {q:"4 + 4 = ?", o:["8","9","7"], c:0},
  {q:"Which is sweet?", o:["Sugar","Salt","Chilli"], c:0},
  {q:"Earth is?", o:["Planet","Star","Moon"], c:0},
  {q:"Bird example?", o:["Parrot","Dog","Cat"], c:0},
  {q:"9 - 3 = ?", o:["6","5","7"], c:0},

  {q:"Which is transport?", o:["Car","Tree","Dog"], c:0},
  {q:"Shape of earth?", o:["Round","Square","Flat"], c:0},
  {q:"5 + 2 = ?", o:["7","6","8"], c:0},
  {q:"Which is hot?", o:["Fire","Ice","Snow"], c:0},
  {q:"8 x 2 = ?", o:["16","14","18"], c:0},

  {q:"Human eye count?", o:["2","1","3"], c:0},
  {q:"Which is metal?", o:["Gold","Wood","Paper"], c:0},
  {q:"1 week = ?", o:["7 days","5 days","10 days"], c:0},
  {q:"Which is pet?", o:["Dog","Lion","Tiger"], c:0},
  {q:"10 + 10 = ?", o:["20","15","25"], c:0},

  {q:"Color of orange fruit?", o:["Orange","Blue","Green"], c:0},
  {q:"Which is soft?", o:["Pillow","Stone","Iron"], c:0},
  {q:"Star example?", o:["Sun","Earth","Moon"], c:0},
  {q:"Which is animal?", o:["Elephant","Car","Chair"], c:0},
  {q:"6 + 4 = ?", o:["10","11","12"], c:0}
];

/* START GAME */
function startGame(){
  document.getElementById("home").classList.remove("active");
  document.getElementById("quizScreen").classList.add("active");
  loadQuestion();
}

/* LOAD QUESTION */
function loadQuestion(){

  if(level >= questions.length){
    alert("Game Completed 🎉");
    return;
  }

  let q = questions[level];

  document.getElementById("levelText").innerText = level + 1;
  document.getElementById("question").innerText = q.q;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.o.forEach((opt,i)=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(i);
    box.appendChild(btn);
  });
}

/* CHECK ANSWER */
function checkAnswer(i){

  let q = questions[level];
  let screen = document.getElementById("quizScreen");

  if(i === q.c){
    coins += 10;
    showCoinPop("+10 Coins 🎉");
    screen.classList.add("correct");

    if(level < questions.length - 1){
      level++;
    } else {
      setTimeout(()=>{
        alert("Game Completed 🎉");
      },500);
      return;
    }

  } else {
    screen.classList.add("wrong");
  }

  setTimeout(()=>{
    screen.classList.remove("correct");
    screen.classList.remove("wrong");
  },400);

  updateUI();
  loadQuestion();
}

/* NEXT */
function nextQuestion(){
  if(level < questions.length - 1){
    level++;
    updateUI();
    loadQuestion();
  } else {
    alert("Game Completed 🎉");
  }
}

/* PREVIOUS */
function prevQuestion(){
  if(level > 0){
    level--;
    updateUI();
    loadQuestion();
  }
}

/* UI UPDATE */
function updateUI(){
  document.getElementById("coinText").innerText = coins;
  document.getElementById("levelText").innerText = level + 1;
}

/* COIN POPUP */
function showCoinPop(text){
  let div = document.createElement("div");
  div.className = "coin-pop";
  div.innerText = text;

  document.body.appendChild(div);

  setTimeout(()=>{
    div.remove();
  },1000);
}

</script>

</body>
</html>
