<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz Game Pro</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f2f6ff;
margin:0;
}

.screen{display:none;padding:20px;}
.active{display:block;}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:#4a6cf7;
color:white;
font-size:16px;
}

.option{
display:block;
width:80%;
margin:10px auto;
background:#fff;
color:#333;
border:2px solid #4a6cf7;
}

.level-btn{width:120px;}

.card{
background:white;
padding:20px;
margin:20px;
border-radius:12px;
box-shadow:0 0 10px #ccc;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
<h1>🎮 Kids Quiz Game Pro</h1>
<input id="name" placeholder="Enter Name"><br><br>
<button onclick="goCategories()">Start Game</button>
</div>

<!-- CATEGORY -->
<div id="categories" class="screen">
<h2>Select Category</h2>
<button onclick="openLevels('kids')">Kids</button>
<button onclick="openLevels('math')">Math</button>
<button onclick="openLevels('english')">English</button>
<button onclick="openLevels('gk')">GK</button>
</div>

<!-- LEVEL -->
<div id="levels" class="screen">
<h2>Select Level</h2>
<div id="levelBox"></div>
<button onclick="goHome()">Back</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="card">
<h3>👤 <span id="player"></span></h3>

<h2 id="q">Question</h2>

<div id="options"></div>

<hr>

<p>
Score: <span id="score">0</span> |
Coins: <span id="coins">0</span> |
Stars: <span id="stars">0</span>
</p>

<button onclick="goHome()">Exit</button>
</div>
</div>

<script>

/* PLAYER DATA */
let player="",category="",level=1;
let score=0,coins=0,stars=0;

let questionPool=[];
let currentIndex=0;

/* NO REPEAT ENGINE */
let bank={kids:[],math:[],english:[],gk:[]};
let indexPointer={kids:0,math:0,english:0,gk:0};

/* DATABASE (NO REPEAT SAFE) */
const DB={
kids:[
{q:"Dog says?",a:"Bark",o:["Bark","Meow","Roar","Buzz"]},
{q:"Cat says?",a:"Meow",o:["Meow","Bark","Roar","Buzz"]},
{q:"Cow gives?",a:"Milk",o:["Milk","Egg","Water","Honey"]},
{q:"Hen gives?",a:"Egg",o:["Egg","Milk","Water","Oil"]},
{q:"Fish lives in?",a:"Water",o:["Water","Sky","Land","Tree"]},
{q:"Bird can?",a:"Fly",o:["Fly","Swim","Run","Sleep"]},
{q:"Lion is?",a:"King",o:["King","Doctor","Teacher","Farmer"]},
{q:"Duck says?",a:"Quack",o:["Quack","Bark","Meow","Roar"]},
{q:"Horse runs?",a:"Fast",o:["Fast","Slow","Fly","Crawl"]},
{q:"Elephant is?",a:"Big",o:["Big","Small","Tiny","Light"]}
],

math:[
{q:"2+2=?",a:"4",o:["4","3","5","6"]},
{q:"5+3=?",a:"8",o:["8","7","9","10"]},
{q:"10-5=?",a:"5",o:["5","4","6","7"]},
{q:"6+2=?",a:"8",o:["8","7","9","10"]},
{q:"9-3=?",a:"6",o:["6","5","7","8"]},
{q:"4+4=?",a:"8",o:["8","7","9","6"]},
{q:"7+2=?",a:"9",o:["9","8","10","11"]},
{q:"3+5=?",a:"8",o:["8","7","9","6"]},
{q:"8-2=?",a:"6",o:["6","5","7","8"]},
{q:"1+1=?",a:"2",o:["2","3","4","5"]}
],

english:[
{q:"A for?",a:"Apple",o:["Apple","Ball","Cat","Dog"]},
{q:"B for?",a:"Ball",o:["Ball","Cat","Dog","Ant"]},
{q:"C for?",a:"Cat",o:["Cat","Dog","Bat","Rat"]},
{q:"D for?",a:"Dog",o:["Dog","Cat","Cow","Hen"]},
{q:"E for?",a:"Elephant",o:["Elephant","Fish","Goat","Hen"]},
{q:"F for?",a:"Fish",o:["Fish","Apple","Ball","Dog"]},
{q:"G for?",a:"Goat",o:["Goat","Cat","Dog","Ant"]},
{q:"H for?",a:"Hen",o:["Hen","Fish","Ball","Dog"]}
],

gk:[
{q:"Sun is?",a:"Hot",o:["Hot","Cold","Wet","Dry"]},
{q:"Sky color?",a:"Blue",o:["Blue","Red","Green","Black"]},
{q:"We drink?",a:"Water",o:["Water","Milk","Oil","Juice"]},
{q:"Earth is?",a:"Round",o:["Round","Flat","Square","Triangle"]},
{q:"We breathe?",a:"Air",o:["Air","Water","Fire","Stone"]},
{q:"Moon gives?",a:"Light",o:["Light","Heat","Smoke","Sound"]},
{q:"Sun rises in?",a:"East",o:["East","West","North","South"]},
{q:"Grass color?",a:"Green",o:["Green","Red","Blue","Black"]}
]
};

/* NAV */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function goHome(){show("home");}

function goCategories(){
player=document.getElementById("name").value;
if(player===""){alert("Enter Name");return;}
show("categories");
}

/* LEVELS */
function openLevels(cat){
category=cat;
show("levels");

let box=document.getElementById("levelBox");
box.innerHTML="";

for(let i=1;i<=5;i++){
let b=document.createElement("button");
b.innerText="Level "+i;
b.className="level-btn";
b.onclick=()=>startGame(i);
box.appendChild(b);
}
}

/* 🔥 MAIN ENGINE (NO REPEAT FIXED) */
function startGame(lv){

level=lv;
score=0;coins=0;stars=0;

if(bank[category].length===0){
bank[category]=[...DB[category]];

for(let i=bank[category].length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[bank[category][i],bank[category][j]]=
[bank[category][j],bank[category][i]];
}

indexPointer[category]=0;
}

/* TAKE UNIQUE 3 */
let start=indexPointer[category];
let end=start+3;

questionPool=bank[category].slice(start,end);

indexPointer[category]+=3;

/* RESET AFTER FULL USE */
if(indexPointer[category]>=bank[category].length){
bank[category]=[];
indexPointer[category]=0;
}

currentIndex=0;

show("game");
load();
updateUI();
}

/* LOAD QUESTION */
function load(){

if(currentIndex>=questionPool.length){
alert("Level Completed 🎉");
show("levels");
return;
}

let q=questionPool[currentIndex];
currentIndex++;

document.getElementById("player").innerText=player;
document.getElementById("q").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.sort(()=>Math.random()-0.5);

q.o.forEach(opt=>{
let btn=document.createElement("button");
btn.className="option";
btn.innerText=opt;

btn.onclick=()=>{

if(opt===q.a){
score+=10;
coins+=5;
stars+=1;
btn.style.background="green";
}else{
btn.style.background="red";
}

updateUI();
setTimeout(load,500);
};

box.appendChild(btn);
});
}

/* UI */
function updateUI(){
document.getElementById("score").innerText=score;
document.getElementById("coins").innerText=coins;
document.getElementById("stars").innerText=stars;
}

</script>

</body>
</html>
