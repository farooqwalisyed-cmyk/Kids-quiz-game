<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.pop{animation:pop 0.3s;}
@keyframes pop{
0%{transform:scale(0.6)}
100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<!-- START -->
<div id="startScreen">
<button class="btn p1" onclick="startApp()">Tap to Play</button>
</div>

<!-- CATEGORY -->
<div id="catScreen" class="hidden">
<button class="btn p4" onclick="goHome()">⬅ Back</button>

<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
</div>

<!-- LEVEL (UNCHANGED) -->
<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium</button>
<button class="btn p3" onclick="selectLevel(2)">Hard</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<!-- ADDED NAVIGATION -->
<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

let cat="";
let level=0;
let i=0;
let stars=0;
let coins=0;
let timer;
let time=10;

/* ===== SOUND (ADDED ONLY) ===== */
function beep(type){
try{
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.connect(ctx.destination);

if(type==="correct") o.frequency.value=800;
else if(type==="wrong") o.frequency.value=200;
else o.frequency.value=500;

o.start();
setTimeout(()=>o.stop(),120);
}catch(e){}
}

/* WELCOME SOUND */
function playWelcome(){
try{
speechSynthesis.speak(new SpeechSynthesisUtterance("Welcome to Kids Quiz Pro"));
}catch(e){}
}

/* SCREEN SWITCH (UNCHANGED CORE) */
function show(screen){
startScreen.classList.add("hidden");
catScreen.classList.add("hidden");
levelScreen.classList.add("hidden");
gameScreen.classList.add("hidden");

document.getElementById(screen).classList.remove("hidden");
}

/* START */
function startApp(){
playWelcome(); // ADDED ONLY
show("catScreen");
}

/* CATEGORY */
function selectCat(c){
cat=c;
show("levelScreen");
}

/* LEVEL */
function selectLevel(l){
level=l;
i=0;
show("gameScreen");
load();
}

/* QUESTIONS (UNCHANGED STRUCTURE — KEEP YOUR FULL DATA HERE) */
const data={
math:[
[
{q:"2+2=?",o:["3","4","5","6"],a:1}
],
[
{q:"25×2=?",o:["40","50","60","70"],a:1}
],
[
{q:"144÷12=?",o:["10","11","12","13"],a:2}
]
],
english:[
[
{q:"A is for?",o:["Apple","Ball","Cat","Dog"],a:0}
],
[
{q:"He ___ playing",o:["is","are","am","be"],a:0}
],
[
{q:"Past of Go?",o:["Went","Goes","Going","Gone"],a:0}
]
],
gk:[
[
{q:"How many days in a year?",o:["365","360","400","300"],a:0}
],
[
{q:"Capital of India?",o:["Delhi","Mumbai","Kolkata","Chennai"],a:0}
],
[
{q:"Sun is a?",o:["Star","Planet","Moon","Comet"],a:0}
]
]
};

/* LOAD */
function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach((op,idx)=>{
html+=`<button class="btn p1" onclick="check(${idx},this)">${op}</button>`;
});

document.getElementById("opts").innerHTML=html;
startTimer();
}

/* TIMER (UNCHANGED) */
function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;

if(time<=0){
clearInterval(timer);
nextQ();
}
},1000);
}

/* CHECK (ONLY SOUND ADDED) */
function check(ans,btn){
clearInterval(timer);

let q=data[cat][level][i];

if(ans===q.a){
btn.classList.add("correct","pop");
stars++;
coins+=10;
beep("correct");   // ADDED
}else{
btn.classList.add("wrong","shake");
beep("wrong");     // ADDED
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

setTimeout(nextQ,700);
}

/* NAVIGATION (ADDED ONLY) */
function nextQ(){
if(i < data[cat][level].length-1){
i++;
load();
}else{
show("catScreen");
}
}

function prevQ(){
if(i>0){
i--;
load();
}
}

function goHome(){
show("catScreen");
}

</script>

</body>
</html>
