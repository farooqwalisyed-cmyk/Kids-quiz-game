<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:linear-gradient(135deg,#6a11cb,#2575fc);
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 color:white;
}

.box{
 width:90%;
 max-width:420px;
 text-align:center;
}

button{
 padding:12px;
 margin:8px;
 border:none;
 border-radius:10px;
 font-size:16px;
 cursor:pointer;
}

.btn{background:white;color:black;}

.option{width:100%;}

.hidden{display:none;}

.top{
 display:flex;
 justify-content:space-between;
}

.bar{
 width:100%;
 height:10px;
 background:#444;
 border-radius:10px;
}

.fill{
 height:10px;
 width:0%;
 background:lime;
}
</style>
</head>

<body>

<div class="box">

<!-- HOME (CLEAN LIKE YOU WANT) -->
<div id="home">
  <h2>🎮 Kids Quiz PRO</h2>
  <button class="btn" onclick="goSetup()">Start Game</button>
</div>

<!-- SETUP -->
<div id="setup" class="hidden">

  <h3>Select Category</h3>
  <button class="btn" onclick="cat='math'">Math</button>
  <button class="btn" onclick="cat='english'">English</button>
  <button class="btn" onclick="cat='gk'">GK</button>

  <h3>Select Difficulty</h3>
  <button class="btn" onclick="diff='easy'">Easy</button>
  <button class="btn" onclick="diff='medium'">Medium</button>
  <button class="btn" onclick="diff='hard'">Hard</button>

  <br>
  <button class="btn" onclick="start()">Play Quiz</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">

 <div class="top">
  <div>❤️ <span id="life">3</span></div>
  <div>💰 <span id="coin">0</span></div>
  <div>⭐ <span id="star">0</span></div>
 </div>

 <div class="bar"><div class="fill" id="bar"></div></div>

 <h3 id="q"></h3>
 <div id="opt"></div>

</div>

</div>

<script>

let cat="", diff="";
let q=[], i=0;
let life=3, coin=0, star=0;

// SIMPLE DATA (SAFE)
const data={
 math:{
  easy:[{q:"2+2?",o:["3","4","5","6"],a:1}],
  medium:[{q:"10+5?",o:["13","14","15","16"],a:2}],
  hard:[{q:"20×2?",o:["30","40","50","60"],a:1}]
 },
 english:{
  easy:[{q:"A for?",o:["Apple","Ball","Cat","Dog"],a:0}],
  medium:[{q:"Plural Book?",o:["Books","Book","Boks","Bookes"],a:0}],
  hard:[{q:"Happy synonym?",o:["Sad","Joyful","Angry","Tired"],a:1}]
 },
 gk:{
  easy:[{q:"Days in week?",o:["5","6","7","8"],a:2}],
  medium:[{q:"Capital India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0}],
  hard:[{q:"Largest ocean?",o:["Atlantic","Pacific","Indian","Arctic"],a:1}]
 }
};

// NAV
function goSetup(){
 document.getElementById("home").style.display="none";
 document.getElementById("setup").style.display="block";
}

function start(){

 if(!cat||!diff){
  alert("Select options");
  return;
 }

 document.getElementById("setup").style.display="none";
 document.getElementById("game").style.display="block";

 q=[...data[cat][diff]];
 i=0; life=3; coin=0; star=0;

 load();
}

function load(){

 if(i>=q.length){
  alert("Completed!");
  location.reload();
  return;
 }

 let x=q[i];
 document.getElementById("q").innerText=x.q;

 let html="";
 x.o.forEach((o,idx)=>{
  html+=`<button class="btn option" onclick="check(${idx})">${o}</button>`;
 });

 document.getElementById("opt").innerHTML=html;

 document.getElementById("bar").style.width=(i/q.length)*100+"%";

 update();
}

function check(n){
 if(n===q[i].a){
  coin+=10;
  star++;
 } else {
  life--;
 }

 if(life<=0){
  alert("Game Over");
  location.reload();
 }

 i++;
 load();
}

function update(){
 document.getElementById("life").innerText=life;
 document.getElementById("coin").innerText=coin;
 document.getElementById("star").innerText=star;
}

</script>

</body>
</html>
