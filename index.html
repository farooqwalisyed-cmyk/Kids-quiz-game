<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}
@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}
.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}
.title{
font-size:24px;
font-weight:bold;
margin:10px 0;
color:#6a11cb;
}
.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}
.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}
.hidden{display:none;}
.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}
.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}
.bounce{animation:bounce 0.5s;}
@keyframes bounce{
0%{transform:scale(1)}
30%{transform:scale(1.15)}
60%{transform:scale(0.95)}
100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">🔊 Tap to Start</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p1" onclick="goHome()">🏠 Restart</button>
</div>

<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium</button>
<button class="btn p3" onclick="selectLevel(2)">Hard</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* ===== QUESTIONS ===== */
const data = {
math:[
[
{q:"2+3=?",o:["4","5","6","7"],a:1},
{q:"4+5=?",o:["7","8","9","10"],a:2},
{q:"6+2=?",o:["6","7","8","9"],a:2},
{q:"7+1=?",o:["6","7","8","9"],a:2},
{q:"3+4=?",o:["5","6","7","8"],a:2},
{q:"9-4=?",o:["3","4","5","6"],a:2},
{q:"8-3=?",o:["4","5","6","7"],a:1},
{q:"5+5=?",o:["8","9","10","11"],a:2},
{q:"10-2=?",o:["6","7","8","9"],a:2},
{q:"1+6=?",o:["6","7","8","9"],a:1}
],
[
{q:"6+8=?",o:["12","13","14","15"],a:2},
{q:"7+9=?",o:["14","15","16","17"],a:2},
{q:"8+10=?",o:["16","17","18","19"],a:2},
{q:"12-5=?",o:["5","6","7","8"],a:2},
{q:"15-7=?",o:["6","7","8","9"],a:2},
{q:"9+8=?",o:["15","16","17","18"],a:2},
{q:"11+6=?",o:["15","16","17","18"],a:2},
{q:"14-6=?",o:["6","7","8","9"],a:2},
{q:"13+5=?",o:["16","17","18","19"],a:2},
{q:"20-9=?",o:["9","10","11","12"],a:2}
],
[
{q:"25+17=?",o:["40","41","42","43"],a:2},
{q:"30-12=?",o:["16","17","18","19"],a:2},
{q:"18×2=?",o:["34","35","36","37"],a:2},
{q:"45÷5=?",o:["7","8","9","10"],a:2},
{q:"36+14=?",o:["48","49","50","51"],a:2},
{q:"50-25=?",o:["20","22","25","27"],a:2},
{q:"12×3=?",o:["34","35","36","37"],a:2},
{q:"60÷6=?",o:["8","9","10","11"],a:2},
{q:"40+15=?",o:["53","54","55","56"],a:2},
{q:"100-55=?",o:["43","44","45","46"],a:2}
]
],
english:[
[
{q:"Apple is a ?",o:["Fruit","Car","Animal","City"],a:0},
{q:"Dog says ?",o:["Meow","Bark","Moo","Quack"],a:1},
{q:"Sky is ?",o:["Blue","Red","Green","Black"],a:0},
{q:"Sun gives ?",o:["Light","Water","Air","Food"],a:0},
{q:"Bird can ?",o:["Swim","Fly","Drive","Cook"],a:1},
{q:"Cat has ?",o:["2 legs","4 legs","6 legs","8 legs"],a:1},
{q:"Fish lives in ?",o:["Air","Water","Tree","Land"],a:1},
{q:"Car runs on ?",o:["Water","Fuel","Air","Wood"],a:1},
{q:"Ball is ?",o:["Round","Square","Flat","Long"],a:0},
{q:"Ice is ?",o:["Hot","Cold","Warm","Dry"],a:1}
],
[
{q:"He dash a boy",o:["is","are","am","be"],a:0},
{q:"They dash playing",o:["is","are","am","be"],a:1},
{q:"She dash happy",o:["is","are","am","be"],a:0},
{q:"We dash ready",o:["is","are","am","be"],a:1},
{q:"I dash student",o:["is","are","am","be"],a:2},
{q:"You dash smart",o:["is","are","am","be"],a:1},
{q:"He dash running",o:["is","are","am","be"],a:0},
{q:"They dash friends",o:["is","are","am","be"],a:1},
{q:"She dash singing",o:["is","are","am","be"],a:0},
{q:"We dash learning",o:["is","are","am","be"],a:1}
],
[
{q:"Go past tense?",o:["Went","Goed","Going","Gone"],a:0}
]
],
gk:[
[
{q:"Capital of India?",o:["Delhi","Mumbai","Goa","Chennai"],a:0},
{q:"Sun is a ?",o:["Star","Planet","Moon","Rock"],a:0}
],
[
{q:"CPU is ?",o:["Brain","Heart","Eye","Hand"],a:0}
],
[
{q:"1 KB=?",o:["1024 bytes","100","10","1"],a:0}
]
]
};

/* ===== GAME ===== */
let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;

function startApp(){show("catScreen");}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){cat=c;show("levelScreen");}

function selectLevel(l){level=l;i=0;show("gameScreen");load();}

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach((op,idx)=>{
html+=`<button class="btn p1" onclick="check(${idx},this)">${op}</button>`;
});
document.getElementById("opts").innerHTML=html;
}

function check(ans,btn){
let q=data[cat][level][i];
if(ans===q.a){
btn.classList.add("correct");
stars++; coins+=10;
}else{
btn.classList.add("wrong");
}
document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;
setTimeout(nextQ,500);
}

function nextQ(){
if(i < data[cat][level].length-1){i++;load();}
else{show("catScreen");}
}

function prevQ(){if(i>0){i--;load();}}

function goHome(){show("catScreen");}

</script>

</body>
</html>
