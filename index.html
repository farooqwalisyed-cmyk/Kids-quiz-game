<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.card{
 width:90%;
 max-width:420px;
 background: rgba(0,0,0,0.25);
 padding:20px;
 border-radius:20px;
 text-align:center;
 backdrop-filter: blur(10px);
}

button{
 padding:12px;
 margin:6px;
 border:none;
 border-radius:12px;
 font-size:16px;
 cursor:pointer;
}

.btn{
 background:white;
 color:black;
 width:100%;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<!-- SOUND -->
<button class="btn" onclick="toggleSound()">🔊 Sound: <span id="s">ON</span></button>

<!-- HOME -->
<div id="home">
 <button class="btn" onclick="goSetup()">Start Game</button>
</div>

<!-- SETUP -->
<div id="setup" class="hidden">

 <h3>Select Category</h3>
 <button class="btn" onclick="setCat('math')">Math</button>
 <button class="btn" onclick="setCat('english')">English</button>
 <button class="btn" onclick="setCat('gk')">GK</button>

 <h3>Select Difficulty</h3>
 <button class="btn" onclick="setDiff('easy')">Easy</button>
 <button class="btn" onclick="setDiff('medium')">Medium</button>
 <button class="btn" onclick="setDiff('hard')">Hard</button>

 <button class="btn" onclick="startGame()">Play Quiz</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">

 <h3 id="q"></h3>
 <div id="opts"></div>

</div>

</div>

<script>

let cat="";
let diff="";
let i=0;
let sound=true;

const data={
 math:{
  easy:[{q:"2+2?",a:1,o:["3","4","5"]},{q:"5+1?",a:2,o:["5","6","7"]}],
  medium:[{q:"10+5?",a:2,o:["12","13","15"]}],
  hard:[{q:"10×2?",a:1,o:["10","20","30"]}]
 },
 english:{
  easy:[{q:"A for?",a:0,o:["Apple","Ball","Cat"]}],
  medium:[{q:"Plural Book?",a:0,o:["Books","Book","Boks"]}],
  hard:[{q:"Opposite Happy?",a:1,o:["Sad","Joyful","Angry"]}]
 },
 gk:{
  easy:[{q:"Days in week?",a:2,o:["5","6","7"]}],
  medium:[{q:"Capital India?",a:0,o:["Delhi","Mumbai","Chennai"]}],
  hard:[{q:"Ocean?",a:1,o:["Atlantic","Pacific","Arctic"]}]
 }
};

function toggleSound(){
 sound=!sound;
 document.getElementById("s").innerText = sound?"ON":"OFF";
}

function goSetup(){
 document.getElementById("home").style.display="none";
 document.getElementById("setup").style.display="block";
}

function setCat(c){
 cat=c;
}

function setDiff(d){
 diff=d;
}

function startGame(){

 // 🔥 STRONG FIX (prevents level not opening)
 if(cat==="" || diff===""){
  alert("Please select Category AND Difficulty");
  return;
 }

 i=0;

 document.getElementById("setup").style.display="none";
 document.getElementById("game").style.display="block";

 load();
}

function load(){

 let q=data[cat][diff][i];

 if(!q){
  alert("Level Completed!");
  location.reload();
  return;
 }

 document.getElementById("q").innerText=q.q;

 let html="";
 q.o.forEach((op,idx)=>{
  html+=`<button class="btn" onclick="check(${idx})">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

function check(ans){

 let q=data[cat][diff][i];

 alert(ans===q.a ? "Correct ✔" : "Wrong ❌");

 i++;
 load();
}

</script>

</body>
</html>
