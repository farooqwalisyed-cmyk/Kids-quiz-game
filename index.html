<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

/* CARD */
.card{
  background:white;
  color:black;
  width:90%;
  max-width:420px;
  margin:60px auto;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* INPUT */
input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

/* BUTTON */
button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#2575fc;
  color:white;
  font-weight:bold;
}

/* OPTIONS */
.option{
  width:100%;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  font-size:14px;
}

/* HIDE SCREENS */
.screen{
  display:none;
}
.active{
  display:block;
}
</style>
</head>

<body>

<!-- TOP INFO -->
<div class="topbar">
  <div id="userInfo">👤 Player</div>
  <div id="coinInfo">💰 Coins: 0</div>
</div>

<!-- NAME SCREEN -->
<div id="nameScreen" class="card screen active">
  <h2>Enter Your Name</h2>
  <input id="nameInput" placeholder="Your Name">
  <button onclick="startGame()">Start</button>
</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen" class="card screen">
  <h2 id="levelText">Level 1</h2>
  <h3 id="question">Question</h3>

  <div id="options"></div>

  <button onclick="prevQuestion()">⬅ Previous</button>
  <button onclick="nextQuestion()">Next ➡</button>
  <button onclick="goHome()">🏠 Home</button>
</div>

<script>
let userName = "";
let level = 0;
let coins = 0;

/* 200 LEVEL QUESTIONS (sample + expandable system) */
const questions = [
  {q:"Capital of UK?", a:["London","Paris","Berlin","Rome"], c:0},
  {q:"2 + 2 = ?", a:["3","4","5","6"], c:1},
  {q:"Spell Apple", a:["Aple","Apple","Appl","Apll"], c:1},
  {q:"5 x 3 = ?", a:["15","10","20","25"], c:0},
  {q:"Capital of India?", a:["Delhi","Mumbai","Kolkata","Chennai"], c:0}
];

/* LOAD QUESTION */
function loadQuestion(){
  let q = questions[level % questions.length];

  document.getElementById("levelText").innerText = "Level " + (level+1);
  document.getElementById("question").innerText = q.q;

  let optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.a.forEach((opt,i)=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.className = "option";
    btn.onclick = ()=>checkAnswer(i);
    optionsDiv.appendChild(btn);
  });
}

/* CHECK ANSWER */
function checkAnswer(i){
  let q = questions[level % questions.length];

  if(i === q.c){
    coins += 10;
    level++;
  }

  updateUI();
  loadQuestion();
}

/* NEXT */
function nextQuestion(){
  level++;
  updateUI();
  loadQuestion();
}

/* PREVIOUS */
function prevQuestion(){
  if(level > 0){
    level--;
    updateUI();
    loadQuestion();
  }
}

/* HOME */
function goHome(){
  document.getElementById("nameScreen").classList.add("active");
  document.getElementById("quizScreen").classList.remove("active");
}

/* START GAME */
function startGame(){
  userName = document.getElementById("nameInput").value || "Player";

  document.getElementById("userInfo").innerText = "👤 " + userName;

  document.getElementById("nameScreen").classList.remove("active");
  document.getElementById("quizScreen").classList.add("active");

  loadQuestion();
  updateUI();
}

/* UPDATE TOP BAR */
function updateUI(){
  document.getElementById("coinInfo").innerText = "💰 Coins: " + coins;
}
</script>

</body>
</html>
