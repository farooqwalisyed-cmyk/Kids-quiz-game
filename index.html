<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

/* CARD */
.card{
  background:white;
  color:black;
  width:90%;
  max-width:420px;
  margin:60px auto;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* BUTTON */
button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#2575fc;
  color:white;
  font-weight:bold;
  transition:0.2s;
}

button:active{
  transform:scale(0.95);
}

/* SCREENS */
.screen{display:none;}
.active{display:block;}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

/* ANIMATIONS */
.correct{background:#4caf50 !important;}
.wrong{background:#f44336 !important;}

/* COIN POP */
.coin-pop{
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:gold;
  color:black;
  padding:10px 20px;
  border-radius:20px;
  font-weight:bold;
  animation:pop 1s ease forwards;
  z-index:9999;
}

@keyframes pop{
  0%{transform:translate(-50%,0) scale(0);opacity:0;}
  50%{transform:translate(-50%,-20px) scale(1.2);opacity:1;}
  100%{transform:translate(-50%,-40px) scale(1);opacity:0;}
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active card">
  <h1>🎮 Kids Quiz Pro</h1>
  <button onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="game" class="screen card">

  <div class="topbar">
    <div>Level: <span id="levelText">1</span></div>
    <div>Coins: <span id="coinText">0</span></div>
  </div>

  <h2 id="question">Question</h2>

  <div id="options"></div>

  <button onclick="prevQuestion()">⬅ Prev</button>
  <button onclick="nextQuestion()">Next ➡</button>
</div>

<script>
let level = 0;
let coins = 0;

const questions = [
  {q:"Capital of India?", o:["Delhi","Mumbai","Kolkata"], c:0},
  {q:"2 + 2 = ?", o:["3","4","5"], c:1},
  {q:"Apple is a?", o:["Fruit","Animal","Car"], c:0},
  {q:"Color of sky?", o:["Blue","Red","Green"], c:0},
  {q:"5 + 3 = ?", o:["6","7","8"], c:2}
];

function startGame(){
  document.getElementById("home").classList.remove("active");
  document.getElementById("game").classList.add("active");
  loadQuestion();
}

function loadQuestion(){
  let q = questions[level];

  document.getElementById("levelText").innerText = level+1;
  document.getElementById("question").innerText = q.q;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.o.forEach((opt,i)=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(i);
    box.appendChild(btn);
  });
}

 function checkAnswer(i){

  let q = questions[level];
  let screen = document.getElementById("quizScreen");

  if(i === q.c){
    coins += 10;

    screen.classList.add("correct");
    showCoinPop("+10 Coins 🎉");

    // move next question ONLY if available
    if(level < questions.length - 1){
      level++;
    } else {
      alert("Game Completed 🎉");
      return;
    }

  } else {
    screen.classList.add("wrong");
  }

  setTimeout(()=>{
    screen.classList.remove("correct");
    screen.classList.remove("wrong");
  }, 400);

  updateUI();
  loadQuestion();
  }

function nextQuestion(){
  if(level < questions.length - 1){
    level++;
    loadQuestion();
    updateUI();
  } else {
    alert("Game Completed 🎉");
  }
}

function prevQuestion(){
  if(level > 0){
    level--;
    loadQuestion();
    updateUI();
  }
}

function updateUI(){
  document.getElementById("coinText").innerText = coins;
}

function showCoin(text){
  let div = document.createElement("div");
  div.className = "coin-pop";
  div.innerText = text;
  document.body.appendChild(div);

  setTimeout(()=>div.remove(),1000);
}

</script>

</body>
</html>
