<!DOCTYPE html>
<html>
<head>
<title>Kids Quiz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

.card, .quizBox{
  background:white;
  color:black;
  width:85%;
  max-width:420px;
  margin:80px auto;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#2575fc;
  color:white;
  font-weight:bold;
}

button:hover{
  background:#1a5fd1;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popupBox{
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  width:250px;
}
</style>
</head>

<body>

<div id="app"></div>

<!-- POPUP -->
<div id="popup">
  <div class="popupBox">
    <h2 id="popupText">Message</h2>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
let app = document.getElementById("app");

let player = "";
let level = 0;
let score = 0;

/* 🎯 200 LEVELS AUTO GENERATED */
let questions = Array.from({length:200}, (_,i)=>({
  q: `Level ${i+1}: What is ${i+1} + 1 ?`,
  options:[
    `${i+1}`,
    `${i+2}`,
    `${i+3}`,
    `${i+4}`
  ],
  answer:1
}));

/* NAME SCREEN */
function renderStart(){
  app.innerHTML = `
    <div class="card">
      <h1>🎮 Kids Quiz Pro</h1>
      <input id="name" placeholder="Enter Your Name"/>
      <button onclick="start()">Start</button>
    </div>
  `;
}

function start(){
  player = document.getElementById("name").value;

  if(!player){
    showPopup("Enter Name");
    return;
  }

  level = 0;
  score = 0;
  loadLevel();
}

/* QUIZ SCREEN */
function loadLevel(){
  let q = questions[level];

  app.innerHTML = `
    <div class="quizBox">
      <h3>👤 ${player}</h3>
      <h2>⭐ Level ${level+1}/200</h2>

      <h3>${q.q}</h3>

      ${q.options.map((o,i)=>`
        <button onclick="answer(${i})">${o}</button>
      `).join("")}

      <button onclick="renderStart()">🏠 Home</button>
    </div>
  `;
}

/* ANSWER CHECK */
function answer(i){
  let q = questions[level];

  if(i === q.answer){
    score++;
    showPopup("🎉 Correct!");
  } else {
    showPopup("❌ Wrong!");
  }

  level++;

  if(level >= questions.length){
    showPopup("Game Finished! Score: " + score);
    renderStart();
    return;
  }

  setTimeout(loadLevel, 300);
}

/* POPUP */
function showPopup(msg){
  document.getElementById("popupText").innerText = msg;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

/* INIT */
renderStart();
</script>

</body>
</html>
