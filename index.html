<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{margin:0;font-family:Poppins;background:linear-gradient(135deg,#667eea,#764ba2);color:white;text-align:center;}
h1{margin:0;padding:15px;background:#ff4d6d;}
.screen{display:none;padding:20px;}
.active{display:block;}
.card{background:white;color:black;padding:20px;border-radius:20px;margin:10px;}
button{width:90%;padding:14px;margin:10px;border:none;border-radius:12px;background:#4a90e2;color:white;}
.stats{display:flex;justify-content:space-around;font-weight:bold;}
.correct{background:#22c55e!important;}
.wrong{background:#ef4444!important;}
</style>
</head>

<body>

<h1>🎮 Kids Quiz PRO</h1>

<div id="home" class="screen active">
<div class="card">
<h2>Enter Name</h2>
<input id="name">
<button onclick="startApp()">Start</button>
</div>
</div>

<div id="menu" class="screen">
<div class="card">
<h2>Select Category</h2>
<button onclick="setCat('kids')">Kids</button>
<button onclick="setCat('math')">Math</button>
<button onclick="setCat('english')">English</button>
<button onclick="setCat('gk')">GK</button>

<h3>Levels</h3>
<button onclick="startLevel(1)">Level 1</button>
<button onclick="startLevel(2)">Level 2</button>
<button onclick="startLevel(3)">Level 3</button>
</div>
</div>

<div id="game" class="screen">
<div class="card">

<div class="stats">
<div>⭐ <span id="score">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>🏆 <span id="stars">0</span></div>
</div>

<h2 id="q"></h2>
<div id="options"></div>

</div>
</div>

<script>

/* 🔊 FINAL SOUND SYSTEM */

let clickSound = new Audio("click.mp3");
let correctSound = new Audio("correct.mp3");
let wrongSound = new Audio("wrong.mp3");

clickSound.preload="auto";
correctSound.preload="auto";
wrongSound.preload="auto";

let audioReady=false;

document.body.addEventListener("click",()=>{
if(!audioReady){
clickSound.play().then(()=>{
clickSound.pause();
clickSound.currentTime=0;
audioReady=true;
}).catch(()=>{});
}
});

function play(type){
let sound;

if(type==="click") sound=clickSound;
if(type==="correct") sound=correctSound;
if(type==="wrong") sound=wrongSound;

if(sound && audioReady){
sound.currentTime=0;
sound.play().catch(()=>{});
}
}

/* GAME LOGIC */

let cat="kids",level=1,index=0;
let score=0,coins=0,stars=0,questions=[];

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function startApp(){
if(!name.value){alert("Enter name");return;}
show("menu");
}

function setCat(c){cat=c;}

/* QUESTIONS */

function getData(cat){

return [
{q:"Dog says?",a:"Bark",o:["Bark","Meow","Roar","Buzz"]},
{q:"2+2=?",a:"4",o:["4","5","6","7"]},
{q:"Sky color?",a:"Blue",o:["Blue","Red","Green","Yellow"]},
{q:"A for?",a:"Apple",o:["Apple","Ball","Car","Dog"]},
{q:"Cow gives?",a:"Milk",o:["Milk","Egg","Water","Honey"]},
{q:"5-3=?",a:"2",o:["2","3","4","5"]},
{q:"Sun gives?",a:"Light",o:["Light","Water","Food","Air"]},
{q:"B for?",a:"Ball",o:["Ball","Pen","Chair","Table"]},
{q:"Cat says?",a:"Meow",o:["Meow","Bark","Roar","Buzz"]},
{q:"1+1=?",a:"2",o:["2","3","4","5"]}
];

}

function startLevel(l){
level=l;
index=0;
score=0;
coins=0;
stars=0;
questions=getData(cat);
show("game");
load();
}

function load(){

if(index>=questions.length){
alert("🎉 Level Complete!");
show("menu");
return;
}

let q=questions[index];
qEl.innerText=q.q;

options.innerHTML="";

q.o.sort(()=>Math.random()-0.5);

q.o.forEach(opt=>{
let b=document.createElement("button");
b.innerText=opt;

b.onclick=()=>{
play("click");

if(opt===q.a){
b.classList.add("correct");
play("correct");
score++;coins+=10;stars++;
}else{
b.classList.add("wrong");
play("wrong");
}

setTimeout(()=>{
index++;
update();
load();
},500);
};

options.appendChild(b);
});

}

function update(){
scoreEl.innerText=score;
coinsEl.innerText=coins;
starsEl.innerText=stars;
}

const qEl=document.getElementById("q");
const options=document.getElementById("options");
const scoreEl=document.getElementById("score");
const coinsEl=document.getElementById("coins");
const starsEl=document.getElementById("stars");

</script>

</body>
</html>
