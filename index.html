<!DOCTYPE html>
<html>
<head>
<title>Kids Quiz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

.card, .quizBox{
  background:white;
  color:black;
  width:85%;
  max-width:420px;
  margin:80px auto;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#2575fc;
  color:white;
  font-weight:bold;
}

button:hover{
  background:#1a5fd1;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popupBox{
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  width:250px;
}
</style>
</head>

<body>

<div id="app"></div>

<!-- POPUP -->
<div id="popup">
  <div class="popupBox">
    <h2 id="popupText">Message</h2>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
let app = document.getElementById("app");

let player = "";
let level = 0;
let score = 0;

/* 🎯 200 LEVELS AUTO GENERATED */
let questions = [
  // 🟢 GK (1–20)
  {
    q: "Capital of India?",
    options: ["Mumbai", "Delhi", "Kolkata", "Chennai"],
    answer: 1
  },
  {
    q: "Capital of UK?",
    options: ["London", "Paris", "Berlin", "Rome"],
    answer: 0
  },
  {
    q: "How many continents are there?",
    options: ["5", "6", "7", "8"],
    answer: 2
  },
  {
    q: "Which planet is called Red Planet?",
    options: ["Earth", "Mars", "Jupiter", "Venus"],
    answer: 1
  },
  {
    q: "National animal of India?",
    options: ["Lion", "Tiger", "Elephant", "Leopard"],
    answer: 1
  },
  {
    q: "Which is largest ocean?",
    options: ["Atlantic", "Indian", "Pacific", "Arctic"],
    answer: 2
  },
  {
    q: "How many days in a year?",
    options: ["365", "360", "366", "350"],
    answer: 0
  },
  {
    q: "Which is the national bird of India?",
    options: ["Peacock", "Parrot", "Sparrow", "Crow"],
    answer: 0
  },
  {
    q: "Sun rises in?",
    options: ["West", "East", "North", "South"],
    answer: 1
  },
  {
    q: "How many states in India (approx)?",
    options: ["28", "29", "30", "27"],
    answer: 0
  },

  // 🔵 Math (21–35)
  {
    q: "5 + 3 = ?",
    options: ["5", "8", "9", "7"],
    answer: 1
  },
  {
    q: "10 - 6 = ?",
    options: ["3", "4", "5", "6"],
    answer: 1
  },
  {
    q: "6 × 2 = ?",
    options: ["10", "12", "14", "8"],
    answer: 1
  },
  {
    q: "15 ÷ 3 = ?",
    options: ["3", "5", "6", "4"],
    answer: 1
  },
  {
    q: "9 + 6 = ?",
    options: ["15", "14", "13", "16"],
    answer: 0
  },
  {
    q: "20 - 5 = ?",
    options: ["10", "15", "16", "14"],
    answer: 1
  },
  {
    q: "4 × 5 = ?",
    options: ["20", "25", "15", "10"],
    answer: 0
  },
  {
    q: "18 ÷ 2 = ?",
    options: ["9", "8", "7", "6"],
    answer: 0
  },
  {
    q: "7 + 8 = ?",
    options: ["14", "15", "16", "13"],
    answer: 1
  },
  {
    q: "12 - 4 = ?",
    options: ["6", "8", "7", "9"],
    answer: 1
  },

  // 🟡 English (36–50)
  {
    q: "Opposite of Hot?",
    options: ["Cold", "Warm", "Dry", "Fast"],
    answer: 0
  },
  {
    q: "Opposite of Big?",
    options: ["Large", "Small", "Tall", "Wide"],
    answer: 1
  },
  {
    q: "Synonym of Happy?",
    options: ["Sad", "Angry", "Joyful", "Tired"],
    answer: 2
  },
  {
    q: "What is a noun?",
    options: ["Action", "Name of person/place", "Color", "Verb"],
    answer: 1
  },
  {
    q: "Opposite of Fast?",
    options: ["Slow", "Quick", "Speed", "Run"],
    answer: 0
  },
  {
    q: "Plural of Child?",
    options: ["Childs", "Children", "Childes", "Childer"],
    answer: 1
  },
  {
    q: "A, E, I, O, U are?",
    options: ["Numbers", "Vowels", "Consonants", "Symbols"],
    answer: 1
  },
  {
    q: "Opposite of Up?",
    options: ["Down", "Left", "Right", "Top"],
    answer: 0
  },
  {
    q: "What is a verb?",
    options: ["Action word", "Name", "Place", "Thing"],
    answer: 0
  },
  {
    q: "He ___ playing football",
    options: ["is", "are", "am", "be"],
    answer: 0
  }
];

/* NAME SCREEN */
function renderStart(){
  app.innerHTML = `
    <div class="card">
      <h1>🎮 Kids Quiz Pro</h1>
      <input id="name" placeholder="Enter Your Name"/>
      <button onclick="start()">Start</button>
    </div>
  `;
}

function start(){
  player = document.getElementById("name").value;

  if(!player){
    showPopup("Enter Name");
    return;
  }

  level = 0;
  score = 0;
  loadLevel();
}

/* QUIZ SCREEN */
function loadLevel(){
  let q = questions[level];

  app.innerHTML = `
    <div class="quizBox">
      <h3>👤 ${player}</h3>
      <h2>⭐ Level ${level+1}/200</h2>

      <h3>${q.q}</h3>

      ${q.options.map((o,i)=>`
        <button onclick="answer(${i})">${o}</button>
      `).join("")}

      <button onclick="renderStart()">🏠 Home</button>
    </div>
  `;
}

/* ANSWER CHECK */
function answer(i){
  let q = questions[level];

  if(i === q.answer){
    score++;
    showPopup("🎉 Correct!");
  } else {
    showPopup("❌ Wrong!");
  }

  level++;

  if(level >= questions.length){
    showPopup("Game Finished! Score: " + score);
    renderStart();
    return;
  }

  setTimeout(loadLevel, 300);
}

/* POPUP */
function showPopup(msg){
  document.getElementById("popupText").innerText = msg;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

/* INIT */
renderStart();
</script>

</body>
</html>
