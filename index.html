<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}
@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}
.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
margin-bottom:10px;
}
.title{
font-size:24px;
font-weight:bold;
margin:10px 0;
color:#6a11cb;
}
.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}
.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}
.hidden{display:none;}
.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.progress{
width:100%;
height:8px;
background:#ddd;
border-radius:10px;
margin-bottom:10px;
overflow:hidden;
}
.bar{
height:100%;
width:0%;
background:#6a11cb;
transition:0.3s;
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
<button onclick="toggleMusic()">🔊</button>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">Tap to Start</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
</div>

<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium 🔒</button>
<button class="btn p3" onclick="selectLevel(2)">Hard 🔒</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* ===== MUSIC ===== */
let music=new Audio("https://actions.google.com/sounds/v1/ambiences/birds_in_forest.ogg");
music.loop=true;
function toggleMusic(){
music.paused?music.play():music.pause();
}

/* ===== SAVE ===== */
function saveGame(){
localStorage.setItem("quizSave",JSON.stringify({stars,coins,unlock}));
}
function loadGame(){
let d=JSON.parse(localStorage.getItem("quizSave"));
if(d){stars=d.stars;coins=d.coins;unlock=d.unlock;}
}

/* ===== VOICE ===== */
function speak(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}
function voice(type){
speak(type==="good"?"Great job!":"Try again!");
}

/* ===== QUESTIONS (FULL 10 EACH) ===== */
const data={
math:[
[
{q:"2+3=?",o:["4","5","6","7"],a:1},
{q:"4+6=?",o:["8","9","10","11"],a:2},
{q:"5+7=?",o:["11","12","13","14"],a:1},
{q:"6+8=?",o:["12","13","14","15"],a:2},
{q:"9+5=?",o:["13","14","15","16"],a:1},
{q:"3+9=?",o:["11","12","13","14"],a:1},
{q:"8+7=?",o:["14","15","16","17"],a:1},
{q:"6+6=?",o:["11","12","13","14"],a:1},
{q:"7+8=?",o:["14","15","16","17"],a:1},

],

{q:"20-9=?",o:["10","11","12","13"],a:1},

{q:"30-12=?",o:["16","17","18","19"],a:2},
{q:"11+11=?",o:["20","21","22","23"],a:2},
{q:"13+6=?",o:["18","19","20","21"],a:1}
],
[
{q:"25×2=?",o:["40","45","50","55"],a:2},
{q:"36÷6=?",o:["5","6","7","8"],a:1},
{q:"12×3=?",o:["30","32","34","36"],a:3},
{q:"49÷7=?",o:["6","7","8","9"],a:1},
{q:"15×4=?",o:["50","55","60","65"],a:2},
{q:"64÷8=?",o:["6","7","8","9"],a:2},
{q:"18×2=?",o:["32","34","36","38"],a:2},
{q:"81÷9=?",o:["7","8","9","10"],a:2},
{q:"20×3=?",o:["50","55","60","65"],a:2},
{q:"100÷10=?",o:["8","9","10","11"],a:2}
]
],

english:[
[
{q:"Apple is a ?",o:["Fruit","Animal","Car","City"],a:0},
{q:"Dog says ?",o:["Meow","Bark","Moo","Quack"],a:1},
{q:"Sky is ?",o:["Blue","Green","Red","Black"],a:0},

],
[
{q:"He - a boy",o:["is","are","am","be"],a:0},
{q:"They - playing",o:["is","are","am","be"],a:1},
{q:"She - happy",o:["is","are","am","be"],a:0},
{q:"We - friends",o:["is","are","am","be"],a:1},
{q:"I - ready",o:["is","are","am","be"],a:2},
{q:"You - smart",o:["is","are","am","be"],a:1},

{q:"Birds - flying",o:["is","are","am","be"],a:1},

{q:"We - ready",o:["is","are","am","be"],a:1}
],

{q:"Earth is?",o:["Planet","Star","Moon","Cloud"],a:0},
{q:"Largest ocean?",o:["Pacific","Atlantic","Indian","Arctic"],a:0},
{q:"Currency of India?",o:["Rupee","Dollar","Yen","Euro"],a:0},
{q:"Rainbow colors?",o:["7","5","6","8"],a:0},
{q:"1 year months?",o:["12","10","11","13"],a:0},
{q:"Moon is?",o:["Satellite","Star","Planet","Cloud"],a:0},
{q:"Day has hours?",o:["24","12","48","36"],a:0}
],
[
{q:"CPU is?",o:["Brain","Heart","Eye","Hand"],a:0},

{q:"DNA is?",o:["Genetic","Metal","Gas","Liquid"],a:0},
{q:"Atom is?",o:["Smallest","Big","Huge","Medium"],a:0},
{q:"Electric unit?",o:["Volt","Meter","Kg","Liter"],a:0},
{q:"Sound travels?",o:["Air","Space","Light","Vacuum"],a:0},
{q:"Brain controls?",o:["Body","Car","Phone","TV"],a:0},
{q:"Earth revolves?",o:["Sun","Moon","Mars","Star"],a:0},

{q:"Light speed?",o:["Fastest","Slow","Medium","Zero"],a:0}
]
]
};

/* ===== GAME ===== */
let unlock={math:0,english:0,gk:0};
let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;

loadGame();

function updateBar(){
let total=data[cat][level].length;
document.getElementById("bar").style.width=((i+1)/total)*100+"%";
}

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);
updateBar();

let options=q.o.map((t,idx)=>({t,ok:idx===q.a}))
.sort(()=>Math.random()-0.5);

let html="";
options.forEach(op=>{
html+=`<button class="btn p1" onclick="check(this,${op.ok})">${op.t}</button>`;
});
document.getElementById("opts").innerHTML=html;

startTimer();
}

function check(btn,ok){
clearInterval(timer);

if(ok){
btn.classList.add("correct");
stars++; coins+=10;
voice("good");
}else{
btn.classList.add("wrong");
voice("bad");
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

saveGame();
setTimeout(nextQ,700);
}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

function nextQ(){
if(i < data[cat][level].length-1){
i++;load();
}else{
if(level===0) unlock[cat]=1;
if(level===1) unlock[cat]=2;
saveGame();
goHome();
}
}

function prevQ(){ if(i>0){i--;load();} }

function goHome(){
i=0;
clearInterval(timer);
show("catScreen");
}

function startApp(){
music.play();
show("catScreen");
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){
cat=c;
show("levelScreen");
}

function selectLevel(l){
level=l;
i=0;
show("gameScreen");
load();
}

</script>

</body>
</html>
