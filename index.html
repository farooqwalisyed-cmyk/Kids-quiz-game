<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.card{
 width:95%;
 max-width:520px;
 background: rgba(0,0,0,0.4);
 padding:25px;
 border-radius:25px;
 text-align:center;
 color:white;
}

h2{color:#ffe600;}
h3{color:#00e5ff;}

button{
 padding:12px;
 margin:5px;
 border:none;
 border-radius:12px;
 font-size:16px;
 cursor:pointer;
}

.btn{width:100%; background:white; font-weight:bold;}
.opt{width:100%; color:white; font-weight:bold;}

.c1{background:#ff6b6b;}
.c2{background:#4dabf7;}
.c3{background:#51cf66;}
.c4{background:#ffd43b; color:black;}

.correct{animation:pop 0.4s ease; background:#2ecc71 !important;}
.wrong{animation:shake 0.4s ease; background:#e74c3c !important;}
.celebrate{animation:boom 0.6s ease;}

@keyframes pop{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
100%{transform:translateX(0);}
}

@keyframes boom{
0%{transform:scale(1);}
30%{transform:scale(1.4) rotate(3deg);}
60%{transform:scale(1.2) rotate(-3deg);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<button class="btn" onclick="toggleSound()">🔊 Sound: <span id="s">ON</span></button>

<div id="home">
 <button class="btn" onclick="startGame()">Start Game</button>
</div>

<div id="setup" style="display:none">

<h3>Select Category</h3>
<button class="c1" onclick="setCat('math')">Math</button>
<button class="c2" onclick="setCat('english')">English</button>
<button class="c3" onclick="setCat('gk')">GK</button>

<h3>Select Difficulty</h3>
<button class="c1" onclick="setDiff('easy')">Easy</button>
<button class="c2" onclick="setDiff('medium')">Medium</button>
<button class="c3" onclick="setDiff('hard')">Hard</button>

</div>

<div id="game" style="display:none">

<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn" onclick="restart()">🔄 Restart</button>
<button class="btn" onclick="home()">🏠 Home</button>

</div>

</div>

<script>

let cat=null;
let diff=null;
let i=0;
let sound=true;
let audioCtx=null;
let unlocked=false;

/* ---------------- AUDIO FIX ---------------- */

function unlockAudio(){
 if(unlocked) return;

 audioCtx = new (window.AudioContext || window.webkitAudioContext)();
 audioCtx.resume();
 unlocked=true;
}

/* ---------------- SOUND ENGINE ---------------- */

function playSound(type){
 if(!sound || !unlocked) return;

 const o = audioCtx.createOscillator();
 const g = audioCtx.createGain();

 o.connect(g);
 g.connect(audioCtx.destination);

 if(type==="welcome") o.frequency.value=600;
 if(type==="correct") o.frequency.value=900;
 if(type==="wrong") o.frequency.value=180;

 o.start();

 g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4);
 o.stop(audioCtx.currentTime + 0.4);
}

/* ---------------- DATA ---------------- */

const data={
 math:{
  easy:[
   {q:"2 + 2 = ?", o:["3","4","5"], a:1},
   {q:"5 + 5 = ?", o:["10","11","9"], a:0}
  ],
  medium:[
   {q:"12 + 8 = ?", o:["18","20","22"], a:1}
  ],
  hard:[
   {q:"12 x 12 = ?", o:["144","124","154"], a:0}
  ]
 },
 english:{
  easy:[
   {q:"A for ?", o:["Apple","Ball","Cat"], a:0}
  ],
  medium:[
   {q:"Plural of Book?", o:["Books","Bookies","Booked"], a:0}
  ],
  hard:[
   {q:"Opposite Happy?", o:["Sad","Joy","Glad"], a:0}
  ]
 },
 gk:{
  easy:[
   {q:"Days in week?", o:["5","6","7"], a:2}
  ],
  medium:[
   {q:"Capital India?", o:["Delhi","Mumbai","Chennai"], a:0}
  ],
  hard:[
   {q:"Largest ocean?", o:["Atlantic","Pacific","Arctic"], a:1}
  ]
 }
};

/* ---------------- START ---------------- */

function startGame(){
 unlockAudio();
 document.getElementById("home").style.display="none";
 document.getElementById("setup").style.display="block";
 setTimeout(()=>playSound("welcome"),200);
}

function setCat(c){ cat=c; tryStart(); }
function setDiff(d){ diff=d; tryStart(); }

function tryStart(){
 if(cat && diff){
  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="block";
  i=0;
  load();
 }
}

/* ---------------- LOAD ---------------- */

function load(){

 let q=data[cat][diff][i];

 if(!q){
  alert("🎉 Level Completed!");
  restart();
  return;
 }

 document.getElementById("q").innerText=q.q;

 let colors=["c1","c2","c3","c4"];
 let html="";

 q.o.forEach((op,idx)=>{
  html+=`<button class="opt ${colors[idx%4]}" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

/* ---------------- CHECK + AUTO NEXT FIX ---------------- */

function check(ans,btn){

 let q=data[cat][diff][i];

 if(ans === q.a){
  playSound("correct");
  btn.classList.add("correct","celebrate");
 } else {
  playSound("wrong");
  btn.classList.add("wrong");
 }

 setTimeout(()=>{
  i++;              // ✅ FIXED AUTO NEXT
  load();
 },700);
}

/* ---------------- RESTART FIX ---------------- */

function restart(){
 i=0;
 load();
}

/* ---------------- HOME ---------------- */

function home(){
 location.reload();
}

/* ---------------- SOUND TOGGLE ---------------- */

function toggleSound(){
 sound=!sound;
 document.getElementById("s").innerText=sound?"ON":"OFF";
}

</script>

</body>
</html>
