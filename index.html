<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO MAX</title>

<style>
body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background: linear-gradient(135deg,#9b8cff,#ffb3b3);
}

.card{
 width:95%;
 max-width:500px;
 background:white;
 border-radius:30px;
 padding:20px;
 box-shadow:0 10px 30px rgba(0,0,0,0.2);
 text-align:center;
 position:relative;
 overflow:hidden;
}

.top{
 display:flex;
 justify-content:space-between;
 font-size:18px;
}

button{
 width:100%;
 padding:16px;
 margin:8px 0;
 border:none;
 border-radius:20px;
 font-size:18px;
 color:white;
}

.btn-blue{background:linear-gradient(90deg,#43cea2,#185a9d);}
.btn-pink{background:linear-gradient(90deg,#ff758c,#ff7eb3);}
.btn-gray{background:#ccc;color:#555;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.screen{display:none;}
.active{display:block;}

.tap{
 font-size:22px;
 animation: blink 1s infinite;
}
@keyframes blink{50%{opacity:0.3;}}

.nav{display:flex;gap:10px;}
.nav button{flex:1;}

.progress{
 height:10px;
 background:#eee;
 border-radius:10px;
 margin:10px 0;
}
.bar{
 height:100%;
 width:0%;
 background:#4dabf7;
}

.timer{color:red;font-weight:bold;}

.lock{opacity:0.5;}

@keyframes shake{
 0%{transform:translateX(0);}
 25%{transform:translateX(-5px);}
 50%{transform:translateX(5px);}
 75%{transform:translateX(-5px);}
 100%{transform:translateX(0);}
}
.shake{animation:shake 0.4s;}

.confetti{
 position:absolute;
 width:6px;
 height:6px;
 top:-10px;
 animation:fall 2s linear forwards;
}
@keyframes fall{
 to{
  transform:translateY(500px) rotate(360deg);
  opacity:0;
 }
}
</style>
</head>

<body>

<div class="card">

<div class="top">
 ⭐ <span id="stars">0</span>
 🪙 <span id="coins">0</span>
 ⏱️ <span class="timer" id="time">10</span>
</div>

<h2>Kids Quiz PRO MAX 🎮</h2>

<div id="start" class="screen active" onclick="startApp()">
 <div class="tap">👉 Tap to Start</div>
</div>

<div id="category" class="screen">
<button class="btn-blue" onclick="selectCat('math')">Math</button>
<button class="btn-blue" onclick="selectCat('english')">English</button>
<button class="btn-blue" onclick="selectCat('gk')">GK</button>
</div>

<div id="level" class="screen">
<button id="easyBtn" class="btn-pink" onclick="startGame('easy')">Easy</button>
<button id="medBtn" class="btn-pink lock" onclick="startGame('medium')">🔒 Medium</button>
<button id="hardBtn" class="btn-pink lock" onclick="startGame('hard')">🔒 Hard</button>
<button class="btn-gray" onclick="back()">Back</button>
</div>

<div id="game" class="screen">
<div class="progress"><div class="bar" id="bar"></div></div>
<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button class="btn-gray" onclick="prev()">⬅</button>
 <button class="btn-gray" onclick="next()">➡</button>
</div>

<button class="btn-gray" onclick="home()">🏠</button>
</div>

</div>

<script>

let cat,diff,i=0;
let stars=0,coins=0;
let timer=10,interval;

let unlockedLevel={math:"easy",english:"easy",gk:"easy"};

function speak(text){
 speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

let audioCtx=new (window.AudioContext||window.webkitAudioContext)();

function playSound(type){
 let o=audioCtx.createOscillator();
 let g=audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);
 o.frequency.value=(type==="correct")?800:200;
 o.start();
 g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.4);
 o.stop(audioCtx.currentTime+0.4);
}

function confetti(){
 for(let j=0;j<25;j++){
  let c=document.createElement("div");
  c.className="confetti";
  c.style.left=Math.random()*100+"%";
  c.style.background=`hsl(${Math.random()*360},100%,50%)`;
  document.querySelector(".card").appendChild(c);
  setTimeout(()=>c.remove(),2000);
 }
}

function startApp(){
 speak("Welcome to Kids Quiz Pro");
 show("category");
}

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function selectCat(c){
 cat=c;
 updateLevelUI();
 show("level");
}

function updateLevelUI(){
 let med=document.getElementById("medBtn");
 let hard=document.getElementById("hardBtn");

 med.classList.add("lock");
 hard.classList.add("lock");

 med.innerText="🔒 Medium";
 hard.innerText="🔒 Hard";

 if(unlockedLevel[cat]==="medium"){
  med.classList.remove("lock");
  med.innerText="Medium";
 }

 if(unlockedLevel[cat]==="hard"){
  med.classList.remove("lock");
  hard.classList.remove("lock");
  med.innerText="Medium";
  hard.innerText="Hard";
 }
}

function startGame(d){
 if(d==="medium" && unlockedLevel[cat]==="easy"){alert("Complete Easy first!");return;}
 if(d==="hard" && unlockedLevel[cat]!=="hard"){alert("Complete Medium first!");return;}

 diff=d; i=0;
 load();
 show("game");
}

/* ===================== HUGE DATA (SHORT SAMPLE SHOWN) ===================== */

const data={
math:{

  {q:"2+2=?",o:["3","4","5"],a:1},

  {q:"2+5=?",o:["6","7","8"],a:1},
  {q:"3+4=?",o:["6","7","8"],a:1},
  {q:"1+6=?",o:["6","7","8"],a:1},
  {q:"7-2=?",o:["5","4","6"],a:0},
  {q:"5+3=?",o:["7","8","9"],a:1},
  {q:"6-1=?",o:["5","6","7"],a:0},
  {q:"2+6=?",o:["7","8","9"],a:1},
  {q:"3+5=?",o:["7","8","9"],a:1},
  {q:"4+4=?",o:["7","8","9"],a:1},
  {q:"10-2=?",o:["8","7","9"],a:0},
  {q:"9-3=?",o:["6","5","7"],a:0}
 ],
 medium:[/* 20 similar */],

},

english:{

  {q:"A for?",o:["Apple","Ball","Cat"],a:0},
  {q:"B for?",o:["Ball","Dog","Egg"],a:0},
  {q:"C for?",o:["Cat","Fish","Goat"],a:0},
  {q:"D for?",o:["Dog","Apple","Ink"],a:0},
  {q:"E for?",o:["Egg","Hat","Jam"],a:0},
  {q:"F for?",o:["Fan","Lion","Sun"],a:0},
  {q:"G for?",o:["Goat","Tiger","Pen"],a:0},

/* ===================== GAME LOGIC ===================== */

function load(){
 let q=data[cat][diff][i];
 document.getElementById("q").innerText=q.q;

 let html="";
 q.o.forEach((op,idx)=>{
  html+=`<button class="btn-blue" onclick="check(${idx},this)">${op}</button>`;
 });
 document.getElementById("opts").innerHTML=html;

 startTimer();
 updateProgress();
}

function startTimer(){
 clearInterval(interval);
 timer=10;
 document.getElementById("time").innerText=timer;

 interval=setInterval(()=>{
  timer--;
  document.getElementById("time").innerText=timer;
  if(timer===0){clearInterval(interval);next();}
 },1000);
}

function updateProgress(){
 let total=data[cat][diff].length;
 document.getElementById("bar").style.width=((i+1)/total*100)+"%";
}

function check(ans,btn){
 clearInterval(interval);
 let q=data[cat][diff][i];

 if(ans===q.a){
  btn.classList.add("correct","shake");
  stars++; coins+=10;
  playSound("correct");
  confetti();
 }else{
  btn.classList.add("wrong");
  playSound("wrong");
 }

 document.getElementById("stars").innerText=stars;
 document.getElementById("coins").innerText=coins;

 setTimeout(()=>next(),700);
}

function next(){
 if(i < data[cat][diff].length-1){
  i++; load();
 }else{
  if(diff==="easy") unlockedLevel[cat]="medium";
  else if(diff==="medium") unlockedLevel[cat]="hard";
  alert("Level Completed!");
  show("category");
 }
}

function prev(){ if(i>0){i--;load();} }
function home(){ show("category"); }
function back(){ show("category"); }

</script>
</body>
</html>
