<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO - Step 1</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container {
  width:90%;
  max-width:500px;
  background: rgba(0,0,0,0.35);
  padding:20px;
  border-radius:15px;
  text-align:center;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.btn { background:white; color:black; }

.option { width:100%; margin-top:10px; }

.top {
  display:flex;
  justify-content:space-between;
}

.bar {
  width:100%;
  height:10px;
  background:#444;
  border-radius:10px;
  margin-top:10px;
}

.fill {
  height:10px;
  background:lime;
  width:0%;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🎮 Kids Quiz PRO</h2>

<!-- MENU -->
<div id="menu">

  <h3>Select Category</h3>
  <button class="btn" onclick="selectCat('math')">Math</button>
  <button class="btn" onclick="selectCat('english')">English</button>
  <button class="btn" onclick="selectCat('gk')">GK</button>

  <h3>Select Difficulty</h3>
  <button class="btn" onclick="selectDiff('easy')">Easy</button>
  <button class="btn" onclick="selectDiff('medium')">Medium</button>
  <button class="btn" onclick="selectDiff('hard')">Hard</button>

  <br><br>
  <button class="btn" onclick="startGame()">Start Game</button>

</div>

<!-- GAME -->
<div id="game" style="display:none;">

  <div class="top">
    <div>❤️ <span id="lives">3</span></div>
    <div>💰 <span id="coins">0</span></div>
    <div>⭐ <span id="stars">0</span></div>
    <div>⏱️ <span id="time">10</span></div>
  </div>

  <div class="bar"><div class="fill" id="progress"></div></div>

  <h3 id="question"></h3>

  <div id="options"></div>

</div>

</div>

<script>

// SOUND
function beep(type){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  o.type="sine";
  o.frequency.value = type==="correct"?800:200;
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime + 0.2);
}

// DATA (CATEGORY + DIFFICULTY)
const data = {
 math: {
  easy: [
   {q:"2 + 2 = ?", o:["3","4","5","6"], a:1},
   {q:"5 + 1 = ?", o:["6","7","5","8"], a:0},
   {q:"3 + 3 = ?", o:["5","6","7","8"], a:1},
   {q:"10 - 5 = ?", o:["6","5","4","3"], a:1}
  ],
  medium: [
   {q:"12 + 8 = ?", o:["18","20","22","24"], a:1},
   {q:"15 - 7 = ?", o:["6","7","8","9"], a:2},
   {q:"6 × 2 = ?", o:["8","10","12","14"], a:2}
  ],
  hard: [
   {q:"25 × 2 = ?", o:["40","45","50","60"], a:2},
   {q:"100 ÷ 4 = ?", o:["20","25","30","35"], a:1}
  ]
 },

 english: {
  easy: [
   {q:"A for ?", o:["Apple","Ball","Cat","Dog"], a:0},
   {q:"Opposite of Big?", o:["Small","Tall","Huge","Fat"], a:0}
  ],
  medium: [
   {q:"Plural of Book?", o:["Books","Bookes","Boks","Book"], a:0},
   {q:"He ___ running", o:["is","are","am","be"], a:0}
  ],
  hard: [
   {q:"Synonym of Happy?", o:["Sad","Joyful","Angry","Tired"], a:1}
  ]
 },

 gk: {
  easy: [
   {q:"How many days in a week?", o:["5","6","7","8"], a:2},
   {q:"Capital of India?", o:["Delhi","Mumbai","Chennai","Kolkata"], a:0}
  ],
  medium: [
   {q:"Sun rises in?", o:["West","North","East","South"], a:2},
   {q:"How many legs dog has?", o:["2","3","4","5"], a:2}
  ],
  hard: [
   {q:"World largest ocean?", o:["Atlantic","Pacific","Indian","Arctic"], a:1}
  ]
 }
};

let category="", difficulty="";
let current=[], index=0;
let lives=3, coins=0, stars=0;
let timer, timeLeft=10;

// SELECTORS
function selectCat(c){ category=c; }
function selectDiff(d){ difficulty=d; }

function startGame(){

 if(!category || !difficulty){
  alert("Select Category + Difficulty");
  return;
 }

 document.getElementById("menu").style.display="none";
 document.getElementById("game").style.display="block";

 current = shuffle([...data[category][difficulty]]);
 index=0;
 lives=3; coins=0; stars=0;

 updateUI();
 loadQ();
}

// SHUFFLE (NO REPEAT)
function shuffle(arr){
 for(let i=arr.length-1;i>0;i--){
  let j=Math.floor(Math.random()*i);
  [arr[i],arr[j]]=[arr[j],arr[i]];
 }
 return arr;
}

function loadQ(){

 if(index>=current.length){
  alert("🎉 Level Complete!");
  location.reload();
  return;
 }

 let q=current[index];
 document.getElementById("question").innerText=q.q;

 let html="";
 q.o.forEach((op,i)=>{
  html+=`<button class="btn option" onclick="check(${i})">${op}</button>`;
 });

 document.getElementById("options").innerHTML=html;

 timeLeft=10;
 startTimer();

 document.getElementById("progress").style.width =
 (index/current.length)*100 + "%";
}

// TIMER
function startTimer(){
 clearInterval(timer);
 timer=setInterval(()=>{
  timeLeft--;
  document.getElementById("time").innerText=timeLeft;

  if(timeLeft<=0){
   loseLife();
   nextQ();
  }
 },1000);
}

// CHECK ANSWER
function check(i){
 let q=current[index];

 if(i===q.a){
  beep("correct");
  coins+=10;
  stars+=1;
 } else {
  beep("wrong");
  loseLife();
 }

 updateUI();
 nextQ();
}

function loseLife(){
 lives--;
 if(lives<=0){
  alert("💀 Game Over");
  location.reload();
 }
}

function nextQ(){
 index++;
 loadQ();
}

function updateUI(){
 document.getElementById("lives").innerText=lives;
 document.getElementById("coins").innerText=coins;
 document.getElementById("stars").innerText=stars;
}

</script>

</body>
</html>
