<!DOCTYPE html>
<html>
<head>
<title>Debug Quiz</title>
</head>

<body style="font-family:Arial;text-align:center;padding-top:50px;">

<h2>DEBUG START</h2>

<button onclick="test()">Test Start Game</button>

<h3 id="status">Waiting...</h3>

<script>

function test(){
 document.getElementById("status").innerText = "Button clicked ✔";

 try {
   startGame();
 } catch(e){
   document.getElementById("status").innerText = "Error: " + e.message;
 }
}

function startGame(){
 document.getElementById("status").innerText = "Game function running ✔";
}

</script>

</body>
</html>
