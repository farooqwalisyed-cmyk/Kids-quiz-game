<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game{
  width:95%;
  max-width:520px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
}

h1{margin:10px 0;}

.btn{
  padding:12px;
  margin:6px;
  width:90%;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

.category-btn{background:#2575fc;color:white;}
.level-btn{background:#6a11cb;color:white;}
.answer-btn{background:#eee;}

.hidden{display:none;}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.nav button{
  width:32%;
  background:#333;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
}

.correct{background:#4CAF50 !important;color:white;}
.wrong{background:#f44336 !important;color:white;}

#emoji{
  font-size:40px;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="game">

<div class="top">
<div>⭐ Stars: <span id="stars">0</span></div>
<div>💰 Coins: <span id="coins">0</span></div>
</div>

<h1>Kids Quiz PRO 🎮</h1>

<div id="emoji">🙂</div>

<!-- CATEGORY -->
<div id="screen1">
  <h3>Select Category</h3>
  <button class="btn category-btn" onclick="selectCategory('gk')">General Knowledge</button>
  <button class="btn category-btn" onclick="selectCategory('english')">English</button>
  <button class="btn category-btn" onclick="selectCategory('math')">Math</button>
</div>

<!-- LEVEL -->
<div id="screen2" class="hidden">
  <h3>Select Level</h3>
  <button class="btn level-btn" onclick="startGame('easy')">Easy</button>
  <button class="btn level-btn" onclick="startGame('medium')">Medium</button>
  <button class="btn level-btn" onclick="startGame('hard')">Hard</button>

  <button class="btn" style="background:#333;color:white;width:90%" onclick="backToCategory()">
    ⬅ Back
  </button>
</div>

<!-- QUIZ -->
<div id="screen3" class="hidden">
  <h3 id="question"></h3>
  <div id="answers"></div>

  <div class="nav">
    <button onclick="prevQ()">⬅ Prev</button>
    <button onclick="backToLevels()">🔙 Levels</button>
    <button onclick="home()">🏠 Home</button>
  </div>

  <div id="timer" style="margin-top:10px;font-weight:bold;">⏱ 10</div>
</div>

<!-- RESULT -->
<div id="screen4" class="hidden">
  <h2>🎉 Game Completed!</h2>
  <h3 id="finalScore"></h3>
  <h3 id="badge"></h3>

  <button class="btn level-btn" onclick="playAgain()">🔁 Play Again</button>
  <button class="btn category-btn" onclick="home()">🏠 Home</button>
</div>

</div>

<script>

let category="", level="", index=0;
let stars=0, coins=0;
let locked=false;
let shuffledList=[];

let timer;
let timeLeft=10;

// ================= QUESTIONS =================
const questions={
gk:{
easy:[
{q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:0},
{q:"Sun rises in?",a:["West","East","North","South"],c:1},
{q:"How many days in a week?",a:["5","6","7","8"],c:2},
{q:"How many legs does a spider have?",a:["6","8","10","12"],c:1}
],
medium:[
{q:"Largest ocean?",a:["Atlantic","Indian","Pacific","Arctic"],c:2},
{q:"Capital of USA?",a:["New York","Washington DC","LA","Chicago"],c:1}
],
hard:[
{q:"Smallest country?",a:["Vatican","India","USA","UK"],c:0},
{q:"Speed of light?",a:["300,000 km/s","150,000 km/s","100,000 km/s","50,000 km/s"],c:0}
]
},

english:{
easy:[
{q:"A for?",a:["Apple","Ball","Cat","Dog"],c:0},
{q:"Opposite of Big?",a:["Small","Large","Huge","Tall"],c:0}
],
medium:[
{q:"Plural of Child?",a:["Childs","Children","Childes","Childer"],c:1},
{q:"Opposite of Hot?",a:["Cold","Warm","Fire","Boil"],c:0}
],
hard:[
{q:"Synonym of Happy?",a:["Sad","Joyful","Angry","Tired"],c:1}
]
},

math:{
easy:[
{q:"2 + 2 = ?",a:["3","4","5","6"],c:1},
{q:"5 - 2 = ?",a:["2","3","4","5"],c:1}
],
medium:[
{q:"10 × 2 = ?",a:["20","15","25","30"],c:0}
],
hard:[
{q:"100 ÷ 4 = ?",a:["20","25","30","40"],c:1}
]
}
};

// ================= SOUND =================
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq,time=0.15){
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();

o.frequency.value=freq;
o.type="sine";

o.connect(g);
g.connect(audioCtx.destination);

o.start();
o.stop(audioCtx.currentTime+time);
}

// ================= SHUFFLE =================
function shuffle(arr){
let a=[...arr];
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

// ================= UI =================
function setEmoji(t){
document.getElementById("emoji").innerText=
t==="good"?"🎉😄":
t==="bad"?"😢":"🙂";
}

// ================= NAV =================
function selectCategory(c){
category=c;
index=0;
stars=0;
coins=0;

document.getElementById("stars").innerText=0;
document.getElementById("coins").innerText=0;

document.getElementById("screen1").classList.add("hidden");
document.getElementById("screen2").classList.remove("hidden");

beep(300);
}

function startGame(l){
level=l;
index=0;
locked=false;

shuffledList=shuffle(questions[category][level]);

document.getElementById("screen2").classList.add("hidden");
document.getElementById("screen3").classList.remove("hidden");

loadQ();
beep(400);
}

// ================= TIMER =================
function startTimer(){
clearInterval(timer);
timeLeft=10;

timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText="⏱ "+timeLeft;

if(timeLeft<=0){
clearInterval(timer);
autoWrong();
}
},1000);
}

function autoWrong(){
if(locked) return;
locked=true;

setEmoji("bad");
beep(200);

setTimeout(()=>nextQ(),800);
}

// ================= LOAD =================
function loadQ(){

let list=shuffledList;

if(!list || !list[index]){
showResult();
return;
}

locked=false;

let q=list[index];
document.getElementById("question").innerText=q.q;

let ansDiv=document.getElementById("answers");
ansDiv.innerHTML="";

q.a.forEach((a,i)=>{
let btn=document.createElement("button");
btn.className="btn answer-btn";
btn.innerText=a;
btn.onclick=()=>checkAnswer(i,q.c,btn);
ansDiv.appendChild(btn);
});

setEmoji("neutral");

startTimer();
}

// ================= ANSWER =================
function checkAnswer(sel,correct,btn){

if(locked) return;
locked=true;

clearInterval(timer);

let buttons=document.querySelectorAll(".answer-btn");

if(sel===correct){
btn.classList.add("correct");
stars++;
coins+=5;
setEmoji("good");
beep(800);
}else{
btn.classList.add("wrong");
setEmoji("bad");
beep(200);
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

buttons.forEach(b=>b.disabled=true);

setTimeout(()=>nextQ(),900);
}

// ================= NEXT =================
function nextQ(){
let list=shuffledList;

if(index<list.length-1){
index++;
loadQ();
}else{
showResult();
}
}

function prevQ(){
if(index>0){
index--;
loadQ();
}
}

// ================= RESULT =================
function showResult(){

document.getElementById("screen3").classList.add("hidden");
document.getElementById("screen4").classList.remove("hidden");

document.getElementById("finalScore").innerText=
"⭐ Stars: "+stars+" 💰 Coins: "+coins;

let badge="🌟 GENIUS";
if(stars>=8) badge="🏆 PRO";
if(stars>=15) badge="⭐ MASTER";

document.getElementById("badge").innerText=badge;

beep(600);
}

function playAgain(){
selectCategory(category);
document.getElementById("screen4").classList.add("hidden");
document.getElementById("screen1").classList.remove("hidden");
}

function backToCategory(){
document.getElementById("screen2").classList.add("hidden");
document.getElementById("screen1").classList.remove("hidden");
}

function backToLevels(){
document.getElementById("screen3").classList.add("hidden");
document.getElementById("screen2").classList.remove("hidden");
}

function home(){
document.getElementById("screen3").classList.add("hidden");
document.getElementById("screen1").classList.remove("hidden");
}

</script>

</body>
</html>
