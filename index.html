<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{margin:0;font-family:Arial;background:#667eea;color:white;text-align:center;}
h1{background:#ff4d6d;padding:10px;margin:0;}
.screen{display:none;padding:20px;}
.active{display:block;}
.card{background:white;color:black;padding:20px;border-radius:15px;}
button{padding:12px;margin:10px;border:none;border-radius:10px;background:#4a90e2;color:white;width:80%;}
.correct{background:green!important;}
.wrong{background:red!important;}
</style>
</head>

<body>

<h1>🎮 Kids Quiz PRO</h1>

<!-- HOME -->
<div id="home" class="screen active">
<div class="card">
<h2>Enter Name</h2>
<input id="username" placeholder="Your name">
<br><br>
<button onclick="startApp()">Start</button>
</div>
</div>

<!-- MENU -->
<div id="menu" class="screen">
<div class="card">
<h2>Select Category</h2>
<button onclick="setCat('kids')">Kids</button>
<button onclick="setCat('math')">Math</button>
<button onclick="setCat('english')">English</button>
<button onclick="setCat('gk')">GK</button>

<h3>Levels</h3>
<button onclick="startLevel(1)">Level 1</button>
<button onclick="startLevel(2)">Level 2</button>
<button onclick="startLevel(3)">Level 3</button>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="card">
<h2 id="q"></h2>
<div id="options"></div>
</div>
</div>

<script>

/* 🔊 SOUND SYSTEM */
let clickSound=new Audio("click.mp3");
let correctSound=new Audio("correct.mp3");
let wrongSound=new Audio("wrong.mp3");

let audioReady=false;

document.body.addEventListener("click",()=>{
if(!audioReady){
clickSound.play().then(()=>{
clickSound.pause();
clickSound.currentTime=0;
audioReady=true;
}).catch(()=>{});
}
});

function play(type){
if(!audioReady) return;

if(type==="click"){
clickSound.currentTime=0;
clickSound.play();
}
if(type==="correct"){
correctSound.currentTime=0;
correctSound.play();
}
if(type==="wrong"){
wrongSound.currentTime=0;
wrongSound.play();
}
}

/* GAME */

let cat="kids",level=1,index=0;

function setCat(c){cat=c;}

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function startApp(){
let userName=document.getElementById("username").value;
if(!userName){alert("Enter name");return;}
show("menu");
}

/* QUESTIONS */

function getData(){

if(cat==="kids"){
return [
{q:"Dog says?",a:"Bark",o:["Bark","Meow","Roar","Buzz"]},
{q:"Cat says?",a:"Meow",o:["Meow","Bark","Roar","Buzz"]},
{q:"Cow gives?",a:"Milk",o:["Milk","Egg","Water","Honey"]}
];
}

if(cat==="math"){
return [
{q:"2+2=?",a:"4",o:["4","5","6","7"]},
{q:"5-3=?",a:"2",o:["2","3","4","5"]},
{q:"3+3=?",a:"6",o:["6","5","7","8"]}
];
}

if(cat==="english"){
return [
{q:"A for?",a:"Apple",o:["Apple","Ball","Cat","Dog"]},
{q:"B for?",a:"Ball",o:["Ball","Pen","Chair","Table"]},
{q:"C for?",a:"Cat",o:["Cat","Dog","Ball","Car"]}
];
}

if(cat==="gk"){
return [
{q:"Sky color?",a:"Blue",o:["Blue","Red","Green","Yellow"]},
{q:"Sun gives?",a:"Light",o:["Light","Water","Food","Air"]},
{q:"We drink?",a:"Water",o:["Water","Milk","Juice","Tea"]}
];
}

}

/* START LEVEL */

function startLevel(l){
level=l;
index=0;
questions=getData();
show("game");
load();
}

let questions=[];

function load(){

if(index>=questions.length){
alert("🎉 Level Completed!");
show("menu");
return;
}

let q=questions[index];
document.getElementById("q").innerText=q.q;

let optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

q.o.forEach(opt=>{
let b=document.createElement("button");
b.innerText=opt;

b.onclick=()=>{
play("click");

if(opt===q.a){
b.classList.add("correct");
play("correct");
}else{
b.classList.add("wrong");
play("wrong");
}

setTimeout(()=>{
index++;
load();
},500);
};

optionsDiv.appendChild(b);
});
}

</script>

</body>
</html>
