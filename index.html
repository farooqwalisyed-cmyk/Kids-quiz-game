<!DOCTYPE html>
<html>
<head>
<title>Kids Quiz Game PRO</title>

<style>
body{
font-family:Arial;
margin:0;
background:#eef2ff;
text-align:center;
}

.screen{display:none;padding:20px;}
.active{display:block;}

h1{color:#4f46e5}

input{
padding:10px;
width:80%;
margin:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
margin:8px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-weight:bold;
cursor:pointer;
}

.level-btn{background:#10b981}

.option{
display:block;
width:80%;
margin:10px auto;
background:#6366f1;
}

.topbar{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
<h1>🎮 Kids Quiz Game</h1>
<input id="name" placeholder="Enter your name">
<br>
<button onclick="goCategories()">Start Game</button>
</div>

<!-- CATEGORIES -->
<div id="categories" class="screen">
<h2>Choose Category</h2>
<button onclick="openLevels('kids')">Kids</button>
<button onclick="openLevels('math')">Math</button>
<button onclick="openLevels('english')">English</button>
<button onclick="openLevels('gk')">GK</button>
<br><br>
<button onclick="goHome()">Back</button>
</div>

<!-- LEVELS -->
<div id="levels" class="screen">
<h2>Choose Level</h2>
<div id="levelBox"></div>
<br>
<button onclick="goHome()">Home</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div class="topbar">
👤 <span id="player"></span><br>
Score: <span id="score">0</span> |
Coins: <span id="coins">0</span> |
Stars: <span id="stars">0</span>
</div>

<h2 id="q"></h2>
<div id="options"></div>

<button onclick="goHome()">Exit</button>
</div>

<script>

/* PLAYER */
let player="";
let category="";
let level=1;

let score=0,coins=0,stars=0;

let questionPool=[];
let currentIndex=0;

/* QUEUE SYSTEM (NO REPEAT) */
let questionQueue={
kids:[],
math:[],
english:[],
gk:[]
};

let usedIndex={
kids:0,
math:0,
english:0,
gk:0
};

/* DATABASE (EXPANDED KIDS FIXED) */
const DB={
kids:[
{q:"Dog says?",a:"Bark",o:["Bark","Meow","Roar","Buzz"]},
{q:"Cat says?",a:"Meow",o:["Meow","Bark","Roar","Buzz"]},
{q:"Cow gives?",a:"Milk",o:["Milk","Egg","Water","Honey"]},
{q:"Hen gives?",a:"Egg",o:["Egg","Milk","Water","Oil"]},
{q:"Fish lives in?",a:"Water",o:["Water","Sky","Land","Tree"]},
{q:"Bird can?",a:"Fly",o:["Fly","Swim","Run","Sleep"]},
{q:"Lion is?",a:"King",o:["King","Doctor","Teacher","Farmer"]},
{q:"Duck says?",a:"Quack",o:["Quack","Bark","Meow","Roar"]},
{q:"Horse runs?",a:"Fast",o:["Fast","Slow","Fly","Crawl"]},
{q:"Elephant is?",a:"Big",o:["Big","Small","Tiny","Light"]},

{q:"Tiger is?",a:"Wild",o:["Wild","Pet","Small","Soft"]},
{q:"Goat gives?",a:"Milk",o:["Milk","Egg","Honey","Water"]},
{q:"Sheep gives?",a:"Wool",o:["Wool","Milk","Egg","Oil"]},
{q:"Frog lives in?",a:"Water",o:["Water","Desert","Fire","Sky"]},
{q:"Snake is?",a:"Slithers",o:["Slithers","Flies","Jumps","Swims"]},

{q:"Ant is?",a:"Small",o:["Small","Big","Tall","Heavy"]},
{q:"Bee gives?",a:"Honey",o:["Honey","Milk","Egg","Water"]},
{q:"Owl sleeps in?",a:"Day",o:["Day","Night","Morning","Evening"]},
{q:"Zebra has?",a:"Stripes",o:["Stripes","Dots","Lines","Circles"]},
{q:"Rabbit is?",a:"Fast",o:["Fast","Slow","Big","Heavy"]}
],

math:[
{q:"2+2=?",a:"4",o:["4","3","5","6"]},
{q:"5+3=?",a:"8",o:["8","7","9","10"]},
{q:"10-5=?",a:"5",o:["5","4","6","7"]},
{q:"6+2=?",a:"8",o:["8","7","9","10"]},
{q:"9-3=?",a:"6",o:["6","5","7","8"]},
{q:"4+4=?",a:"8",o:["8","7","9","6"]},
{q:"7+2=?",a:"9",o:["9","8","10","11"]},
{q:"3+5=?",a:"8",o:["8","7","9","6"]}
],

english:[
{q:"A for?",a:"Apple",o:["Apple","Ball","Cat","Dog"]},
{q:"B for?",a:"Ball",o:["Ball","Cat","Dog","Ant"]},
{q:"C for?",a:"Cat",o:["Cat","Dog","Bat","Rat"]},
{q:"D for?",a:"Dog",o:["Dog","Cat","Cow","Hen"]},
{q:"E for?",a:"Elephant",o:["Elephant","Fish","Goat","Hen"]},
{q:"F for?",a:"Fish",o:["Fish","Apple","Ball","Dog"]},
{q:"G for?",a:"Goat",o:["Goat","Cat","Dog","Ant"]},
{q:"H for?",a:"Hen",o:["Hen","Fish","Ball","Dog"]}
],

gk:[
{q:"Sun is?",a:"Hot",o:["Hot","Cold","Wet","Dry"]},
{q:"Sky color?",a:"Blue",o:["Blue","Red","Green","Black"]},
{q:"We drink?",a:"Water",o:["Water","Milk","Oil","Juice"]},
{q:"Earth is?",a:"Round",o:["Round","Flat","Square","Triangle"]},
{q:"We breathe?",a:"Air",o:["Air","Water","Fire","Stone"]},
{q:"Moon gives?",a:"Light",o:["Light","Heat","Smoke","Sound"]},
{q:"Sun rises in?",a:"East",o:["East","West","North","South"]},
{q:"Grass color?",a:"Green",o:["Green","Red","Blue","Black"]}
]
};

/* HOME */
function goCategories(){
player=document.getElementById("name").value;
if(player===""){alert("Enter name");return;}
show("categories");
}

/* LEVELS */
function openLevels(cat){
category=cat;
show("levels");

let box=document.getElementById("levelBox");
box.innerHTML="";

for(let i=1;i<=5;i++){
let b=document.createElement("button");
b.innerText="Level "+i;
b.className="level-btn";
b.onclick=()=>startGame(i);
box.appendChild(b);
}
}

/* START GAME */
function startGame(lv){

level=lv;
score=0;coins=0;stars=0;

if(questionQueue[category].length===0){

let arr=DB[category].slice();

/* shuffle */
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}

questionQueue[category]=arr;
usedIndex[category]=0;
}

/* TAKE 3 QUESTIONS PER LEVEL */
questionPool = questionQueue[category].slice(
usedIndex[category],
usedIndex[category]+3
);

usedIndex[category]+=3;

/* RESET IF END */
if(questionPool.length===0){
questionQueue[category]=[];
return startGame(level);
}

currentIndex=0;

show("game");
load();
updateUI();
}

/* LOAD */
function load(){

if(currentIndex>=questionPool.length){
alert("Level Completed 🎉");
show("levels");
return;
}

let q=questionPool[currentIndex];
currentIndex++;

document.getElementById("player").innerText=player;
document.getElementById("q").innerText=q.q;

let box=document.getElementById("options");
box.innerHTML="";

q.o.sort(()=>Math.random()-0.5);

q.o.forEach(opt=>{
let btn=document.createElement("button");
btn.className="option";
btn.innerText=opt;

btn.onclick=()=>{

if(opt===q.a){
score+=10;
coins+=5;
stars+=1;
btn.style.background="green";
}else{
btn.style.background="red";
}

updateUI();
setTimeout(load,500);
};

box.appendChild(btn);
});
}

/* UI */
function updateUI(){
document.getElementById("score").innerText=score;
document.getElementById("coins").innerText=coins;
document.getElementById("stars").innerText=stars;
}

/* NAV */
function goHome(){
show("home");
}

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
