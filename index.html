<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:0.5s;
}

/* 🎨 THEMES FIXED */
body.kids{background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);}
body.dark{background:#0f172a;}
body.neon{background:#000;}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.5s;
}

.card.dark{background:#1e1e1e;color:white;}
.card.neon{background:#000;color:#0ff;box-shadow:0 0 20px #0ff;}
.card.kids{background:#fff;}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}
</style>
</head>

<body class="kids">

<canvas id="confetti"></canvas>

<div class="card kids" id="card">

<div class="topbar">
⭐ <span id="stars">0</span> |
🪙 <span id="coins">0</span> |
⏱️ <span id="time">10</span>
</div>

<h2>🎮 Kids Quiz PRO</h2>

<button class="btn p3" onclick="changeTheme()">🎨 Theme</button>

<div id="startScreen">
<button class="btn p1" onclick="startGame()">Start Game</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
</div>

<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium</button>
<button class="btn p3" onclick="selectLevel(2)">Hard</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<!-- 🔥 ADDED BUTTONS -->
<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>

</div>

</div>

<script>

/* 🔊 SOUND FIX */
function sound(type){
let s=null;
if(type==="welcome") s="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg";
if(type==="correct") s="https://actions.google.com/sounds/v1/cartoon/pop.ogg";
if(type==="wrong") s="https://actions.google.com/sounds/v1/cartoon/boing.ogg";
if(s) new Audio(s).play();
}

/* 🎤 VOICE READING */
function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.rate=0.9;
msg.pitch=1.3;
speechSynthesis.speak(msg);
}

/* 🎉 CONFETTI FIX */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let parts=[];
function blast(){
for(let i=0;i<80;i++){
parts.push({x:Math.random()*canvas.width,y:0,r:Math.random()*6+2,c:`hsl(${Math.random()*360},100%,50%)`});
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
parts.forEach(p=>{
ctx.fillStyle=p.c;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=3;
});
parts=parts.filter(p=>p.y<canvas.height);
requestAnimationFrame(draw);
}
draw();

/* 📚 QUESTIONS (UNCHANGED STYLE - FULL SAFE SAMPLE STRUCTURE) */
const data={
math:[
[
{q:"2+3=?",o:["4","5","6","7"],a:1},
{q:"4+5=?",o:["7","8","9","10"],a:2},
{q:"6+2=?",o:["6","7","8","9"],a:2}
],
[
{q:"10+5=?",o:["14","15","16","17"],a:1},
{q:"12+6=?",o:["17","18","19","20"],a:1}
],
[
{q:"20+15=?",o:["30","35","40","45"],a:1},
{q:"25+10=?",o:["30","35","40","45"],a:1}
]
],

english:[
[
{q:"Apple is?",o:["Fruit","Car","Animal","City"],a:0},
{q:"Dog says?",o:["Bark","Meow","Moo","Roar"],a:0}
],
[
{q:"Opposite Big?",o:["Small","Tall","Huge","Long"],a:0},
{q:"Opposite Hot?",o:["Cold","Warm","Fire","Heat"],a:0}
],
[
{q:"Past go?",o:["Went","Goed","Gone","Going"],a:0},
{q:"Past eat?",o:["Ate","Eated","Eat","Eating"],a:0}
]
],

gk:[
[
{q:"Capital India?",o:["Delhi","Mumbai","Goa","Chennai"],a:0},
{q:"Sun is?",o:["Star","Planet","Moon","Rock"],a:0}
],
[
{q:"Fastest animal?",o:["Cheetah","Lion","Tiger","Horse"],a:0},
{q:"CPU is?",o:["Brain","Heart","Eye","Hand"],a:0}
],
[
{q:"1 KB=?",o:["1024 bytes","100","10","1"],a:0}
]
]
};

/* GAME STATE */
let cat="",level=0,i=0,stars=0,coins=0,time=10,timer;

/* 🔊 FIXED START */
function startGame(){
sound("welcome");
show("catScreen");
}

/* 🎨 THEMES FIXED */
function changeTheme(){
let body=document.body;
let card=document.getElementById("card");

if(body.classList.contains("dark")){
body.className="neon";
card.className="card neon";
}
else if(body.classList.contains("neon")){
body.className="kids";
card.className="card kids";
}
else{
body.className="dark";
card.className="card dark";
}
}

/* GAME FLOW */
function selectCat(c){cat=c;show("levelScreen");}
function selectLevel(l){level=l;i=0;show("gameScreen");load();}

/* LOAD QUESTION */
function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

/* 🔊 VOICE QUESTION */
speechSynthesis.cancel();
speak(q.q);

let html="";
q.o.forEach((o,idx)=>{
html+=`<button class="btn p1" onclick="check(${idx})">${o}</button>`;
});
document.getElementById("opts").innerHTML=html;

startTimer();
}

/* ANSWER CHECK */
function check(ans){
clearInterval(timer);
let q=data[cat][level][i];

if(ans==q.a){
stars++;coins+=10;
blast();
sound("correct");
}else{
sound("wrong");
}

setTimeout(nextQ,500);
}

/* TIMER */
function startTimer(){
time=10-(level*2);
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

/* NEXT / PREV FIX */
function nextQ(){
if(i<data[cat][level].length-1){
i++;
load();
}else{
show("catScreen");
}
}

function prevQ(){
if(i>0){
i--;
load();
}
}

function goHome(){
show("catScreen");
}

/* SCREEN SWITCH */
function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

</script>
</body>
</html>
