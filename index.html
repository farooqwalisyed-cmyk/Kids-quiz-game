<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:linear-gradient(135deg,#6a11cb,#2575fc);
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
}

.card{
 width:95%;
 max-width:500px;
 background:#ffffff;
 border-radius:25px;
 padding:20px;
 text-align:center;
}

.top{
 display:flex;
 justify-content:space-between;
 font-size:18px;
 margin-bottom:10px;
}

.timer{color:red;font-weight:bold;}

button{
 width:100%;
 padding:14px;
 margin:6px 0;
 border:none;
 border-radius:15px;
 font-size:18px;
 color:white;
}

.btn1{background:#ff6b6b;}
.btn2{background:#4dabf7;}
.btn3{background:#51cf66;}
.btn4{background:#ffd43b;color:black;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.screen{display:none;}
.active{display:block;}

.nav{display:flex;gap:8px;}
.nav button{flex:1;}

.tap{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0.3;}}

.lock{opacity:0.5;}

.progress{
 height:8px;
 background:#eee;
 border-radius:10px;
 margin:10px 0;
}
.bar{
 height:100%;
 width:0%;
 background:#4dabf7;
}
</style>
</head>

<body>

<div class="card">

<div class="top">
 ⭐ <span id="stars">0</span>
 🪙 <span id="coins">0</span>
 ⏱️ <span id="time" class="timer">10</span>
</div>

<h2>🎮 Kids Quiz PRO</h2>

<div id="start" class="screen active" onclick="startApp()">
 <h3 class="tap">👉 Tap to Start</h3>
</div>

<div id="category" class="screen">
<button class="btn2" onclick="selectCat('math')">Math</button>
<button class="btn2" onclick="selectCat('english')">English</button>
<button class="btn2" onclick="selectCat('gk')">GK</button>
</div>

<div id="level" class="screen">
<button class="btn1" onclick="startGame('easy')">Easy</button>
<button id="medBtn" class="btn1 lock" onclick="startGame('medium')">🔒 Medium</button>
<button id="hardBtn" class="btn1 lock" onclick="startGame('hard')">🔒 Hard</button>
</div>

<div id="game" class="screen">

<div class="progress"><div id="bar" class="bar"></div></div>

<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button onclick="prev()">⬅ Prev</button>
 <button onclick="next()">Next ➡</button>
</div>

<button onclick="home()">🏠 Home</button>

</div>

</div>

<script>

let cat,diff,i=0;
let stars=0,coins=0;
let timer=10,interval;

let unlocked={math:"easy",english:"easy",gk:"easy"};

let audioCtx;

/* 🔊 SOUND */
function playSound(type){
 if(!audioCtx){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
 }
 let o=audioCtx.createOscillator();
 let g=audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);

 o.frequency.value = (type==="correct") ? 800 : 200;

 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
 o.stop(audioCtx.currentTime+0.4);
}

/* START */
function startApp(){
 speechSynthesis.speak(new SpeechSynthesisUtterance("Welcome to Kids Quiz Pro"));
 show("category");
}

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function selectCat(c){
 cat=c;
 updateUI();
 show("level");
}

/* LOCK */
function updateUI(){
 let med=document.getElementById("medBtn");
 let hard=document.getElementById("hardBtn");

 med.classList.add("lock");
 hard.classList.add("lock");

 med.innerText="🔒 Medium";
 hard.innerText="🔒 Hard";

 if(unlocked[cat]==="medium"){
  med.classList.remove("lock");
  med.innerText="Medium";
 }

 if(unlocked[cat]==="hard"){
  med.classList.remove("lock");
  hard.classList.remove("lock");
  med.innerText="Medium";
  hard.innerText="Hard";
 }
}

function startGame(d){
 if(d==="medium" && unlocked[cat]==="easy"){alert("Complete Easy first");return;}
 if(d==="hard" && unlocked[cat]!=="hard"){alert("Complete Medium first");return;}

 diff=d;
 i=0;
 show("game");
 load();
}

/* SHUFFLE */
function shuffle(q){
 let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
 arr.sort(()=>Math.random()-0.5);
 return {
  q:q.q,
  o:arr.map(x=>x.t),
  a:arr.findIndex(x=>x.correct)
 };
}

/* DATA (CLEAN + 4 OPTIONS) */
const data={
math:{
 easy:[
  {q:"2 + 2 = ?",o:["3","4","5","6"],a:1},
  {q:"5 + 3 = ?",o:["7","8","9","6"],a:1}
 ],
 medium:[
  {q:"12 + 8 = ?",o:["18","20","22","24"],a:1}
 ],
 hard:[
  {q:"12 × 12 = ?",o:["144","124","154","134"],a:0}
 ]
},

english:{
 easy:[
  {q:"A is for?",o:["Apple","Ball","Cat","Dog"],a:0}
 ],
 medium:[
  {q:"Plural of book?",o:["Books","Book","Booked","Booking"],a:0}
 ],
 hard:[
  {q:"Opposite of happy?",o:["Sad","Joy","Fun","Smile"],a:0}
 ]
},

gk:{
 easy:[
  {q:"How many days are there in a week?",o:["5","6","7","8"],a:2},
  {q:"Which animal says meow?",o:["Dog","Cat","Cow","Lion"],a:1}
 ],
 medium:[
  {q:"What is the capital of India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0}
 ],
 hard:[
  {q:"Who invented the light bulb?",o:["Newton","Edison","Tesla","Einstein"],a:1}
 ]
}
};

let current;

/* LOAD */
function load(){
 let q=data[cat][diff][i];
 current=shuffle(q);

 document.getElementById("q").innerText=current.q;

 let colors=["btn1","btn2","btn3","btn4"];
 let html="";
 current.o.forEach((op,idx)=>{
  html+=`<button class="${colors[idx]}" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;

 startTimer();
 updateProgress();
}

/* TIMER */
function startTimer(){
 clearInterval(interval);
 timer=10;
 document.getElementById("time").innerText=timer;

 interval=setInterval(()=>{
  timer--;
  document.getElementById("time").innerText=timer;
  if(timer===0){clearInterval(interval);next();}
 },1000);
}

/* PROGRESS */
function updateProgress(){
 let total=data[cat][diff].length;
 document.getElementById("bar").style.width=((i+1)/total*100)+"%";
}

/* CHECK */
function check(ans,btn){
 clearInterval(interval);

 if(ans===current.a){
  btn.classList.add("correct");
  stars++; coins+=10;
  playSound("correct");
 }else{
  btn.classList.add("wrong");
  playSound("wrong");
 }

 document.getElementById("stars").innerText=stars;
 document.getElementById("coins").innerText=coins;

 setTimeout(()=>next(),700);
}

/* NAV */
function next(){
 if(i < data[cat][diff].length-1){
  i++; load();
 }else{
  if(diff==="easy") unlocked[cat]="medium";
  else if(diff==="medium") unlocked[cat]="hard";

  alert("Level Completed!");
  show("category");
 }
}

function prev(){
 if(i>0){i--;load();}
}

function home(){
 show("category");
}

</script>

</body>
</html>
