<!DOCTYPE html>
<html>
<head>
<title>Kids Quiz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

.card, .quizBox{
  background:white;
  color:black;
  width:85%;
  max-width:420px;
  margin:70px auto;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#2575fc;
  color:white;
  font-weight:bold;
  transition:0.2s;
}

button:active{
  transform:scale(0.97);
}

button:hover{
  background:#1a5fd1;
}

/* POPUP FIXED CENTER */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popupBox{
  background:white;
  color:black;
  padding:25px;
  border-radius:15px;
  width:260px;
  text-align:center;
  animation:pop 0.25s ease;
}

@keyframes pop{
  from{transform:scale(0.7); opacity:0;}
  to{transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<div id="app"></div>

<!-- POPUP -->
<div id="popup">
  <div class="popupBox">
    <h2 id="popupText">Message</h2>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>

let app = document.getElementById("app");

let player = "";
let level = 0;
let coins = 0;

/* 🎮 50 REAL QUESTIONS */
let questions = [
{ q:"Capital of India?", options:["Mumbai","Delhi","Kolkata","Chennai"], answer:1 },
{ q:"Capital of UK?", options:["London","Paris","Berlin","Rome"], answer:0 },
{ q:"Largest ocean?", options:["Atlantic","Indian","Pacific","Arctic"], answer:2 },
{ q:"How many continents?", options:["5","6","7","8"], answer:2 },
{ q:"National animal of India?", options:["Lion","Tiger","Elephant","Leopard"], answer:1 },

{ q:"12 × 8 = ?", options:["96","88","108","86"], answer:0 },
{ q:"144 ÷ 12 = ?", options:["10","11","12","13"], answer:2 },
{ q:"25 × 6 = ?", options:["150","120","140","160"], answer:0 },
{ q:"225 ÷ 15 = ?", options:["10","12","15","20"], answer:2 },
{ q:"√144 = ?", options:["10","11","12","13"], answer:2 },

{ q:"Opposite of Brave?", options:["Coward","Strong","Bold","Smart"], answer:0 },
{ q:"Synonym of Happy?", options:["Sad","Joyful","Angry","Tired"], answer:1 },
{ q:"Plural of Mouse?", options:["Mouses","Mice","Mouse","Mices"], answer:1 },
{ q:"He ___ playing football", options:["is","are","am","be"], answer:0 },
{ q:"Opposite of Fast?", options:["Slow","Quick","Run","Speed"], answer:0 },

{ q:"18 × 7 = ?", options:["126","136","116","146"], answer:0 },
{ q:"500 - 275 = ?", options:["225","235","215","245"], answer:0 },
{ q:"20% of 200 = ?", options:["20","30","40","40"], answer:2 },
{ q:"3/4 of 100 = ?", options:["70","75","80","85"], answer:1 },
{ q:"9 × 11 = ?", options:["99","89","109","91"], answer:0 }
];

/* START SCREEN */
function renderStart(){
  app.innerHTML = `
    <div class="card">
      <h1>🎮 Kids Quiz Pro</h1>
      <input id="name" placeholder="Enter Your Name"/>
      <button onclick="startGame()">Start</button>
    </div>
  `;
}

function startGame(){
  player = document.getElementById("name").value;

  if(!player){
    showPopup("Enter Name");
    return;
  }

  level = 0;
  coins = 0;
  loadLevel();
}

/* QUIZ SCREEN */
function loadLevel(){
  let q = questions[level];

  app.innerHTML = `
    <div class="quizBox">
      <h3>👤 ${player} | 💰 Coins: ${coins}</h3>
      <h2>⭐ Level ${level+1}/${questions.length}</h2>

      <h3>${q.q}</h3>

      ${q.options.map((o,i)=>`
        <button onclick="answer(${i})">${o}</button>
      `).join("")}

      <button onclick="prevQuestion()">⬅ Previous</button>
      <button onclick="renderStart()">🏠 Home</button>
    </div>
  `;
}

/* ANSWER SYSTEM */
function answer(i){
  let q = questions[level];

  if(i === q.answer){
    coins += 10;
    showPopup("🎉 Correct +10 coins");
  } else {
    showPopup("❌ Wrong!");
  }

  setTimeout(()=>{
    level++;

    if(level >= questions.length){
      showPopup("Game Over! Coins: " + coins);
      renderStart();
      return;
    }

    loadLevel();
  }, 800);
}

/* PREVIOUS QUESTION */
function prevQuestion(){
  if(level > 0){
    level--;
    loadLevel();
  } else {
    showPopup("This is first level");
  }
}

/* POPUP */
function showPopup(msg){
  document.getElementById("popupText").innerText = msg;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

/* INIT */
renderStart();

</script>

</body>
</html>
