speechSynthesis.speak(msg);

/* GAME LOGIC SAME */
let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);

if(q.img){
document.getElementById("qImg").src=q.img;
document.getElementById("qImg").classList.remove("hidden");
}else{
document.getElementById("qImg").classList.add("hidden");
}

let options=q.o.map((t,idx)=>({t,ok:idx===q.a})).sort(()=>Math.random()-0.5);

document.getElementById("opts").innerHTML=
options.map(op=>`<button class="btn p1" onclick="check(this,${op.ok})">${op.t}</button>`).join("");

startTimer();
}

function check(btn,ok){
clearInterval(timer);
if(ok){
stars++;coins+=10;
playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
blastConfetti();
}else{
playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
}
document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;
setTimeout(nextQ,800);
}

function nextQ(){if(i<data[cat][level].length-1){i++;load();}else{goHome();}}
function prevQ(){if(i>0){i--;stars=Math.max(0,stars-1);load();}}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;
timer=setInterval(()=>{time--;document.getElementById("time").innerText=time;if(time<=0) nextQ();},1000);
}

function goHome(){i=0;clearInterval(timer);show("catScreen");}
function startApp(){
playSound("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
setTimeout(()=>speak("Welcome to Kids Quiz Pro"),300);
show("catScreen");
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){cat=c;show("levelScreen");}
function selectLevel(l){level=l;i=0;show("gameScreen");load();}

/* CONFETTI */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
let confetti=[];
function blastConfetti(){
for(let i=0;i<60;i++){
confetti.push({x:Math.random()*canvas.width,y:0,r:Math.random()*6,color:`hsl(${Math.random()*360},100%,50%)`});
}}
function drawConfetti(){
ctx.clearRect(0,0,canvas.width,canvas.height);
confetti.forEach(p=>{
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=3;
});
confetti=confetti.filter(p=>p.y<canvas.height);
requestAnimationFrame(drawConfetti);
}
drawConfetti();
