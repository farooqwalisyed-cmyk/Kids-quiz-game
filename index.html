}

/* GAME LOGIC */
function startLevel(l){
level=l;index=0;score=0;coins=0;stars=0;
questions=getData(cat,level);
show("game");
load();
}

function load(){
if(index>=questions.length){
alert("🎉 Level Complete!");
show("menu");
return;
}

let q=questions[index];
qEl.innerText=q.q;

options.innerHTML="";
q.o.sort(()=>Math.random()-0.5);

q.o.forEach(opt=>{
let b=document.createElement("button");
b.innerText=opt;

b.onclick=()=>{
play("click");

if(opt===q.a){
b.classList.add("correct");
play("correct");
score++;coins+=10;stars++;
}else{
b.classList.add("wrong");
play("wrong");
}

setTimeout(()=>{
index++;
update();
load();
},500);
};

options.appendChild(b);
});

bar.style.width=((index/questions.length)*100)+"%";
}

function update(){
scoreEl.innerText=score;
coinsEl.innerText=coins;
starsEl.innerText=stars;
}
