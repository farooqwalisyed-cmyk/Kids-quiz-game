<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#6a11cb,#2575fc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.screen{
width:95%;
max-width:420px;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.top{
display:flex;
justify-content:space-between;
font-size:14px;
font-weight:bold;
margin-bottom:10px;
color:#333;
}

.title{
text-align:center;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.btn{
display:block;
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:10px;
font-size:16px;
background:#f1f1f1;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
background:#ddd;
}

.correct{
background:#2ecc71 !important;
animation:pop 0.3s ease;
color:white;
}

.wrong{
background:#e74c3c !important;
animation:shake 0.4s ease;
color:white;
}

@keyframes pop{
0%{transform:scale(0.7)}
100%{transform:scale(1)}
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}
</style>
</head>

<body>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>
<audio id="welcomeSound" src="welcome.mp3"></audio>

<div class="screen">

<div class="top">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">0</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div id="menu">
<button class="btn" onclick="startGame('math')">Math</button>
<button class="btn" onclick="startGame('english')">English</button>
<button class="btn" onclick="startGame('gk')">GK</button>
</div>

<div id="game" style="display:none">
<div id="q"></div>
<div id="opts"></div>
</div>

</div>

<script>

let data={
math:{easy:[],medium:[],hard:[]},
english:{easy:[],medium:[],hard:[]},
gk:{easy:[],medium:[],hard:[]}
};

// ================= EASY =================
data.math.easy=[
{q:"2+2=?",o:["3","4","5","6"],a:1},
{q:"5+3=?",o:["7","8","9","10"],a:1},
{q:"10-4=?",o:["5","6","7","8"],a:1},
{q:"6+1=?",o:["6","7","8","9"],a:1},
{q:"9-3=?",o:["5","6","7","8"],a:1},
{q:"3×2=?",o:["5","6","7","8"],a:1},
{q:"4×4=?",o:["12","14","16","18"],a:2},
{q:"8÷2=?",o:["2","3","4","5"],a:2},
{q:"7+2=?",o:["8","9","10","11"],a:1},
{q:"10+10=?",o:["15","18","20","22"],a:2},
{q:"12-2=?",o:["8","9","10","11"],a:2},
{q:"11+1=?",o:["10","11","12","13"],a:2},
{q:"5×5=?",o:["20","25","30","15"],a:1},
{q:"14-4=?",o:["10","11","12","13"],a:0},
{q:"6×3=?",o:["12","15","18","21"],a:2},
{q:"9+1=?",o:["9","10","11","12"],a:1},
{q:"20-5=?",o:["10","15","20","25"],a:1},
{q:"2×6=?",o:["10","11","12","13"],a:2},
{q:"18÷2=?",o:["7","8","9","10"],a:2},
{q:"15+5=?",o:["18","19","20","21"],a:2}
];

data.english.easy=[
{q:"A is for?",o:["Apple","Ball","Cat","Dog"],a:0},
{q:"B is for?",o:["Ball","Dog","Egg","Fish"],a:0},
{q:"C is for?",o:["Cat","Rat","Bat","Hat"],a:0},
{q:"D is for?",o:["Dog","Log","Fog","Jog"],a:0},
{q:"E is for?",o:["Elephant","Egg","Ear","Eye"],a:0},
{q:"F is for?",o:["Fish","Fan","Fog","Fig"],a:0},
{q:"G is for?",o:["Goat","Gate","Game","Gun"],a:0},
{q:"H is for?",o:["Hen","Hat","Hot","Hit"],a:0},
{q:"I is for?",o:["Ice","Ink","Iron","It"],a:0},
{q:"J is for?",o:["Jug","Jam","Jet","Job"],a:0},
{q:"K is for?",o:["Kite","Kit","Key","Kid"],a:0},
{q:"L is for?",o:["Lion","Lip","Lot","Lab"],a:0},
{q:"M is for?",o:["Man","Map","Moon","Mat"],a:0},
{q:"N is for?",o:["Nest","Net","Not","Nut"],a:0},
{q:"O is for?",o:["Orange","Ox","Oil","On"],a:0},
{q:"P is for?",o:["Parrot","Pen","Pin","Pan"],a:0},
{q:"Q is for?",o:["Queen","Quick","Quiz","Quit"],a:0},
{q:"R is for?",o:["Rat","Run","Red","Row"],a:0},
{q:"S is for?",o:["Sun","Sat","Sit","Sap"],a:0},
{q:"T is for?",o:["Tiger","Tap","Top","Tin"],a:0}
];

data.gk.easy=[
{q:"How many days in a week?",o:["5","6","7","8"],a:2},
{q:"Cat says?",o:["Woof","Meow","Moo","Bark"],a:1},
{q:"Sky color?",o:["Blue","Red","Green","Black"],a:0},
{q:"Sun rises in?",o:["East","West","North","South"],a:0},
{q:"Days in year?",o:["365","360","400","300"],a:0},
{q:"Dog legs?",o:["2","3","4","5"],a:2},
{q:"Bird can?",o:["Fly","Swim","Run","Walk"],a:0},
{q:"Moon is a?",o:["Star","Planet","Satellite","Sun"],a:2},
{q:"Plants need?",o:["Water","Stone","Plastic","Fire"],a:0},
{q:"Fish lives in?",o:["Air","Water","Land","Fire"],a:1}
];

// MEDIUM
data.math.medium=[
{q:"12×3=?",o:["36","32","30","40"],a:0},
{q:"100-50=?",o:["40","50","60","70"],a:1}
];

data.english.medium=[
{q:"Opposite of Big?",o:["Small","Large","Huge","Tall"],a:0},
{q:"Plural of Cat?",o:["Cats","Caties","Catt","Cates"],a:0}
];

data.gk.medium=[
{q:"Largest planet?",o:["Earth","Mars","Jupiter","Venus"],a:2},
{q:"Fastest animal?",o:["Tiger","Cheetah","Lion","Horse"],a:1}
];

// HARD
data.math.hard=[
{q:"25×4=?",o:["100","90","110","120"],a:0},
{q:"144÷12=?",o:["10","11","12","13"],a:2}
];

data.english.hard=[
{q:"Correct spelling?",o:["Beautifull","Beautiful","Beutiful","Beautifal"],a:1},
{q:"Past of Go?",o:["Goed","Went","Gone","Going"],a:1}
];

data.gk.hard=[
{q:"Bones in body?",o:["206","150","300","250"],a:0},
{q:"Galaxy?",o:["Milky Way","Sun","Moon","Earth"],a:0}
];

// GAME ENGINE
let cat="gk",lvl="easy",i=0,stars=0,coins=0,timer;
let current;

function startGame(c){
cat=c;i=0;
document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";
document.getElementById("welcomeSound").play();
load();
}

function load(){
current=data[cat][lvl][i];
document.getElementById("q").innerText=current.q;

let opt="";
current.o.forEach((o,idx)=>{
opt+=`<button class='btn' onclick='check(${idx},this)'>${o}</button>`;
});

document.getElementById("opts").innerHTML=opt;
startTimer();
}

function check(ans,btn){

clearInterval(timer);

let correctSound=document.getElementById("correctSound");
let wrongSound=document.getElementById("wrongSound");

let all=document.querySelectorAll("#opts button");
all.forEach(b=>b.disabled=true);

if(ans===current.a){
btn.classList.add("correct");
correctSound.currentTime=0;
correctSound.play();
stars++;coins+=10;
}else{
btn.classList.add("wrong");
all[current.a].classList.add("correct");
wrongSound.currentTime=0;
wrongSound.play();
}

setTimeout(()=>next(),1000);
}

function next(){
i++;
if(i>=data[cat][lvl].length){
home();
return;
}
load();
}

function home(){
document.getElementById("menu").style.display="block";
document.getElementById("game").style.display="none";
}

function startTimer(){
let t=10;
document.getElementById("time").innerText=t;

timer=setInterval(()=>{
t--;
document.getElementById("time").innerText=t;
if(t<=0){clearInterval(timer);next();}
},1000);
}

</script>

</body>
</html>
