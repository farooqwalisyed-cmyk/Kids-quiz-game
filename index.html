<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: linear-gradient(135deg,#6a11cb,#2575fc,#ff6b6b);
 height:100vh;
 overflow:hidden;
}

/* FULL SCREEN CARD */
.card{
 width:100%;
 height:100vh;
 background: rgba(0,0,0,0.35);
 color:white;
 padding:15px;
 box-sizing:border-box;
 display:flex;
 flex-direction:column;
}

/* SCREENS */
.screen{display:none;}
.active{display:block;}

/* TITLE */
h2{text-align:center;color:#ffe600;margin:10px 0;}
h3{text-align:center;color:#00e5ff;}

/* BUTTONS */
button{
 padding:14px;
 margin:6px 0;
 border:none;
 border-radius:14px;
 font-size:18px;
 width:100%;
 font-weight:bold;
}

.btn{background:white;}

.c1{background:#ff6b6b;}
.c2{background:#4dabf7;}
.c3{background:#51cf66;}
.c4{background:#ffd43b;color:black;}

.opt{color:white;font-weight:bold;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

/* NAV */
.nav{
 display:flex;
 gap:10px;
 margin-top:10px;
}
.nav button{
 flex:1;
}

/* GAME AREA BIG */
#q{
 font-size:24px;
 margin:20px 0;
 text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<button class="btn" onclick="toggleSound()">🔊 Sound: <span id="s">ON</span></button>

<!-- HOME -->
<div id="home" class="screen active">
 <button class="btn" onclick="goMenu()">Start Game</button>
</div>

<!-- MENU -->
<div id="menu" class="screen">

<h3>Select Category</h3>
<button class="c1" onclick="setCat('math')">Math</button>
<button class="c2" onclick="setCat('english')">English</button>
<button class="c3" onclick="setCat('gk')">GK</button>

<h3>Select Difficulty</h3>
<button class="c1" onclick="setDiff('easy')">Easy</button>
<button class="c2" onclick="setDiff('medium')">Medium</button>
<button class="c3" onclick="setDiff('hard')">Hard</button>

<button class="btn" onclick="startQuiz()">▶ Play Quiz</button>

</div>

<!-- GAME -->
<div id="game" class="screen">

<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button class="btn" onclick="prev()">⬅ Prev</button>
 <button class="btn" onclick="next()">Next ➡</button>
</div>

<button class="btn" onclick="restart()">🔄 Restart</button>
<button class="btn" onclick="home()">🏠 Home</button>

</div>

</div>

<script>

/* STATE */
let cat=null;
let diff=null;
let i=0;
let sound=true;

/* AUDIO */
let audioCtx;

function unlockAudio(){
 if(!audioCtx){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
 }
 audioCtx.resume();
}

function playSound(type){
 if(!sound || !audioCtx) return;

 let o = audioCtx.createOscillator();
 let g = audioCtx.createGain();

 o.connect(g);
 g.connect(audioCtx.destination);

 if(type==="welcome") o.frequency.value=600;
 if(type==="correct") o.frequency.value=900;
 if(type==="wrong") o.frequency.value=180;

 g.gain.value=0.2;

 o.start();
 setTimeout(()=>o.stop(),200);
}

/* DATA */
const data={
 math:{
  easy:[
   {q:"2 + 2 = ?", o:["3","4","5"], a:1},
   {q:"5 + 5 = ?", o:["10","11","9"], a:0}
  ],
  medium:[
   {q:"12 + 8 = ?", o:["18","20","22"], a:1}
  ],
  hard:[
   {q:"12 x 12 = ?", o:["144","124","154"], a:0}
  ]
 },
 english:{
  easy:[
   {q:"A for ?", o:["Apple","Ball","Cat"], a:0}
  ],
  medium:[
   {q:"Plural of Book?", o:["Books","Bookies","Booked"], a:0}
  ],
  hard:[
   {q:"Opposite Happy?", o:["Sad","Joy","Glad"], a:0}
  ]
 },
 gk:{
  easy:[
   {q:"Days in week?", o:["5","6","7"], a:2}
  ],
  medium:[
   {q:"Capital India?", o:["Delhi","Mumbai","Chennai"], a:0}
  ],
  hard:[
   {q:"Largest ocean?", o:["Atlantic","Pacific","Arctic"], a:1}
  ]
};

/* SCREEN CONTROL */
function show(screen){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(screen).classList.add("active");
}

/* FLOW */
function goMenu(){
 unlockAudio();
 show("menu");
 playSound("welcome");
}

function setCat(c){cat=c;}
function setDiff(d){diff=d;}

function startQuiz(){
 unlockAudio();

 if(!cat || !diff){
  alert("Select category + difficulty");
  return;
 }

 i=0;
 show("game");
 load();
 playSound("welcome");
}

/* LOAD */
function load(){
 let q=data[cat][diff][i];

 document.getElementById("q").innerText=q.q;

 let colors=["c1","c2","c3","c4"];
 let html="";

 q.o.forEach((op,idx)=>{
  html+=`<button class="opt ${colors[idx%4]}" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

/* ANSWER */
function check(ans,btn){

 let q=data[cat][diff][i];

 document.querySelectorAll(".opt").forEach(b=>b.disabled=true);

 if(ans===q.a){
  playSound("correct");
  btn.classList.add("correct");
 } else {
  playSound("wrong");
  btn.classList.add("wrong");
 }

 setTimeout(()=>{
  next();
 },700);
}

/* NAV */
function next(){
 if(i < data[cat][diff].length-1){
  i++;
  load();
 } else {
  alert("🎉 Level Completed!");
  home();
 }
}

function prev(){
 if(i>0){
  i--;
  load();
 }
}

/* RESET */
function restart(){
 i=0;
 load();
}

/* HOME */
function home(){
 cat=null;
 diff=null;
 i=0;
 show("home");
}

/* SOUND */
function toggleSound(){
 sound=!sound;
 document.getElementById("s").innerText=sound?"ON":"OFF";
}

</script>

</body>
</html>
