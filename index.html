<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidz Quiz PRO MAX</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#ff758c);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.game{
width:95%;
max-width:520px;
background:white;
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.top{
display:flex;
justify-content:space-between;
font-weight:bold;
}

.btn{
padding:14px;
margin:8px;
width:90%;
border:none;
border-radius:14px;
font-size:16px;
cursor:pointer;
}

.category-btn{background:#36d1dc;color:white;}
.level-btn{background:#ff758c;color:white;}
.answer-btn{background:white;font-weight:bold;}

.hidden{display:none;}

.correct{background:#4CAF50 !important;color:white;}
.wrong{background:#f44336 !important;color:white;}

.quiz-box{
background:linear-gradient(135deg,#36d1dc,#5b86e5);
padding:15px;
border-radius:15px;
color:white;
}

.nav{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.nav button{
width:32%;
background:#333;
color:white;
padding:10px;
border:none;
border-radius:10px;
}

#emoji{font-size:40px;margin:10px;}

.confetti{
position:fixed;
top:0;
width:8px;
height:8px;
animation:fall 1s linear forwards;
}
@keyframes fall{
to{transform:translateY(500px) rotate(360deg);opacity:0;}
}
</style>
</head>

<body>

<div class="game">

<div class="top">
<div>⭐ <span id="stars">0</span></div>
<div>💰 <span id="coins">0</span></div>
</div>

<h2>Kids Quiz PRO MAX 🎮</h2>

<button id="soundBtn" class="btn level-btn" onclick="toggleSound()">🔊 Sound</button>

<div id="emoji">🙂</div>

<!-- CATEGORY -->
<div id="screen1">
<h3>Select Category</h3>
<button class="btn category-btn" onclick="selectCategory('gk')">GK</button>
<button class="btn category-btn" onclick="selectCategory('english')">English</button>
<button class="btn category-btn" onclick="selectCategory('math')">Math</button>
</div>

<!-- LEVEL -->
<div id="screen2" class="hidden">
<h3>Select Level</h3>
<button id="easyBtn" class="btn level-btn" onclick="startGame('easy')">Easy</button>
<button id="mediumBtn" class="btn level-btn" onclick="startGame('medium')">🔒 Medium</button>
<button id="hardBtn" class="btn level-btn" onclick="startGame('hard')">🔒 Hard</button>
<button class="btn" onclick="backToCategory()">⬅ Back</button>
</div>

<!-- QUIZ -->
<div id="screen3" class="hidden">
<div class="quiz-box">
<h3 id="question"></h3>
<div id="answers"></div>
</div>

<div class="nav">
<button onclick="prevQ()">⬅ Prev</button>
<button onclick="backToLevels()">🔙</button>
<button onclick="home()">🏠</button>
</div>
</div>

</div>

<script>

let category="", level="", index=0;
let stars=0, coins=0;
let list=[];
let locked=false;
let soundOn=true;

let unlocked={
gk:{easy:true,medium:false,hard:false},
english:{easy:true,medium:false,hard:false},
math:{easy:true,medium:false,hard:false}
};

// VOICE
function speak(text){
if(!soundOn) return;
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.pitch=1.3;
speechSynthesis.speak(msg);
}

// SOUND TOGGLE
function toggleSound(){
soundOn=!soundOn;
soundBtn.innerText = soundOn ? "🔊 Sound" : "🔇 Mute";
}

// SHUFFLE
function shuffleOptions(q){
let arr=q.a.map((t,i)=>({text:t,correct:i===q.c}));
arr.sort(()=>Math.random()-0.5);
return {
q:q.q,
a:arr.map(x=>x.text),
c:arr.findIndex(x=>x.correct)
};
}

// QUESTIONS
const questions={
gk:{
easy:[
{q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:0},
{q:"Sun rises in?",a:["West","East","North","South"],c:1}
],
medium:[
{q:"Largest ocean?",a:["Atlantic","Indian","Pacific","Arctic"],c:2},
{q:"Fastest animal?",a:["Lion","Tiger","Cheetah","Horse"],c:2}
],
hard:[
{q:"Speed of light?",a:["300,000 km/s","100,000","150,000","200,000"],c:0}
]
},

english:{
easy:[
{q:"A for?",a:["Apple","Ball","Cat","Dog"],c:0}
],
medium:[
{q:"Plural of child?",a:["Childs","Children","Childes","Childer"],c:1}
],
hard:[
{q:"Synonym of happy?",a:["Sad","Joyful","Angry","Tired"],c:1}
]
},

math:{
easy:[
{q:"2+2?",a:["3","4","5","6"],c:1}
],
medium:[
{q:"10×2?",a:["20","15","25","30"],c:0}
],
hard:[
{q:"100÷4?",a:["20","25","30","40"],c:1}
]
}
};

// FLOW

function selectCategory(c){
category=c;
setTimeout(()=>speak("Welcome to Kids Quiz"),200);
screen1.classList.add("hidden");
screen2.classList.remove("hidden");
updateLevels();
}

function updateLevels(){
let u=unlocked[category];
mediumBtn.disabled=!u.medium;
hardBtn.disabled=!u.hard;
mediumBtn.innerText=u.medium?"Medium":"🔒 Medium";
hardBtn.innerText=u.hard?"Hard":"🔒 Hard";
}

function startGame(l){
if(l!=="easy" && !unlocked[category][l]) return;

level=l;
index=0;

list = questions[category][level].map(q=>shuffleOptions(q));
list.sort(()=>Math.random()-0.5);

screen2.classList.add("hidden");
screen3.classList.remove("hidden");

loadQ();
}

function loadQ(){
if(!list[index]){
unlockNext();
backToLevels();
return;
}

locked=false;

let q=list[index];
question.innerText=q.q;
answers.innerHTML="";

q.a.forEach((a,i)=>{
let b=document.createElement("button");
b.className="btn answer-btn";
b.innerText=a;
b.onclick=()=>check(i,q.c,b);
answers.appendChild(b);
});
}

function check(sel,correct,btn){
if(locked) return;
locked=true;

if(sel===correct){
btn.classList.add("correct");
stars++; coins+=5;
emoji.innerText="🎉";
speak("Correct Answer");
confetti();
}else{
btn.classList.add("wrong");
emoji.innerText="😢";
speak("Wrong Answer");
}

starsEl.innerText=stars;
coinsEl.innerText=coins;

setTimeout(()=>{index++;loadQ();},800);
}

function unlockNext(){
if(level==="easy") unlocked[category].medium=true;
if(level==="medium") unlocked[category].hard=true;
}

function confetti(){
for(let i=0;i<15;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),1000);
}
}

// NAV
function prevQ(){if(index>0){index--;loadQ();}}
function backToCategory(){screen2.classList.add("hidden");screen1.classList.remove("hidden");}
function backToLevels(){screen3.classList.add("hidden");screen2.classList.remove("hidden");updateLevels();}
function home(){screen3.classList.add("hidden");screen1.classList.remove("hidden");}

// ELEMENTS
let starsEl=document.getElementById("stars");
let coinsEl=document.getElementById("coins");
let question=document.getElementById("question");
let answers=document.getElementById("answers");
let screen1=document.getElementById("screen1");
let screen2=document.getElementById("screen2");
let screen3=document.getElementById("screen3");
let mediumBtn=document.getElementById("mediumBtn");
let hardBtn=document.getElementById("hardBtn");
let emoji=document.getElementById("emoji");
let soundBtn=document.getElementById("soundBtn");

</script>

</body>
</html>
