<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#a18cd1,#84fab0);
 background-size:400% 400%;
 animation:bg 8s infinite;
}

@keyframes bg{
 0%{background-position:0%}
 50%{background-position:100%}
 100%{background-position:0%}
}

.card{
 width:95%;
 max-width:520px;
 background:white;
 border-radius:25px;
 padding:20px;
 text-align:center;
}

.top{
 display:flex;
 justify-content:space-between;
}

.timer{color:red;font-size:20px;font-weight:bold;}

button{
 width:100%;
 padding:14px;
 margin:6px 0;
 border:none;
 border-radius:15px;
 font-size:18px;
 color:white;
 transition:0.2s;
}

/* COLORS */
.btn1{background:#ff6b6b;}
.btn2{background:#4dabf7;}
.btn3{background:#51cf66;}
.btn4{background:#ffd43b;color:black;}

.navBtn1{background:#845ef7;}
.navBtn2{background:#20c997;}
.navBtn3{background:#ff922b;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

/* ✅ NEW CLICK ANIMATION */
.clicked{
 transform:scale(0.92);
}

/* SCREEN */
.screen{display:none;}
.active{display:block;}

.nav{display:flex;gap:8px;}
.nav button{flex:1;}

.lock{opacity:0.5;}

.emoji{
 font-size:40px;
 animation:pop 0.5s;
}

@keyframes pop{
 0%{transform:scale(0)}
 100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="card">

<div class="top">
 ⭐ <span id="stars">0</span>
 🪙 <span id="coins">0</span>
 ⏱️ <span id="time">10</span>
</div>

<h2>🎮 Kids Quiz PRO</h2>

<div id="start" class="screen active" onclick="startApp()">
 <h3>👉 Tap to Start</h3>
</div>

<div id="category" class="screen">
<button class="btn2" onclick="selectCat('math')">Math</button>
<button class="btn2" onclick="selectCat('english')">English</button>
<button class="btn2" onclick="selectCat('gk')">GK</button>
</div>

<div id="level" class="screen">
<button class="btn1" onclick="startGame('easy')">Easy</button>
<button id="medBtn" class="btn1 lock" onclick="startGame('medium')">🔒 Medium</button>
<button id="hardBtn" class="btn1 lock" onclick="startGame('hard')">🔒 Hard</button>
<button class="navBtn1" onclick="show('category')">⬅ Back</button>
</div>

<div id="game" class="screen">
<h3 id="q"></h3>
<div id="opts"></div>
<div id="emoji"></div>

<div class="nav">
 <button class="navBtn1" onclick="prev()">⬅ Prev</button>
 <button class="navBtn2" onclick="next()">Next ➡</button>
</div>

<button class="navBtn3" onclick="home()">🏠 Home</button>
</div>

</div>

<script>

let cat,diff="easy",i=0;
let stars=0,coins=0;
let timer,interval;

let unlock={math:"easy",english:"easy",gk:"easy"};

function playSound(freq){
 let ctx=new (window.AudioContext||window.webkitAudioContext)();
 let o=new OscillatorNode(ctx);
 let g=ctx.createGain();
 o.connect(g); g.connect(ctx.destination);
 o.frequency.value=freq;
 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
 o.stop(ctx.currentTime+0.4);
}

function startApp(){
 speechSynthesis.speak(new SpeechSynthesisUtterance("Welcome to Kids Quiz Pro"));
 show("category");
}

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function selectCat(c){
 cat=c;
 updateUI();
 show("level");
}

function updateUI(){
 let m=document.getElementById("medBtn");
 let h=document.getElementById("hardBtn");

 m.classList.add("lock");
 h.classList.add("lock");

 if(unlock[cat]=="medium") m.classList.remove("lock");
 if(unlock[cat]=="hard"){
  m.classList.remove("lock");
  h.classList.remove("lock");
 }
}

function startGame(d){
 if(d=="medium" && unlock[cat]=="easy"){alert("Finish Easy first");return;}
 if(d=="hard" && unlock[cat]!="hard"){alert("Finish Medium first");return;}

 diff=d;
 i=0;
 show("game");
 load();
}

function shuffle(q){
 let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
 arr.sort(()=>Math.random()-0.5);
 return {q:q.q,o:arr.map(x=>x.t),a:arr.findIndex(x=>x.correct)};
}

/* DATA (ONLY ONE FIXED QUESTION HERE) */
const data = {

gk:{
 easy:[
 {q:"How many days in a year?",o:["365","360","400","300"],a:0},
 {q:"Which animal says meow?",o:["Dog","Cat","Cow","Lion"],a:1},
 {q:"Color of sky?",o:["Blue","Red","Green","Black"],a:0},
 {q:"Sun rises in?",o:["East","West","North","South"],a:0},
 {q:"How many months in a year?",o:["10","11","12","13"],a:2},
 {q:"Water formula?",o:["H2O","CO2","O2","NaCl"],a:0},
 {q:"Capital of India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0},
 {q:"Planet we live on?",o:["Mars","Earth","Venus","Jupiter"],a:1},
 {q:"How many legs dog has?",o:["2","3","4","5"],a:2},
 {q:"Bird can?",o:["Fly","Swim","Run","Walk"],a:0}
 ]
}

};

/* GAME LOGIC */
let current;

function load(){
 let q=data[cat][diff][i];
 current=shuffle(q);

 document.getElementById("q").innerText=current.q;

 let colors=["btn1","btn2","btn3","btn4"];
 let html="";

 current.o.forEach((op,idx)=>{
  html+=`<button class="${colors[idx]}" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
 startTimer();
}

function startTimer(){
 clearInterval(interval);
 timer=10;
 document.getElementById("time").innerText=timer;

 interval=setInterval(()=>{
  timer--;
  document.getElementById("time").innerText=timer;
  if(timer==0){clearInterval(interval);next();}
 },1000);
}

function check(ans,btn){

 // ✅ NEW ANIMATION ON CLICK
 btn.classList.add("clicked");
 setTimeout(()=>btn.classList.remove("clicked"),200);

 clearInterval(interval);

 let emoji=document.getElementById("emoji");

 if(ans===current.a){
  btn.classList.add("correct");
  stars++; coins+=10;
  playSound(900);
  emoji.innerHTML='<div class="emoji">🎉</div>';
 }else{
  btn.classList.add("wrong");
  playSound(200);
  emoji.innerHTML='<div class="emoji">😢</div>';
 }

 document.getElementById("stars").innerText=stars;
 document.getElementById("coins").innerText=coins;

 setTimeout(()=>{
  emoji.innerHTML="";
  next();
 },800);
}

function next(){
 if(i < data[cat][diff].length-1){
  i++; load();
 }else{
  alert(diff+" Completed!");
  show("category");
 }
}

function prev(){ if(i>0){i--;load();} }
function home(){ show("category"); }

</script>

</body>
</html>
