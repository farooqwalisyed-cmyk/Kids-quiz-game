<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}
@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}
.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
margin-bottom:10px;
}
.title{
font-size:24px;
font-weight:bold;
margin:10px 0;
color:#6a11cb;
}
.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}
.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}
.hidden{display:none;}
.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.progress{
width:100%;
height:8px;
background:#ddd;
border-radius:10px;
margin-bottom:10px;
overflow:hidden;
}
.bar{
height:100%;
width:0%;
background:#6a11cb;
transition:0.3s;
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
<div>
<button onclick="toggleMusic()">🔊</button>
</div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">Tap to Start</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
</div>

<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium 🔒</button>
<button class="btn p3" onclick="selectLevel(2)">Hard 🔒</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* ===== BACKGROUND MUSIC ===== */
let music = new Audio("https://actions.google.com/sounds/v1/ambiences/birds_in_forest.ogg");
music.loop=true;

function toggleMusic(){
if(music.paused){music.play();}
else{music.pause();}
}

/* ===== SAVE SYSTEM ===== */
function saveGame(){
localStorage.setItem("quizSave", JSON.stringify({
stars,coins,unlock
}));
}
function loadGame(){
let d=JSON.parse(localStorage.getItem("quizSave"));
if(d){
stars=d.stars;
coins=d.coins;
unlock=d.unlock;
}
}

/* ===== VOICE ===== */
function speak(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}
function voice(type){
let msg = type==="good" ? "Great job!" : "Try again!";
speak(msg);
}

/* ===== DATA (same working data) ===== */
const data = {
math:[[ {q:"2+3=?",o:["4","5","6","7"],a:1} ],[{q:"12+8=?",o:["18","19","20","21"],a:2}],[{q:"25×2=?",o:["40","45","50","55"],a:2}]],
english:[[ {q:"Apple is a ?",o:["Fruit","Animal","Car","City"],a:0} ],[{q:"He is a boy",o:["is","are","am","be"],a:0}],[{q:"Go past tense?",o:["Went","Goed","Going","Gone"],a:0}]],
gk:[[ {q:"Capital of India?",o:["Delhi","Mumbai","Goa","Chennai"],a:0} ],[{q:"CPU is?",o:["Brain","Heart","Eye","Hand"],a:0}],[{q:"1 KB=?",o:["1024 bytes","100 bytes","10 bytes","1 byte"],a:0}]]
};

/* ===== GAME ===== */
let unlock={math:0,english:0,gk:0};
let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;

loadGame();

function updateBar(){
let total=data[cat][level].length;
let percent=((i+1)/total)*100;
document.getElementById("bar").style.width=percent+"%";
}

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);

updateBar();

let options=q.o.map((t,idx)=>({t,ok:idx===q.a}))
.sort(()=>Math.random()-0.5);

let html="";
options.forEach(op=>{
html+=`<button class="btn p1" onclick="check(this,${op.ok})">${op.t}</button>`;
});
document.getElementById("opts").innerHTML=html;

startTimer();
}

function check(btn,ok){
clearInterval(timer);

if(ok){
btn.classList.add("correct");
stars++; coins+=10;
voice("good");
}else{
btn.classList.add("wrong");
voice("bad");
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

saveGame();

setTimeout(nextQ,700);
}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

function nextQ(){
if(i < data[cat][level].length-1){
i++;load();
}else{
if(level===0) unlock[cat]=1;
if(level===1) unlock[cat]=2;
saveGame();
goHome();
}
}

function prevQ(){ if(i>0){i--;load();} }

function goHome(){
i=0;
clearInterval(timer);
show("catScreen");
}

function startApp(){
music.play();
show("catScreen");
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){
cat=c;
show("levelScreen");
}

function selectLevel(l){
level=l;
i=0;
show("gameScreen");
load();
}

</script>

</body>
</html>
