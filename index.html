<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz Pro</title>

<style>

/* 🌈 BACKGROUND */
body{
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 🧊 GAME CARD */
#quizScreen{
  width:92%;
  max-width:520px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-radius:30px;
  padding:25px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* TEXT */
h2{
  font-size:28px;
  margin:20px 0;
}

h3{
  font-size:18px;
  margin:5px;
}

/* 🎮 BUTTONS */
button{
  width:100%;
  padding:16px;
  margin:10px 0;
  border:none;
  border-radius:16px;
  background: linear-gradient(135deg,#2575fc,#6a11cb);
  color:white;
  font-size:18px;
  font-weight:bold;
  transition:0.2s;
}

button:active{
  transform:scale(0.97);
}

/* 📊 PROGRESS */
.progress{
  width:100%;
  height:14px;
  background:#ddd;
  border-radius:20px;
  margin:15px 0;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background: linear-gradient(90deg,gold,orange);
  transition:0.3s;
}

/* 💰 COIN POP */
.coin-popup{
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:gold;
  color:black;
  padding:12px 20px;
  border-radius:20px;
  font-weight:bold;
  font-size:18px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
  animation:pop 1s ease forwards;
  z-index:9999;
}

@keyframes pop {
  0% { transform: translate(-50%,0) scale(0); opacity:0; }
  50% { transform: translate(-50%,-20px) scale(1.3); opacity:1; }
  100% { transform: translate(-50%,-40px) scale(1); opacity:0; }
}

</style>
</head>

<body>

<div id="quizScreen">

  <div>
    <h3>Level: <span id="levelText">1</span></h3>
    <h3>Coins: <span id="coinText">0</span></h3>
  </div>

  <div class="progress">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <h2 id="question"></h2>

  <div id="options"></div>

  <button onclick="prevQuestion()">⬅ Prev</button>
  <button onclick="nextQuestion()">Next ➡</button>
  <button onclick="goHome()">🏠 Home</button>

</div>

<script>

let level = 0;
let coins = 0;

/* 4 OPTION QUESTIONS */
const sampleQuestions = [
  {q:"Capital of India?", o:["Delhi","Mumbai","Kolkata","Chennai"], c:0},
  {q:"2 + 2 = ?", o:["3","4","5","6"], c:1},
  {q:"Water formula?", o:["H2O","CO2","O2","NaCl"], c:0},
  {q:"Sun is a?", o:["Star","Planet","Moon","Comet"], c:0},
  {q:"5 x 5 = ?", o:["10","20","25","30"], c:2}
];

/* 100 LEVELS */
const questions = Array.from({length:100},(_,i)=>{
  return sampleQuestions[i % sampleQuestions.length];
});

/* LOAD QUESTION */
function loadQuestion(){

  if(level >= questions.length){
    alert("🎉 Game Completed! Coins: " + coins);
    return;
  }

  let q = questions[level];

  document.getElementById("question").innerText = q.q;
  document.getElementById("levelText").innerText = level + 1;

  let box = document.getElementById("options");
  box.innerHTML = "";

  q.o.forEach((opt,i)=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>checkAnswer(i);
    box.appendChild(btn);
  });

  updateUI();
}

/* CHECK ANSWER */
function checkAnswer(i){

  let q = questions[level];

  if(i === q.c){
    coins += 10;
    showCoinPopup();
  }

  level++;

  if(level < questions.length){
    loadQuestion();
  } else {
    alert("🎉 Completed! Coins: " + coins);
  }

  updateUI();
}

/* UI */
function updateUI(){
  document.getElementById("coinText").innerText = coins;

  let percent = (level / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

/* NEXT */
function nextQuestion(){
  if(level < questions.length - 1){
    level++;
    loadQuestion();
  }
}

/* PREV */
function prevQuestion(){
  if(level > 0){
    level--;
    loadQuestion();
  }
}

/* HOME */
function goHome(){
  location.reload();
}

/* 💰 COIN POP */
function showCoinPopup(){
  let div = document.createElement("div");
  div.className = "coin-popup";
  div.innerText = "+10 Coins 💰";

  document.body.appendChild(div);

  setTimeout(()=>div.remove(),1000);
}

/* START */
loadQuestion();

</script>

</body>
</html>
