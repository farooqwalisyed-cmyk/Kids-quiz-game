<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
align-items:center;
}

.title{font-size:22px;font-weight:bold;margin:10px 0;}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.hidden{display:none;}

.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.pop{animation:pop 0.3s;}
@keyframes pop{
0%{transform:scale(0.6)}
100%{transform:scale(1)}
}

.soundBtn{
cursor:pointer;
font-size:20px;
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
<div class="soundBtn" onclick="toggleSound()" id="soundIcon">🔊</div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">Tap to Play</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p1" onclick="goHome()">Restart</button>
</div>

<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium</button>
<button class="btn p3" onclick="selectLevel(2)">Hard</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* ================= SOUND CONTROL ================= */
let soundOn=true;

function toggleSound(){
soundOn=!soundOn;
document.getElementById("soundIcon").innerText=soundOn?"🔊":"🔇";
}

/* ================= AUDIO ================= */
function playAudio(src){
if(!soundOn) return;
let a=new Audio(src);
a.play();
}

/* Welcome sound */
function welcome(){
playAudio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
let msg=new SpeechSynthesisUtterance("Welcome to Kids Quiz Pro");
speechSynthesis.speak(msg);
}

/* ================= GAME ================= */
let cat="",level=0,i=0;
let stars=0,coins=0;
let timer,time=10;

function show(s){
document.getElementById("startScreen").classList.add("hidden");
document.getElementById("catScreen").classList.add("hidden");
document.getElementById("levelScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.add("hidden");
document.getElementById(s).classList.remove("hidden");
}

function startApp(){
show("catScreen");
welcome();
}

function selectCat(c){
cat=c;
show("levelScreen");
}

function selectLevel(l){
level=l;
i=0;
show("gameScreen");
load();
}

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach((op,idx)=>{
html+=`<button class="btn p1" onclick="check(${idx},this)">${op}</button>`;
});
document.getElementById("opts").innerHTML=html;

startTimer();
}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

function check(ans,btn){
clearInterval(timer);
let q=data[cat][level][i];

if(ans===q.a){
btn.classList.add("correct","pop");
stars++; coins+=10;
playAudio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
}else{
btn.classList.add("wrong","shake");
playAudio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

setTimeout(nextQ,800);
}

function nextQ(){
if(i < data[cat][level].length-1){
i++;
load();
}else{
goHome();
}
}

function prevQ(){
if(i>0){
i--;
load();
}
}

function goHome(){
i=0;
clearInterval(timer);
show("catScreen");
}

</script>

</body>
</html>
