<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: linear-gradient(135deg,#6a11cb,#2575fc,#ff6b6b);
 height:100vh;
}

.card{
 width:100%;
 height:100vh;
 background: rgba(0,0,0,0.35);
 color:white;
 padding:15px;
 box-sizing:border-box;
}

h2{text-align:center;color:#ffe600;}
h3{text-align:center;color:#00e5ff;}

button{
 padding:14px;
 margin:6px 0;
 border:none;
 border-radius:14px;
 font-size:18px;
 width:100%;
 font-weight:bold;
}

.btn{background:white;}

/* CATEGORY COLORS */
.c1{background:#ff6b6b;}
.c2{background:#4dabf7;}
.c3{background:#51cf66;}

/* OPTIONS COLORS */
.opt1{background:#ff6b6b;color:white;}
.opt2{background:#4dabf7;color:white;}
.opt3{background:#51cf66;color:white;}
.opt4{background:#ffd43b;color:black;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.nav{display:flex;gap:10px;}
.nav button{flex:1;}

.screen{display:none;}
.active{display:block;}

#q{font-size:24px;margin:20px 0;text-align:center;}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<!-- HOME -->
<div id="home" class="screen active">
 <button onclick="showCategory()" class="btn">Start Game</button>
</div>

<!-- CATEGORY -->
<div id="category" class="screen">
<h3>Select Category</h3>
<button class="c1" onclick="selectCat('math')">Math</button>
<button class="c2" onclick="selectCat('english')">English</button>
<button class="c3" onclick="selectCat('gk')">GK</button>
</div>

<!-- LEVEL -->
<div id="level" class="screen">
<h3>Select Difficulty</h3>
<button class="c1" onclick="startGame('easy')">Easy</button>
<button class="c2" onclick="startGame('medium')">Medium</button>
<button class="c3" onclick="startGame('hard')">Hard</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button onclick="prev()" class="btn">⬅ Prev</button>
 <button onclick="next()" class="btn">Next ➡</button>
</div>

<button onclick="restart()" class="btn">🔄 Restart</button>
<button onclick="home()" class="btn">🏠 Home</button>

</div>

</div>

<script>

let cat=null;
let diff=null;
let i=0;

/* DATA */
const data={
 math:{
  easy:[
   {q:"2+2=?",o:["3","4","5","6"],a:1},
   {q:"3+1=?",o:["4","5","6","7"],a:0}
  ],
  medium:[
   {q:"10+5=?",o:["15","12","14","11"],a:0}
  ],
  hard:[
   {q:"12x12=?",o:["144","124","154","134"],a:0}
  ]
 },
 english:{
  easy:[
   {q:"A for?",o:["Apple","Ball","Cat","Dog"],a:0}
  ],
  medium:[
   {q:"Plural of book?",o:["Books","Booked","Bookies","Book"],a:0}
  ],
  hard:[
   {q:"Opposite happy?",o:["Sad","Joy","Glad","Fun"],a:0}
  ]
 },
 gk:{
  easy:[
   {q:"Days in week?",o:["5","6","7","8"],a:2}
  ],
  medium:[
   {q:"Capital India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0}
  ],
  hard:[
   {q:"Largest ocean?",o:["Pacific","Atlantic","Arctic","Indian"],a:0}
  ]
 }
};

/* SCREEN CONTROL */
function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* FLOW */
function showCategory(){
 show("category");
}

function selectCat(c){
 cat=c;
 show("level");
}

function startGame(d){
 diff=d;
 i=0;
 show("game");
 load();
}

/* LOAD */
function load(){
 let q=data[cat][diff][i];

 document.getElementById("q").innerText=q.q;

 let colors=["opt1","opt2","opt3","opt4"];
 let html="";

 q.o.forEach((op,idx)=>{
  html+=`<button class="${colors[idx]}" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

/* ANSWER */
function check(ans,btn){
 let q=data[cat][diff][i];

 document.querySelectorAll("#opts button").forEach(b=>b.disabled=true);

 if(ans===q.a){
  btn.classList.add("correct");
 }else{
  btn.classList.add("wrong");
 }
}

/* NAV */
function next(){
 if(i < data[cat][diff].length-1){
  i++;
  load();
 }
}

function prev(){
 if(i>0){
  i--;
  load();
 }
}

/* RESET */
function restart(){
 i=0;
 load();
}

function home(){
 show("home");
}

</script>

</body>
</html>
