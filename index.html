<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background: linear-gradient(135deg,#9b8cff,#ffb3b3);
}

.card{
 width:95%;
 max-width:500px;
 background:white;
 border-radius:20px;
 padding:20px;
 text-align:center;
}

button{
 width:100%;
 padding:14px;
 margin:8px 0;
 border:none;
 border-radius:15px;
 font-size:18px;
 color:white;
}

.btn-blue{background:#4dabf7;}
.btn-pink{background:#ff7eb3;}
.btn-gray{background:#ccc;color:#333;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.screen{display:none;}
.active{display:block;}

.nav{
 display:flex;
 gap:10px;
}
.nav button{flex:1;}

.lock{opacity:0.5;}

.tap{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0.3;}}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<div id="start" class="screen active" onclick="startApp()">
 <h3 class="tap">👉 Tap to Start</h3>
</div>

<div id="category" class="screen">
<button class="btn-blue" onclick="selectCat('math')">Math</button>
<button class="btn-blue" onclick="selectCat('english')">English</button>
<button class="btn-blue" onclick="selectCat('gk')">GK</button>
</div>

<div id="level" class="screen">
<button class="btn-pink" onclick="startGame('easy')">Easy</button>
<button id="medBtn" class="btn-pink lock" onclick="startGame('medium')">🔒 Medium</button>
<button id="hardBtn" class="btn-pink lock" onclick="startGame('hard')">🔒 Hard</button>
</div>

<div id="game" class="screen">

<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button class="btn-gray" onclick="prev()">⬅ Prev</button>
 <button class="btn-gray" onclick="next()">Next ➡</button>
</div>

<button class="btn-gray" onclick="home()">🏠 Home</button>

</div>

</div>

<script>

let cat,diff,i=0;
let unlocked={math:"easy",english:"easy",gk:"easy"};

let audioCtx;

/* SOUND */
function playSound(type){
 if(!audioCtx){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
 }
 let o=audioCtx.createOscillator();
 let g=audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);

 o.frequency.value = (type==="correct") ? 800 : 200;

 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
 o.stop(audioCtx.currentTime+0.4);
}

function speak(text){
 speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function startApp(){
 speak("Welcome to Kids Quiz Pro");
 show("category");
}

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function selectCat(c){
 cat=c;
 updateUI();
 show("level");
}

/* LOCK FIX */
function updateUI(){
 let med=document.getElementById("medBtn");
 let hard=document.getElementById("hardBtn");

 med.classList.add("lock");
 hard.classList.add("lock");

 med.innerText="🔒 Medium";
 hard.innerText="🔒 Hard";

 if(unlocked[cat]==="medium"){
  med.classList.remove("lock");
  med.innerText="Medium";
 }

 if(unlocked[cat]==="hard"){
  med.classList.remove("lock");
  hard.classList.remove("lock");
  med.innerText="Medium";
  hard.innerText="Hard";
 }
}

function startGame(d){
 if(d==="medium" && unlocked[cat]==="easy"){alert("Complete Easy first");return;}
 if(d==="hard" && unlocked[cat]!=="hard"){alert("Complete Medium first");return;}

 diff=d;
 i=0;
 show("game");
 load();
}

/* SHUFFLE + 4 OPTIONS */
function shuffle(q){
 let arr=q.o.map((text,index)=>({text,correct:index===q.a}));
 arr.sort(()=>Math.random()-0.5);
 let newA=arr.findIndex(x=>x.correct);
 return {q:q.q,o:arr.map(x=>x.text),a:newA};
}

/* DATA (4 OPTIONS FIXED) */
const data={
gk:{
 easy:[
  {q:"Which animal says meow?",o:["Dog","Cat","Cow","Lion"],a:1},
  {q:"How many days are there in a week?",o:["5","6","7","8"],a:2}
 ],
 medium:[
  {q:"Capital of India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0}
 ],
 hard:[
  {q:"Who invented bulb?",o:["Newton","Edison","Tesla","Einstein"],a:1}
 ]
},

math:{
 easy:[
  {q:"2+2=?",o:["3","4","5","6"],a:1}
 ],
 medium:[
  {q:"12+8=?",o:["18","20","22","24"],a:1}
 ],
 hard:[
  {q:"12x12=?",o:["144","124","154","134"],a:0}
 ]
},

english:{
 easy:[
  {q:"A is for?",o:["Apple","Ball","Cat","Dog"],a:0}
 ],
 medium:[
  {q:"Plural of book?",o:["Books","Book","Booked","Booking"],a:0}
 ],
 hard:[
  {q:"Opposite of happy?",o:["Sad","Joy","Fun","Smile"],a:0}
 ]
}
};

let current;

/* LOAD */
function load(){
 let q=data[cat][diff][i];
 current=shuffle(q);

 document.getElementById("q").innerText=current.q;

 let html="";
 current.o.forEach((op,idx)=>{
  html+=`<button class="btn-blue" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

/* CHECK */
function check(ans,btn){
 if(ans===current.a){
  btn.classList.add("correct");
  playSound("correct");
 }else{
  btn.classList.add("wrong");
  playSound("wrong");
 }

 setTimeout(()=>next(),600);
}

/* NAV */
function next(){
 if(i < data[cat][diff].length-1){
  i++; load();
 }else{
  if(diff==="easy") unlocked[cat]="medium";
  else if(diff==="medium") unlocked[cat]="hard";

  alert("Level Completed!");
  show("category");
 }
}

function prev(){
 if(i>0){i--;load();}
}

function home(){
 show("category");
}

</script>

</body>
</html>
