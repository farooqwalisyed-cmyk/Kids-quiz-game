<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: linear-gradient(135deg,#6a11cb,#2575fc,#ff6b6b);
 height:100vh;
}

.card{
 width:100%;
 height:100vh;
 background: rgba(0,0,0,0.35);
 color:white;
 padding:15px;
 box-sizing:border-box;
}

h2{text-align:center;color:#ffe600;}
h3{text-align:center;color:#00e5ff;}

button{
 padding:14px;
 margin:6px 0;
 border:none;
 border-radius:14px;
 font-size:18px;
 width:100%;
 font-weight:bold;
}

.btn{background:white;}

.c1{background:#ff6b6b;}
.c2{background:#4dabf7;}
.c3{background:#51cf66;}
.c4{background:#ffd43b;color:black;}

.opt{color:white;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.nav{display:flex;gap:10px;}
.nav button{flex:1;}

.screen{display:none;}
.active{display:block;}

#q{font-size:24px;margin:20px 0;text-align:center;}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<button id="soundBtn" class="btn">🔊 Sound: ON</button>

<div id="home" class="screen active">
 <button id="startBtn" class="btn">Start Game</button>
</div>

<div id="menu" class="screen">

<h3>Select Category</h3>
<button class="c1 cat" data-cat="math">Math</button>
<button class="c2 cat" data-cat="english">English</button>
<button class="c3 cat" data-cat="gk">GK</button>

<h3>Select Difficulty</h3>
<button class="c1 diff" data-diff="easy">Easy</button>
<button class="c2 diff" data-diff="medium">Medium</button>
<button class="c3 diff" data-diff="hard">Hard</button>

<button id="playBtn" class="btn">▶ Play Quiz</button>

</div>

<div id="game" class="screen">

<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button id="prevBtn" class="btn">⬅ Prev</button>
 <button id="nextBtn" class="btn">Next ➡</button>
</div>

<button id="restartBtn" class="btn">🔄 Restart</button>
<button id="homeBtn" class="btn">🏠 Home</button>

</div>

</div>

<script>

/* WAIT UNTIL PAGE LOADS */
window.onload = function(){

let cat=null;
let diff=null;
let i=0;
let sound=true;

/* AUDIO */
let audioCtx;

function unlockAudio(){
 if(!audioCtx){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
 }
 audioCtx.resume();
}

function playSound(type){
 if(!sound || !audioCtx) return;

 let o = audioCtx.createOscillator();
 let g = audioCtx.createGain();

 o.connect(g);
 g.connect(audioCtx.destination);

 if(type==="welcome") o.frequency.value=600;
 if(type==="correct") o.frequency.value=900;
 if(type==="wrong") o.frequency.value=180;

 g.gain.value=0.2;

 o.start();
 setTimeout(()=>o.stop(),200);
}

/* DATA */
const data={
 math:{easy:[{q:"2+2=?",o:["3","4","5"],a:1}]},
 english:{easy:[{q:"A for?",o:["Apple","Ball","Cat"],a:0}]},
 gk:{easy:[{q:"Days in week?",o:["5","6","7"],a:2}]}
};

/* SCREEN */
function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* BUTTONS */
document.getElementById("startBtn").onclick = function(){
 alert("Button Click Working ✅"); // DEBUG
 unlockAudio();
 show("menu");
};

document.querySelectorAll(".cat").forEach(btn=>{
 btn.onclick=()=>cat=btn.dataset.cat;
});

document.querySelectorAll(".diff").forEach(btn=>{
 btn.onclick=()=>diff=btn.dataset.diff;
});

document.getElementById("playBtn").onclick = function(){

 if(!cat || !diff){
  alert("Select category + difficulty");
  return;
 }

 i=0;
 show("game");
 load();
};

/* LOAD */
function load(){
 let q=data[cat][diff][i];
 document.getElementById("q").innerText=q.q;

 let html="";
 q.o.forEach((op,idx)=>{
  html+=`<button class="opt" onclick="check(${idx},this)">${op}</button>`;
 });
 document.getElementById("opts").innerHTML=html;
}

window.check=function(ans,btn){
 let q=data[cat][diff][i];

 if(ans===q.a){
  playSound("correct");
  btn.classList.add("correct");
 }else{
  playSound("wrong");
  btn.classList.add("wrong");
 }
};

};

</script>

</body>
</html>
