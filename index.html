<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6a11cb,#2575fc);
overflow:hidden;
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
position:relative;
z-index:2;
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

/* BUTTONS + GLOW */
.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
transform:scale(1.03);
box-shadow:0 0 12px rgba(255,255,255,0.6);
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.hidden{display:none;}

.shake{animation:shake 0.3s;}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

.pop{animation:pop 0.3s;}
@keyframes pop{
0%{transform:scale(0.6)}
100%{transform:scale(1)}
}

/* CONFETTI CANVAS */
#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:999;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">Tap to Play</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p1" onclick="goHome()">⬅ Back</button>
</div>

<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium 🔒</button>
<button class="btn p3" onclick="selectLevel(2)">Hard 🔒</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* ===== DATA ===== */
const data={
math:[
[
{q:"2+2=?",o:["3","4","5","6"],a:1}
],
[
{q:"25×2=?",o:["40","50","60","70"],a:1}
],
[
{q:"144÷12=?",o:["10","11","12","13"],a:2}
]
],
english:[
[
{q:"A is for?",o:["Apple","Ball","Cat","Dog"],a:0}
]
],
gk:[
[
{q:"Capital of India?",o:["Delhi","Mumbai","Kolkata","Chennai"],a:0}
]
]
};

let cat="",level=0,i=0;
let stars=0,coins=0;
let timer,time=10;

/* ===== SOUND SYSTEM ===== */
function sound(type){
try{
let audio=new Audio();

if(type==="correct"){
audio.src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg";
playConfetti();
}else if(type==="wrong"){
audio.src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg";
}

audio.play();
}catch(e){
beep(type);
}
}

/* fallback beep */
function beep(type){
try{
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.connect(ctx.destination);
o.frequency.value = type==="correct"?800:200;
o.start();
setTimeout(()=>o.stop(),120);
}catch(e){}
}

/* ===== CONFETTI ===== */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];

function playConfetti(){
for(let i=0;i<80;i++){
pieces.push({
x:Math.random()*canvas.width,
y:0,
r:Math.random()*6+2,
d:Math.random()*80,
color:`hsl(${Math.random()*360},100%,50%)`
});
}
}

function drawConfetti(){
ctx.clearRect(0,0,canvas.width,canvas.height);
pieces.forEach(p=>{
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=2+p.d/50;
});
pieces=pieces.filter(p=>p.y<canvas.height);
requestAnimationFrame(drawConfetti);
}
drawConfetti();

/* ===== VOICE ===== */
function speak(text){
try{
speechSynthesis.cancel();
let msg=new SpeechSynthesisUtterance(text);
msg.rate=0.9;
msg.pitch=1;
speechSynthesis.speak(msg);
}catch(e){}
}

/* ===== GAME FLOW ===== */
function startApp(){
show("catScreen");
}

function show(s){
startScreen.classList.add("hidden");
catScreen.classList.add("hidden");
levelScreen.classList.add("hidden");
gameScreen.classList.add("hidden");
document.getElementById(s).classList.remove("hidden");
}

function selectCat(c){
cat=c;
show("levelScreen");
}

function selectLevel(l){
level=l;
i=0;
show("gameScreen");
load();
}

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);

let html="";
q.o.forEach((op,idx)=>{
html+=`<button class="btn p1" onclick="check(${idx},this)">${op}</button>`;
});
document.getElementById("opts").innerHTML=html;

startTimer();
}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

/* ===== CHECK ANSWER ===== */
function check(ans,btn){
clearInterval(timer);
let q=data[cat][level][i];

if(ans===q.a){
btn.classList.add("correct","pop");
stars++; coins+=10;
sound("correct");
}else{
btn.classList.add("wrong","shake");
sound("wrong");
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

setTimeout(nextQ,800);
}

/* ===== NAV ===== */
function nextQ(){
if(i < data[cat][level].length-1){
i++;
load();
}else{
show("catScreen");
}
}

function prevQ(){
if(i>0){
i--;
load();
}
}

function goHome(){
show("catScreen");
}

</script>

</body>
</html>
