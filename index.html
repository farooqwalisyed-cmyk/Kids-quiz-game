<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: linear-gradient(135deg,#6a11cb,#2575fc,#ff6b6b);
 height:100vh;
}

/* FULL SCREEN BIG UI */
.card{
 width:100%;
 height:100vh;
 background: rgba(0,0,0,0.4);
 color:white;
 padding:20px;
 box-sizing:border-box;
}

/* TEXT */
h2{
 text-align:center;
 color:#ffe600;
 font-size:32px;
}
h3{
 text-align:center;
 color:#00e5ff;
 font-size:26px;
}

/* BUTTONS */
button{
 padding:18px;
 margin:10px 0;
 border:none;
 border-radius:16px;
 font-size:20px;
 width:100%;
 font-weight:bold;
}

/* CATEGORY COLORS */
.c1{background:#ff6b6b;}
.c2{background:#4dabf7;}
.c3{background:#51cf66;}

/* OPTIONS COLORS */
.opt1{background:#ff6b6b;color:white;}
.opt2{background:#4dabf7;color:white;}
.opt3{background:#51cf66;color:white;}
.opt4{background:#ffd43b;color:black;}

/* RESULT */
.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

/* NAV */
.nav{
 display:flex;
 gap:10px;
}
.nav button{
 flex:1;
}

/* SCREENS */
.screen{display:none;}
.active{display:block;}

/* QUESTION BIG */
#q{
 font-size:28px;
 margin:25px 0;
 text-align:center;
}

</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<!-- HOME -->
<div id="home" class="screen active">
 <button onclick="showCategory()">Start Game</button>
</div>

<!-- CATEGORY -->
<div id="category" class="screen">
<h3>Select Category</h3>
<button class="c1" onclick="selectCat('math')">Math</button>
<button class="c2" onclick="selectCat('english')">English</button>
<button class="c3" onclick="selectCat('gk')">GK</button>
</div>

<!-- LEVEL -->
<div id="level" class="screen">
<h3>Select Difficulty</h3>
<button class="c1" onclick="startGame('easy')">Easy</button>
<button class="c2" onclick="startGame('medium')">Medium</button>
<button class="c3" onclick="startGame('hard')">Hard</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button onclick="prev()">⬅ Prev</button>
 <button onclick="next()">Next ➡</button>
</div>

<button onclick="restart()">🔄 Restart</button>
<button onclick="home()">🏠 Home</button>

</div>

</div>

<script>

/* STATE */
let cat=null;
let diff=null;
let i=0;

/* AUDIO SYSTEM */
let audioCtx;

function unlockAudio(){
 if(!audioCtx){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
 }
 audioCtx.resume();
}

function playSound(type){
 if(!audioCtx) return;

 let o = audioCtx.createOscillator();
 let g = audioCtx.createGain();

 o.connect(g);
 g.connect(audioCtx.destination);

 if(type==="correct") o.frequency.value=900;
 if(type==="wrong") o.frequency.value=200;

 g.gain.value=0.2;

 o.start();
 setTimeout(()=>o.stop(),200);
}

/* DATA */
const data={
 math:{
  easy:[
   {q:"2+2=?",o:["3","4","5","6"],a:1},
   {q:"3+1=?",o:["4","5","6","7"],a:0}
  ],
  medium:[
   {q:"10+5=?",o:["15","12","14","11"],a:0}
  ],
  hard:[
   {q:"12x12=?",o:["144","124","154","134"],a:0}
  ]
 },
 english:{
  easy:[
   {q:"A for?",o:["Apple","Ball","Cat","Dog"],a:0}
  ],
  medium:[
   {q:"Plural of book?",o:["Books","Booked","Bookies","Book"],a:0}
  ],
  hard:[
   {q:"Opposite happy?",o:["Sad","Joy","Glad","Fun"],a:0}
  ]
 },
 gk:{
  easy:[
   {q:"Days in week?",o:["5","6","7","8"],a:2}
  ],
  medium:[
   {q:"Capital India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0}
  ],
  hard:[
   {q:"Largest ocean?",o:["Pacific","Atlantic","Arctic","Indian"],a:0}
  ]
 }
};

/* SCREEN */
function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* FLOW */
function showCategory(){
 unlockAudio();
 show("category");
}

function selectCat(c){
 cat=c;
 show("level");
}

function startGame(d){
 diff=d;
 i=0;
 show("game");
 load();
}

/* LOAD */
function load(){
 let q=data[cat][diff][i];

 document.getElementById("q").innerText=q.q;

 let colors=["opt1","opt2","opt3","opt4"];
 let html="";

 q.o.forEach((op,idx)=>{
  html+=`<button class="${colors[idx]}" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

/* ANSWER */
function check(ans,btn){

 let q=data[cat][diff][i];

 document.querySelectorAll("#opts button").forEach(b=>b.disabled=true);

 if(ans===q.a){
  playSound("correct");
  btn.classList.add("correct");
 }else{
  playSound("wrong");
  btn.classList.add("wrong");
 }

 setTimeout(()=>{
  next();
 },800);
}

/* NAV */
function next(){
 if(i < data[cat][diff].length-1){
  i++;
  load();
 }else{
  alert("🎉 Level Completed!");
  home();
 }
}

function prev(){
 if(i>0){
  i--;
  load();
 }
}

/* RESET */
function restart(){
 i=0;
 load();
}

function home(){
 show("home");
}

</script>

</body>
</html>
