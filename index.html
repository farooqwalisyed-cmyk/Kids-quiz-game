<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game{
  width:95%;
  max-width:520px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
}

.btn{
  padding:12px;
  margin:6px;
  width:90%;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

.category-btn{background:#2575fc;color:white;}
.level-btn{background:#6a11cb;color:white;}
.answer-btn{background:#eee;}

.hidden{display:none;}

.nav{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.nav button{
  width:32%;
  background:#333;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
}

.correct{background:#4CAF50 !important;color:white;}
.wrong{background:#f44336 !important;color:white;}

#emoji{font-size:40px;margin:10px 0;}

.confetti{
position:fixed;
width:10px;height:10px;
animation:fall 1s linear forwards;
}
@keyframes fall{
to{transform:translateY(500px) rotate(360deg);opacity:0;}
}
</style>
</head>

<body>

<div class="game">

<div class="top">
<div>⭐ <span id="stars">0</span></div>
<div>💰 <span id="coins">0</span></div>
</div>

<h2>Kids Quiz PRO MAX 🎮</h2>

<button onclick="toggleSound()" id="soundBtn">🔊 Sound</button>

<div id="emoji">🙂</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<!-- CATEGORY -->
<div id="screen1">
<h3>Select Category</h3>
<button class="btn category-btn" onclick="selectCategory('gk')">GK</button>
<button class="btn category-btn" onclick="selectCategory('english')">English</button>
<button class="btn category-btn" onclick="selectCategory('math')">Math</button>
</div>

<!-- LEVEL -->
<div id="screen2" class="hidden">
<h3>Select Level</h3>
<button id="easyBtn" class="btn level-btn" onclick="startGame('easy')">Easy</button>
<button id="mediumBtn" class="btn level-btn" onclick="startGame('medium')">🔒 Medium</button>
<button id="hardBtn" class="btn level-btn" onclick="startGame('hard')">🔒 Hard</button>
<button class="btn" onclick="backToCategory()">⬅ Back</button>
</div>

<!-- QUIZ -->
<div id="screen3" class="hidden">
<h3 id="question"></h3>
<div id="answers"></div>

<div class="nav">
<button onclick="prevQ()">⬅</button>
<button onclick="backToLevels()">🔙</button>
<button onclick="home()">🏠</button>
</div>
</div>

</div>

<script>

// STATE
let category="", level="", index=0;
let stars=0, coins=0;
let shuffledList=[];
let soundOn=true;
let musicStarted=false;

let unlockedLevels={
gk:{easy:true,medium:false,hard:false},
english:{easy:true,medium:false,hard:false},
math:{easy:true,medium:false,hard:false}
};

// QUESTIONS (short sample)
const questions={
gk:{easy:[{q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:0}],
medium:[{q:"Largest ocean?",a:["Atlantic","Indian","Pacific","Arctic"],c:2}],
hard:[{q:"Smallest country?",a:["Vatican","India","USA","UK"],c:0}]},
english:{easy:[{q:"A for?",a:["Apple","Ball","Cat","Dog"],c:0}],
medium:[{q:"Plural of child?",a:["Children","Childs","Childes","Childer"],c:0}],
hard:[{q:"Synonym of happy?",a:["Joyful","Sad","Angry","Tired"],c:0}]},
math:{easy:[{q:"2+2?",a:["3","4","5","6"],c:1}],
medium:[{q:"10×2?",a:["20","15","25","30"],c:0}],
hard:[{q:"100÷4?",a:["20","25","30","40"],c:1}]}
};

// SOUND
let audioCtx=new (window.AudioContext||window.webkitAudioContext)();

function startMusic(){
if(musicStarted) return;

if(audioCtx.state==="suspended") audioCtx.resume();

bgMusic.volume=0.5;
bgMusic.play().then(()=>{
musicStarted=true;
speak("Welcome to Kids Quiz");
});
}

document.body.addEventListener("click",startMusic);

function toggleSound(){
soundOn=!soundOn;
soundBtn.innerText=soundOn?"🔊 Sound":"🔇 Mute";
if(!soundOn) bgMusic.pause(); else if(musicStarted) bgMusic.play();
}

function beep(f,t=0.15){
if(!soundOn) return;
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.frequency.value=f;
o.connect(g); g.connect(audioCtx.destination);
o.start(); o.stop(audioCtx.currentTime+t);
}

function correctSound(){beep(800);setTimeout(()=>beep(1000),150);}
function wrongSound(){beep(200);}

function speak(t){
if(!soundOn) return;
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

// CONFETTI
function confetti(){
for(let i=0;i<15;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),1000);
}
}

// GAME
function selectCategory(c){
category=c;
screen1.classList.add("hidden");
screen2.classList.remove("hidden");
updateLevelButtons();
}

function updateLevelButtons(){
let c=unlockedLevels[category];
mediumBtn.disabled=!c.medium;
hardBtn.disabled=!c.hard;
mediumBtn.innerText=c.medium?"Medium":"🔒 Medium";
hardBtn.innerText=c.hard?"Hard":"🔒 Hard";
}

function startGame(l){
if(!unlockedLevels[category][l]) return;
level=l;
index=0;
shuffledList=questions[category][level].sort(()=>Math.random()-0.5);
screen2.classList.add("hidden");
screen3.classList.remove("hidden");
loadQ();
}

function loadQ(){
let q=shuffledList[index];
if(!q){unlockNext();home();return;}

question.innerText=q.q;
answers.innerHTML="";

q.a.forEach((a,i)=>{
let b=document.createElement("button");
b.className="btn answer-btn";
b.innerText=a;
b.onclick=()=>checkAnswer(i,q.c,b);
answers.appendChild(b);
});
}

function checkAnswer(sel,correct,btn){
let buttons=document.querySelectorAll(".answer-btn");

if(sel===correct){
btn.classList.add("correct");
stars++; coins+=5;
correctSound();
confetti();
speak("Correct answer");
}else{
btn.classList.add("wrong");
wrongSound();
speak("Wrong answer");
}

starsEl.innerText=stars;
coinsEl.innerText=coins;
buttons.forEach(b=>b.disabled=true);

setTimeout(nextQ,800);
}

function nextQ(){index++;loadQ();}
function prevQ(){if(index>0){index--;loadQ();}}

function unlockNext(){
if(level==="easy") unlockedLevels[category].medium=true;
if(level==="medium") unlockedLevels[category].hard=true;
}

function backToCategory(){
screen2.classList.add("hidden");
screen1.classList.remove("hidden");
}

function backToLevels(){
screen3.classList.add("hidden");
screen2.classList.remove("hidden");
}

function home(){
screen3.classList.add("hidden");
screen1.classList.remove("hidden");
}

// ELEMENTS
let starsEl=document.getElementById("stars");
let coinsEl=document.getElementById("coins");
let question=document.getElementById("question");
let answers=document.getElementById("answers");
let screen1=document.getElementById("screen1");
let screen2=document.getElementById("screen2");
let screen3=document.getElementById("screen3");
let mediumBtn=document.getElementById("mediumBtn");
let hardBtn=document.getElementById("hardBtn");
let soundBtn=document.getElementById("soundBtn");
let bgMusic=document.getElementById("bgMusic");

</script>

</body>
</html>
