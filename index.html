<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
}

/* FULL SCREEN MOBILE FIX */
.card{
 width:100%;
 height:100%;
 max-width:600px;
 padding:20px;
 box-sizing:border-box;
 background: rgba(0,0,0,0.4);
 color:white;
 display:flex;
 flex-direction:column;
 justify-content:center;
}

h2{
 font-size:32px;
 text-align:center;
 color:#ffe600;
}

h3{
 text-align:center;
 color:#00e5ff;
 font-size:22px;
}

button{
 padding:16px;
 margin:6px 0;
 border:none;
 border-radius:14px;
 font-size:18px;
 cursor:pointer;
 width:100%;
}

.btn{
 background:white;
 font-weight:bold;
}

.opt{
 color:white;
 font-weight:bold;
}

.c1{background:#ff6b6b;}
.c2{background:#4dabf7;}
.c3{background:#51cf66;}
.c4{background:#ffd43b; color:black;}

.nav{
 display:flex;
 gap:8px;
}

.nav button{
 flex:1;
}

/* ANIMATIONS */
.correct{animation:pop 0.4s ease; background:#2ecc71 !important;}
.wrong{animation:shake 0.4s ease; background:#e74c3c !important;}

@keyframes pop{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<button class="btn" onclick="toggleSound()">🔊 Sound: <span id="s">ON</span></button>

<div id="home">
 <button class="btn" onclick="startGame()">Start Game</button>
</div>

<div id="setup" style="display:none">

<h3>Select Category</h3>
<button class="c1" onclick="setCat('math')">Math</button>
<button class="c2" onclick="setCat('english')">English</button>
<button class="c3" onclick="setCat('gk')">GK</button>

<h3>Select Difficulty</h3>
<button class="c1" onclick="setDiff('easy')">Easy</button>
<button class="c2" onclick="setDiff('medium')">Medium</button>
<button class="c3" onclick="setDiff('hard')">Hard</button>

</div>

<div id="game" style="display:none">

<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button class="btn" onclick="prev()">⬅ Prev</button>
 <button class="btn" onclick="next()">Next ➡</button>
</div>

<button class="btn" onclick="restart()">🔄 Restart</button>
<button class="btn" onclick="home()">🏠 Home</button>

</div>

</div>

<script>

/* ---------------- AUDIO ENGINE (FIXED) ---------------- */

let audioCtx=null;
let unlocked=false;
let sound=true;

function unlockAudio(){
 if(unlocked) return;
 audioCtx = new (window.AudioContext || window.webkitAudioContext)();
 audioCtx.resume();
 unlocked=true;
}

/* GUARANTEED SOUND */
function playSound(type){
 if(!sound || !unlocked) return;

 const o = audioCtx.createOscillator();
 const g = audioCtx.createGain();

 o.connect(g);
 g.connect(audioCtx.destination);

 if(type==="welcome") o.frequency.value=600;
 if(type==="correct") o.frequency.value=900;
 if(type==="wrong") o.frequency.value=160;

 o.start();
 g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.35);
 o.stop(audioCtx.currentTime + 0.35);
}

/* ---------------- GAME DATA ---------------- */

let cat=null;
let diff=null;
let i=0;

const data={
 math:{
  easy:[
   {q:"2 + 2 = ?", o:["3","4","5"], a:1},
   {q:"5 + 5 = ?", o:["10","11","9"], a:0}
  ],
  medium:[
   {q:"12 + 8 = ?", o:["18","20","22"], a:1}
  ],
  hard:[
   {q:"12 x 12 = ?", o:["144","124","154"], a:0}
  ]
 },
 english:{
  easy:[
   {q:"A for ?", o:["Apple","Ball","Cat"], a:0}
  ],
  medium:[
   {q:"Plural of Book?", o:["Books","Bookies","Booked"], a:0}
  ],
  hard:[
   {q:"Opposite Happy?", o:["Sad","Joy","Glad"], a:0}
  ]
 },
 gk:{
  easy:[
   {q:"Days in week?", o:["5","6","7"], a:2}
  ],
  medium:[
   {q:"Capital India?", o:["Delhi","Mumbai","Chennai"], a:0}
  ],
  hard:[
   {q:"Largest ocean?", o:["Atlantic","Pacific","Arctic"], a:1}
  ]
};

/* ---------------- START ---------------- */

function startGame(){
 unlockAudio(); // MUST FIRST TOUCH
 document.getElementById("home").style.display="none";
 document.getElementById("setup").style.display="block";

 setTimeout(()=>playSound("welcome"),200);
}

function setCat(c){ cat=c; tryStart(); }
function setDiff(d){ diff=d; tryStart(); }

function tryStart(){
 if(cat && diff){
  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="block";
  i=0;
  load();
 }
}

/* ---------------- LOAD ---------------- */

function load(){

 let q=data[cat][diff][i];

 if(!q){
  alert("🎉 Level Completed!");
  restart();
  return;
 }

 document.getElementById("q").innerText=q.q;

 let colors=["c1","c2","c3","c4"];
 let html="";

 q.o.forEach((op,idx)=>{
  html+=`<button class="opt ${colors[idx%4]}" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

/* ---------------- ANSWER ---------------- */

function check(ans,btn){

 let q=data[cat][diff][i];

 if(ans===q.a){
  playSound("correct");
  btn.classList.add("correct");
 } else {
  playSound("wrong");
  btn.classList.add("wrong");
 }
}

/* ---------------- NAVIGATION FIXED ---------------- */

function next(){
 if(i < data[cat][diff].length-1){
  i++;
  load();
 }
}

function prev(){
 if(i > 0){
  i--;
  load();
 }
}

/* ---------------- RESET ---------------- */

function restart(){
 i=0;
 load();
}

function home(){
 location.reload();
}

/* ---------------- SOUND TOGGLE ---------------- */

function toggleSound(){
 sound=!sound;
 document.getElementById("s").innerText=sound?"ON":"OFF";
}

</script>

</body>
</html>
