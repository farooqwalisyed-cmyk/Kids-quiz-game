<!DOCTYPE html>
<html>
<head>
<title>Kids Quiz Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

.card,.quizBox{
  background:white;
  color:black;
  width:85%;
  max-width:420px;
  margin:70px auto;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:#2575fc;
  color:white;
  font-weight:bold;
}

button:active{
  transform:scale(0.97);
}
</style>
</head>

<body>

<div id="app"></div>

<script>

let app = document.getElementById("app");

let player = "";
let level = 0;
let coins = 0;

/* QUESTIONS */
let questions = [
{q:"2+2=?",options:["3","4","5","6"],answer:1},
{q:"Capital of India?",options:["Delhi","Mumbai","Kolkata","Chennai"],answer:0},
{q:"5×5=?",options:["20","25","30","15"],answer:1},
{q:"Capital of UK?",options:["London","Paris","Berlin","Rome"],answer:0},
{q:"10+10=?",options:["10","15","20","25"],answer:2}
];

function renderStart(){
app.innerHTML=`
<div class="card">
<h2>🎮 Kids Quiz Pro</h2>
<input id="name" placeholder="Enter name">
<button onclick="startGame()">Start</button>
</div>
`;
}

function startGame(){
player=document.getElementById("name").value;

if(!player){
alert("Enter name");
return;
}

level=0;
coins=0;
loadLevel();
}

function loadLevel(){
let q=questions[level];

app.innerHTML=`
<div class="quizBox">
<h3>${player} 💰 Coins: ${coins}</h3>
<h2>Level ${level+1}/${questions.length}</h2>

<h3>${q.q}</h3>

${q.options.map((o,i)=>`
<button onclick="answer(${i})">${o}</button>
`).join("")}

<button onclick="prevQuestion()">⬅ Previous</button>
<button onclick="renderStart()">🏠 Home</button>
</div>
`;
}

function answer(i){
if(i === questions[level].answer){
coins += 10;
alert("🎉 Correct +10 coins");
}else{
alert("❌ Wrong");
}

setTimeout(()=>{
level++;

if(level >= questions.length){
alert("Game Over! Coins: " + coins);
renderStart();
return;
}

loadLevel();
},500);
}

function prevQuestion(){
if(level > 0){
level--;
loadLevel();
}else{
alert("This is first question");
}
}

renderStart();

</script>

</body>
</html>
