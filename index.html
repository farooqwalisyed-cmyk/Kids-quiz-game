<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.game{
  width:95%;
  max-width:520px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
}

h1{margin:10px 0;}

.btn{
  padding:12px;
  margin:6px;
  width:90%;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

.btn:active{
  transform:scale(0.95);
}

.category-btn{background:#2575fc;color:white;}
.level-btn{background:#6a11cb;color:white;}
.answer-btn{background:#eee;}

.top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.nav{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.nav button{
  width:32%;
  background:#333;
  color:white;
}

.hidden{display:none;}

.correct{background:#4CAF50 !important;color:white;}
.wrong{background:#f44336 !important;color:white;}

.pop{animation:pop 0.3s ease;}

@keyframes pop{
  0%{transform:scale(1);}
  50%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

#emoji{
  font-size:40px;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="game">

<div class="top">
<div>⭐ Stars: <span id="stars">0</span></div>
<div>💰 Coins: <span id="coins">0</span></div>
</div>

<h1>Kids Quiz PRO 🎮</h1>

<div id="progress">Question: 1</div>

<div id="emoji">🙂</div>

<!-- CATEGORY -->
<div id="screen1">
  <h3>Select Category</h3>
  <button class="btn category-btn" onclick="selectCategory('gk')">General Knowledge</button>
  <button class="btn category-btn" onclick="selectCategory('english')">English</button>
  <button class="btn category-btn" onclick="selectCategory('math')">Math</button>
</div>

<!-- LEVEL -->
<div id="screen2" class="hidden">
  <h3>Select Level</h3>
  <button class="btn level-btn" onclick="startGame('easy')">Easy</button>
  <button class="btn level-btn" onclick="startGame('medium')">Medium</button>
  <button class="btn level-btn" onclick="startGame('hard')">Hard</button>
</div>

<!-- QUIZ -->
<div id="screen3" class="hidden">
  <h3 id="question"></h3>
  <div id="answers"></div>

  <div class="nav">
    <button onclick="prevQ()">⬅ Prev</button>
    <button onclick="home()">🏠 Home</button>
    <button onclick="nextQ()">Next ➡</button>
  </div>
</div>

</div>

<script>

let category="", level="", index=0;
let stars=0, coins=0;
let streak=0;

// ================= QUESTIONS =================
const questions={
gk:{
easy:[
{q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:0},
{q:"Sun rises in?",a:["West","East","North","South"],c:1},
{q:"How many days in a week?",a:["5","6","7","8"],c:2},
{q:"Largest planet?",a:["Earth","Mars","Jupiter","Venus"],c:2},
{q:"National animal of India?",a:["Lion","Tiger","Elephant","Leopard"],c:1}
]
},
english:{
easy:[
{q:"A for?",a:["Apple","Ball","Cat","Dog"],c:0},
{q:"B for?",a:["Ball","Apple","Cat","Dog"],c:0},
{q:"C for?",a:["Cat","Dog","Elephant","Fish"],c:0}
]
},
math:{
easy:[
{q:"2 + 2 = ?",a:["3","4","5","6"],c:1},
{q:"5 - 2 = ?",a:["2","3","4","5"],c:1},
{q:"1 + 1 = ?",a:["1","2","3","4"],c:1}
]
}
};

// ================= SOUND (FIXED RELIABLE METHOD) =================
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, time=0.15){
let o = audioCtx.createOscillator();
let g = audioCtx.createGain();

o.frequency.value = freq;
o.type = "sine";

o.connect(g);
g.connect(audioCtx.destination);

o.start();
o.stop(audioCtx.currentTime + time);
}

// ================= UI =================

function setEmoji(type){
document.getElementById("emoji").innerText =
type==="good" ? "🎉😄" :
type==="bad" ? "😢" : "🙂";
}

// ================= GAME =================

function selectCategory(c){
category=c;
document.getElementById("screen1").classList.add("hidden");
document.getElementById("screen2").classList.remove("hidden");
beep(300);
}

function startGame(l){
level=l;
index=0;
streak=0;
document.getElementById("screen2").classList.add("hidden");
document.getElementById("screen3").classList.remove("hidden");
loadQ();
beep(400);
}

function loadQ(){
let q = questions[category][level][index];

document.getElementById("question").innerText=q.q;
document.getElementById("progress").innerText =
"Question: " + (index+1);

setEmoji("neutral");

let ansDiv=document.getElementById("answers");
ansDiv.innerHTML="";

q.a.forEach((a,i)=>{
let btn=document.createElement("button");
btn.className="btn answer-btn";
btn.innerText=a;
btn.onclick=()=>checkAnswer(i,q.c,btn);
ansDiv.appendChild(btn);
});
}

// ================= ANSWER =================

function checkAnswer(sel,correct,btn){
let buttons=document.querySelectorAll(".answer-btn");

if(sel===correct){
btn.classList.add("correct");
stars++;
coins+=5;
streak++;

setEmoji("good");
beep(800);

// 🔥 streak bonus
if(streak % 3 === 0){
coins+=10;
beep(1000,0.2);
}
}else{
btn.classList.add("wrong");
streak=0;
setEmoji("bad");
beep(200);
}

document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;

buttons.forEach(b=>b.disabled=true);

// AUTO NEXT
setTimeout(()=>nextQ(),1000);
}

// ================= NAV =================

function nextQ(){
if(index < questions[category][level].length-1){
index++;
loadQ();
}else{
home();
}
}

function prevQ(){
if(index>0){
index--;
loadQ();
}
}

function home(){
document.getElementById("screen3").classList.add("hidden");
document.getElementById("screen1").classList.remove("hidden");
beep(300);
}

</script>

</body>
</html>
