.p3{background:#74b9ff;}
.p4{background:#ff7675;color:white;}
.hidden{display:none;}
.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

}}
function playSound(src){new Audio(src).play().catch(()=>{});}

/* VOICE */
function speak(text){
speechSynthesis.cancel();
text=text.replace(/__+/g," dash ");
let msg=new SpeechSynthesisUtterance(text);
msg.rate=0.9;
speechSynthesis.speak(msg);
}

/* KEEP REST SAME (your logic unchanged) */

let unlock={math:0,english:0,gk:0};
let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);

let options=q.o.map((t,idx)=>({t,ok:idx===q.a})).sort(()=>Math.random()-0.5);

document.getElementById("opts").innerHTML=
options.map(op=>`<button class="btn p1" onclick="check(this,${op.ok})">${op.t}</button>`).join("");

startTimer();
}

function check(btn,ok){
clearInterval(timer);
if(ok){stars++;coins+=10;playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");blastConfetti();}
else{playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");}
document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;
setTimeout(nextQ,800);
}

function nextQ(){if(i<data[cat][level].length-1){i++;load();}else{goHome();}}
function prevQ(){if(i>0){i--;stars=Math.max(0,stars-1);coins=Math.max(0,coins-10);load();}}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;
timer=setInterval(()=>{time--;document.getElementById("time").innerText=time;if(time<=0) nextQ();},1000);
}

function goHome(){i=0;clearInterval(timer);show("catScreen");}
function startApp(){unlockAudio();playSound("https://actions.google.com/sounds/v1/cartoon/pop.ogg");show("catScreen");}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){
cat=c;
document.getElementById("medBtn").innerText=unlock[cat]>=1?"Medium":"Medium 🔒";
document.getElementById("hardBtn").innerText=unlock[cat]>=2?"Hard":"Hard 🔒";
show("levelScreen");
}

function selectLevel(l){
if(l===1 && unlock[cat]<1){alert("Complete Easy");return;}
if(l===2 && unlock[cat]<2){alert("Complete Medium");return;}
level=l;i=0;show("gameScreen");load();
}

/* CONFETTI */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
let confetti=[];
function blastConfetti(){
for(let i=0;i<80;i++){
confetti.push({x:Math.random()*canvas.width,y:0,r:Math.random()*6,vx:(Math.random()-0.5)*2,vy:3,color:`hsl(${Math.random()*360},100%,50%)`});
}}
function drawConfetti(){
ctx.clearRect(0,0,canvas.width,canvas.height);
confetti.forEach(p=>{
ctx.fillStyle=p.color;
ctx.fillRect(p.x,p.y,p.r,p.r);
p.x+=p.vx;
p.y+=p.vy;
});
confetti=confetti.filter(p=>p.y<canvas.height);
requestAnimationFrame(drawConfetti);
}
drawConfetti();
