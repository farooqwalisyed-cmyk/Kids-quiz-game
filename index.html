<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

.screen{
  display:none;
  padding:20px;
}

.card{
  background:white;
  color:black;
  margin:20px auto;
  padding:20px;
  border-radius:20px;
  max-width:500px;
}

button{
  padding:12px;
  margin:10px;
  width:80%;
  border:none;
  border-radius:12px;
  font-size:16px;
}

.option{background:#eee;}
.correct{background:#2ecc71 !important;color:white;}
.wrong{background:#e74c3c !important;color:white;}

.topbar{
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,0.4);
  padding:10px;
}

.progress{
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}
.bar{
  height:10px;
  width:0%;
  background:#2ecc71;
}

.nav{
  display:flex;
  justify-content:space-around;
}
.nav button{
  width:45%;
  background:#333;
  color:white;
}
</style>
</head>

<body>

<!-- NAME SCREEN -->
<div id="nameScreen" class="screen" style="display:block;">
  <div class="card">
    <h2>👋 Enter Your Name</h2>
    <input id="nameInput" placeholder="Your name"
    style="padding:10px;width:80%;border-radius:10px;">
    <br>
    <button onclick="goMenu()">Start</button>
  </div>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen">
  <div class="card">
    <h2>Welcome <span id="playerName"></span> 🎮</h2>
    <h3>Select Category</h3>
    <button onclick="startGame('gk')">🌍 GK</button>
    <button onclick="startGame('math')">➕ Math</button>
    <button onclick="startGame('english')">🔤 English</button>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

  <div class="topbar">
    <div>⭐ <span id="stars">0</span></div>
    <div>🪙 <span id="coins">0</span></div>
    <div>📘 Level <span id="level">1</span></div>
  </div>

  <div class="card">

    <p id="levelText"></p>

    <div class="progress">
      <div id="bar" class="bar"></div>
    </div>

    <h3 id="question"></h3>
    <div id="options"></div>

    <div class="nav">
      <button onclick="goHome()">🏠 Home</button>
      <button onclick="nextQ()">➡ Next</button>
    </div>

  </div>
</div>

<script>

let player="",cat="",level=1,index=0;
let used=[],coins=0,stars=0,currentQ=null;

let data={
  gk:[
    {q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:"Delhi"},
    {q:"National Animal?",a:["Tiger","Lion","Dog","Elephant"],c:"Tiger"},
    {q:"Sun rises in?",a:["East","West","North","South"],c:"East"},
    {q:"Largest planet?",a:["Jupiter","Mars","Earth","Venus"],c:"Jupiter"},
    {q:"Water freezes at?",a:["0°C","10°C","100°C","50°C"],c:"0°C"}
  ],
  math:[
    {q:"2 + 2 = ?",a:["3","4","5","6"],c:"4"},
    {q:"5 + 3 = ?",a:["6","7","8","9"],c:"8"},
    {q:"10 - 6 = ?",a:["3","4","5","6"],c:"4"},
    {q:"4 × 2 = ?",a:["6","7","8","9"],c:"8"}
  ],
  english:[
    {q:"A for ?",a:["Apple","Ball","Cat","Dog"],c:"Apple"},
    {q:"B for ?",a:["Ball","Apple","Cat","Dog"],c:"Ball"},
    {q:"C for ?",a:["Cat","Dog","Ant","Bat"],c:"Cat"},
    {q:"Opposite Big?",a:["Small","Tall","Long","Wide"],c:"Small"}
  ]
};

function goMenu(){
  player=document.getElementById("nameInput").value.trim();
  if(player===""){
    alert("Enter name");
    return;
  }

  document.getElementById("nameScreen").style.display="none";
  document.getElementById("menuScreen").style.display="block";
  document.getElementById("playerName").innerText=player;
}

function startGame(c){
  cat=c;
  level=1;
  used=[];

  show("gameScreen");
  loadQ();
}

function goHome(){
  show("menuScreen");
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

function loadQ(){

  let list=data[cat];

  if(used.length>=list.length){
    used=[];
    level++;
    alert("🎉 Level Up!");
  }

  do{
    index=Math.floor(Math.random()*list.length);
  }while(used.includes(index));

  used.push(index);

  currentQ=list[index];

  document.getElementById("question").innerText=currentQ.q;
  document.getElementById("level").innerText=level;
  document.getElementById("levelText").innerText=
    "Level "+level+" - "+cat.toUpperCase();

  let opt=document.getElementById("options");
  opt.innerHTML="";

  document.getElementById("bar").style.width=
    (used.length/list.length)*100+"%";

  currentQ.a.forEach(o=>{
    let b=document.createElement("button");
    b.innerText=o;
    b.className="option";
    b.onclick=()=>check(o,b);
    opt.appendChild(b);
  });
}

function nextQ(){ loadQ(); }

function check(sel,btn){
  if(sel===currentQ.c){
    btn.classList.add("correct");
    coins+=10;
    stars++;
    sound(true);
  }else{
    btn.classList.add("wrong");
    sound(false);
  }
  updateUI();
  setTimeout(loadQ,600);
}

function updateUI(){
  document.getElementById("coins").innerText=coins;
  document.getElementById("stars").innerText=stars;
  document.getElementById("level").innerText=level;
}

function sound(ok){
  let ctx=new AudioContext();
  let o=ctx.createOscillator();
  o.frequency.value=ok?700:200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

</script>

</body>
</html>
