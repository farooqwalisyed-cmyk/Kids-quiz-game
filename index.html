<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container{
  width:90%;
  max-width:500px;
  background: rgba(0,0,0,0.35);
  padding:20px;
  border-radius:15px;
  text-align:center;
}

/* BUTTON STYLE */
button{
  padding:12px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.btn{ background:white; color:black; }

.option{ width:100%; }

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* PROGRESS BAR */
.bar{
  width:100%;
  height:10px;
  background:#444;
  border-radius:10px;
  margin-top:10px;
}

.fill{
  height:10px;
  background:lime;
  width:0%;
  border-radius:10px;
}

/* SMALL LABELS */
.small{
  font-size:14px;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<h2>🎮 Kids Quiz PRO</h2>

<!-- HOME SCREEN -->
<div id="home">
  <button class="btn" onclick="openSetup()">Start Game</button>
</div>

<!-- SETUP SCREEN -->
<div id="setup" style="display:none;">

  <div class="small">Select Category</div>
  <button class="btn" onclick="setCat('math')">Math</button>
  <button class="btn" onclick="setCat('english')">English</button>
  <button class="btn" onclick="setCat('gk')">GK</button>

  <div class="small">Select Difficulty</div>
  <button class="btn" onclick="setDiff('easy')">Easy</button>
  <button class="btn" onclick="setDiff('medium')">Medium</button>
  <button class="btn" onclick="setDiff('hard')">Hard</button>

  <br>

  <button class="btn" onclick="startGame()">Play Quiz</button>

</div>

<!-- GAME SCREEN -->
<div id="game" style="display:none;">

  <div class="top">
    <div>❤️ <span id="lives">3</span></div>
    <div>💰 <span id="coins">0</span></div>
    <div>⭐ <span id="stars">0</span></div>

    <!-- SOUND BUTTON -->
    <div>
      🔊 <button class="btn" onclick="toggleSound()" id="soundBtn">ON</button>
    </div>
  </div>

  <div class="bar"><div class="fill" id="progress"></div></div>

  <h3 id="question"></h3>
  <div id="options"></div>

</div>

</div>

<script>

let sound=true;

// 🔊 SOUND CONTROL (FIXED STEP A)
function toggleSound(){
  sound=!sound;
  document.getElementById("soundBtn").innerText = sound ? "ON" : "OFF";
}

// SOUND
function beep(type){
  if(!sound) return;

  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  o.frequency.value = type==="correct"?800:200;
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.2);
}

// NAVIGATION FIX
function openSetup(){
  document.getElementById("home").style.display="none";
  document.getElementById("setup").style.display="block";
}

// DATA (SAFE + SIMPLE FOR STEP 1)
const data={
 math:{
  easy:[
   {q:"2 + 2 = ?",o:["3","4","5","6"],a:1},
   {q:"5 + 1 = ?",o:["6","7","5","8"],a:0},
   {q:"3 + 3 = ?",o:["5","6","7","8"],a:1}
  ],
  medium:[
   {q:"10 + 5 = ?",o:["13","14","15","16"],a:2},
   {q:"12 - 4 = ?",o:["6","7","8","9"],a:2}
  ],
  hard:[
   {q:"25 × 2 = ?",o:["40","45","50","60"],a:2}
  ]
 },
 english:{
  easy:[
   {q:"A for ?",o:["Apple","Ball","Cat","Dog"],a:0}
  ],
  medium:[
   {q:"Plural of Book?",o:["Books","Bookes","Boks","Book"],a:0}
  ],
  hard:[
   {q:"Synonym of Happy?",o:["Sad","Joyful","Angry","Tired"],a:1}
  ]
 },
 gk:{
  easy:[
   {q:"Days in a week?",o:["5","6","7","8"],a:2}
  ],
  medium:[
   {q:"Capital of India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0}
  ],
  hard:[
   {q:"Largest ocean?",o:["Atlantic","Pacific","Indian","Arctic"],a:1}
  ]
 }
};

let cat="", diff="";
let qlist=[], i=0;
let lives=3, coins=0, stars=0;

// SETTERS
function setCat(c){cat=c;}
function setDiff(d){diff=d;}

// START GAME
function startGame(){

 if(!cat || !diff){
  alert("Select Category + Difficulty");
  return;
 }

 document.getElementById("setup").style.display="none";
 document.getElementById("game").style.display="block";

 qlist=[...data[cat][diff]];
 shuffle(qlist);
 i=0;
 lives=3; coins=0; stars=0;

 update();
 load();
}

// SHUFFLE
function shuffle(a){
 for(let i=a.length-1;i>0;i--){
  let j=Math.floor(Math.random()*i);
  [a[i],a[j]]=[a[j],a[i]];
 }
}

// LOAD QUESTION
function load(){

 if(i>=qlist.length){
  alert("🎉 Level Completed!");
  location.reload();
  return;
 }

 let q=qlist[i];
 document.getElementById("question").innerText=q.q;

 let html="";
 q.o.forEach((op,idx)=>{
  html+=`<button class="btn option" onclick="check(${idx})">${op}</button>`;
 });

 document.getElementById("options").innerHTML=html;

 document.getElementById("progress").style.width =
 (i/qlist.length)*100 + "%";
}

// CHECK ANSWER
function check(x){

 let q=qlist[i];

 if(x===q.a){
  beep("correct");
  coins+=10;
  stars+=1;
 } else {
  beep("wrong");
  lives--;
 }

 if(lives<=0){
  alert("💀 Game Over");
  location.reload();
 }

 i++;
 load();
 update();
}

// UI UPDATE
function update(){
 document.getElementById("lives").innerText=lives;
 document.getElementById("coins").innerText=coins;
 document.getElementById("stars").innerText=stars;
}

</script>

</body>
</html>
