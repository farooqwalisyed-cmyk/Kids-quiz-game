<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidz Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#ff758c);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.game{
width:95%;
max-width:520px;
background:white;
border-radius:20px;
padding:20px;
text-align:center;
}

.btn{
padding:14px;
margin:8px;
width:90%;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.category-btn{background:#36d1dc;color:white;}
.level-btn{background:#ff758c;color:white;}
.answer-btn{background:#eee;}

.hidden{display:none;}

.correct{background:#4CAF50 !important;color:white;}
.wrong{background:#f44336 !important;color:white;}

.nav{
display:flex;
justify-content:space-between;
}

#emoji{font-size:40px;}

.confetti{
position:fixed;
top:0;
width:8px;
height:8px;
animation:fall 1s linear forwards;
}
@keyframes fall{
to{transform:translateY(500px) rotate(360deg);opacity:0;}
}
</style>
</head>

<body>

<div class="game">

<h2>🎮 Kidz Quiz PRO</h2>
<div>⭐ <span id="stars">0</span> | 💰 <span id="coins">0</span></div>

<div id="emoji">🙂</div>

<!-- CATEGORY -->
<div id="screen1">
<h3>Select Category</h3>
<button class="btn category-btn" onclick="selectCategory('gk')">GK</button>
<button class="btn category-btn" onclick="selectCategory('english')">English</button>
<button class="btn category-btn" onclick="selectCategory('math')">Math</button>
</div>

<!-- LEVEL -->
<div id="screen2" class="hidden">
<h3>Select Level</h3>
<button id="easyBtn" class="btn level-btn" onclick="startGame('easy')">Easy</button>
<button id="mediumBtn" class="btn level-btn" onclick="startGame('medium')">🔒 Medium</button>
<button id="hardBtn" class="btn level-btn" onclick="startGame('hard')">🔒 Hard</button>
<button class="btn" onclick="backToCategory()">⬅ Back</button>
</div>

<!-- QUIZ -->
<div id="screen3" class="hidden">
<h3 id="question"></h3>
<div id="answers"></div>

<div class="nav">
<button onclick="prevQ()">⬅ Prev</button>
<button onclick="backToLevels()">🔙 Back</button>
<button onclick="home()">🏠 Home</button>
</div>
</div>

</div>

<script>

let category="", level="", index=0;
let stars=0, coins=0;
let list=[];
let locked=false;

let unlocked={
gk:{easy:true,medium:false,hard:false},
english:{easy:true,medium:false,hard:false},
math:{easy:true,medium:false,hard:false}
};

// 🎤 VOICE
function speak(t){
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

// 🔀 SHUFFLE OPTIONS
function shuffleOptions(q){
let arr=q.a.map((text,i)=>({text,correct:i===q.c}));
arr.sort(()=>Math.random()-0.5);
return {
q:q.q,
a:arr.map(x=>x.text),
c:arr.findIndex(x=>x.correct)
};
}

// 📚 QUESTIONS (20 EASY EACH)
const questions={
gk:[
{q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:0},
{q:"Sun rises in?",a:["West","East","North","South"],c:1},
{q:"Largest planet?",a:["Earth","Mars","Jupiter","Venus"],c:2},
{q:"National animal?",a:["Tiger","Lion","Elephant","Dog"],c:0},
{q:"How many days?",a:["5","6","7","8"],c:2},
{q:"Water freezes?",a:["0°C","10°C","50°C","100°C"],c:0},
{q:"Bird?",a:["Lion","Eagle","Tiger","Dog"],c:1},
{q:"Fruit?",a:["Carrot","Apple","Potato","Onion"],c:1},
{q:"Color?",a:["Dog","Blue","Chair","Table"],c:1},
{q:"Vehicle?",a:["Car","Tree","Water","Stone"],c:0},
{q:"Earth is?",a:["Planet","Star","Moon","Sun"],c:0},
{q:"Sky color?",a:["Green","Blue","Red","Black"],c:1},
{q:"Animal?",a:["Cat","Table","Chair","Fan"],c:0},
{q:"Fire?",a:["Cold","Hot","Wet","Dry"],c:1},
{q:"Shape?",a:["Circle","Dog","Car","Tree"],c:0},
{q:"Vegetable?",a:["Carrot","Apple","Mango","Banana"],c:0},
{q:"Drink?",a:["Milk","Stone","Chair","Pen"],c:0},
{q:"Insect?",a:["Ant","Dog","Cat","Cow"],c:0},
{q:"Body part?",a:["Hand","Chair","Table","Pen"],c:0},
{q:"Toy?",a:["Ball","Stone","Iron","Brick"],c:0}
],

english:[
{q:"A for?",a:["Apple","Ball","Cat","Dog"],c:0},
{q:"B for?",a:["Ball","Apple","Cat","Dog"],c:0},
{q:"C for?",a:["Cat","Dog","Fish","Tiger"],c:0},
{q:"D for?",a:["Dog","Cat","Ball","Apple"],c:0},
{q:"E for?",a:["Elephant","Fish","Goat","Hat"],c:0},
{q:"F for?",a:["Fish","Dog","Cat","Apple"],c:0},
{q:"G for?",a:["Goat","Hat","Ice","Jug"],c:0},
{q:"H for?",a:["Hat","Goat","Fish","Dog"],c:0},
{q:"I for?",a:["Ice","Jug","Kite","Lion"],c:0},
{q:"J for?",a:["Jug","Kite","Lion","Monkey"],c:0},
{q:"K for?",a:["Kite","Lion","Monkey","Nest"],c:0},
{q:"L for?",a:["Lion","Monkey","Nest","Owl"],c:0},
{q:"M for?",a:["Monkey","Nest","Owl","Pen"],c:0},
{q:"N for?",a:["Nest","Owl","Pen","Queen"],c:0},
{q:"O for?",a:["Owl","Pen","Queen","Rat"],c:0},
{q:"P for?",a:["Pen","Queen","Rat","Sun"],c:0},
{q:"Q for?",a:["Queen","Rat","Sun","Tree"],c:0},
{q:"R for?",a:["Rat","Sun","Tree","Umbrella"],c:0},
{q:"S for?",a:["Sun","Tree","Umbrella","Van"],c:0},
{q:"T for?",a:["Tree","Umbrella","Van","Watch"],c:0}
],

math:[
{q:"2+2?",a:["3","4","5","6"],c:1},
{q:"5-2?",a:["2","3","4","5"],c:1},
{q:"3+3?",a:["5","6","7","8"],c:1},
{q:"10-5?",a:["2","3","5","6"],c:2},
{q:"4+1?",a:["4","5","6","7"],c:1},
{q:"6-3?",a:["2","3","4","5"],c:1},
{q:"7+2?",a:["8","9","10","11"],c:1},
{q:"9-4?",a:["4","5","6","7"],c:1},
{q:"1+1?",a:["1","2","3","4"],c:1},
{q:"8-3?",a:["4","5","6","7"],c:1},
{q:"5+5?",a:["8","9","10","11"],c:2},
{q:"6+1?",a:["6","7","8","9"],c:1},
{q:"3+2?",a:["4","5","6","7"],c:1},
{q:"10-2?",a:["6","7","8","9"],c:2},
{q:"4+4?",a:["6","7","8","9"],c:2},
{q:"7-2?",a:["4","5","6","7"],c:1},
{q:"2+5?",a:["6","7","8","9"],c:1},
{q:"9-1?",a:["7","8","9","10"],c:1},
{q:"3+4?",a:["6","7","8","9"],c:1},
{q:"8-2?",a:["5","6","7","8"],c:1}
]
};

// FLOW

function selectCategory(c){
category=c;
screen1.classList.add("hidden");
screen2.classList.remove("hidden");
updateLevels();
}

function updateLevels(){
let u=unlocked[category];
mediumBtn.disabled=!u.medium;
hardBtn.disabled=!u.hard;
mediumBtn.innerText=u.medium?"Medium":"🔒 Medium";
hardBtn.innerText=u.hard?"Hard":"🔒 Hard";
}

function startGame(l){
if(!unlocked[category][l]) return;

level=l;
index=0;

list=questions[category].map(q=>shuffleOptions(q));
list.sort(()=>Math.random()-0.5);

screen2.classList.add("hidden");
screen3.classList.remove("hidden");

loadQ();
}

function loadQ(){
if(!list[index]){
unlockNext();
backToLevels();
return;
}

locked=false;

let q=list[index];
question.innerText=q.q;
answers.innerHTML="";

q.a.forEach((a,i)=>{
let b=document.createElement("button");
b.className="btn answer-btn";
b.innerText=a;
b.onclick=()=>check(i,q.c,b);
answers.appendChild(b);
});
}

function check(sel,correct,btn){
if(locked) return;
locked=true;

if(sel===correct){
btn.classList.add("correct");
stars++; coins+=5;
emoji.innerText="🎉";
speak("Correct answer");
confetti();
}else{
btn.classList.add("wrong");
emoji.innerText="😢";
speak("Wrong answer");
}

starsEl.innerText=stars;
coinsEl.innerText=coins;

setTimeout(()=>{index++;loadQ();},800);
}

function unlockNext(){
if(level==="easy") unlocked[category].medium=true;
if(level==="medium") unlocked[category].hard=true;
}

function confetti(){
for(let i=0;i<10;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),1000);
}
}

// NAV
function prevQ(){if(index>0){index--;loadQ();}}
function backToCategory(){screen2.classList.add("hidden");screen1.classList.remove("hidden");}
function backToLevels(){screen3.classList.add("hidden");screen2.classList.remove("hidden");updateLevels();}
function home(){screen3.classList.add("hidden");screen1.classList.remove("hidden");}

// ELEMENTS
let starsEl=document.getElementById("stars");
let coinsEl=document.getElementById("coins");
let question=document.getElementById("question");
let answers=document.getElementById("answers");
let screen1=document.getElementById("screen1");
let screen2=document.getElementById("screen2");
let screen3=document.getElementById("screen3");
let mediumBtn=document.getElementById("mediumBtn");
let hardBtn=document.getElementById("hardBtn");
let emoji=document.getElementById("emoji");

</script>

</body>
</html>
