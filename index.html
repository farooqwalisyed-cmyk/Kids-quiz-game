<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
text-align:center;
}

.screen{display:none;padding:20px;}

.card{
background:white;
color:black;
margin:20px auto;
padding:20px;
border-radius:20px;
max-width:500px;
}

button{
padding:12px;
margin:10px;
width:80%;
border:none;
border-radius:12px;
font-size:16px;
}

.option{background:#eee;}
.correct{background:#2ecc71 !important;color:white;}
.wrong{background:#e74c3c !important;color:white;}

.topbar{
display:flex;
justify-content:space-around;
padding:10px;
background:rgba(0,0,0,0.4);
}

.progress{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
}

.bar{
height:10px;
width:0%;
background:#2ecc71;
}
</style>
</head>

<body>

<!-- NAME -->
<div id="nameScreen" class="screen" style="display:block;">
<div class="card">
<h2>👋 Enter Name</h2>
<input id="nameInput" placeholder="Your name"
style="padding:10px;width:80%;border-radius:10px;">
<br>
<button onclick="goMenu()">Start</button>
</div>
</div>

<!-- MENU -->
<div id="menuScreen" class="screen">
<div class="card">
<h2>Welcome <span id="playerName"></span></h2>

<h3>Select Category</h3>
<button onclick="startGame('gk')">🌍 GK</button>
<button onclick="startGame('math')">➕ Math</button>
<button onclick="startGame('english')">🔤 English</button>
</div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">

<div class="topbar">
⭐ <span id="stars">0</span>
🪙 <span id="coins">0</span>
📘 <span id="levelText">LEVEL</span>
</div>

<div class="card">

<h3 id="question"></h3>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="options"></div>

<button onclick="goHome()">🏠 Home</button>

</div>
</div>

<script>

let player="",cat="";
let levelIndex=0;
let coins=0,stars=0;
let currentQ=null;

const levels=["easy","medium","hard"];
let used={};

// 📦 QUESTIONS
const data={
gk:{
easy:[
{q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:"Delhi"},
{q:"Sun rises in?",a:["East","West","North","South"],c:"East"},
{q:"National Animal?",a:["Tiger","Lion","Dog","Elephant"],c:"Tiger"}
],
medium:[
{q:"Largest planet?",a:["Jupiter","Mars","Earth","Venus"],c:"Jupiter"},
{q:"Water freezes at?",a:["0°C","10°C","100°C","50°C"],c:"0°C"}
],
hard:[
{q:"Plants absorb?",a:["Oxygen","Nitrogen","CO2","Hydrogen"],c:"CO2"}
]
},

math:{
easy:[
{q:"2 + 2 = ?",a:["3","4","5","6"],c:"4"},
{q:"5 + 3 = ?",a:["6","7","8","9"],c:"8"}
],
medium:[
{q:"10 - 6 = ?",a:["3","4","5","6"],c:"4"}
],
hard:[
{q:"4 × 2 + 1 = ?",a:["8","9","7","6"],c:"9"}
]
},

english:{
easy:[
{q:"A for ?",a:["Apple","Ball","Cat","Dog"],c:"Apple"},
{q:"B for ?",a:["Ball","Apple","Cat","Dog"],c:"Ball"}
],
medium:[
{q:"C for ?",a:["Cat","Dog","Ant","Bat"],c:"Cat"}
],
hard:[
{q:"Opposite of Big?",a:["Small","Tall","Long","Wide"],c:"Small"}
]
}
};

// 👤 NAME
function goMenu(){
player=document.getElementById("nameInput").value.trim();
if(!player){alert("Enter name");return;}

show("menuScreen");
document.getElementById("playerName").innerText=player;
}

// 🎮 START
function startGame(c){
cat=c;
levelIndex=0;
coins=0;
stars=0;
used={};

show("gameScreen");
showLevelStart();   // 🔥 IMPORTANT FIX
}

// 🏠 HOME
function goHome(){
show("menuScreen");
}

// 📺 SCREEN
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

// 📊 LEVEL
function level(){
return levels[levelIndex];
}

// ❌ NO REPEAT
function getQuestion(){

let lvl=level();
let list=data[cat][lvl];

if(!used[lvl]) used[lvl]=[];

let available=list.filter((_,i)=>!used[lvl].includes(i));

if(available.length===0) return null;

let q=available[Math.floor(Math.random()*available.length)];
used[lvl].push(list.indexOf(q));

return q;
}

// 🔥 LEVEL START SCREEN
function showLevelStart(){

let lvl=level();

document.getElementById("question").innerHTML=
"🔥 " + lvl.toUpperCase() + " LEVEL START";

document.getElementById("options").innerHTML="";

document.getElementById("levelText").innerText=
"LEVEL: " + lvl.toUpperCase();

document.getElementById("bar").style.width="0%";

setTimeout(loadQ,1500);
}

// 🎯 LOAD QUESTION
function loadQ(){

currentQ=getQuestion();

if(!currentQ){

levelIndex++;

if(levelIndex>=levels.length){
alert("🎉 Game Completed!");
levelIndex=0;
}

showLevelStart();
return;
}

document.getElementById("question").innerText=currentQ.q;

document.getElementById("levelText").innerText=
"LEVEL: " + level().toUpperCase();

let opt=document.getElementById("options");
opt.innerHTML="";

currentQ.a.forEach(o=>{
let b=document.createElement("button");
b.innerText=o;
b.className="option";
b.onclick=()=>check(o,b);
opt.appendChild(b);
});

document.getElementById("bar").style.width=
(used[level()].length / data[cat][level()].length) * 100 + "%";
}

// ✅ CHECK ANSWER
function check(sel,btn){

if(sel===currentQ.c){
btn.classList.add("correct");
coins+=10;
stars++;
}else{
btn.classList.add("wrong");
}

document.getElementById("coins").innerText=coins;
document.getElementById("stars").innerText=stars;

setTimeout(loadQ,500);
}

</script>

</body>
</html>
