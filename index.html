<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO MAX</title>

<style>
body{
  margin:0;
  font-family:'Comic Sans MS', Arial;
  background:linear-gradient(45deg,#ff9a9e,#fad0c4,#a18cd1,#fbc2eb);
  background-size:300% 300%;
  animation:bgMove 8s infinite alternate;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

@keyframes bgMove{
  0%{background-position:left;}
  100%{background-position:right;}
}

.game{
  width:95%;
  max-width:520px;
  background:white;
  border-radius:25px;
  padding:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
  text-align:center;
}

h2{
  color:#444;
}

.btn{
  padding:14px;
  margin:8px;
  width:90%;
  border:none;
  border-radius:15px;
  font-size:18px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}

.category-btn{
  background:linear-gradient(45deg,#36d1dc,#5b86e5);
  color:white;
}

.level-btn{
  background:linear-gradient(45deg,#ff758c,#ff7eb3);
  color:white;
}

.answer-btn{
  background:#f1f1f1;
}

.correct{background:#4CAF50 !important;color:white;}
.wrong{background:#f44336 !important;color:white;}

.hidden{display:none;}

#emoji{
  font-size:50px;
  margin:10px 0;
}

.nav button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#333;
  color:white;
}

/* Confetti */
.confetti{
position:fixed;
width:10px;height:10px;
animation:fall 1s linear forwards;
}
@keyframes fall{
to{transform:translateY(500px) rotate(360deg);opacity:0;}
}
</style>
</head>

<body>

<div class="game">

<div>⭐ <span id="stars">0</span> | 💰 <span id="coins">0</span></div>

<h2>Kids Quiz PRO MAX 🎮</h2>

<button onclick="toggleSound()" id="soundBtn">🔊 Sound</button>

<div id="emoji">🙂</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<!-- CATEGORY -->
<div id="screen1">
<h3>Select Category</h3>
<button class="btn category-btn" onclick="startExperience('gk')">GK</button>
<button class="btn category-btn" onclick="startExperience('english')">English</button>
<button class="btn category-btn" onclick="startExperience('math')">Math</button>
</div>

<!-- LEVEL -->
<div id="screen2" class="hidden">
<h3>Select Level</h3>
<button class="btn level-btn" onclick="startGame('easy')">Easy</button>
<button class="btn level-btn" onclick="startGame('medium')">Medium</button>
<button class="btn level-btn" onclick="startGame('hard')">Hard</button>
<button class="btn" onclick="backToCategory()">⬅ Back</button>
</div>

<!-- QUIZ -->
<div id="screen3" class="hidden">
<h3 id="question"></h3>
<div id="answers"></div>

<div>
<button onclick="prevQ()">⬅</button>
<button onclick="backToLevels()">🔙</button>
<button onclick="home()">🏠</button>
</div>
</div>

</div>

<script>

// STATE
let category="", level="", index=0;
let stars=0, coins=0;
let shuffledList=[];
let soundOn=true;
let started=false;

// QUESTIONS (few demo)
const questions={
gk:{easy:[
{q:"Capital of India?",a:["Delhi","Mumbai","Kolkata","Chennai"],c:0},
{q:"Sun rises in?",a:["West","East","North","South"],c:1}
]}
};

// SOUND ENGINE
let audioCtx=new (window.AudioContext||window.webkitAudioContext)();

function startExperience(c){

// 🔥 FIRST CLICK HANDLER (FIXED)
if(!started){
started=true;

audioCtx.resume();

bgMusic.volume=0.5;
bgMusic.play();

// 🎤 GUARANTEED VOICE
setTimeout(()=>{
speak("Welcome to Kids Quiz");
},300);
}

category=c;

screen1.classList.add("hidden");
screen2.classList.remove("hidden");
}

function toggleSound(){
soundOn=!soundOn;
soundBtn.innerText=soundOn?"🔊 Sound":"🔇 Mute";
if(!soundOn) bgMusic.pause(); else bgMusic.play();
}

function beep(f){
if(!soundOn) return;
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.frequency.value=f;
o.connect(g); g.connect(audioCtx.destination);
o.start(); o.stop(audioCtx.currentTime+0.15);
}

function speak(t){
if(!soundOn) return;
speechSynthesis.cancel();
speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}

// GAME
function startGame(l){
level=l;
index=0;
shuffledList=[...questions[category][level]].sort(()=>Math.random()-0.5);

screen2.classList.add("hidden");
screen3.classList.remove("hidden");

loadQ();
}

function loadQ(){
let q=shuffledList[index];
if(!q){home();return;}

question.innerText=q.q;
answers.innerHTML="";

q.a.forEach((a,i)=>{
let b=document.createElement("button");
b.className="btn answer-btn";
b.innerText=a;
b.onclick=()=>checkAnswer(i,q.c,b);
answers.appendChild(b);
});
}

function checkAnswer(sel,correct,btn){
let buttons=document.querySelectorAll(".answer-btn");

if(sel===correct){
btn.classList.add("correct");
stars++; coins+=5;
beep(800);
confetti();
}else{
btn.classList.add("wrong");
beep(200);
}

starsEl.innerText=stars;
coinsEl.innerText=coins;

buttons.forEach(b=>b.disabled=true);
setTimeout(nextQ,800);
}

function confetti(){
for(let i=0;i<15;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),1000);
}
}

// NAV
function nextQ(){index++;loadQ();}
function prevQ(){if(index>0){index--;loadQ();}}
function backToCategory(){screen2.classList.add("hidden");screen1.classList.remove("hidden");}
function backToLevels(){screen3.classList.add("hidden");screen2.classList.remove("hidden");}
function home(){screen3.classList.add("hidden");screen1.classList.remove("hidden");}

// ELEMENTS
let starsEl=document.getElementById("stars");
let coinsEl=document.getElementById("coins");
let question=document.getElementById("question");
let answers=document.getElementById("answers");
let screen1=document.getElementById("screen1");
let screen2=document.getElementById("screen2");
let screen3=document.getElementById("screen3");
let soundBtn=document.getElementById("soundBtn");
let bgMusic=document.getElementById("bgMusic");

</script>

</body>
</html>
