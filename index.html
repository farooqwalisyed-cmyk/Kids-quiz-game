<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:420px;
background:white;
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.btn{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;}

.hidden{display:none;}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0.4;}
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="screen1" class="card">
<div class="title">🎮 Tap to Play</div>
<button class="btn p1" onclick="goCategory()">START GAME</button>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="card hidden">
<div class="title">Select Category</div>
<button class="btn p2" onclick="setCat('math')">Math</button>
<button class="btn p3" onclick="setCat('english')">English</button>
<button class="btn p4" onclick="setCat('gk')">GK</button>
<button class="btn p1" onclick="goLevel()">NEXT ➡</button>
</div>

<!-- SCREEN 3 -->
<div id="screen3" class="card hidden">
<div class="title">Select Level</div>
<button class="btn p1" onclick="setLevel(0)">Easy</button>
<button class="btn p2" onclick="setLevel(1)">Medium</button>
<button class="btn p3" onclick="setLevel(2)">Hard</button>
<button class="btn p4" onclick="startGame()">START QUIZ</button>
</div>

<!-- SCREEN 4 GAME -->
<div id="game" class="card hidden">
<div id="q" style="font-size:18px;font-weight:bold;"></div>
<div id="options"></div>
<button class="btn p1" onclick="next()">Next</button>
</div>

<audio id="welcomeSound" src="welcome.mp3"></audio>

<script>

let cat="math";
let level=0;
let i=0;

/* QUESTIONS */
const data={
math:[
[
{q:"2+2=?",o:["3","4","5","6"],a:1}
],
[
{q:"10×2=?",o:["20","18","22","24"],a:0}
],
[
{q:"50÷5=?",o:["5","10","15","20"],a:1}
]
],
english:[
[
{q:"A is for?",o:["Apple","Ball","Cat","Dog"],a:0}
],
[
{q:"Opposite of Big?",o:["Small","Tall","Huge","Large"],a:0}
],
[
{q:"Correct spelling?",o:["Beautiful","Beautifull","Bautiful","Beautifal"],a:0}
]
],
gk:[
[
{q:"Dog legs?",o:["2","3","4","5"],a:2}
],
[
{q:"Capital of India?",o:["Delhi","Mumbai","Kolkata","Chennai"],a:0}
],
[
{q:"Largest planet?",o:["Earth","Mars","Jupiter","Venus"],a:2}
]
]
};

/* SCREEN FLOW */
function goCategory(){
document.getElementById("screen1").classList.add("hidden");
document.getElementById("screen2").classList.remove("hidden");

/* welcome sound FIX */
document.getElementById("welcomeSound").play().catch(()=>{});
}

function goLevel(){
document.getElementById("screen2").classList.add("hidden");
document.getElementById("screen3").classList.remove("hidden");
}

function setCat(c){cat=c;}
function setLevel(l){level=l;}

/* START GAME */
function startGame(){
document.getElementById("screen3").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
i=0;
load();
}

/* LOAD Q */
function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach((opt,idx)=>{
html+=`<button class='btn p1' onclick='check(${idx},this)'>${opt}</button>`;
});

document.getElementById("options").innerHTML=html;
}

/* CHECK */
function check(ans,btn){
let q=data[cat][level][i];

let all=document.querySelectorAll("#options button");
all.forEach(b=>b.disabled=true);

if(ans===q.a){
btn.style.background="green";
}else{
btn.style.background="red";
all[q.a].style.background="green";
}
}

/* NEXT */
function next(){
i++;
if(i>=data[cat][level].length){
location.reload();
return;
}
load();
}

</script>

</body>
</html>
