<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}
@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{font-size:22px;font-weight:bold;margin:10px 0;}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}
.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="confetti"></canvas>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">🔊 Tap to Start</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p1" onclick="goHome()">🏠 Restart</button>
</div>

<div id="levelScreen" class="hidden">
<button id="easyBtn" class="btn p1" onclick="selectLevel(0)">Easy</button>
<button id="medBtn" class="btn p2" onclick="selectLevel(1)">Medium 🔒</button>
<button id="hardBtn" class="btn p3" onclick="selectLevel(2)">Hard 🔒</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* ===== FULL QUESTIONS (10 EACH LEVEL) ===== */
const data = {
math:[
Array.from({length:10},(_,i)=>({
q:`${i+2}+${i+3}=?`,
o:[`${i+3}`,`${i+5}`,`${i+6}`,`${i+7}`],
a:1
})),
Array.from({length:10},(_,i)=>({
q:`${i+5}+${i+8}=?`,
o:[`${i+10}`,`${i+13}`,`${i+14}`,`${i+15}`],
a:1
})),
Array.from({length:10},(_,i)=>({
q:`${i+10}+${i+15}=?`,
o:[`${i+20}`,`${i+25}`,`${i+30}`,`${i+35}`],
a:1
}))
],

english:[
[
{q:"Apple is a ?",o:["Fruit","Car","Animal","City"],a:0},
{q:"Dog says ?",o:["Bark","Meow","Moo","Roar"],a:0},
{q:"Sky is ?",o:["Blue","Red","Green","Black"],a:0},
{q:"Sun gives ?",o:["Light","Water","Food","Air"],a:0},
{q:"Bird can ?",o:["Fly","Drive","Cook","Swim"],a:0},
{q:"Fish lives in ?",o:["Water","Air","Land","Fire"],a:0},
{q:"Boy is ?",o:["Male","Female","Animal","Thing"],a:0},
{q:"Milk is ?",o:["Drink","Food","Toy","Book"],a:0},
{q:"Tree is ?",o:["Plant","Animal","Car","Phone"],a:0},
{q:"Cat says ?",o:["Meow","Bark","Roar","Moo"],a:0}
],
[
{q:"Opposite of Big?",o:["Small","Tall","Huge","Long"],a:0},
{q:"Opposite of Hot?",o:["Cold","Warm","Cool","Fire"],a:0},
{q:"Opposite of Up?",o:["Down","Left","Right","Front"],a:0},
{q:"Opposite of Fast?",o:["Slow","Quick","Speed","Rush"],a:0},
{q:"Opposite of Happy?",o:["Sad","Joy","Smile","Fun"],a:0},
{q:"Opposite of Light?",o:["Dark","Bright","Shiny","Glow"],a:0},
{q:"Opposite of Day?",o:["Night","Morning","Evening","Noon"],a:0},
{q:"Opposite of Clean?",o:["Dirty","Neat","Clear","Pure"],a:0},
{q:"Opposite of Open?",o:["Close","Start","Begin","Unlock"],a:0},
{q:"Opposite of Early?",o:["Late","Soon","Fast","Quick"],a:0}
],
[
{q:"Past of go?",o:["Went","Goed","Going","Gone"],a:0},
{q:"Past of eat?",o:["Ate","Eated","Eating","Eat"],a:0},
{q:"Past of run?",o:["Ran","Runed","Running","Runs"],a:0},
{q:"Past of come?",o:["Came","Comed","Coming","Comes"],a:0},
{q:"Past of see?",o:["Saw","Seed","Seeing","Sees"],a:0},
{q:"Past of take?",o:["Took","Taked","Taking","Takes"],a:0},
{q:"Past of make?",o:["Made","Maked","Making","Makes"],a:0},
{q:"Past of give?",o:["Gave","Gived","Giving","Gives"],a:0},
{q:"Past of write?",o:["Wrote","Writed","Writing","Writes"],a:0},
{q:"Past of speak?",o:["Spoke","Speaked","Speaking","Speaks"],a:0}
]
],

gk:[
Array.from({length:10},()=>({
q:"Capital of India?",
o:["Delhi","Mumbai","Goa","Chennai"],
a:0
})),
Array.from({length:10},()=>({
q:"Sun is a ?",
o:["Star","Planet","Moon","Rock"],
a:0
})),
Array.from({length:10},()=>({
q:"Water formula?",
o:["H2O","CO2","O2","NaCl"],
a:0
}))
]
};

/* 🔒 LOCK SYSTEM */
let unlock={math:0,english:0,gk:0};

let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

let options=q.o.map((t,idx)=>({t,ok:idx===q.a})).sort(()=>Math.random()-0.5);

let html="";
options.forEach(op=>{
html+=`<button class="btn p1" onclick="check(this,${op.ok})">${op.t}</button>`;
});
document.getElementById("opts").innerHTML=html;
startTimer();
}

function check(btn,ok){
clearInterval(timer);
if(ok){
btn.classList.add("correct");
stars++; coins+=10;
}else{
btn.classList.add("wrong");
}
document.getElementById("stars").innerText=stars;
document.getElementById("coins").innerText=coins;
setTimeout(nextQ,600);
}

function startTimer(){
clearInterval(timer);
time=10;
document.getElementById("time").innerText=time;
timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) nextQ();
},1000);
}

function nextQ(){
if(i < data[cat][level].length-1){
i++;load();
}else{
if(level===0) unlock[cat]=1;
if(level===1) unlock[cat]=2;
goHome();
}
}

function prevQ(){if(i>0){i--;load();}}

function goHome(){
i=0;
clearInterval(timer);
show("catScreen");
}

function startApp(){
show("catScreen");
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){
cat=c;

document.getElementById("medBtn").innerText =
unlock[cat]>=1 ? "Medium" : "Medium 🔒";

document.getElementById("hardBtn").innerText =
unlock[cat]>=2 ? "Hard" : "Hard 🔒";

show("levelScreen");
}

function selectLevel(l){

if(l===1 && unlock[cat]<1){
alert("Complete Easy first");return;
}
if(l===2 && unlock[cat]<2){
alert("Complete Medium first");return;
}

level=l;
i=0;
show("gameScreen");
load();
}

</script>

</body>
</html>
