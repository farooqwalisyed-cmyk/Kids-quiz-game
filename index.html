<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 color:white;
}

.card{
 width:95%;
 max-width:520px;
 background: rgba(0,0,0,0.35);
 padding:25px;
 border-radius:25px;
 text-align:center;
 backdrop-filter: blur(12px);
}

h2{
 font-size:30px;
 color:#fff700;
 text-shadow:1px 1px 3px black;
}

h3{
 color:#00e5ff;
}

button{
 padding:14px;
 margin:6px;
 border:none;
 border-radius:14px;
 font-size:18px;
 cursor:pointer;
 transition:0.2s;
}

button:hover{
 transform:scale(1.05);
}

.btn{
 width:100%;
 background: linear-gradient(90deg,#ffffff,#e0e0e0);
 color:black;
 font-weight:bold;
}

.opt{
 width:100%;
 color:white;
 font-weight:bold;
}

/* COLOURED UI BUTTONS */
.c1{background:#ff6b6b;}
.c2{background:#4dabf7;}
.c3{background:#51cf66;}
.c4{background:#ffd43b; color:black;}

/* ANIMATION */
.correct{ animation:pop 0.4s ease; background:#2ecc71 !important; }
.wrong{ animation:shake 0.4s ease; background:#e74c3c !important; }

@keyframes pop{
 0%{transform:scale(1);}
 50%{transform:scale(1.3);}
 100%{transform:scale(1);}
}

@keyframes shake{
 0%{transform:translateX(0);}
 25%{transform:translateX(-6px);}
 50%{transform:translateX(6px);}
 100%{transform:translateX(0);}
}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<button class="btn" onclick="toggleSound()">🔊 Sound: <span id="s">ON</span></button>

<div id="home">
 <button class="btn" onclick="startSetup()">Start Game</button>
</div>

<div id="setup" class="hidden">

 <h3>Select Category</h3>
 <button class="c1" onclick="setCat('math')">Math</button>
 <button class="c2" onclick="setCat('english')">English</button>
 <button class="c3" onclick="setCat('gk')">GK</button>

 <h3>Select Difficulty</h3>
 <button class="c1" onclick="setDiff('easy')">Easy</button>
 <button class="c2" onclick="setDiff('medium')">Medium</button>
 <button class="c3" onclick="setDiff('hard')">Hard</button>

</div>

<div id="game" class="hidden">

 <h3 id="q"></h3>
 <div id="opts"></div>

 <button class="btn" onclick="home()">🏠 Home</button>
 <button class="btn" onclick="restart()">🔄 Restart</button>

</div>

</div>

<script>

let cat=null;
let diff=null;
let i=0;
let sound=true;
let audioCtx=null;

/* ---------------- SOUND FIX (MOBILE SAFE) ---------------- */

function initAudio(){
 if(!audioCtx){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.resume(); // IMPORTANT FIX FOR ANDROID
 }
}

function beep(type){
 if(!sound) return;

 initAudio();

 const o = audioCtx.createOscillator();
 const g = audioCtx.createGain();

 o.connect(g);
 g.connect(audioCtx.destination);

 if(type==="welcome") o.frequency.value=600;
 if(type==="correct") o.frequency.value=800;
 if(type==="wrong") o.frequency.value=200;

 o.start();
 g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4);
 o.stop(audioCtx.currentTime + 0.4);
}

/* ---------------- DATA ---------------- */

const data={
 math:{
  easy:[
   {q:"2 + 2 = ?", o:["3","4","5"], a:1},
   {q:"5 + 3 = ?", o:["8","9","7"], a:0}
  ],
  medium:[
   {q:"12 + 8 = ?", o:["18","20","22"], a:1}
  ],
  hard:[
   {q:"12 x 12 = ?", o:["124","144","154"], a:1}
  ]
 },

 english:{
  easy:[
   {q:"A for ?", o:["Apple","Ball","Cat"], a:0}
  ],
  medium:[
   {q:"Plural of Book?", o:["Books","Bookies","Booked"], a:0}
  ],
  hard:[
   {q:"Opposite Happy?", o:["Sad","Joy","Glad"], a:0}
  ]
 },

 gk:{
  easy:[
   {q:"Days in week?", o:["5","6","7"], a:2}
  ],
  medium:[
   {q:"Capital India?", o:["Delhi","Mumbai","Chennai"], a:0}
  ],
  hard:[
   {q:"Largest ocean?", o:["Atlantic","Pacific","Arctic"], a:1}
  ]
 }
};

/* ---------------- FLOW ---------------- */

function startSetup(){
 document.getElementById("home").style.display="none";
 document.getElementById("setup").style.display="block";

 initAudio();        // FIX SOUND ON FIRST CLICK
 beep("welcome");    // NOW WORKS
}

function setCat(c){ cat=c; tryStart(); }
function setDiff(d){ diff=d; tryStart(); }

function tryStart(){
 if(cat && diff){
  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="block";
  i=0;
  load();
 }
}

/* ---------------- LOAD ---------------- */

function load(){

 let q=data?.[cat]?.[diff]?.[i];

 if(!q){
  alert("🎉 Level Completed!");
  restart();
  return;
 }

 document.getElementById("q").innerText=q.q;

 let colors=["c1","c2","c3","c4"];
 let html="";

 q.o.forEach((op,idx)=>{
  html+=`<button class="opt ${colors[idx%4]}" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

/* ---------------- CHECK ---------------- */

function check(ans,btn){

 let q=data[cat][diff][i];

 if(ans === q.a){
  beep("correct");
  btn.classList.add("correct");
 }else{
  beep("wrong");
  btn.classList.add("wrong");
 }

 setTimeout(()=>{
  i++;
  load();
 },500);
}

/* ---------------- FIXED RESTART ---------------- */

function restart(){
 i=0;
 load();   // FIXED: actually reloads game properly
}

function home(){
 location.reload();
}

/* ---------------- SOUND ---------------- */

function toggleSound(){
 sound=!sound;
 document.getElementById("s").innerText=sound?"ON":"OFF";
}

</script>

</body>
</html>
