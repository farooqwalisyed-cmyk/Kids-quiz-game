<!DOCTYPE html>
<html>
<head>
<title>Kids Quiz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color:white;
}

.card, .quizBox{
  background:white;
  color:black;
  width:85%;
  max-width:420px;
  margin:80px auto;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:90%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  background:#2575fc;
  color:white;
  font-weight:bold;
}

button:hover{
  background:#1a5fd1;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popupBox{
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  width:250px;
}
</style>
</head>

<body>

<div id="app"></div>

<!-- POPUP -->
<div id="popup">
  <div class="popupBox">
    <h2 id="popupText">Message</h2>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
let app = document.getElementById("app");

let player = "";
let level = 0;
let score = 0;

/* 🎯 200 LEVELS AUTO GENERATED */
let questions = [

/* 🟢 GK (1–18) */
{
  q: "Capital of India?",
  options: ["Mumbai", "Delhi", "Kolkata", "Chennai"],
  answer: 1
},
{
  q: "Which planet is known as Red Planet?",
  options: ["Earth", "Mars", "Venus", "Jupiter"],
  answer: 1
},
{
  q: "How many continents are there?",
  options: ["5", "6", "7", "8"],
  answer: 2
},
{
  q: "Largest ocean in the world?",
  options: ["Atlantic", "Indian", "Arctic", "Pacific"],
  answer: 3
},
{
  q: "National animal of India?",
  options: ["Lion", "Tiger", "Elephant", "Leopard"],
  answer: 1
},
{
  q: "Sun rises in which direction?",
  options: ["West", "East", "North", "South"],
  answer: 1
},
{
  q: "How many days in a leap year?",
  options: ["365", "366", "364", "360"],
  answer: 1
},
{
  q: "Which is national bird of India?",
  options: ["Peacock", "Parrot", "Sparrow", "Crow"],
  answer: 0
},
{
  q: "Which gas do plants use?",
  options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"],
  answer: 2
},
{
  q: "Water freezes at?",
  options: ["0°C", "10°C", "100°C", "50°C"],
  answer: 0
},

/* 🔵 MATH (CLASS 5/6/7 LEVEL) */
{
  q: "12 × 8 = ?",
  options: ["96", "88", "108", "86"],
  answer: 0
},
{
  q: "144 ÷ 12 = ?",
  options: ["10", "11", "12", "13"],
  answer: 2
},
{
  q: "25 × 6 = ?",
  options: ["150", "120", "160", "140"],
  answer: 0
},
{
  q: "225 ÷ 15 = ?",
  options: ["10", "12", "15", "20"],
  answer: 2
},
{
  q: "√144 = ?",
  options: ["10", "11", "12", "13"],
  answer: 2
},
{
  q: "35 × 4 = ?",
  options: ["120", "140", "150", "160"],
  answer: 1
},
{
  q: "48 ÷ 6 = ?",
  options: ["6", "7", "8", "9"],
  answer: 2
},
{
  q: "15² = ?",
  options: ["225", "250", "200", "275"],
  answer: 0
},
{
  q: "18 × 7 = ?",
  options: ["126", "136", "116", "146"],
  answer: 0
},
{
  q: "500 - 275 = ?",
  options: ["225", "235", "215", "245"],
  answer: 0
},
{
  q: "What is 20% of 200?",
  options: ["20", "30", "40", "50"],
  answer: 2
},
{
  q: "3/4 of 100 = ?",
  options: ["70", "75", "80", "85"],
  answer: 1
},
{
  q: "9 × 11 = ?",
  options: ["99", "89", "109", "91"],
  answer: 0
},

/* 🟡 ENGLISH */
{
  q: "Opposite of Brave?",
  options: ["Strong", "Coward", "Bold", "Smart"],
  answer: 1
},
{
  q: "Synonym of Happy?",
  options: ["Sad", "Joyful", "Angry", "Tired"],
  answer: 1
},
{
  q: "Plural of Mouse?",
  options: ["Mouses", "Mice", "Mouse", "Mices"],
  answer: 1
},
{
  q: "A noun is?",
  options: ["Action", "Name of person/place", "Verb", "Adjective"],
  answer: 1
},
{
  q: "He ___ playing football.",
  options: ["is", "are", "am", "be"],
  answer: 0
},
{
  q: "Opposite of Easy?",
  options: ["Simple", "Hard", "Light", "Soft"],
  answer: 1
},
{
  q: "Verb means?",
  options: ["Action word", "Name", "Place", "Thing"],
  answer: 0
},
{
  q: "Past tense of Go?",
  options: ["Goed", "Gone", "Went", "Going"],
  answer: 2
},
{
  q: "Article in English?",
  options: ["a, an, the", "is, are", "he, she", "run, jump"],
  answer: 0
},
{
  q: "Opposite of Fast?",
  options: ["Quick", "Slow", "Run", "Speed"],
  answer: 1
}
];
];

/* NAME SCREEN */
function renderStart(){
  app.innerHTML = `
    <div class="card">
      <h1>🎮 Kids Quiz Pro</h1>
      <input id="name" placeholder="Enter Your Name"/>
      <button onclick="start()">Start</button>
    </div>
  `;
}

function start(){
  player = document.getElementById("name").value;

  if(!player){
    showPopup("Enter Name");
    return;
  }

  level = 0;
  score = 0;
  loadLevel();
}

/* QUIZ SCREEN */
function loadLevel(){
  let q = questions[level];

  app.innerHTML = `
    <div class="quizBox">
      <h3>👤 ${player}</h3>
      <h2>⭐ Level ${level+1}/200</h2>

      <h3>${q.q}</h3>

      ${q.options.map((o,i)=>`
        <button onclick="answer(${i})">${o}</button>
      `).join("")}

      <button onclick="renderStart()">🏠 Home</button>
    </div>
  `;
}

/* ANSWER CHECK */
function answer(i){
  let q = questions[level];

  if(i === q.answer){
    score++;
    showPopup("🎉 Correct!");
  } else {
    showPopup("❌ Wrong!");
  }

  level++;

  if(level >= questions.length){
    showPopup("Game Finished! Score: " + score);
    renderStart();
    return;
  }

  setTimeout(loadLevel, 300);
}

/* POPUP */
function showPopup(msg){
  document.getElementById("popupText").innerText = msg;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

/* INIT */
renderStart();
</script>

</body>
</html>
