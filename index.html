<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;

 background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#a18cd1,#84fab0);
 background-size:400% 400%;
 animation: gradientBG 8s ease infinite;
}

@keyframes gradientBG{
 0%{background-position:0% 50%;}
 50%{background-position:100% 50%;}
 100%{background-position:0% 50%;}
}

.card{
 width:95%;
 max-width:500px;
 background:rgba(255,255,255,0.9);
 border-radius:25px;
 padding:20px;
 text-align:center;
 backdrop-filter:blur(10px);
}

.top{
 display:flex;
 justify-content:space-between;
 font-size:18px;
}

.timer{color:red;font-weight:bold;}

button{
 width:100%;
 padding:14px;
 margin:6px 0;
 border:none;
 border-radius:15px;
 font-size:18px;
 color:white;
}

.btn1{background:#ff6b6b;}
.btn2{background:#4dabf7;}
.btn3{background:#51cf66;}
.btn4{background:#ffd43b;color:black;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.screen{display:none;}
.active{display:block;}

.nav{display:flex;gap:8px;}
.nav button{flex:1;}

.tap{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0.3;}}

.progress{
 height:8px;
 background:#eee;
 border-radius:10px;
 margin:10px 0;
}
.bar{
 height:100%;
 width:0%;
 background:#4dabf7;
}
</style>
</head>

<body>

<div class="card">

<div class="top">
 ⭐ <span id="stars">0</span>
 🪙 <span id="coins">0</span>
 ⏱️ <span id="time" class="timer">10</span>
</div>

<h2>🎮 Kids Quiz PRO</h2>

<div id="start" class="screen active" onclick="startApp()">
 <h3 class="tap">👉 Tap to Start</h3>
</div>

<div id="category" class="screen">
<button class="btn2" onclick="selectCat('math')">Math</button>
<button class="btn2" onclick="selectCat('english')">English</button>
<button class="btn2" onclick="selectCat('gk')">GK</button>
</div>

<div id="level" class="screen">
<button class="btn1" onclick="startGame('easy')">Easy</button>
<button id="medBtn" class="btn1" onclick="startGame('medium')">Medium</button>
<button id="hardBtn" class="btn1" onclick="startGame('hard')">Hard</button>
</div>

<div id="game" class="screen">

<div class="progress"><div id="bar" class="bar"></div></div>

<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button onclick="prev()">⬅ Prev</button>
 <button onclick="next()">Next ➡</button>
</div>

<button onclick="home()">🏠 Home</button>

</div>

</div>

<script>

let cat,diff,i=0;
let stars=0,coins=0;
let timer=10,interval;

let audioCtx=null;

/* 🔊 FIXED AUDIO UNLOCK */
function unlockAudio(){
 if(!audioCtx){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
 }
 audioCtx.resume();
}

/* SOUND */
function playSound(type){
 if(!audioCtx) return;

 let o=audioCtx.createOscillator();
 let g=audioCtx.createGain();
 o.connect(g);
 g.connect(audioCtx.destination);

 if(type==="correct") o.frequency.value=900;
 else o.frequency.value=150;

 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);
 o.stop(audioCtx.currentTime+0.5);
}

/* START */
function startApp(){
 unlockAudio(); // 🔥 IMPORTANT
 speechSynthesis.speak(new SpeechSynthesisUtterance("Welcome to Kids Quiz Pro"));
 show("category");
}

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function selectCat(c){
 cat=c;
 show("level");
}

function startGame(d){
 diff=d;
 i=0;
 show("game");
 load();
}

/* SHUFFLE */
function shuffle(q){
 let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
 arr.sort(()=>Math.random()-0.5);
 return {
  q:q.q,
  o:arr.map(x=>x.t),
  a:arr.findIndex(x=>x.correct)
 };
}

/* DATA */
const data={
math:{
 easy:[{q:"2 + 2 = ?",o:["3","4","5","6"],a:1}]
},
english:{
 easy:[{q:"A is for?",o:["Apple","Ball","Cat","Dog"],a:0}]
},
gk:{
 easy:[{q:"How many days are there in a week?",o:["5","6","7","8"],a:2}]
}
};

let current;

/* LOAD */
function load(){
 let q=data[cat][diff][i];
 current=shuffle(q);

 document.getElementById("q").innerText=current.q;

 let colors=["btn1","btn2","btn3","btn4"];
 let html="";
 current.o.forEach((op,idx)=>{
  html+=`<button class="${colors[idx]}" onclick="check(${idx},this)">${op}</button>`;
 });
 document.getElementById("opts").innerHTML=html;

 startTimer();
}

/* TIMER */
function startTimer(){
 clearInterval(interval);
 timer=10;
 document.getElementById("time").innerText=timer;

 interval=setInterval(()=>{
  timer--;
  document.getElementById("time").innerText=timer;
  if(timer===0){clearInterval(interval);next();}
 },1000);
}

/* CHECK */
function check(ans,btn){
 clearInterval(interval);

 if(ans===current.a){
  btn.classList.add("correct");
  playSound("correct");
 }else{
  btn.classList.add("wrong");
  playSound("wrong");
 }

 setTimeout(()=>next(),700);
}

function next(){
 if(i < data[cat][diff].length-1){
  i++; load();
 }else{
  alert("Level Completed!");
  show("category");
 }
}

function prev(){ if(i>0){i--;load();} }
function home(){ show("category"); }

</script>

</body>
</html>
