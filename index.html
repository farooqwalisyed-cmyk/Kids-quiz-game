<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a11cb,#2575fc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD UI (LOCKED STYLE) */
.screen{
width:95%;
max-width:420px;
background:white;
border-radius:20px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.top{
display:flex;
justify-content:space-between;
font-size:14px;
font-weight:bold;
color:#333;
margin-bottom:10px;
}

.title{
text-align:center;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
color:#222;
}

/* BUTTONS */
.btn{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:10px;
font-size:16px;
background:#f2f2f2;
cursor:pointer;
transition:0.2s;
}

.btn:hover{background:#ddd;}

.correct{
background:#2ecc71 !important;
color:white;
animation:pop 0.3s ease;
}

.wrong{
background:#e74c3c !important;
color:white;
animation:shake 0.4s ease;
}

/* ANIMATIONS */
@keyframes pop{
0%{transform:scale(0.7)}
100%{transform:scale(1)}
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}
</style>
</head>

<body>

<!-- SOUNDS -->
<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>
<audio id="welcomeSound" src="welcome.mp3"></audio>

<div class="screen">

<div class="top">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">0</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<!-- LEVEL SELECT (FIXED) -->
<div id="menu">

<h3 style="text-align:center;">Select Level</h3>

<button class="btn" onclick="setLevel('easy')">Easy</button>
<button class="btn" onclick="setLevel('medium')">Medium</button>
<button class="btn" onclick="setLevel('hard')">Hard</button>

<hr>

<h3 style="text-align:center;">Select Category</h3>

<button class="btn" onclick="startGame('math')">Math</button>
<button class="btn" onclick="startGame('english')">English</button>
<button class="btn" onclick="startGame('gk')">GK</button>

</div>

<div id="game" style="display:none">
<div id="q"></div>
<div id="opts"></div>
</div>

</div>

<script>

/* GAME DATA */
let data={
math:{easy:[],medium:[],hard:[]},
english:{easy:[],medium:[],hard:[]},
gk:{easy:[],medium:[],hard:[]}
};

/* EASY (FULL) */
data.math.easy=[
{q:"2+2=?",o:["3","4","5","6"],a:1},
{q:"5+3=?",o:["7","8","9","10"],a:1},
{q:"10-4=?",o:["5","6","7","8"],a:1},
{q:"4×4=?",o:["12","14","16","18"],a:2}
];

data.english.easy=[
{q:"A is for?",o:["Apple","Ball","Cat","Dog"],a:0},
{q:"B is for?",o:["Ball","Dog","Egg","Fish"],a:0}
];

data.gk.easy=[
{q:"Dog has how many legs?",o:["2","3","4","5"],a:2},
{q:"Bird can?",o:["Fly","Swim","Run","Walk"],a:0}
];

/* MEDIUM */
data.math.medium=[
{q:"12×3=?",o:["36","32","30","40"],a:0},
{q:"100-50=?",o:["40","50","60","70"],a:1}
];

data.english.medium=[
{q:"Opposite of Big?",o:["Small","Large","Huge","Tall"],a:0},
{q:"Plural of Cat?",o:["Cats","Catt","Cates","Caties"],a:0}
];

data.gk.medium=[
{q:"Largest planet?",o:["Earth","Mars","Jupiter","Venus"],a:2},
{q:"Fastest animal?",o:["Tiger","Cheetah","Lion","Horse"],a:1}
];

/* HARD */
data.math.hard=[
{q:"25×4=?",o:["100","90","110","120"],a:0},
{q:"144÷12=?",o:["10","11","12","13"],a:2}
];

data.english.hard=[
{q:"Correct spelling?",o:["Beautifull","Beautiful","Beutiful","Beautifal"],a:1},
{q:"Past of Go?",o:["Goed","Went","Gone","Going"],a:1}
];

data.gk.hard=[
{q:"Bones in body?",o:["206","150","300","250"],a:0},
{q:"Galaxy name?",o:["Milky Way","Sun","Moon","Earth"],a:0}
];

let cat="",lvl="easy",i=0,stars=0,coins=0,timer;
let current;

/* LEVEL SELECT */
function setLevel(l){
lvl=l;
alert("Level Selected: "+lvl);
}

/* START */
function startGame(c){
cat=c;
i=0;

document.getElementById("menu").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("welcomeSound").play();

load();
}

/* LOAD */
function load(){
current=data[cat][lvl][i];

document.getElementById("q").innerText=current.q;

let opt="";
current.o.forEach((o,idx)=>{
opt+=`<button class='btn' onclick='check(${idx},this)'>${o}</button>`;
});

document.getElementById("opts").innerHTML=opt;

startTimer();
}

/* CHECK */
function check(ans,btn){

clearInterval(timer);

let correctSound=document.getElementById("correctSound");
let wrongSound=document.getElementById("wrongSound");

let all=document.querySelectorAll("#opts button");
all.forEach(b=>b.disabled=true);

if(ans===current.a){
btn.classList.add("correct");
correctSound.play();
stars++;coins+=10;
}else{
btn.classList.add("wrong");
all[current.a].classList.add("correct");
wrongSound.play();
}

setTimeout(()=>next(),1000);
}

/* NEXT */
function next(){
i++;
if(i>=data[cat][lvl].length){
menu();
return;
}
load();
}

/* MENU */
function menu(){
document.getElementById("menu").style.display="block";
document.getElementById("game").style.display="none";
}

/* TIMER */
function startTimer(){
let t=10;
document.getElementById("time").innerText=t;

timer=setInterval(()=>{
t--;
document.getElementById("time").innerText=t;
if(t<=0){
clearInterval(timer);
next();
}
},1000);
}

</script>

</body>
</html>
