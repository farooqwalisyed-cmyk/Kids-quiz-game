<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6a00,#ee0979,#00c6ff);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}

body.dark{
background:linear-gradient(135deg,#1a1a1a,#2c2c2c,#3d3d3d);
color:white;
}

@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

body.dark .card{
background:#222;
color:white;
}

.topbar{
display:flex;
justify-content:space-between;
font-weight:bold;
margin-bottom:10px;
}

.title{
font-size:24px;
font-weight:bold;
margin:10px 0;
color:#6a11cb;
}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

img{
width:120px;
margin:10px auto;
display:block;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}
.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}
</style>
</head>

<body onclick="unlockAudio()">

<canvas id="confetti"></canvas>

<div class="card">

<div class="topbar">
<div>⭐ <span id="stars">0</span></div>
<div>🪙 <span id="coins">0</span></div>
<div>⏱️ <span id="time">10</span></div>
</div>

<div class="title">🎮 Kids Quiz PRO</div>

<button class="btn p3" onclick="toggleTheme()">🎨 Theme</button>

<div id="startScreen">
<button class="btn p1" onclick="startApp()">🔊 Tap to Start</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
<button class="btn p1" onclick="show('startScreen')">⬅ Back</button>
<button class="btn p4" onclick="goHome()">🏠 Restart</button>
</div>

<div id="levelScreen" class="hidden">
<button id="easyBtn" class="btn p1" onclick="selectLevel(0)">Easy</button>
<button id="medBtn" class="btn p2" onclick="selectLevel(1)">Medium 🔒</button>
<button id="hardBtn" class="btn p3" onclick="selectLevel(2)">Hard 🔒</button>
<button class="btn p4" onclick="show('catScreen')">⬅ Back</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<img id="qImg" src="" class="hidden">
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* SOUND FIX */
let audioUnlocked=false;
function unlockAudio(){
if(!audioUnlocked){
new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg").play().catch(()=>{});
audioUnlocked=true;
}
}

function playSound(src){
if(audioUnlocked){
new Audio(src).play().catch(()=>{});
}
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle("dark");
}

/* VOICE */
function speak(text){
speechSynthesis.cancel();
text = text.replace(/__+/g," dash ");
let msg=new SpeechSynthesisUtterance(text);
msg.rate=0.85;
msg.pitch=1.2;
speechSynthesis.speak(msg);
}

/* SAMPLE QUESTIONS (KEEP YOUR FULL DATA HERE) */
const data={
math:[[{q:"2+2=?",img:"",o:["4","5","6","3"],a:0}]],
english:[[{q:"Cat says?",img:"",o:["Meow","Bark","Moo","Quack"],a:0}]],
gk:[[{q:"Sun is?",img:"",o:["Star","Planet","Moon","Rock"],a:0}]]
};

/* GAME */
let cat="",level=0,i=0,stars=0,coins=0,timer,time=10;

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;
speak(q.q);

if(q.img){
qImg.src=q.img;
qImg.classList.remove("hidden");
}else qImg.classList.add("hidden");

let options=q.o.map((t,idx)=>({t,ok:idx===q.a})).sort(()=>Math.random()-0.5);

opts.innerHTML=options.map(op=>
`<button class="btn p1" onclick="check(this,${op.ok})">${op.t}</button>`
).join("");

startTimer();
}

function check(btn,ok){
clearInterval(timer);

if(ok){
stars++;coins+=10;
btn.classList.add("correct");
playSound("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
blastConfetti();
}else{
btn.classList.add("wrong");
playSound("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
}

starsEl.innerText=stars;
coinsEl.innerText=coins;

setTimeout(nextQ,800);
}

function nextQ(){if(i<data[cat][level].length-1){i++;load();}else goHome();}
function prevQ(){if(i>0){i--;stars=Math.max(0,stars-1);load();}}

function startTimer(){
clearInterval(timer);
time=10;
timeEl.innerText=time;
timer=setInterval(()=>{
time--;
timeEl.innerText=time;
if(time<=0) nextQ();
},1000);
}

function goHome(){i=0;clearInterval(timer);show("catScreen");}

function startApp(){
playSound("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
show("catScreen");
}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function selectCat(c){cat=c;show("levelScreen");}
function selectLevel(l){level=l;i=0;show("gameScreen");load();}

/* SHORTCUTS */
const starsEl=document.getElementById("stars");
const coinsEl=document.getElementById("coins");
const timeEl=document.getElementById("time");
const opts=document.getElementById("opts");
const qImg=document.getElementById("qImg");

/* CONFETTI */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let confetti=[];

function blastConfetti(){
for(let i=0;i<60;i++){
confetti.push({
x:Math.random()*canvas.width,
y:0,
r:Math.random()*6,
color:`hsl(${Math.random()*360},100%,50%)`
});
}}

function drawConfetti(){
ctx.clearRect(0,0,canvas.width,canvas.height);
confetti.forEach(p=>{
ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=3;
});
confetti=confetti.filter(p=>p.y<canvas.height);
requestAnimationFrame(drawConfetti);
}
drawConfetti();

</script>

</body>
</html>
