<script>

/* STATE */
let cat="kids";
let level=1;
let index=0;

let score=0;
let coins=0;
let stars=0;

let questions=[];

/* USED QUESTION TRACKER (FIX) */
let usedQuestions={
kids:[],
math:[],
english:[],
gk:[]
};

/* UI */
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* START */
function startApp(){
let name=document.getElementById("username").value;
if(!name){alert("Enter name");return;}
show("menu");
}

function setCat(c){
cat=c;
}

/* DATABASE */
const DB={
kids:[
{q:"Dog says?",a:"Bark",o:["Bark","Meow","Roar","Buzz"]},
{q:"Cat says?",a:"Meow",o:["Meow","Bark","Roar","Buzz"]},
{q:"Cow gives?",a:"Milk",o:["Milk","Egg","Water","Honey"]},
{q:"Lion sound?",a:"Roar",o:["Roar","Buzz","Meow","Bark"]},
{q:"Bird can?",a:"Fly",o:["Fly","Swim","Run","Sleep"]},
{q:"Fish lives in?",a:"Water",o:["Water","Sky","Land","Tree"]},
{q:"Sun is?",a:"Hot",o:["Hot","Cold","Wet","Dry"]},
{q:"Moon appears at?",a:"Night",o:["Night","Morning","Noon","Evening"]},
{q:"Tree gives?",a:"Oxygen",o:["Oxygen","Milk","Water","Fire"]},
{q:"Baby dog?",a:"Puppy",o:["Puppy","Kitten","Cub","Calf"]}
],

math:[
{q:"2+2=?",a:"4",o:["4","5","6","7"]},
{q:"5-3=?",a:"2",o:["2","3","4","5"]},
{q:"3+3=?",a:"6",o:["6","5","7","8"]},
{q:"10-5=?",a:"5",o:["5","6","7","8"]},
{q:"4+1=?",a:"5",o:["5","6","7","8"]},
{q:"6-2=?",a:"4",o:["4","5","6","7"]},
{q:"7+1=?",a:"8",o:["8","9","10","7"]},
{q:"9-4=?",a:"5",o:["5","4","3","2"]},
{q:"8+2=?",a:"10",o:["10","9","8","7"]},
{q:"1+3=?",a:"4",o:["4","5","6","7"]}
],

english:[
{q:"A for?",a:"Apple",o:["Apple","Ball","Cat","Dog"]},
{q:"B for?",a:"Ball",o:["Ball","Pen","Chair","Table"]},
{q:"C for?",a:"Cat",o:["Cat","Dog","Ball","Car"]},
{q:"D for?",a:"Dog",o:["Dog","Apple","Ball","Car"]},
{q:"E for?",a:"Elephant",o:["Elephant","Fish","Goat","Hat"]},
{q:"F for?",a:"Fish",o:["Fish","Lion","Tiger","Dog"]},
{q:"G for?",a:"Goat",o:["Goat","Hat","Ice","Jug"]},
{q:"H for?",a:"Hat",o:["Hat","Goat","Fish","Dog"]},
{q:"I for?",a:"Ice",o:["Ice","Jug","Kite","Lion"]},
{q:"J for?",a:"Jug",o:["Jug","Ice","Hat","Goat"]}
],

gk:[
{q:"Sky color?",a:"Blue",o:["Blue","Red","Green","Yellow"]},
{q:"Sun gives?",a:"Light",o:["Light","Water","Food","Air"]},
{q:"We drink?",a:"Water",o:["Water","Milk","Juice","Tea"]},
{q:"National animal?",a:"Tiger",o:["Tiger","Lion","Dog","Cat"]},
{q:"National bird?",a:"Peacock",o:["Peacock","Crow","Sparrow","Eagle"]},
{q:"Earth shape?",a:"Round",o:["Round","Flat","Square","Triangle"]},
{q:"Fire is?",a:"Hot",o:["Hot","Cold","Wet","Dry"]},
{q:"Plants need?",a:"Water",o:["Water","Fire","Air","Stone"]},
{q:"We breathe?",a:"Air",o:["Air","Water","Fire","Soil"]}
]
};

/* LEVEL SIZE */
const LEVELS={
1:4,
2:6,
3:10
};

/* REAL SHUFFLE */
function shuffleArray(arr){
let a=[...arr];
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
return a;
}

/* START LEVEL (ANTI REPEAT FIX) */
function startLevel(l){

level=l;
index=0;
score=0;
coins=0;
stars=0;

/* GET UNUSED QUESTIONS ONLY */
let pool=DB[cat].filter(q=>{
return !usedQuestions[cat].includes(q.q);
});

/* IF NOT ENOUGH LEFT → RESET */
if(pool.length<LEVELS[level]){
usedQuestions[cat]=[];
pool=DB[cat];
}

/* SHUFFLE + PICK */
questions=shuffleArray(pool).slice(0,LEVELS[level]);

/* SAVE USED QUESTIONS */
questions.forEach(q=>{
usedQuestions[cat].push(q.q);
});

updateStats();
show("game");
load();
}

/* LOAD */
function load(){

if(index>=questions.length){
alert("🎉 Level Completed!");
show("menu");
return;
}

let q=questions[index];
document.getElementById("q").innerText=q.q;

let optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

let shuffled=shuffleArray(q.o);

shuffled.forEach(opt=>{

let btn=document.createElement("button");
btn.innerText=opt;

btn.onclick=()=>{

if(opt===q.a){
btn.classList.add("correct");
score+=10;
coins+=15;
stars+=1;
}else{
btn.classList.add("wrong");
score=Math.max(0,score-3);
}

updateStats();

setTimeout(()=>{
index++;
load();
},500);

};

optionsDiv.appendChild(btn);
});

}

/* STATS */
function updateStats(){
document.getElementById("score").innerText=score;
document.getElementById("coins").innerText=coins;
document.getElementById("stars").innerText=stars;
}

</script>
