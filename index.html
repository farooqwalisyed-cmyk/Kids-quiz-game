<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO MAX</title>

<style>
body{
 margin:0;
 font-family: 'Segoe UI', sans-serif;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background: linear-gradient(135deg,#9b8cff,#ffb3b3);
}

.card{
 width:95%;
 max-width:420px;
 background:white;
 border-radius:30px;
 padding:20px;
 box-shadow:0 10px 30px rgba(0,0,0,0.2);
 text-align:center;
}

.top{
 display:flex;
 justify-content:center;
 gap:15px;
 font-size:18px;
 margin-bottom:10px;
}

h1{
 font-size:26px;
 margin:10px 0;
}

.emoji{
 font-size:50px;
 margin:10px 0;
}

button{
 width:100%;
 padding:16px;
 margin:10px 0;
 border:none;
 border-radius:25px;
 font-size:18px;
 color:white;
}

.btn-blue{
 background: linear-gradient(90deg,#43cea2,#185a9d);
}
.btn-pink{
 background: linear-gradient(90deg,#ff758c,#ff7eb3);
}
.btn-gray{
 background:#ddd;
 color:black;
}

.opt{border-radius:15px;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.screen{display:none;}
.active{display:block;}

#q{
 font-size:22px;
 margin:15px 0;
}

/* NAV BUTTON ROW */
.nav{
 display:flex;
 gap:10px;
}
.nav button{
 flex:1;
}

</style>
</head>

<body>

<div class="card">

<div class="top">
 ⭐ <span id="stars">0</span>
 🪙 <span id="coins">0</span>
</div>

<h1>Kids Quiz PRO MAX 🎮</h1>

<button onclick="toggleSound()">🔊 Sound</button>

<div class="emoji">🙂</div>

<!-- CATEGORY -->
<div id="category" class="screen active">
<h2>Select Category</h2>
<button class="btn-blue" onclick="selectCat('gk')">GK</button>
<button class="btn-blue" onclick="selectCat('english')">English</button>
<button class="btn-blue" onclick="selectCat('math')">Math</button>
</div>

<!-- LEVEL -->
<div id="level" class="screen">
<h2>Select Level</h2>
<button class="btn-pink" onclick="startGame('easy')">Easy</button>
<button class="btn-pink" onclick="startGame('medium')">Medium</button>
<button class="btn-pink" onclick="startGame('hard')">Hard</button>
<button class="btn-gray" onclick="back()">← Back</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div id="q"></div>
<div id="opts"></div>

<!-- NAVIGATION -->
<div class="nav">
 <button class="btn-gray" onclick="prev()">⬅ Prev</button>
 <button class="btn-gray" onclick="next()">Next ➡</button>
</div>

<button class="btn-gray" onclick="home()">🏠 Home</button>

</div>

</div>

<script>

let cat, diff, i=0;
let stars=0, coins=0;
let soundOn=true;

/* AUDIO */
let audioCtx;

function toggleSound(){
 soundOn=!soundOn;
}

function play(freq){
 if(!soundOn) return;
 if(!audioCtx){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
 }
 let o=audioCtx.createOscillator();
 let g=audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);
 o.frequency.value=freq;
 g.gain.value=0.2;
 o.start();
 setTimeout(()=>o.stop(),200);
}

/* DATA */
const data={
 math:{
  easy:[{q:"2+2=?",o:["3","4","5","6"],a:1}],
  medium:[{q:"10+5=?",o:["15","12","14","11"],a:0}],
  hard:[{q:"12x12=?",o:["144","124","154","134"],a:0}]
 },
 english:{
  easy:[{q:"A for?",o:["Apple","Ball","Cat","Dog"],a:0}],
  medium:[{q:"Plural of book?",o:["Books","Book","Booked","Bookies"],a:0}],
  hard:[{q:"Opposite happy?",o:["Sad","Joy","Fun","Glad"],a:0}]
 },
 gk:{
  easy:[{q:"Days in week?",o:["5","6","7","8"],a:2}],
  medium:[{q:"Capital India?",o:["Delhi","Mumbai","Chennai","Kolkata"],a:0}],
  hard:[{q:"Largest ocean?",o:["Pacific","Atlantic","Arctic","Indian"],a:0}]
 }
};

/* SCREEN */
function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* FLOW */
function selectCat(c){
 cat=c;
 show("level");
}

function startGame(d){
 diff=d;
 i=0;
 show("game");
 load();
}

function back(){
 show("category");
}

/* LOAD */
function load(){
 let q=data[cat][diff][i];
 document.getElementById("q").innerText=q.q;

 let html="";
 q.o.forEach((op,idx)=>{
  html+=`<button class="opt btn-blue" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

/* ANSWER */
function check(ans,btn){
 let q=data[cat][diff][i];

 if(ans===q.a){
  btn.classList.add("correct");
  stars++; coins+=10;
  play(900);
 }else{
  btn.classList.add("wrong");
  play(200);
 }

 document.getElementById("stars").innerText=stars;
 document.getElementById("coins").innerText=coins;

 setTimeout(()=>next(),800);
}

/* NAV */
function next(){
 if(i < data[cat][diff].length-1){
  i++; load();
 }else{
  alert("Game Finished!");
  home();
 }
}

function prev(){
 if(i>0){
  i--;
  load();
 }
}

/* HOME */
function home(){
 show("category");
}

</script>

</body>
</html>
