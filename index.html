<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GK Quiz Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#141e30,#243b55);
  color:white;
  text-align:center;
}

h1{margin:15px;}

.topbar{
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,0.3);
  padding:10px;
  font-size:14px;
}

.card{
  background:white;
  color:black;
  margin:20px;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

button{
  padding:12px;
  margin:8px;
  width:80%;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
}

.option{background:#f1f1f1;}
.correct{background:#2ecc71 !important; color:white;}
.wrong{background:#e74c3c !important; color:white;}

.progress{
  height:10px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin:10px;
}
.bar{
  height:10px;
  width:0%;
  background:#2ecc71;
}
</style>
</head>

<body>

<div class="topbar">
  <div>⭐ <span id="stars">0</span></div>
  <div>🪙 <span id="coins">0</span></div>
  <div>📘 Level <span id="level">1</span></div>
</div>

<h1>🌍 GK Quiz PRO</h1>

<div id="menu" class="card">
  <h2>Start GK Quiz</h2>
  <button onclick="startGame()">▶ Start Game</button>
</div>

<div id="game" class="card" style="display:none;">
  <div class="progress"><div id="bar" class="bar"></div></div>
  <h2 id="question"></h2>
  <div id="options"></div>
</div>

<script>
let data = [
  {q:"Capital of India?", a:["Delhi","Mumbai","Kolkata","Chennai"], c:"Delhi"},
  {q:"National Animal of India?", a:["Tiger","Lion","Elephant","Dog"], c:"Tiger"},
  {q:"How many days in a year?", a:["365","360","400","300"], c:"365"},
  {q:"Sun rises in?", a:["East","West","North","South"], c:"East"},
  {q:"Largest planet?", a:["Earth","Mars","Jupiter","Venus"], c:"Jupiter"},
  {q:"National Bird of India?", a:["Peacock","Parrot","Eagle","Sparrow"], c:"Peacock"},
  {q:"Which is ocean?", a:["Pacific","Sahara","Gobi","Thar"], c:"Pacific"},
  {q:"Water freezes at?", a:["0°C","10°C","100°C","50°C"], c:"0°C"},
  {q:"How many states in India?", a:["28","29","30","27"], c:"28"},
  {q:"Who is Prime Minister of India?", a:["Narendra Modi","Rahul Gandhi","APJ Abdul Kalam","Vajpayee"], c:"Narendra Modi"}
];

let used=[], index=0;
let coins=0, stars=0, level=1;

function startGame(){
  used=[];
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  loadQ();
}

function loadQ(){
  if(used.length>=data.length){
    level++;
    alert("🎉 Level Up!");
    used=[];
  }

  do{
    index=Math.floor(Math.random()*data.length);
  }while(used.includes(index));

  used.push(index);

  let q=data[index];
  document.getElementById("question").innerText=q.q;

  let opt=document.getElementById("options");
  opt.innerHTML="";

  document.getElementById("bar").style.width=(used.length/data.length)*100+"%";

  q.a.forEach(o=>{
    let b=document.createElement("button");
    b.innerText=o;
    b.className="option";
    b.onclick=()=>check(o,q.c,b);
    opt.appendChild(b);
  });
}

function check(sel,ans,btn){
  if(sel===ans){
    btn.classList.add("correct");
    coins+=10;
    stars++;
    sound(true);
  }else{
    btn.classList.add("wrong");
    sound(false);
  }
  updateUI();
  setTimeout(loadQ,700);
}

function updateUI(){
  document.getElementById("coins").innerText=coins;
  document.getElementById("stars").innerText=stars;
  document.getElementById("level").innerText=level;
}

function sound(ok){
  let ctx=new AudioContext();
  let o=ctx.createOscillator();
  o.frequency.value=ok?700:200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}
</script>

</body>
</html>
