<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#a18cd1,#84fab0);
 background-size:400% 400%;
 animation: bg 8s infinite;
}
@keyframes bg{
 0%{background-position:0%}
 50%{background-position:100%}
 100%{background-position:0%}
}

.card{
 width:95%;
 max-width:500px;
 background:#fff;
 border-radius:25px;
 padding:20px;
 text-align:center;
}

.top{
 display:flex;
 justify-content:space-between;
 font-size:18px;
}

.timer{color:red;font-weight:bold;}

button{
 width:100%;
 padding:14px;
 margin:6px 0;
 border:none;
 border-radius:15px;
 font-size:18px;
 color:white;
}

.btn1{background:#ff6b6b;}
.btn2{background:#4dabf7;}
.btn3{background:#51cf66;}
.btn4{background:#ffd43b;color:black;}

.navBtn1{background:#845ef7;}
.navBtn2{background:#20c997;}
.navBtn3{background:#ff922b;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.screen{display:none;}
.active{display:block;}

.nav{display:flex;gap:8px;}
.nav button{flex:1;}

.lock{opacity:0.5;}
</style>
</head>

<body>

<div class="card">

<div class="top">
 ⭐ <span id="stars">0</span>
 🪙 <span id="coins">0</span>
 ⏱️ <span id="time" class="timer">10</span>
</div>

<h2>🎮 Kids Quiz PRO</h2>

<div id="start" class="screen active" onclick="startApp()">
 <h3>👉 Tap to Start</h3>
</div>

<div id="category" class="screen">
<button class="btn2" onclick="selectCat('math')">Math</button>
<button class="btn2" onclick="selectCat('english')">English</button>
<button class="btn2" onclick="selectCat('gk')">GK</button>
</div>

<div id="level" class="screen">
<button class="btn1" onclick="startGame('easy')">Easy</button>
<button id="medBtn" class="btn1 lock" onclick="startGame('medium')">🔒 Medium</button>
<button id="hardBtn" class="btn1 lock" onclick="startGame('hard')">🔒 Hard</button>

<button class="navBtn1" onclick="backToCategory()">⬅ Back</button>
</div>

<div id="game" class="screen">

<h3 id="q"></h3>
<div id="opts"></div>

<div class="nav">
 <button class="navBtn1" onclick="prev()">⬅ Prev</button>
 <button class="navBtn2" onclick="next()">Next ➡</button>
</div>

<button class="navBtn3" onclick="home()">🏠 Home</button>

</div>

</div>

<script>

let cat,i=0;
let stars=0,coins=0;
let timer,interval;

/* 🔓 LEVEL UNLOCK SYSTEM */
let unlockLevel={
 math:"easy",
 english:"easy",
 gk:"easy"
};

/* 🔊 SOUND */
function playSound(freq){
 let ctx=new (window.AudioContext||window.webkitAudioContext)();
 let o=ctx.createOscillator();
 let g=ctx.createGain();
 o.connect(g); g.connect(ctx.destination);
 o.frequency.value=freq;
 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
 o.stop(ctx.currentTime+0.5);
}

/* START */
function startApp(){
 speechSynthesis.speak(new SpeechSynthesisUtterance("Welcome to Kids Quiz Pro"));
 show("category");
}

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function selectCat(c){
 cat=c;
 updateLevelUI();
 show("level");
}

/* 🔓 UPDATE BUTTONS */
function updateLevelUI(){
 let med=document.getElementById("medBtn");
 let hard=document.getElementById("hardBtn");

 med.classList.add("lock");
 hard.classList.add("lock");

 med.innerText="🔒 Medium";
 hard.innerText="🔒 Hard";

 if(unlockLevel[cat]==="medium"){
  med.classList.remove("lock");
  med.innerText="Medium";
 }

 if(unlockLevel[cat]==="hard"){
  med.classList.remove("lock");
  hard.classList.remove("lock");
  med.innerText="Medium";
  hard.innerText="Hard";
 }
}

/* START GAME */
let diff="easy";

function startGame(d){

 if(d==="medium" && unlockLevel[cat]==="easy"){
  alert("Complete Easy first"); return;
 }

 if(d==="hard" && unlockLevel[cat]!=="hard"){
  alert("Complete Medium first"); return;
 }

 diff=d;
 i=0;
 show("game");
 load();
}

/* BACK BUTTON */
function backToCategory(){
 show("category");
}

/* SHUFFLE */
function shuffle(q){
 let arr=q.o.map((t,i)=>({t,correct:i===q.a}));
 arr.sort(()=>Math.random()-0.5);
 return {
  q:q.q,
  o:arr.map(x=>x.t),
  a:arr.findIndex(x=>x.correct)
 };
}

/* DATA (20 QUESTIONS EASY ONLY) */
const data={
math:{ easy:[{q:"2+2=?",o:["3","4","5","6"],a:1},{q:"5+3=?",o:["7","8","9","6"],a:1}] },
english:{ easy:[{q:"A is for?",o:["Apple","Ball","Cat","Dog"],a:0}] },
gk:{ easy:[{q:"How many days are there in a week?",o:["5","6","7","8"],a:2}] }
};

let current;

/* LOAD */
function load(){
 let q=data[cat].easy[i];
 current=shuffle(q);

 document.getElementById("q").innerText=current.q;

 let colors=["btn1","btn2","btn3","btn4"];
 let html="";
 current.o.forEach((op,idx)=>{
  html+=`<button class="${colors[idx]}" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;

 startTimer();
}

/* TIMER */
function startTimer(){
 clearInterval(interval);
 timer=10;
 document.getElementById("time").innerText=timer;

 interval=setInterval(()=>{
  timer--;
  document.getElementById("time").innerText=timer;
  if(timer===0){clearInterval(interval);next();}
 },1000);
}

/* CHECK */
function check(ans,btn){
 clearInterval(interval);

 if(ans===current.a){
  btn.classList.add("correct");
  stars++; coins+=10;
  playSound(900);
 }else{
  btn.classList.add("wrong");
  playSound(200);
 }

 document.getElementById("stars").innerText=stars;
 document.getElementById("coins").innerText=coins;

 setTimeout(()=>next(),700);
}

/* NEXT */
function next(){
 if(i < data[cat].easy.length-1){
  i++; load();
 }else{

  if(diff==="easy") unlockLevel[cat]="medium";
  else if(diff==="medium") unlockLevel[cat]="hard";

  alert("Level Completed!");
  show("category");
 }
}

function prev(){ if(i>0){i--;load();} }
function home(){ show("category"); }

</script>

</body>
</html>
