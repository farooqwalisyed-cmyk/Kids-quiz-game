<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background: linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 color:white;
}

.card{
 width:92%;
 max-width:420px;
 background: rgba(0,0,0,0.3);
 padding:20px;
 border-radius:20px;
 text-align:center;
 backdrop-filter: blur(10px);
}

button{
 padding:12px;
 margin:6px;
 border:none;
 border-radius:12px;
 font-size:16px;
 cursor:pointer;
}

.btn{
 width:100%;
 background:white;
 color:black;
}

.hidden{display:none;}

h2,h3{margin:10px 0;}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<button class="btn" onclick="toggleSound()">🔊 Sound: <span id="soundTxt">ON</span></button>

<div id="home">
  <button class="btn" onclick="goSetup()">Start Game</button>
</div>

<div id="setup" class="hidden">

  <h3>Select Category</h3>
  <button class="btn" onclick="setCat('math')">Math</button>
  <button class="btn" onclick="setCat('english')">English</button>
  <button class="btn" onclick="setCat('gk')">GK</button>

  <h3>Select Difficulty</h3>
  <button class="btn" onclick="setDiff('easy')">Easy</button>
  <button class="btn" onclick="setDiff('medium')">Medium</button>
  <button class="btn" onclick="setDiff('hard')">Hard</button>

  <button class="btn" onclick="startGame()">Play Quiz</button>

</div>

<div id="game" class="hidden">

  <h3 id="question">Loading...</h3>
  <div id="options"></div>

</div>

</div>

<script>

let cat = null;
let diff = null;
let index = 0;
let sound = true;

/* ---------------- SAFE QUESTION BANK (FIXED) ---------------- */

const data = {
 math:{
  easy:[
   {q:"2 + 2 = ?", o:["3","4","5"], a:1},
   {q:"5 + 3 = ?", o:["6","7","8"], a:2},
   {q:"10 - 4 = ?", o:["5","6","7"], a:1},
   {q:"3 + 6 = ?", o:["7","8","9"], a:2},
   {q:"2 x 2 = ?", o:["2","4","6"], a:1}
  ],
  medium:[
   {q:"12 + 8 = ?", o:["18","20","22"], a:1},
   {q:"15 - 7 = ?", o:["6","8","9"], a:1}
  ],
  hard:[
   {q:"12 x 12 = ?", o:["124","144","154"], a:1}
  ]
 },

 english:{
  easy:[
   {q:"A for ?", o:["Apple","Ball","Cat"], a:0},
   {q:"B for ?", o:["Bat","Dog","Egg"], a:0}
  ],
  medium:[
   {q:"Plural of Book?", o:["Books","Bookies","Booked"], a:0}
  ],
  hard:[
   {q:"Opposite of Happy?", o:["Joy","Sad","Glad"], a:1}
  ]
 },

 gk:{
  easy:[
   {q:"Days in a week?", o:["5","6","7"], a:2},
   {q:"Capital of India?", o:["Delhi","Mumbai","Chennai"], a:0}
  ],
  medium:[
   {q:"How many continents?", o:["5","6","7"], a:2}
  ],
  hard:[
   {q:"Largest ocean?", o:["Atlantic","Pacific","Arctic"], a:1}
  ]
 }
};

/* ---------------- UI FLOW FIX ---------------- */

function goSetup(){
 document.getElementById("home").style.display="none";
 document.getElementById("setup").style.display="block";
}

function setCat(c){
 cat = c;
}

function setDiff(d){
 diff = d;
}

function startGame(){

 if(!cat || !diff){
  alert("⚠ Please select Category and Difficulty");
  return;
 }

 index = 0;

 document.getElementById("setup").style.display="none";
 document.getElementById("game").style.display="block";

 loadQuestion();
}

/* ---------------- SAFE LOADER (IMPORTANT FIX) ---------------- */

function loadQuestion(){

 let questions = data?.[cat]?.[diff];

 if(!questions){
  document.getElementById("question").innerText = "No questions found!";
  return;
 }

 let q = questions[index];

 if(!q){
  alert("🎉 Level Completed!");
  location.reload();
  return;
 }

 document.getElementById("question").innerText = q.q;

 let html = "";

 q.o.forEach((opt,i)=>{
  html += `<button class="btn" onclick="check(${i})">${opt}</button>`;
 });

 document.getElementById("options").innerHTML = html;
}

/* ---------------- ANSWER CHECK ---------------- */

function check(i){

 let q = data[cat][diff][index];

 if(i === q.a){
  if(sound) console.log("Correct Sound");
 } else {
  if(sound) console.log("Wrong Sound");
 }

 index++;
 loadQuestion();
}

/* ---------------- SOUND TOGGLE ---------------- */

function toggleSound(){
 sound = !sound;
 document.getElementById("soundTxt").innerText = sound ? "ON" : "OFF";
}

</script>

</body>
</html>
