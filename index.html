<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Quiz PRO MAX</title>

<style>
body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background: linear-gradient(135deg,#9b8cff,#ffb3b3);
}

.card{
 width:95%;
 max-width:500px;
 background:white;
 border-radius:30px;
 padding:20px;
 box-shadow:0 10px 30px rgba(0,0,0,0.2);
 text-align:center;
}

button{
 width:100%;
 padding:16px;
 margin:8px 0;
 border:none;
 border-radius:20px;
 font-size:18px;
 color:white;
}

.btn-blue{background:#4dabf7;}
.btn-pink{background:#ff7eb3;}
.btn-gray{background:#ccc;color:#555;}

.correct{background:#2ecc71 !important;}
.wrong{background:#e74c3c !important;}

.screen{display:none;}
.active{display:block;}

.tap{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0.3;}}

.lock{opacity:0.5;}
</style>
</head>

<body>

<div class="card">

<h2>🎮 Kids Quiz PRO</h2>

<div id="start" class="screen active" onclick="startApp()">
 <h3 class="tap">👉 Tap to Start</h3>
</div>

<div id="category" class="screen">
<button class="btn-blue" onclick="selectCat('math')">Math</button>
<button class="btn-blue" onclick="selectCat('english')">English</button>
<button class="btn-blue" onclick="selectCat('gk')">GK</button>
</div>

<div id="level" class="screen">
<button onclick="startGame('easy')" class="btn-pink">Easy</button>
<button id="medBtn" onclick="startGame('medium')" class="btn-pink lock">🔒 Medium</button>
<button id="hardBtn" onclick="startGame('hard')" class="btn-pink lock">🔒 Hard</button>
</div>

<div id="game" class="screen">
<h3 id="q"></h3>
<div id="opts"></div>
<button class="btn-gray" onclick="next()">Next</button>
</div>

</div>

<script>

let cat,diff,i=0;
let unlocked={math:"easy",english:"easy",gk:"easy"};

let audioCtx;

/* 🔊 SOUND FIX */
function playSound(type){
 if(!audioCtx){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
 }
 let o=audioCtx.createOscillator();
 let g=audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);

 o.frequency.value = (type==="correct") ? 800 : 200;

 o.start();
 g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
 o.stop(audioCtx.currentTime+0.4);
}

/* START */
function startApp(){
 speak("Welcome to Kids Quiz Pro");
 show("category");
}

function speak(text){
 speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

function show(id){
 document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function selectCat(c){
 cat=c;
 updateUI();
 show("level");
}

/* 🔒 LEVEL FIX */
function updateUI(){
 let med=document.getElementById("medBtn");
 let hard=document.getElementById("hardBtn");

 med.classList.add("lock");
 hard.classList.add("lock");

 med.innerText="🔒 Medium";
 hard.innerText="🔒 Hard";

 if(unlocked[cat]==="medium"){
  med.classList.remove("lock");
  med.innerText="Medium";
 }

 if(unlocked[cat]==="hard"){
  med.classList.remove("lock");
  hard.classList.remove("lock");
  med.innerText="Medium";
  hard.innerText="Hard";
 }
}

function startGame(d){
 if(d==="medium" && unlocked[cat]==="easy"){alert("Complete Easy first");return;}
 if(d==="hard" && unlocked[cat]!=="hard"){alert("Complete Medium first");return;}

 diff=d;
 i=0;
 show("game");
 load();
}

/* 🎯 RANDOMIZE ANSWERS */
function shuffle(q){
 let arr=q.o.map((text,index)=>({text,correct:index===q.a}));
 arr.sort(()=>Math.random()-0.5);
 let newA=arr.findIndex(x=>x.correct);
 return {q:q.q,o:arr.map(x=>x.text),a:newA};
}

/* DATA (PRO GK FIXED) */
const data={
gk:{
 easy:[
  {q:"How many days are there in a week?",o:["5","6","7"],a:2},
  {q:"Which animal says meow?",o:["Dog","Cat","Cow"],a:1},
  {q:"What color is the sky?",o:["Blue","Green","Red"],a:0},
  {q:"How many legs does a dog have?",o:["2","4","6"],a:1},
  {q:"Which fruit is yellow?",o:["Apple","Banana","Grapes"],a:1}
 ],
 medium:[
  {q:"What is the capital of India?",o:["Delhi","Mumbai","Chennai"],a:0}
 ],
 hard:[
  {q:"Who invented the light bulb?",o:["Newton","Edison","Tesla"],a:1}
 ]
},

math:{
 easy:[
  {q:"2 + 2 = ?",o:["3","4","5"],a:1},
  {q:"5 + 3 = ?",o:["7","8","9"],a:1}
 ],
 medium:[
  {q:"12 + 8 = ?",o:["18","20","22"],a:1}
 ],
 hard:[
  {q:"12 × 12 = ?",o:["144","124","154"],a:0}
 ]
},

english:{
 easy:[
  {q:"A is for?",o:["Apple","Ball","Cat"],a:0},
  {q:"B is for?",o:["Ball","Dog","Egg"],a:0}
 ],
 medium:[
  {q:"Plural of 'Book'?",o:["Books","Book","Booked"],a:0}
 ],
 hard:[
  {q:"Opposite of 'Happy'?",o:["Sad","Joy","Fun"],a:0}
 ]
}
};

let current;

/* LOAD */
function load(){
 let q=data[cat][diff][i];
 current=shuffle(q);

 document.getElementById("q").innerText=current.q;

 let html="";
 current.o.forEach((op,idx)=>{
  html+=`<button class="btn-blue" onclick="check(${idx},this)">${op}</button>`;
 });

 document.getElementById("opts").innerHTML=html;
}

/* CHECK */
function check(ans,btn){

 if(ans===current.a){
  btn.classList.add("correct");
  playSound("correct");
 }else{
  btn.classList.add("wrong");
  playSound("wrong");
 }

 setTimeout(()=>next(),600);
}

/* NEXT */
function next(){
 if(i < data[cat][diff].length-1){
  i++; load();
 }else{
  if(diff==="easy") unlocked[cat]="medium";
  else if(diff==="medium") unlocked[cat]="hard";

  alert("Level Completed!");
  show("category");
 }
}

</script>

</body>
</html>
