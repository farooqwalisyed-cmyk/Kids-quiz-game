<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Quiz PRO</title>

<style>
body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:0.6s;
overflow:hidden;
}

/* 🎨 THEMES FIXED */
body.kids{background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);}
body.dark{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);}
body.neon{background:linear-gradient(135deg,#00f5ff,#7cffcb,#ff61d2);}

.card{
width:92%;
max-width:520px;
background:white;
border-radius:20px;
padding:18px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
z-index:2;
position:relative;
}

.card.dark{background:#1e1e1e;color:white;}
.card.neon{background:#001a1a;color:#0ff;}
.card.kids{background:#fff;}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.p1{background:#ffdd59;}
.p2{background:#1dd1a1;}
.p3{background:#54a0ff;}
.p4{background:#ff6b6b;color:white;}

.hidden{display:none;}

/* 🎉 CONFETTI FIX (ANIMATED + ROTATION) */
.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
border-radius:50%;
animation:fall linear forwards;
opacity:0.9;
}

@keyframes fall{
0%{
transform:translateY(0) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(720deg);
}
}
</style>
</head>

<body class="kids">

<div id="confetti-container"></div>

<div class="card kids" id="card">

<div>
⭐ <span id="stars">0</span> |
🪙 <span id="coins">0</span>
</div>

<h2>🎮 Kids Quiz PRO</h2>

<button class="btn p3" onclick="changeTheme()">🎨 Theme</button>

<div id="startScreen">
<button class="btn p1" onclick="startGame()">Start Game</button>
</div>

<div id="catScreen" class="hidden">
<button class="btn p2" onclick="selectCat('math')">Math</button>
<button class="btn p3" onclick="selectCat('english')">English</button>
<button class="btn p4" onclick="selectCat('gk')">GK</button>
</div>

<div id="levelScreen" class="hidden">
<button class="btn p1" onclick="selectLevel(0)">Easy</button>
<button class="btn p2" onclick="selectLevel(1)">Medium</button>
<button class="btn p3" onclick="selectLevel(2)">Hard</button>
<button class="btn p4" onclick="backToCategory()">⬅ Back</button>
</div>

<div id="gameScreen" class="hidden">
<h3 id="q"></h3>
<div id="opts"></div>

<button class="btn p2" onclick="prevQ()">⬅ Prev</button>
<button class="btn p3" onclick="nextQ()">Next ➡</button>
<button class="btn p4" onclick="goHome()">🏠 Home</button>
</div>

</div>

<script>

/* 🔊 SOUND (UNCHANGED) */
function sound(type){
let s="";
if(type==="welcome") s="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg";
if(type==="correct") s="https://actions.google.com/sounds/v1/cartoon/pop.ogg";
if(type==="wrong") s="https://actions.google.com/sounds/v1/cartoon/boing.ogg";
if(s) new Audio(s).play();
}

/* 🎤 VOICE */
function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.rate=0.75;
msg.pitch=1.8;
speechSynthesis.speak(msg);
}

/* 🎨 FIX: THEME SWITCH WORKING PROPERLY */
function changeTheme(){
let body=document.body;
let card=document.getElementById("card");

if(body.classList.contains("kids")){
body.className="dark";
card.className="card dark";
}
else if(body.classList.contains("dark")){
body.className="neon";
card.className="card neon";
}
else{
body.className="kids";
card.className="card kids";
}
}

/* 🎉 FIX: ANIMATED CONFETTI SYSTEM */
function blast(){
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*window.innerWidth+"px";
c.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
c.style.animationDuration=(2+Math.random()*2)+"s";
document.body.appendChild(c);

setTimeout(()=>c.remove(),4000);
}
}

/* 📚 QUESTIONS (UNCHANGED) */
const data={
math:[
[
{q:"2+3=?",o:["4","5","6","7"],a:1},
{q:"4+5=?",o:["7","8","9","10"],a:2}
],
[
{q:"10+5=?",o:["14","15","16","17"],a:1}
],
[
{q:"20+15=?",o:["30","35","40","45"],a:1}
]
],

english:[
[
{q:"Apple is?",o:["Fruit","Car","Animal","City"],a:0}
],
[
{q:"Opposite Hot?",o:["Cold","Warm","Fire","Heat"],a:0}
],
[
{q:"Past go?",o:["Went","Goed","Gone","Going"],a:0}
]
],

gk:[
[
{q:"Capital India?",o:["Delhi","Mumbai","Goa","Chennai"],a:0}
],
[
{q:"Fastest animal?",o:["Cheetah","Lion","Tiger","Horse"],a:0}
],
[
{q:"CPU is?",o:["Brain","Heart","Eye","Hand"],a:0}
]
]
};

let cat="",level=0,i=0;

/* START */
function startGame(){
sound("welcome");
show("catScreen");
}

/* CATEGORY */
function selectCat(c){cat=c;show("levelScreen");}

/* LEVEL */
function selectLevel(l){level=l;i=0;show("gameScreen");load();}

function load(){
let q=data[cat][level][i];
document.getElementById("q").innerText=q.q;

let html="";
q.o.forEach((o,idx)=>{
html+=`<button class="btn p1" onclick="check(${idx})">${o}</button>`;
});
document.getElementById("opts").innerHTML=html;

speechSynthesis.cancel();
speak(q.q);
}

function check(ans){
let q=data[cat][level][i];

if(ans==q.a){
sound("correct");
blast();
}else{
sound("wrong");
}

setTimeout(nextQ,500);
}

function nextQ(){
if(i<data[cat][level].length-1){
i++;load();
}else{
show("catScreen");
}
}

function prevQ(){if(i>0){i--;load();}}
function goHome(){show("catScreen");}

function backToCategory(){show("catScreen");}

function show(id){
["startScreen","catScreen","levelScreen","gameScreen"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

</script>
</body>
</html>
